<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="douyin:gallery.page.title"></title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <script src="/js/pixiv-vue.js"></script>
    <script src="/js/pixiv-navigation.js"></script>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/css/lang-theme-switcher.css">
    <link rel="stylesheet" href="/pixiv-douyin-gallery/pixiv-douyin-gallery.css">
</head>
<body>
<div class="douyin-gallery-shell">
    <aside class="douyin-gallery-sidebar" id="douyinGallerySidebar">
        <div class="douyin-gallery-brand">
            <span class="douyin-gallery-brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 5v11a4 4 0 1 1-3-3.87"/>
                    <path d="M8 5c2.4 3.2 4.8 4.8 8 5"/>
                </svg>
            </span>
            <span class="douyin-gallery-brand-label" data-i18n="douyin:gallery.sidebar.brand"></span>
        </div>

        <div class="douyin-gallery-section-title" data-i18n="douyin:gallery.sidebar.categories"></div>
        <nav class="douyin-gallery-category-nav" data-i18n-aria-label="douyin:gallery.sidebar.categories">
            <a class="douyin-gallery-category" data-gallery-view="all"
               href="/pixiv-douyin-gallery.html?view=all">
                <span class="douyin-gallery-category-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </span>
                <span data-i18n="douyin:gallery.category.all"></span>
            </a>
            <a class="douyin-gallery-category" data-gallery-view="image"
               href="/pixiv-douyin-gallery.html?view=image">
                <span class="douyin-gallery-category-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="16" rx="2"/>
                        <circle cx="9" cy="10" r="2"/>
                        <path d="m21 15-5-5L5 20"/>
                    </svg>
                </span>
                <span data-i18n="douyin:gallery.category.image"></span>
            </a>
            <a class="douyin-gallery-category" data-gallery-view="video"
               href="/pixiv-douyin-gallery.html?view=video">
                <span class="douyin-gallery-category-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="5" width="18" height="14" rx="2"/>
                        <path d="m10 9 5 3-5 3Z"/>
                    </svg>
                </span>
                <span data-i18n="douyin:gallery.category.video"></span>
            </a>
        </nav>
    </aside>

    <button class="douyin-gallery-overlay" id="douyinGalleryOverlay" type="button"
            data-i18n-aria-label="douyin:gallery.sidebar.close"></button>

    <main class="douyin-gallery-main">
        <header class="douyin-gallery-topbar">
            <button class="douyin-gallery-menu" id="douyinGalleryMenu" type="button"
                    data-i18n-aria-label="douyin:gallery.sidebar.open">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="douyin-gallery-heading" data-i18n="douyin:gallery.heading"></h1>
            <div class="gallery-type-switch" role="tablist"
                 data-i18n-aria-label="douyin:gallery.type-switch">
                <span data-nav-slot="gallery.type-switch"
                      data-nav-link-class="gallery-type-option"
                      data-nav-no-icon data-nav-item-role="tab"></span>
            </div>
            <div class="douyin-gallery-topbar-actions" id="douyinGallerySwitchers"></div>
        </header>

        <div class="douyin-gallery-content">
            <div class="douyin-gallery-status" id="douyinGalleryStatus" role="status" aria-live="polite"></div>
            <section class="douyin-gallery-grid" id="douyinGalleryGrid"
                     data-i18n-aria-label="douyin:gallery.results"></section>
            <div class="douyin-gallery-pagination">
                <button class="douyin-gallery-load-more" id="douyinGalleryLoadMore" type="button" hidden
                        data-i18n="douyin:gallery.action.load-more"></button>
            </div>
        </div>
    </main>
</div>

<script src="/pixiv-douyin-gallery/douyin-gallery-core.js"></script>
<script src="/pixiv-douyin-gallery/douyin-gallery-view.js"></script>
<script src="/pixiv-douyin-gallery/douyin-gallery-init.js"></script>
</body>
</html>
