# PF4J 外置插件描述符（位于插件 jar 根部，由 PF4J PropertiesPluginDescriptorFinder 读取）。
# 字段与 org.pf4j.PropertiesPluginDescriptorFinder / 核心 PluginPackageReader 的 key 完全一致。
plugin.id=stats
# 插件包自身版本（合法 semver；当前未发布初始版本为 1.0.0，后续发布时独立递增）。
plugin.version=1.0.0
# 所需核心 API 契约版本（major.minor）；由核心发现桥接据 PluginApiVersion.isCompatible 判定，不满足即拒绝接入。
plugin.requires=1.0
# 插件主类：继承 org.pf4j.Plugin 并实现入口契约 PixivPluginProvider，暴露统计功能插件 StatsPlugin。
plugin.class=top.sywyar.pixivdownload.stats.StatsPf4jPlugin
plugin.provider=Sywyar
plugin.description=统计仪表盘功能插件：管理员专属只读聚合页面与 /api/stats/**。
pixiv.display-namespace=stats
pixiv.display-name-key=plugin.name
pixiv.description-key=plugin.summary
pixiv.icon-key=chart-line
pixiv.color-token=green
pixiv.lifecycle-policy=hot-reload
