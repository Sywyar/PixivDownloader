plugin.name=邮件通知
plugin.summary=SMTP 邮件通知发送与模板。
gui.config.field.mail.enabled.label=启用邮件发送
gui.config.field.mail.enabled.help=关闭时所有发信都跳过；开启后计划任务在过度访问警告 / 登录态失效等需要人工介入的事件发生时会通过此通道通知管理员
gui.config.field.mail.host.label=SMTP 主机
gui.config.field.mail.host.help=如 smtp.163.com / smtp.qq.com；选择左上方"服务商预设"可自动填入
gui.config.field.mail.port.label=SMTP 端口
gui.config.field.mail.port.help=默认 587；SSL 通常 465，STARTTLS 通常 587
gui.config.field.mail.security.label=加密方式
gui.config.field.mail.security.help=none = 明文（仅本机/内网测试）；ssl = 整条 TCP 由 TLS 包裹（SMTPS，常 465）；starttls = 明文连接后升级 TLS（常 587）
gui.config.field.mail.username.label=SMTP 用户名
gui.config.field.mail.username.help=通常是完整邮箱地址
gui.config.field.mail.password.label=SMTP 密码 / 授权码
gui.config.field.mail.password.help=注意：大多数邮箱不接受登录密码，需要在邮箱网站申请"授权码 / 应用专用密码 / 客户端专用密码"；密码绝不会出现在日志或邮件正文中
gui.config.field.mail.from.label=发件人邮箱
gui.config.field.mail.from.help=留空时回退用 SMTP 用户名
gui.config.field.mail.to.label=收件人邮箱
gui.config.field.mail.to.help=支持逗号分隔多个收件人
gui.config.field.mail.socks-proxy.label=SOCKS 代理
gui.config.field.mail.socks-proxy.help=可选；格式 host:port（如 127.0.0.1:1080），用于网络环境屏蔽 SMTP 时；既有的 HTTP 代理不承载 SMTP，故此处独立
gui.config.field.mail.subject-prefix.label=邮件主题前缀
gui.config.field.mail.subject-prefix.help=拼接在模板标题前，便于客户端过滤；默认 [PixivDownloader]
gui.config.mail.preset.label=服务商预设
gui.config.mail.preset.help=选中后会自动填入并锁定主机 / 端口 / 加密方式；如需非标准端口请选择"自定义"
gui.config.mail.test-button.label=发送测试邮件
gui.config.mail.test-button.help=用当前表单设置（无需先保存）向收件人发送一封"邮件配置成功"邮件；收到即代表 SMTP 配置生效
gui.config.mail.test.notice.sending=正在发送测试邮件，请稍候…
gui.config.mail.test.notice.success=测试邮件已发送，请前往收件人邮箱查收
gui.config.mail.test.notice.failed=测试邮件发送失败：{0}
gui.config.mail.test.notice.unreachable=无法连接到后端服务，请确认服务正在运行
gui.config.mail.test-all.button.label=发送所有邮件模板
gui.config.mail.test-all.button.help=使用示例数据依次发送全部通知邮件模板，便于一次性预览所有邮件样式
gui.config.mail.test-all.notice.sending=正在依次发送所有邮件模板，请稍候…
gui.config.mail.test-all.notice.success=已发送全部 {0} 封邮件模板，请前往收件人邮箱查收
gui.config.mail.test-all.notice.partial=已发送 {0} / {1} 封邮件模板，部分失败：{2}
mail.preset.name.netease-163=163 邮箱（smtp.163.com）
mail.preset.name.netease-126=126 邮箱（smtp.126.com）
mail.preset.name.netease-yeah=网易 yeah.net（smtp.yeah.net）
mail.preset.name.qq=QQ 邮箱（smtp.qq.com）
mail.preset.name.sina=新浪邮箱（smtp.sina.com）
mail.preset.name.gmail=Gmail（个人）
mail.preset.name.outlook=Outlook.com（个人）
mail.preset.name.icloud=iCloud
mail.preset.name.yahoo=Yahoo
mail.preset.name.netease-qiye=网易企业邮箱
mail.preset.name.tencent-exmail=腾讯企业邮箱
mail.preset.name.aliyun-qiye=阿里云企业邮箱
mail.preset.name.ms365=Microsoft 365（企业）
mail.preset.name.google-workspace=Gmail / Workspace（企业）
mail.preset.name.custom=自定义
mail.preset.help.authcode=⚠️ 国内主流邮箱（163 / 126 / yeah / QQ / 新浪）通常拒绝登录密码，需要在邮箱网站"设置 → 账号 → 客户端授权码 / 第三方授权码"申请专用授权码作为 SMTP 密码使用。
mail.preset.help.app-password=⚠️ 个人邮箱（Gmail / Outlook.com / iCloud / Yahoo）通常需要先开启两步验证，再生成"应用专用密码（App Password）"作为 SMTP 密码使用，不能用普通登录密码。
mail.preset.help.netease-qiye=⚠️ 网易企业邮箱需要使用客户端授权码；SMTP 地址可能随开通时间不同（部分租户为 smtphz.qiye.163.com），若发送失败请到企业邮箱管理后台核对实际地址。
mail.preset.help.tencent-exmail=⚠️ 腾讯企业邮箱需要在管理员后台或个人设置中开启 SMTP 并使用"客户端专用密码"作为 SMTP 密码。
mail.preset.help.aliyun-qiye=⚠️ 阿里云企业邮箱需要在邮箱设置中开启"三方客户端安全密码"，并使用该密码而非登录密码。
mail.preset.help.ms365=⚠️ Microsoft 365（office365.com）自 2022-10 起默认禁用 SMTP AUTH 的基础密码认证，需管理员显式为此邮箱开启 SMTP AUTH；否则只支持 OAuth（本程序本期不支持），基础密码会被拒绝。
mail.preset.help.google-workspace=⚠️ Google Workspace 自 2025-05 起强制 OAuth 登录，基础应用密码会被拒；本程序本期不支持 OAuth，企业用户暂时无法通过该预设直连。
mail.preset.help.custom=自定义模式：请自行填写 SMTP 主机 / 端口 / 加密方式。密码字段通常需要授权码 / 应用专用密码，详见你的邮件服务商文档。
