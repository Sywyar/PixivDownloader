plugin.name=TTS 朗读
plugin.summary=在线 TTS 与小说朗读语音引擎。
listen=🎧 听书
play=播放
pause=暂停
prev=上一段
next=下一段
stop=停止
settings=朗读设置
close=关闭
seek=点击跳转到对应段落
engine=引擎
engine.browser=浏览器（离线）
engine.edge=在线（Edge 神经语音）
engine.narration=富感情朗读（多角色·beta）
engine.narration-debug=富感情朗读（多角色·beta·调试）
narration-degraded=富感情朗读暂不可用，已切换为{engine}
voice=语音
rate=语速
synthesizing=合成中… {cur}/{total}
no-content=没有可朗读的正文
browser-unsupported=当前浏览器不支持内置语音朗读
hint.browser=浏览器引擎：完全离线、即时、免费；音质与可用语言取决于系统已安装的语音包。
hint.edge=在线引擎（Edge 神经语音）：音质自然、语言丰富、免费；需联网（经后端代理），有轻微合成延迟。
hint.narration=富感情朗读（beta，可用但尚不稳定）：由后端 AI 把整章逐句归属到说话人，每个角色用固定音色经富情感引擎逐句合成多角色有声书；需在后端配置朗读引擎（仅管理员可用）。首次播放才会触发分析，可在「朗读分析设置 → 朗读花名册」中编辑各角色音色、处理冲突。
hint.narration-debug=调试模式：富感情朗读引擎当前不可用，已允许选中本引擎仅用于运行分析、查看说话人与音色结果；逐句语音合成会失败。
gui.config.group.narration-tts=AI 听小说朗读
gui.config.tts.modality.label=模态
gui.config.tts.modality.help=选择要配置的 AI 模态：「文本模型」是通用大语言模型（OpenAI 兼容，供翻译 / 听小说剧本分析等使用）；「TTS 模型」是多角色听小说朗读的语音合成引擎（beta，可用但尚不稳定）。两类配置同时保存并生效，下拉仅切换当前编辑项
gui.config.tts.modality.tts=TTS 模型（beta）
gui.config.field.narration-tts.engine.label=朗读引擎
gui.config.field.narration-tts.engine.help=多角色朗读使用的 TTS 引擎；选定后在下方填写该引擎对应的地址 / 密钥等参数
gui.config.field.narration-tts.engine.value.voxcpm=VoxCPM（本地 / 自托管）
gui.config.field.narration-tts.engine.value.mimo=小米 MiMo（云 API）
gui.config.field.narration-tts.engine.value.cosyvoice=CosyVoice（自建）
gui.config.field.narration-tts.engine.value.fish=Fish Audio（云 API）
gui.config.field.narration-tts.engine.value.minimax=MiniMax（云 API）
gui.config.field.narration-tts.engine.value.elevenlabs=ElevenLabs（云 API）
gui.config.field.narration-tts.engine.value.qwen=阿里通义千问 Qwen3-TTS（百炼）
gui.config.field.narration-tts.engine.value.doubao=字节豆包 / Seed-TTS（火山引擎）
gui.config.field.narration-tts.voxcpm.base-url.label=VoxCPM 地址
gui.config.field.narration-tts.voxcpm.base-url.help=VoxCPM 的 OpenAI 兼容端点，如 http://127.0.0.1:8000/v1（需带 /v1）。VoxCPM 是需 GPU 的外部服务，由你自行以 vllm serve openbmb/VoxCPM2 --omni 启动，缺少 --omni 不会暴露音频端点；留空则该引擎不可用
gui.config.field.narration-tts.voxcpm.api-key.label=API Key
gui.config.field.narration-tts.voxcpm.api-key.help=vLLM 默认可留空；绝不会出现在日志或任何响应中
gui.config.field.narration-tts.voxcpm.model.label=模型
gui.config.field.narration-tts.voxcpm.model.help=VoxCPM 模型名，默认 openbmb/VoxCPM2
gui.config.field.narration-tts.voxcpm.voice.label=voice id
gui.config.field.narration-tts.voxcpm.voice.help=OpenAI 兼容 /audio/speech 的 voice 字段，不决定音色（VoxCPM 音色由内联描述/参考音承载）。VoxCPM 这类 voice-design/克隆模型通常没有任何预设音色（服务端报 Invalid voice '...'. Supported: none 即指预设列表为空），带任何 voice 值都会被拒；故默认留空=不下发该字段，仅当某构建明确要求某个 voice 名时才填
gui.config.field.narration-tts.voxcpm.response-format.label=输出格式
gui.config.field.narration-tts.voxcpm.response-format.help=音频输出格式：wav 或 pcm，默认 wav
gui.config.field.narration-tts.voxcpm.use-proxy.label=使用代理
gui.config.field.narration-tts.voxcpm.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port）；VoxCPM 多为本机/内网服务，通常无需开启。独立于全局代理开关
gui.config.field.narration-tts.voxcpm.enable-clone.label=启用参考音克隆
gui.config.field.narration-tts.voxcpm.enable-clone.help=开启后，为角色生成 / 上传「标准音 / 参考音」时用其音色克隆（逐句情绪仍生效，音色更跨章一致）；关闭则即便已配参考音也退回内联音色画像
gui.config.field.narration-tts.voxcpm.clone-mode.label=克隆模式
gui.config.field.narration-tts.voxcpm.clone-mode.help=配了参考音时的克隆方式：controllable（可控克隆，默认）只送参考音、保住逐句情绪，克隆音色又能演情绪；hifi（Hi-Fi 续写）额外送参考音转录，保真度最高，但会忽略逐句情绪控制，且仅在该角色参考音带转录时生效、否则该句自动降回可控克隆
gui.config.field.narration-tts.voxcpm.max-new-tokens.label=生成 token 上限
gui.config.field.narration-tts.voxcpm.max-new-tokens.help=所有 VoxCPM 合成请求（voice-design 与克隆）的生成 token 上限，兜底 vllm-omni 已知 bug（停止符可能不触发导致无限生成）。0 表示不限制；长句被截断时可调高——注意调低会同时作用于普通 voice-design 朗读与克隆，可能截断较长句子
gui.config.field.narration-tts.mimo.base-url.label=MiMo 地址
gui.config.field.narration-tts.mimo.base-url.help=小米 MiMo 开放平台的 OpenAI 兼容地址，默认 https://api.xiaomimimo.com/v1（引擎在其后拼接 /chat/completions）
gui.config.field.narration-tts.mimo.api-key.label=API Key
gui.config.field.narration-tts.mimo.api-key.help=MiMo API Key（经 api-key 请求头发送，非 Bearer）；绝不会出现在日志或任何响应中。未配置则该引擎不可用
gui.config.field.narration-tts.mimo.model.label=预置音色模型
gui.config.field.narration-tts.mimo.model.help=配置了「预置音色 id」时使用的模型，默认 mimo-v2.5-tts
gui.config.field.narration-tts.mimo.voice-design-model.label=描述音色模型
gui.config.field.narration-tts.mimo.voice-design-model.help=未配预置音色时按角色音色画像生成音色所用的模型，默认 mimo-v2.5-tts-voicedesign
gui.config.field.narration-tts.mimo.voice-clone-model.label=克隆音色模型
gui.config.field.narration-tts.mimo.voice-clone-model.help=角色配了参考音时用其音色克隆所用的模型，默认 mimo-v2.5-tts-voiceclone
gui.config.field.narration-tts.mimo.voice.label=预置音色 id
gui.config.field.narration-tts.mimo.voice.help=填写则用「预置音色模型」+ 该音色（如 Chloe / 茉莉），角色画像作风格微调；留空则用「描述音色模型」按画像生成音色
gui.config.field.narration-tts.mimo.response-format.label=输出格式
gui.config.field.narration-tts.mimo.response-format.help=音频输出格式：wav 或 pcm16，默认 wav
gui.config.field.narration-tts.mimo.use-proxy.label=使用代理
gui.config.field.narration-tts.mimo.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port）；MiMo 为云服务，按需开启。独立于全局代理开关
gui.config.field.narration-tts.mimo.enable-clone.label=启用参考音克隆
gui.config.field.narration-tts.mimo.enable-clone.help=开启后，角色有参考音时用克隆模型复刻音色；关闭则即便已配参考音也退回描述音色
gui.config.field.narration-tts.cosyvoice.base-url.label=CosyVoice 地址
gui.config.field.narration-tts.cosyvoice.base-url.help=CosyVoice 的 OpenAI 兼容地址，如 http://127.0.0.1:8000/v1（引擎在其后拼接 /audio/speech）。CosyVoice 是需 GPU 的外部服务，由你自行部署（vox-box / Xinference 等）；不同部署字段名略有差异。留空则该引擎不可用
gui.config.field.narration-tts.cosyvoice.api-key.label=API Key
gui.config.field.narration-tts.cosyvoice.api-key.help=自建服务默认可留空；绝不会出现在日志或任何响应中
gui.config.field.narration-tts.cosyvoice.model.label=模型
gui.config.field.narration-tts.cosyvoice.model.help=CosyVoice 模型名，默认 CosyVoice2-0.5B
gui.config.field.narration-tts.cosyvoice.voice.label=预置音色
gui.config.field.narration-tts.cosyvoice.voice.help=voice-design 时下发的预置音色 / 角色（如 中文女）；不同部署预置名不同，留空则不下发
gui.config.field.narration-tts.cosyvoice.response-format.label=输出格式
gui.config.field.narration-tts.cosyvoice.response-format.help=音频输出格式：wav / mp3 / pcm，默认 wav
gui.config.field.narration-tts.cosyvoice.use-proxy.label=使用代理
gui.config.field.narration-tts.cosyvoice.use-proxy.help=开启后本引擎的请求走 HTTP 代理；CosyVoice 多为本机/内网服务，通常无需开启。独立于全局代理开关
gui.config.field.narration-tts.cosyvoice.enable-clone.label=启用参考音克隆
gui.config.field.narration-tts.cosyvoice.enable-clone.help=开启后，角色有参考音时以 reference_audio 送参考音克隆音色（自然语言 instruct 仍控制逐句情绪）；关闭则退回 instruct 描述
gui.config.field.narration-tts.fish.base-url.label=Fish Audio 地址
gui.config.field.narration-tts.fish.base-url.help=Fish Audio 地址，默认 https://api.fish.audio（引擎在其后拼接 /v1/tts）
gui.config.field.narration-tts.fish.api-key.label=API Key
gui.config.field.narration-tts.fish.api-key.help=Fish Audio API Key（Authorization: Bearer）；绝不会出现在日志或任何响应中。未配置则该引擎不可用
gui.config.field.narration-tts.fish.model.label=模型
gui.config.field.narration-tts.fish.model.help=Fish 模型（经 model 请求头发送，如 s1 / s2-pro），默认 s1
gui.config.field.narration-tts.fish.reference-id.label=声音模型 id
gui.config.field.narration-tts.fish.reference-id.help=Fish 控制台预创建 / 上传的声音模型 id（reference_id），决定音色；留空则用账户默认音色。Fish 不支持「纯文本描述生成音色」，逐句情绪以行内标记注入，且本机参考音克隆需先在 Fish 侧上传换取该 id
gui.config.field.narration-tts.fish.format.label=输出格式
gui.config.field.narration-tts.fish.format.help=音频输出格式：mp3 / wav / pcm / opus，默认 mp3
gui.config.field.narration-tts.fish.use-proxy.label=使用代理
gui.config.field.narration-tts.fish.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port），独立于全局代理开关
gui.config.field.narration-tts.minimax.base-url.label=MiniMax 地址
gui.config.field.narration-tts.minimax.base-url.help=MiniMax 地址，默认 https://api.minimax.io/v1（引擎在其后拼接 /t2a_v2；国内站点为 https://api.minimaxi.chat/v1）
gui.config.field.narration-tts.minimax.api-key.label=API Key
gui.config.field.narration-tts.minimax.api-key.help=MiniMax API Key（Authorization: Bearer）；绝不会出现在日志或任何响应中。未配置则该引擎不可用
gui.config.field.narration-tts.minimax.group-id.label=GroupId
gui.config.field.narration-tts.minimax.group-id.help=MiniMax 账户 GroupId（控制台可见的 19 位数字）；T2A v2 必填，作为 URL 查询参数随请求下发、与 API Key 配对，留空则该引擎不可用
gui.config.field.narration-tts.minimax.model.label=模型
gui.config.field.narration-tts.minimax.model.help=MiniMax 模型名，默认 speech-2.8-hd
gui.config.field.narration-tts.minimax.voice-id.label=预置音色 id
gui.config.field.narration-tts.minimax.voice-id.help=MiniMax 预置音色 id（如 English_expressive_narrator）。MiniMax 无逐句自然语言音色通道，必须指定预置音色，留空则该引擎不可用
gui.config.field.narration-tts.minimax.emotion.label=情绪
gui.config.field.narration-tts.minimax.emotion.help=可选固定情绪：happy / sad / angry / fearful / disgusted / surprised / calm / fluent / whisper；留空用模型默认。引擎会先按逐句情绪关键词自动映射，未命中再回退本设置
gui.config.field.narration-tts.minimax.format.label=输出格式
gui.config.field.narration-tts.minimax.format.help=音频输出格式：mp3 / wav / pcm / flac，默认 mp3
gui.config.field.narration-tts.minimax.sample-rate.label=采样率
gui.config.field.narration-tts.minimax.sample-rate.help=音频采样率（Hz），默认 32000
gui.config.field.narration-tts.minimax.use-proxy.label=使用代理
gui.config.field.narration-tts.minimax.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port），独立于全局代理开关
gui.config.field.narration-tts.elevenlabs.base-url.label=ElevenLabs 地址
gui.config.field.narration-tts.elevenlabs.base-url.help=ElevenLabs 地址，默认 https://api.elevenlabs.io（引擎在其后拼接 /v1/text-to-speech/{voice_id}）
gui.config.field.narration-tts.elevenlabs.api-key.label=API Key
gui.config.field.narration-tts.elevenlabs.api-key.help=ElevenLabs API Key（经 xi-api-key 请求头发送，非 Bearer）；绝不会出现在日志或任何响应中。未配置则该引擎不可用
gui.config.field.narration-tts.elevenlabs.model.label=模型
gui.config.field.narration-tts.elevenlabs.model.help=ElevenLabs 模型 id，默认 eleven_v3；行内情绪标签仅 v3 解析，旧模型（如 eleven_multilingual_v2）会把方括号标签读出来
gui.config.field.narration-tts.elevenlabs.voice-id.label=声音 id
gui.config.field.narration-tts.elevenlabs.voice-id.help=ElevenLabs 控制台预建 / 克隆的声音 id（voice_id），决定音色；必填，留空则该引擎不可用。逐句情绪以行内方括号音频标签注入
gui.config.field.narration-tts.elevenlabs.output-format.label=输出格式
gui.config.field.narration-tts.elevenlabs.output-format.help=音频输出格式（query 参数 output_format，如 mp3_44100_128 / pcm_24000 / opus_48000_128），默认 mp3_44100_128
gui.config.field.narration-tts.elevenlabs.use-proxy.label=使用代理
gui.config.field.narration-tts.elevenlabs.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port），独立于全局代理开关
gui.config.field.narration-tts.qwen.base-url.label=Qwen / DashScope 地址
gui.config.field.narration-tts.qwen.base-url.help=阿里 DashScope（百炼）地址，默认 https://dashscope.aliyuncs.com/api/v1（北京区；国际区为 https://dashscope-intl.aliyuncs.com/api/v1；引擎在其后拼接 /services/aigc/multimodal-generation/generation）
gui.config.field.narration-tts.qwen.api-key.label=API Key
gui.config.field.narration-tts.qwen.api-key.help=DashScope API Key（Authorization: Bearer）；绝不会出现在日志或任何响应中。未配置则该引擎不可用
gui.config.field.narration-tts.qwen.model.label=模型
gui.config.field.narration-tts.qwen.model.help=Qwen TTS 模型名，默认 qwen3-tts-flash
gui.config.field.narration-tts.qwen.voice.label=预置音色
gui.config.field.narration-tts.qwen.voice.help=预置音色（如 Cherry / Ryan / Dylan）；留空则用模型默认
gui.config.field.narration-tts.qwen.language-type.label=语言提示
gui.config.field.narration-tts.qwen.language-type.help=可选文本语言提示（如 Chinese / English / Japanese），留空则自动判别；指定后发音 / 语调更自然
gui.config.field.narration-tts.qwen.use-proxy.label=使用代理
gui.config.field.narration-tts.qwen.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port），独立于全局代理开关
gui.config.field.narration-tts.doubao.base-url.label=豆包 / 火山地址
gui.config.field.narration-tts.doubao.base-url.help=字节火山引擎语音合成地址，默认 https://openspeech.bytedance.com（引擎在其后拼接 /api/v1/tts，HTTP 非流式 query 路径）
gui.config.field.narration-tts.doubao.app-id.label=App ID
gui.config.field.narration-tts.doubao.app-id.help=火山语音应用 appid（语音控制台）
gui.config.field.narration-tts.doubao.access-token.label=Access Token
gui.config.field.narration-tts.doubao.access-token.help=火山语音 access-token（经 Authorization: Bearer;<token> 发送，带分号）；绝不会出现在日志或任何响应中。未配置则该引擎不可用
gui.config.field.narration-tts.doubao.cluster.label=集群
gui.config.field.narration-tts.doubao.cluster.help=业务集群，默认 volcano_tts
gui.config.field.narration-tts.doubao.voice-type.label=预置音色 id
gui.config.field.narration-tts.doubao.voice-type.help=火山预置音色 id（voice_type，如 zh_female_wanqudashu_moon_bigtts）；必填，留空则该引擎不可用
gui.config.field.narration-tts.doubao.encoding.label=输出格式
gui.config.field.narration-tts.doubao.encoding.help=音频编码 / 格式：mp3 / wav / pcm / ogg_opus，默认 mp3
gui.config.field.narration-tts.doubao.emotion.label=情绪
gui.config.field.narration-tts.doubao.emotion.help=可选固定情绪（如 happy / sad / angry / scare / hate / surprise / comfort 等火山支持的枚举），留空用模型默认。引擎会先按逐句情绪关键词自动映射，未命中再回退本设置；仅支持情绪的音色（如 *_bigtts）生效
gui.config.field.narration-tts.doubao.use-proxy.label=使用代理
gui.config.field.narration-tts.doubao.use-proxy.help=开启后本引擎的请求走 HTTP 代理（地址取代理设置的 host:port），独立于全局代理开关
