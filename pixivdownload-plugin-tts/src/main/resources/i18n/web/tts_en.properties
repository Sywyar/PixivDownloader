hint.browser=Browser engine: fully offline, instant, free; quality and available languages depend on the voices installed on your OS.
hint.edge=Online engine (Edge neural): natural quality, many languages, free; needs network (via the backend proxy) and has slight synthesis latency.
hint.narration=Emotive narration (beta — usable but not yet stable): the backend AI attributes each sentence of the chapter to a speaker and synthesizes a multi-voice audiobook, each character keeping a fixed voice via an emotive engine; requires a configured narration engine (admin only). Analysis runs only when you start playback; edit each voice or resolve conflicts under "Narration settings → Narration cast".
hint.narration-debug=Debug mode: the emotive narration engine is currently unavailable; the engine is selectable only to run the analysis and inspect speakers/voices — per-sentence audio synthesis will fail.
gui.config.group.narration-tts=AI audiobook narration
gui.config.tts.modality.label=Modality
gui.config.tts.modality.help=Choose which AI modality to configure: "Text model" is the general OpenAI-compatible LLM (used for translation, audiobook script analysis, etc.); "TTS model" is the speech engine for multi-voice audiobook narration (beta — usable but not yet stable). Both are saved and take effect together; the dropdown only switches which one you edit.
gui.config.tts.modality.tts=TTS model (beta)
gui.config.field.narration-tts.engine.label=Narration engine
gui.config.field.narration-tts.engine.help=TTS engine for multi-voice narration; once selected, fill in that engine's URL / key parameters below
gui.config.field.narration-tts.engine.value.voxcpm=VoxCPM (self-hosted)
gui.config.field.narration-tts.engine.value.mimo=Xiaomi MiMo (cloud)
gui.config.field.narration-tts.engine.value.cosyvoice=CosyVoice (self-hosted)
gui.config.field.narration-tts.engine.value.fish=Fish Audio (cloud)
gui.config.field.narration-tts.engine.value.minimax=MiniMax (cloud)
gui.config.field.narration-tts.engine.value.elevenlabs=ElevenLabs (cloud)
gui.config.field.narration-tts.engine.value.qwen=Qwen3-TTS (Alibaba)
gui.config.field.narration-tts.engine.value.doubao=Doubao / Seed-TTS (Volcengine)
gui.config.field.narration-tts.voxcpm.base-url.label=VoxCPM base URL
gui.config.field.narration-tts.voxcpm.base-url.help=VoxCPM OpenAI-compatible endpoint, e.g. http://127.0.0.1:8000/v1 (must include /v1). VoxCPM is an external GPU service you start yourself via vllm serve openbmb/VoxCPM2 --omni; the --omni flag is required to expose the audio endpoint. Leave blank to disable this engine
gui.config.field.narration-tts.voxcpm.api-key.label=API key
gui.config.field.narration-tts.voxcpm.api-key.help=vLLM may leave it empty by default; it never appears in logs or any response
gui.config.field.narration-tts.voxcpm.model.label=Model
gui.config.field.narration-tts.voxcpm.model.help=VoxCPM model name, default openbmb/VoxCPM2
gui.config.field.narration-tts.voxcpm.voice.label=voice id
gui.config.field.narration-tts.voxcpm.voice.help=The voice field of the OpenAI-compatible /audio/speech; it does not decide the timbre (VoxCPM derives it from the inline description / reference audio). Voice-design / cloning models like VoxCPM usually have no preset voices (a server reply Invalid voice '...'. Supported: none means the preset list is empty), so any voice value gets rejected; leave it blank (default) to omit the field, and only fill a voice name if a particular build explicitly requires one
gui.config.field.narration-tts.voxcpm.response-format.label=Output format
gui.config.field.narration-tts.voxcpm.response-format.help=Audio output format: wav or pcm, default wav
gui.config.field.narration-tts.voxcpm.use-proxy.label=Use proxy
gui.config.field.narration-tts.voxcpm.use-proxy.help=When on, this engine's requests go through the HTTP proxy (using the proxy settings' host:port); VoxCPM is usually a local/intranet service, so typically off. Independent of the global proxy toggle.
gui.config.field.narration-tts.voxcpm.enable-clone.label=Enable voice cloning
gui.config.field.narration-tts.voxcpm.enable-clone.help=When on, generating / uploading a character's standard or reference voice clones its timbre (per-line emotion still applies, for more cross-chapter consistency); off falls back to the inline voice profile even when a reference exists
gui.config.field.narration-tts.voxcpm.clone-mode.label=Clone mode
gui.config.field.narration-tts.voxcpm.clone-mode.help=How cloning works when a reference voice is set: controllable (default) sends only the reference audio and keeps per-line emotion, cloning the timbre while still acting the emotion; hifi also sends the reference transcript for the highest fidelity, but ignores per-line emotion control and only takes effect when that character's reference has a transcript, otherwise that line falls back to controllable cloning
gui.config.field.narration-tts.voxcpm.max-new-tokens.label=Generation token cap
gui.config.field.narration-tts.voxcpm.max-new-tokens.help=Token cap for every VoxCPM synthesis request (voice-design and cloning alike), guarding the known vllm-omni bug where the stop token may not fire and generation runs away. 0 means no cap; raise it if long sentences get truncated. Note that lowering it affects plain voice-design narration as well as cloning and may truncate long sentences
gui.config.field.narration-tts.mimo.base-url.label=MiMo base URL
gui.config.field.narration-tts.mimo.base-url.help=OpenAI-compatible base URL of Xiaomi MiMo open platform, default https://api.xiaomimimo.com/v1 (the engine appends /chat/completions)
gui.config.field.narration-tts.mimo.api-key.label=API Key
gui.config.field.narration-tts.mimo.api-key.help=MiMo API key (sent via the api-key header, not Bearer); never appears in logs or any response. Engine is unavailable until set
gui.config.field.narration-tts.mimo.model.label=Preset-voice model
gui.config.field.narration-tts.mimo.model.help=Model used when a preset voice id is configured, default mimo-v2.5-tts
gui.config.field.narration-tts.mimo.voice-design-model.label=Voice-design model
gui.config.field.narration-tts.mimo.voice-design-model.help=Model used to design a voice from the character persona when no preset voice is set, default mimo-v2.5-tts-voicedesign
gui.config.field.narration-tts.mimo.voice-clone-model.label=Voice-clone model
gui.config.field.narration-tts.mimo.voice-clone-model.help=Model used to clone a character's voice from its reference audio, default mimo-v2.5-tts-voiceclone
gui.config.field.narration-tts.mimo.voice.label=Preset voice id
gui.config.field.narration-tts.mimo.voice.help=If set, uses the preset-voice model with this voice (e.g. Chloe), with the persona as style steering; if blank, uses the voice-design model to synthesize a voice from the persona
gui.config.field.narration-tts.mimo.response-format.label=Output format
gui.config.field.narration-tts.mimo.response-format.help=Audio output format: wav or pcm16, default wav
gui.config.field.narration-tts.mimo.use-proxy.label=Use proxy
gui.config.field.narration-tts.mimo.use-proxy.help=When on, this engine's requests go through the HTTP proxy (host:port from proxy settings); MiMo is a cloud service, enable as needed. Independent of the global proxy switch
gui.config.field.narration-tts.mimo.enable-clone.label=Enable reference-audio cloning
gui.config.field.narration-tts.mimo.enable-clone.help=When on, characters with a reference audio use the clone model to replicate the timbre; off falls back to voice-design even if a reference exists
gui.config.field.narration-tts.cosyvoice.base-url.label=CosyVoice base URL
gui.config.field.narration-tts.cosyvoice.base-url.help=OpenAI-compatible base URL of CosyVoice, e.g. http://127.0.0.1:8000/v1 (the engine appends /audio/speech). CosyVoice is a GPU external service you deploy yourself (vox-box / Xinference, etc.); field names vary by deployment. Blank means unavailable
gui.config.field.narration-tts.cosyvoice.api-key.label=API Key
gui.config.field.narration-tts.cosyvoice.api-key.help=Optional for self-hosted servers; never appears in logs or any response
gui.config.field.narration-tts.cosyvoice.model.label=Model
gui.config.field.narration-tts.cosyvoice.model.help=CosyVoice model name, default CosyVoice2-0.5B
gui.config.field.narration-tts.cosyvoice.voice.label=Preset voice
gui.config.field.narration-tts.cosyvoice.voice.help=Preset voice / speaker sent in voice-design (e.g. 中文女); preset names differ by deployment, blank means not sent
gui.config.field.narration-tts.cosyvoice.response-format.label=Output format
gui.config.field.narration-tts.cosyvoice.response-format.help=Audio output format: wav / mp3 / pcm, default wav
gui.config.field.narration-tts.cosyvoice.use-proxy.label=Use proxy
gui.config.field.narration-tts.cosyvoice.use-proxy.help=When on, this engine's requests go through the HTTP proxy; CosyVoice is usually a local/LAN service, normally off. Independent of the global proxy switch
gui.config.field.narration-tts.cosyvoice.enable-clone.label=Enable reference-audio cloning
gui.config.field.narration-tts.cosyvoice.enable-clone.help=When on, characters with a reference audio send it via reference_audio to clone the timbre (the natural-language instruct still controls per-line emotion); off falls back to the instruct description
gui.config.field.narration-tts.fish.base-url.label=Fish Audio base URL
gui.config.field.narration-tts.fish.base-url.help=Fish Audio base URL, default https://api.fish.audio (the engine appends /v1/tts)
gui.config.field.narration-tts.fish.api-key.label=API Key
gui.config.field.narration-tts.fish.api-key.help=Fish Audio API key (Authorization: Bearer); never appears in logs or any response. Engine is unavailable until set
gui.config.field.narration-tts.fish.model.label=Model
gui.config.field.narration-tts.fish.model.help=Fish model (sent via the model header, e.g. s1 / s2-pro), default s1
gui.config.field.narration-tts.fish.reference-id.label=Voice model id
gui.config.field.narration-tts.fish.reference-id.help=Voice model id (reference_id) pre-created/uploaded in the Fish console; determines the timbre. Blank uses the account default voice. Fish does not synthesize a voice from a text description; per-line emotion is injected as inline markers, and cloning from local reference bytes requires uploading to Fish first to obtain this id
gui.config.field.narration-tts.fish.format.label=Output format
gui.config.field.narration-tts.fish.format.help=Audio output format: mp3 / wav / pcm / opus, default mp3
gui.config.field.narration-tts.fish.use-proxy.label=Use proxy
gui.config.field.narration-tts.fish.use-proxy.help=When on, this engine's requests go through the HTTP proxy (host:port from proxy settings), independent of the global proxy switch
gui.config.field.narration-tts.minimax.base-url.label=MiniMax base URL
gui.config.field.narration-tts.minimax.base-url.help=MiniMax base URL, default https://api.minimax.io/v1 (the engine appends /t2a_v2; the China site is https://api.minimaxi.chat/v1)
gui.config.field.narration-tts.minimax.api-key.label=API Key
gui.config.field.narration-tts.minimax.api-key.help=MiniMax API key (Authorization: Bearer); never appears in logs or any response. Engine is unavailable until set
gui.config.field.narration-tts.minimax.group-id.label=GroupId
gui.config.field.narration-tts.minimax.group-id.help=MiniMax account GroupId (19-digit number from the console); required by T2A v2, sent as a URL query parameter and paired with the API key; blank means unavailable
gui.config.field.narration-tts.minimax.model.label=Model
gui.config.field.narration-tts.minimax.model.help=MiniMax model name, default speech-2.8-hd
gui.config.field.narration-tts.minimax.voice-id.label=Preset voice id
gui.config.field.narration-tts.minimax.voice-id.help=MiniMax preset voice id (e.g. English_expressive_narrator). MiniMax has no per-line natural-language voice channel, so a preset voice is required; blank means unavailable
gui.config.field.narration-tts.minimax.emotion.label=Emotion
gui.config.field.narration-tts.minimax.emotion.help=Optional fixed emotion: happy / sad / angry / fearful / disgusted / surprised / calm / fluent / whisper; blank uses the model default. The engine first maps per-line emotion keywords automatically, falling back to this setting when none match
gui.config.field.narration-tts.minimax.format.label=Output format
gui.config.field.narration-tts.minimax.format.help=Audio output format: mp3 / wav / pcm / flac, default mp3
gui.config.field.narration-tts.minimax.sample-rate.label=Sample rate
gui.config.field.narration-tts.minimax.sample-rate.help=Audio sample rate (Hz), default 32000
gui.config.field.narration-tts.minimax.use-proxy.label=Use proxy
gui.config.field.narration-tts.minimax.use-proxy.help=When on, this engine's requests go through the HTTP proxy (host:port from proxy settings), independent of the global proxy switch
gui.config.field.narration-tts.elevenlabs.base-url.label=ElevenLabs base URL
gui.config.field.narration-tts.elevenlabs.base-url.help=ElevenLabs base URL, default https://api.elevenlabs.io (the engine appends /v1/text-to-speech/{voice_id})
gui.config.field.narration-tts.elevenlabs.api-key.label=API Key
gui.config.field.narration-tts.elevenlabs.api-key.help=ElevenLabs API key (sent via the xi-api-key header, not Bearer); never appears in logs or any response. Engine is unavailable until set
gui.config.field.narration-tts.elevenlabs.model.label=Model
gui.config.field.narration-tts.elevenlabs.model.help=ElevenLabs model id, default eleven_v3; inline emotion tags are only parsed by v3, older models (e.g. eleven_multilingual_v2) read the bracketed tag aloud
gui.config.field.narration-tts.elevenlabs.voice-id.label=Voice id
gui.config.field.narration-tts.elevenlabs.voice-id.help=Voice id (voice_id) pre-created / cloned in the ElevenLabs console, determines the timbre; required, blank means unavailable. Per-line emotion is injected as inline bracketed audio tags
gui.config.field.narration-tts.elevenlabs.output-format.label=Output format
gui.config.field.narration-tts.elevenlabs.output-format.help=Audio output format (the output_format query param, e.g. mp3_44100_128 / pcm_24000 / opus_48000_128), default mp3_44100_128
gui.config.field.narration-tts.elevenlabs.use-proxy.label=Use proxy
gui.config.field.narration-tts.elevenlabs.use-proxy.help=When on, this engine's requests go through the HTTP proxy (host:port from proxy settings), independent of the global proxy switch
gui.config.field.narration-tts.qwen.base-url.label=Qwen / DashScope base URL
gui.config.field.narration-tts.qwen.base-url.help=Alibaba DashScope (Model Studio) base URL, default https://dashscope.aliyuncs.com/api/v1 (Beijing; the Singapore region is https://dashscope-intl.aliyuncs.com/api/v1; the engine appends /services/aigc/multimodal-generation/generation)
gui.config.field.narration-tts.qwen.api-key.label=API Key
gui.config.field.narration-tts.qwen.api-key.help=DashScope API key (Authorization: Bearer); never appears in logs or any response. Engine is unavailable until set
gui.config.field.narration-tts.qwen.model.label=Model
gui.config.field.narration-tts.qwen.model.help=Qwen TTS model name, default qwen3-tts-flash
gui.config.field.narration-tts.qwen.voice.label=Preset voice
gui.config.field.narration-tts.qwen.voice.help=Preset voice (e.g. Cherry / Ryan / Dylan); blank uses the model default
gui.config.field.narration-tts.qwen.language-type.label=Language hint
gui.config.field.narration-tts.qwen.language-type.help=Optional text language hint (e.g. Chinese / English / Japanese), blank auto-detects; setting it makes pronunciation / intonation more natural
gui.config.field.narration-tts.qwen.use-proxy.label=Use proxy
gui.config.field.narration-tts.qwen.use-proxy.help=When on, this engine's requests go through the HTTP proxy (host:port from proxy settings), independent of the global proxy switch
gui.config.field.narration-tts.doubao.base-url.label=Doubao / Volcengine base URL
gui.config.field.narration-tts.doubao.base-url.help=ByteDance Volcengine speech synthesis base URL, default https://openspeech.bytedance.com (the engine appends /api/v1/tts, the HTTP non-streaming query path)
gui.config.field.narration-tts.doubao.app-id.label=App ID
gui.config.field.narration-tts.doubao.app-id.help=Volcengine speech app id (speech console)
gui.config.field.narration-tts.doubao.access-token.label=Access Token
gui.config.field.narration-tts.doubao.access-token.help=Volcengine speech access token (sent via Authorization: Bearer;<token> with a semicolon); never appears in logs or any response. Engine is unavailable until set
gui.config.field.narration-tts.doubao.cluster.label=Cluster
gui.config.field.narration-tts.doubao.cluster.help=Business cluster, default volcano_tts
gui.config.field.narration-tts.doubao.voice-type.label=Preset voice id
gui.config.field.narration-tts.doubao.voice-type.help=Volcengine preset voice id (voice_type, e.g. zh_female_wanqudashu_moon_bigtts); required, blank means unavailable
gui.config.field.narration-tts.doubao.encoding.label=Output format
gui.config.field.narration-tts.doubao.encoding.help=Audio encoding / format: mp3 / wav / pcm / ogg_opus, default mp3
gui.config.field.narration-tts.doubao.emotion.label=Emotion
gui.config.field.narration-tts.doubao.emotion.help=Optional fixed emotion (e.g. happy / sad / angry / scare / hate / surprise / comfort and other Volcengine-supported values), blank uses the model default. The engine maps per-line emotion keywords first and falls back to this setting; only emotion-capable voices (e.g. *_bigtts) take effect
gui.config.field.narration-tts.doubao.use-proxy.label=Use proxy
gui.config.field.narration-tts.doubao.use-proxy.help=When on, this engine's requests go through the HTTP proxy (host:port from proxy settings), independent of the global proxy switch
