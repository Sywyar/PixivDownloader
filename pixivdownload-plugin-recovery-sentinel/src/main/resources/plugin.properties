# PF4J 外置插件描述符（位于插件 jar 根部，由 PF4J PropertiesPluginDescriptorFinder 读取）。
# 字段与 org.pf4j.PropertiesPluginDescriptorFinder / 核心描述符映射的 key 完全一致。
plugin.id=recovery-sentinel
# 插件包自身版本（合法 semver；当前未发布初始版本为 1.0.0，后续发布时独立递增）。
plugin.version=1.0.0
# 所需核心 API 契约版本（major.minor）；由核心发现桥接据 PluginApiVersion.isCompatible 判定，不满足即拒绝接入。
plugin.requires=1.0
# 插件主类：继承 org.pf4j.Plugin 并实现入口契约 PixivPluginProvider，暴露最小功能插件 RecoverySentinelPlugin。
plugin.class=top.sywyar.pixivdownload.recoverysentinel.RecoverySentinelPf4jPlugin
plugin.provider=Sywyar
plugin.description=最小外置插件：不贡献任何功能，仅用于验证必选插件缺失或被禁用时核心进入恢复模式。
pixiv.lifecycle-policy=hot-reload
