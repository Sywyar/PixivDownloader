plugin.name=Notifications
plugin.summary=Base configuration for notification scenarios and severity.
gui.config.notification.scenario.section.label=Notification types
gui.config.notification.scenario.section.help=Unchecking a type stops both its email and push notifications; all types are enabled by default
gui.config.field.notification.scenario.overuse-paused.label=Overuse paused
