<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件市场 · Pixiv 下载助手</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <script src="/js/pixiv-navigation.js"></script>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/plugin-market/plugin-market.css">
    <!-- 页面模块按依赖顺序加载：core（命名空间 / 状态 / i18n 助手 / 后端调用）→ views（渲染）→ init（启动 + 顶层事件）。 -->
    <script src="/plugin-market/plugin-market-core.js"></script>
    <script src="/plugin-market/plugin-market-views.js"></script>
    <script src="/plugin-market/plugin-market-init.js"></script>
</head>
<body>

<nav class="app-nav">
    <div class="app-nav-brand-wrap">
        <span class="app-nav-logo"><i class="fa-solid fa-store"></i></span>
        <span class="app-nav-brand" data-i18n="nav.brand">Pixiv 下载助手</span>
    </div>
    <!-- 跨插件导航 slot（app.top placement）：由 /js/pixiv-navigation.js 据 /api/navigation 动态渲染，
         禁用某插件后其入口自然消失；当前页（插件市场）由 pathname 自动识别为激活项。 -->
    <span class="app-nav-links" data-nav-slot="app.top" data-nav-link-class="app-nav-link"
          data-nav-active-class="active" data-nav-target="_blank" data-nav-rel="noopener"></span>
    <div class="app-nav-spacer"></div>
    <div class="app-nav-actions" id="langSwitcherAnchor"></div>
    <button class="app-nav-logout" id="logout-btn" onclick="pmkLogout()" data-i18n="logout">退出</button>
</nav>

<div class="pmk-page">

    <!-- 标题行 -->
    <div class="pmk-titlebar">
        <div class="pmk-title-block">
            <h1 class="pmk-title"><i class="fa-solid fa-store"></i><span data-i18n="page.heading">插件市场</span></h1>
            <p class="pmk-subtitle" data-i18n="page.subtitle">从受信仓库浏览并安装插件</p>
        </div>
        <div class="pmk-titlebar-actions">
            <button class="pmk-btn pmk-btn--teal" id="pmk-refresh-btn">
                <i class="fa-solid fa-rotate"></i><span data-i18n="refresh">刷新</span>
            </button>
        </div>
    </div>

    <!-- 主开关状态横幅（由 JS 据 /api/plugin-market/repositories 的 enabled 填充）。 -->
    <div class="pmk-master" id="pmk-master" hidden></div>

    <!-- 受信仓库列表区（由 JS 渲染；含加载 / 错误 / 空状态）。 -->
    <section class="pmk-section">
        <h2 class="pmk-section-title" data-i18n="section.repositories">受信仓库</h2>
        <div class="pmk-repo-grid" id="pmk-repo-grid"></div>
        <div id="pmk-state-host">
            <div class="pmk-state"><i class="fa-solid fa-spinner fa-spin"></i><span data-i18n="loading">正在加载…</span></div>
        </div>
    </section>

    <!-- 占位说明：完整的浏览 / 筛选 / 安装界面随后提供。 -->
    <div class="pmk-note" data-i18n="note.preview">
        完整的插件浏览、筛选与安装界面将随后提供；此页当前用于查看受信仓库状态与核心 API 版本。
    </div>

    <!-- 免责声明 -->
    <div class="pmk-disclaimer" data-i18n="disclaimer">
        插件运行于本地，仅供个人学习与研究使用 · 请尊重创作者版权 · 本工具与 Pixiv 无任何关联
    </div>

</div>

</body>
</html>
