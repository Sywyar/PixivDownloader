<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixivDownloader</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-side-modules.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <!-- Vue 槽位挂载共享 helper（加性、加载即无副作用；导航由其挂 Vue 主渲染，缺失 / 加载失败即命令式回退）。 -->
    <script src="/js/pixiv-vue.js"></script>
    <script src="/js/pixiv-navigation.js"></script>
    <link rel="stylesheet" href="/css/admin-visibility.css">
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/css/lang-theme-switcher.css">
    <link rel="stylesheet" href="/css/pixiv-translate.css">
    <link rel="stylesheet" href="/css/pixiv-side-modules.css">
    <link rel="stylesheet" href="/pixiv-series/pixiv-series.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-brand" data-i18n="sidebar.brand"></span>
        </div>

        <div class="section-header">
            <span class="section-title" data-i18n="gallery:section.view"></span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" id="navViewAll" href="/pixiv-gallery.html?view=all">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.all"></span>
            </a>
            <a class="nav-item" id="navViewAuthors" href="/pixiv-gallery.html?view=authors">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.authors"></span>
            </a>
            <a class="nav-item active" id="navViewSeries" href="/pixiv-gallery.html?view=series">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.series"></span>
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="gallery:section.collections"></span>
            <a class="section-add" id="btnCreateCollection" href="/pixiv-gallery.html?view=all&createCollection=1"
               data-i18n-title="gallery:collection.new" data-i18n-aria-label="gallery:collection.new">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </a>
        </div>
        <div class="sidebar-nav" id="collectionList"></div>

        <div class="sidebar-divider"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="section.navigation"></span>
        </div>
        <!-- 跨插件导航 slot（gallery.sidebar placement）：由 /js/pixiv-navigation.js 据 /api/navigation 动态渲染
             （禁用插件后其入口自然消失，admin-only 入口对受邀访客不返回）。系列页是画廊子页，复用画廊家族侧栏菜单：
             画廊作为可点击「返回画廊」入口（pathname 不匹配本页、非 current）；小说不属于该 placement。 -->
        <nav class="sidebar-nav" data-nav-slot="gallery.sidebar"
             data-nav-link-class="nav-item" data-nav-active-class="current"
             data-nav-icon-wrap-class="nav-icon" data-nav-label-class="nav-label"
             data-nav-target="_blank" data-nav-rel="noopener"></nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">P</div>
                <div class="user-info">
                    <div class="user-name" data-i18n="user.name"></div>
                    <div class="user-status" data-i18n="status.online"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main class="main-content">
        <div class="topbar">
            <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria-label="button.open-menu">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <label class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder">
            </label>
            <div class="topbar-actions" id="langSwitcherAnchor"></div>
        </div>

        <div class="series-wrapper">
            <section class="series-hero">
                <div class="series-hero-cover" id="seriesCover" style="display:none">
                    <img id="seriesCoverImg" alt=""
                         onerror="document.getElementById('seriesCover').style.display='none'">
                </div>
                <div class="series-hero-main">
                    <div class="series-kicker" data-i18n="page.kicker"></div>
                    <h1 class="series-title" id="seriesTitle"></h1>
                    <a class="series-author" id="seriesAuthor" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span id="seriesAuthorName"></span>
                    </a>
                </div>
                <div class="series-actions">
                    <span id="contentLangAnchor"></span>
                    <button class="btn" id="downloadMergedBtn" type="button" style="display:none"
                            data-i18n="series:button.download-merged">下载合订本</button>
                    <button class="btn" id="translateSeriesBtn" type="button" style="display:none"
                            data-i18n="translate:button.translate-series">翻译整个系列</button>
                    <a class="btn" id="backToArtworkBtn" href="#" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        <span data-i18n="button.back-to-artwork"></span>
                    </a>
                    <a class="btn btn-primary" id="openGalleryFilterBtn" href="/pixiv-gallery.html?view=all">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span data-i18n="button.open-gallery-filter"></span>
                    </a>
                </div>
            </section>

            <div class="meta-strip" id="metaStrip"></div>
            <div class="series-description" id="seriesDescription" style="display:none"></div>
            <div class="series-tags" id="seriesTags" style="display:none"></div>
            <div class="gallery-status" id="seriesStatus" data-i18n="status.loading"></div>
            <section class="chapter-grid" id="chapterGrid"></section>
            <nav class="pagination" id="pagination"></nav>
        </div>
    </main>
</div>

<script src="/js/pixiv-translate.js"></script>
<script src="/pixiv-series/series-core.js"></script>
<script src="/pixiv-series/series-actions.js"></script>
<script src="/pixiv-series/series-collections.js"></script>
<script src="/pixiv-series/series-data.js"></script>
<script src="/pixiv-series/series-render.js"></script>
<script src="/pixiv-series/series-sidebar.js"></script>
<script src="/pixiv-series/series-init.js"></script>
</body>
</html>
