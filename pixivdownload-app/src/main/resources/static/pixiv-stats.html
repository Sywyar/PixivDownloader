<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixiv 统计</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-side-modules.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <script src="/js/pixiv-navigation.js"></script>
    <script src="/js/pixiv-page-sections.js"></script>
    <script src="/js/pixiv-drilldowns.js"></script>
    <link rel="stylesheet" href="/css/admin-visibility.css">
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/css/lang-theme-switcher.css">
    <link rel="stylesheet" href="/css/pixiv-side-modules.css">
    <link rel="stylesheet" href="/pixiv-stats/pixiv-stats.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-brand" data-i18n="sidebar.brand">Pixiv 统计</span>
        </div>

        <!-- 借用其它插件能力的页面内区块由活动插件经 /api/page-sections 贡献：统计页只声明这一空 section slot
             （stats.sidebar.sections），区块标题 / 快捷入口 / 列表与创建入口全部由活动插件渲染（/js/pixiv-page-sections.js）。
             禁用某插件后它贡献的区块自然消失——统计页不硬编码任何具体插件的 href / API，也不按插件 id 显隐；
             统计页不需要知道是哪个插件提供了这些区块。 -->
        <div data-section-slot="stats.sidebar.sections"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="sidebar.navigation">导航</span>
        </div>
        <!-- 通用主侧栏导航 slot（app.sidebar placement，plugin-neutral）：由 /js/pixiv-navigation.js 据 /api/navigation
             动态渲染（禁用插件后其入口自然消失）。统计页声明宿主中立的主侧栏 slot、内容全由注册到该 placement 的导航贡献
             决定，统计页不需要知道有哪些插件；当前项按 pathname 自动识别为统计（current 不可点击）。 -->
        <nav class="sidebar-nav" data-nav-slot="app.sidebar"
             data-nav-link-class="nav-item" data-nav-active-class="current"
             data-nav-icon-wrap-class="nav-icon" data-nav-label-class="nav-label"
             data-nav-target="_blank" data-nav-rel="noopener"></nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">P</div>
                <div class="user-info">
                    <div class="user-name">Pixiv User</div>
                    <div class="user-status" data-i18n="status.online">在线</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main class="main-content">
        <div class="topbar">
            <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria-label="button.open-menu">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title" data-i18n="page.heading">统计仪表盘</h1>
            <div class="topbar-actions" id="langSwitcherAnchor"></div>
        </div>

        <div class="stats-wrapper">
            <div class="status-banner" id="statusBanner" data-i18n="status.loading">加载中...</div>

            <section class="overview-grid" id="overviewGrid" hidden>
                <div class="stat-card">
                    <span class="stat-value" id="ovArtworks">0</span>
                    <span class="stat-label" data-i18n="overview.artworks">总作品数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="ovImages">0</span>
                    <span class="stat-label" data-i18n="overview.images">总图片数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="ovNovels">0</span>
                    <span class="stat-label" data-i18n="overview.novels">总小说数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="ovAuthors">0</span>
                    <span class="stat-label" data-i18n="overview.authors">作者数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="ovTags">0</span>
                    <span class="stat-label" data-i18n="overview.tags">标签数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="ovSeries">0</span>
                    <span class="stat-label" data-i18n="overview.series">系列数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="ovMoved">0</span>
                    <span class="stat-label" data-i18n="overview.moved">已归档/移动</span>
                </div>
            </section>

            <section class="panel" id="monthlyPanel" hidden>
                <h2 class="panel-title" data-i18n="monthly.title">按月下载量</h2>
                <div class="chart-wrap" id="monthlyChart"></div>
            </section>

            <div class="two-col">
                <section class="panel" id="authorsPanel" hidden>
                    <h2 class="panel-title" data-i18n="authors.title">下载量 Top 作者</h2>
                    <div class="bar-list" id="authorsList"></div>
                </section>

                <section class="panel" id="tagsPanel" hidden>
                    <h2 class="panel-title" data-i18n="tags.title">热门标签</h2>
                    <div class="tag-cloud" id="tagCloud"></div>
                </section>
            </div>
        </div>
    </main>
</div>

<script src="/pixiv-stats/pixiv-stats.js"></script>
</body>
</html>
