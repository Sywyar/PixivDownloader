config.template.server.port.comment=Service listening port
config.template.debug.enabled.comment=Debug mode: enables debug-only features when turned on (disabled by default)
config.template.download.root-folder.comment=Download root folder (relative or absolute path)
config.template.download.user-flat-folder.comment=Checked: flat layout identical to Bulk Import Single Works; unchecked: creates a folder named after the author's username inside the download root to save User mode downloads
config.template.download.max-concurrent.comment=Max images/artworks downloaded concurrently (>=1, extra queue up, dedicated pool); lower it to reduce the chance of Pixiv rate-limiting. Restart required after changing
config.template.download.novel-max-concurrent.comment=Max novels downloaded concurrently (>=1, dedicated pool, isolated from image downloads). Restart required after changing
config.template.proxy.enabled.comment=Whether to enable the HTTP proxy (used for all outbound access: Pixiv, online updates, FFmpeg download, online TTS)
config.template.proxy.host.comment=Proxy server address
config.template.proxy.port.comment=Proxy server port
config.template.multi-mode.quota.enabled.comment=Whether to enable download quota limits
config.template.multi-mode.quota.max-artworks.comment=Maximum artworks each user can download per cycle
config.template.multi-mode.quota.reset-period-hours.comment=Quota reset period (hours)
config.template.multi-mode.quota.archive-expire-minutes.comment=Archive download link expiration time (minutes)
config.template.multi-mode.quota.limit-image.comment=Image limit per artwork (0 = unlimited); if exceeded, quota is charged as ceil(imageCount/limit-image) artworks
config.template.multi-mode.quota.max-proxy-requests.comment=Maximum search/proxy requests per user in each reset cycle (0 = unlimited)
config.template.multi-mode.quota.archive-max-concurrent.comment=Max quota archive packaging jobs running concurrently (>=1, dedicated pool). Restart required after changing
config.template.multi-mode.post-download-mode.comment=Post-download handling mode (choose one):
config.template.multi-mode.post-download-mode.pack-and-delete=pack-and-delete  Pack and delete source files (default)
config.template.multi-mode.post-download-mode.never-delete=never-delete     Keep source files after packaging; downloading the same artwork again returns the completed result directly
config.template.multi-mode.post-download-mode.timed-delete=timed-delete     Keep source files after packaging; delete them automatically after delete-after-hours
config.template.multi-mode.delete-after-hours.comment=timed-delete mode: auto-delete after how many hours (hours)
config.template.multi-mode.request-limit-minute.comment=Maximum requests per user per minute (0 = unlimited)
config.template.multi-mode.static-resource-request-limit-minute.comment=Maximum static resource requests per IP per minute for multi-mode guests (0 = unlimited)
config.template.multi-mode.limit-page.comment=Search mode "backfill N pages" limit (0 = unlimited, multi mode only)
config.template.guest-invite.request-limit-minute.comment=Maximum API requests per minute per invite code for invited guests (0 = unlimited; admins are never limited)
config.template.guest-invite.static-resource-request-limit-minute.comment=Maximum static resource requests per minute per invite code for invited guests (0 = unlimited; applies in both solo and multi mode)
config.template.guest-invite.tts-request-limit-minute.comment=Maximum online TTS (speech synthesis) requests per minute per invite code for invited guests (0 = unlimited; admins are never limited)
config.template.setup.login-rate-limit-minute.comment=Maximum login attempts per IP per minute (0 = unlimited)
config.template.ssl.domain.comment=Service domain used to build public URLs (keep localhost for local access; change it when accessed through a domain name)
config.template.ssl.type.comment=Certificate type: pem (recommended, .pem + .key) or jks (JKS/PKCS12 keystore)
config.template.server.ssl.enabled.comment=Whether to enable HTTPS (true/false)
config.template.server.ssl.certificate.comment=PEM certificate file path (effective when ssl.type=pem)
config.template.server.ssl.certificate-private-key.comment=PEM private key file path (effective when ssl.type=pem)
config.template.server.ssl.key-store-type.comment=JKS certificate type: JKS or PKCS12 (effective when ssl.type=jks)
config.template.server.ssl.key-store.comment=JKS/PKCS12 keystore path (effective when ssl.type=jks)
config.template.server.ssl.key-store-password.comment=JKS keystore password (effective when ssl.type=jks)
config.template.ssl.http-redirect.comment=Whether to listen on ssl.http-redirect-port for HTTP and redirect automatically to HTTPS
config.template.ssl.http-redirect-port.comment=HTTP redirect listening port (default 80)
config.template.app.language.comment=GUI and log language (en-US/zh-CN; leave blank to auto-detect from system language)
config.template.app.theme.comment=GUI theme: system / light / dark (system follows the OS light/dark switch)
config.template.section.update=---- Online update ----
config.template.update.enabled.comment=Whether to enable online update checks (enabled by default); when disabled, no update requests are made
config.template.update.manifest-url.comment=Update manifest JSON URL; defaults to the latest GitHub release's update.json. Override with a mirror if needed
config.template.update.nightly-manifest-url.comment=Nightly update manifest JSON URL; defaults to the GitHub nightly release's update.json
config.template.update.auto-check.comment=Whether the GUI silently checks for updates after launch (at most once per day)
config.template.update.check-nightly.comment=Whether to check nightly build updates; defaults to false on release builds and true on nightly builds
config.template.section.schedule=---- Scheduled tasks (admin) ----
config.template.schedule.enabled.comment=Whether to enable scheduled-task dispatch (enabled by default); when off, no scheduled task runs (created tasks are kept)
config.template.schedule.tick-interval-ms.comment=Interval (ms) for checking due tasks (default 60000); resolved by the startup timer, requires a restart to take effect
config.template.schedule.max-tasks.comment=Maximum number of scheduled tasks per database (default 100), to prevent abuse
config.template.schedule.inbox-check-every.comment=A cookie-bound task reads the message inbox once per this many successfully downloaded works to detect overuse warnings (default 500; skipped/filtered not counted)
config.template.schedule.auth-failure-circuit-breaker.comment=When per-work fetch failures reach this count consecutively within a run, the session is treated as expired and the task is suspended (default 5)
config.template.schedule.pending-max-attempts.comment=Max automatic retries for an isolated failed work; once reached it is marked as needing manual action (default 5)
config.template.schedule.overuse-defer-default-minutes.comment=Default minutes to defer when resuming an account paused for overuse via "continue later", minimum 60 (default 60)
