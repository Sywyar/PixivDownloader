config.template.mail.password.comment=SMTP password / authorization code / app-specific password (never appears in logs or email bodies)
config.template.mail.from.comment=Sender address (falls back to mail.username when empty)
config.template.mail.to.comment=Recipient address; multiple addresses separated by commas
config.template.mail.socks-proxy.comment=Optional SOCKS proxy in host:port form; empty means direct connection (the existing HTTP proxy does not carry SMTP)
config.template.mail.subject-prefix.comment=Email subject prefix (default [PixivDownloader]; prepended to template titles)
