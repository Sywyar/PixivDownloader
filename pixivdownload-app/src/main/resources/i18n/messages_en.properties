config.template.mail.enabled.comment=Enable email sending (when off, all outgoing mail is skipped; default off)
config.template.mail.host.comment=SMTP host (e.g. smtp.163.com / smtp.qq.com; the GUI provider preset can fill this in for you)
config.template.mail.port.comment=SMTP port (default 587; SSL usually 465, STARTTLS usually 587)
config.template.mail.security.comment=Encryption: none / ssl / starttls (default starttls; ssl is also known as SMTPS)
