cli.setup.proxy.intro=Configure the HTTP proxy (the backend uses it for all outbound access: reaching Pixiv and downloading works, online updates, downloading the bundled FFmpeg, and online TTS). When running in a Docker container, 127.0.0.1 usually cannot reach a proxy on the host; disable the proxy or enter an address reachable from the container.
