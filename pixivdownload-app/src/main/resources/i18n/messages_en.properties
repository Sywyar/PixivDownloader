config.template.section.push=---- Push notifications (multi-channel) ----
config.template.push.enabled.comment=Master switch for push (when off, no channel sends; default off)
config.template.push.use-proxy.comment=Whether this channel's requests go through the HTTP proxy (using proxy.host:proxy.port), independent of the global proxy.enabled
config.template.push.bark.enabled.comment=Enable the Bark channel (iOS push)
config.template.push.bark.server.comment=Bark server URL (official public server https://api.day.app, or a self-hosted one)
config.template.push.bark.device-key.comment=Bark device key (never appears in logs)
config.template.push.bark.sound.comment=Optional sound name (empty uses the app default)
config.template.push.dingtalk.enabled.comment=Enable the DingTalk custom-robot channel
config.template.push.dingtalk.access-token.comment=access_token of the DingTalk robot webhook (never appears in logs)
config.template.push.dingtalk.secret.comment=Signing secret (starts with SEC) for the "sign" security setting; leave empty when using keyword / IP allowlist (never appears in logs)
config.template.push.telegram.enabled.comment=Enable the Telegram Bot channel
config.template.push.telegram.bot-token.comment=Telegram Bot token (never appears in logs)
config.template.push.telegram.chat-id.comment=Target chat id (user / group / channel)
config.template.push.feishu.enabled.comment=Enable the Feishu (Lark) custom-robot channel
config.template.push.feishu.webhook-key.comment=The hook key at the end of the Feishu webhook URL (never appears in logs)
config.template.push.feishu.secret.comment=Signing secret for the "signature" security setting; leave empty when using keyword / IP allowlist (never appears in logs)
config.template.push.wecom.enabled.comment=Enable the WeCom (Enterprise WeChat) group-robot channel
config.template.push.wecom.key.comment=The key of the WeCom group-robot webhook (never appears in logs)
config.template.push.pushplus.enabled.comment=Enable the PushPlus channel
config.template.push.pushplus.token.comment=PushPlus user token (never appears in logs)
config.template.push.serverchan.enabled.comment=Enable the ServerChan channel
config.template.push.serverchan.send-key.comment=ServerChan SendKey (an sctp- prefix auto-routes to the ServerChan3 endpoint; never appears in logs)
config.template.push.webhook.enabled.comment=Enable the custom Webhook channel
config.template.push.webhook.url.comment=Target URL (http/https); works with Discord / Slack / ntfy / Gotify, etc.
config.template.push.webhook.content-type.comment=Request content type (default application/json)
config.template.push.webhook.body-template.comment=Request body template with {{title}} / {{content}} placeholders; empty uses {"title":"{{title}}","content":"{{content}}"} (values are JSON-escaped for JSON types)
config.template.section.notification=---- Notification type switches ----
config.template.notification.scenario.enabled.comment=Whether to send this notification type (email + push); default on, turn off to stop this type
push.log.send.success=Push sent: channel={0}, status={1}, took={2}ms
push.log.send.failed=Push failed: channel={0}, took={1}ms, err={2}
push.log.channel.error=Push channel error: channel={0}, err={1}
push.log.skipped.disabled=Push is not enabled (push.enabled=false), skipped
push.log.skipped.no-channel=Push skipped: no enabled and fully-configured channel

# --- PluginRegistry ---
plugin.log.started=Plugin registry started with {0} plugin(s): {1}
plugin.log.stop-failed=Plugin ''{0}'' failed to stop: {1}

# --- Required plugin recovery mode ---
plugin.recovery.blocked=A required plugin is missing. The core is in recovery mode; please install or repair the required plugin and try again.
plugin.recovery.missing.download-workbench=The required download plugin (download-workbench) is missing. The core is in recovery mode; please install or repair it and try again.

# --- Plugin temporarily unavailable (being stopped) ---
plugin.unavailable.quiesced=The plugin is being stopped and is temporarily unavailable. Please try again later.

# --- Plugin management backend API ---
plugin.manage.error.unknown=Unknown plugin
plugin.manage.error.built-in=Built-in plugins cannot be hot-managed at runtime
plugin.manage.error.inactive=This external plugin is not currently active (it may be disabled via config); runtime actions are unavailable
plugin.manage.error.required=Required plugins cannot be disabled
plugin.manage.error.transition=The plugin's current state does not allow this action

# --- Local plugin package install backend API (install only stages to disk; new packages take effect after restart) ---
plugin.install.outcome.installed=Plugin installed successfully; it will take effect after the next restart
plugin.install.outcome.upgraded=Plugin upgraded to the new version; it will take effect after the next restart
plugin.install.outcome.downgraded=Plugin downgraded to the given version; it will take effect after the next restart
plugin.install.outcome.duplicate=This plugin version is already installed; nothing to do
plugin.install.outcome.downgrade-rejected=A higher version is already installed; downgrade is rejected by default (allow downgrade explicitly to override)
plugin.install.outcome.rejected-empty=No plugin package was uploaded, or the package is empty
plugin.install.outcome.rejected-malformed=The plugin package is corrupt or is not a supported .jar / .zip package
plugin.install.outcome.rejected-no-descriptor=The plugin package has no descriptor (plugin.properties)
plugin.install.outcome.rejected-ambiguous=The plugin package layout is ambiguous; no single plugin could be determined
plugin.install.outcome.rejected-invalid=The plugin descriptor is invalid (id / version / main class, etc.)
plugin.install.outcome.rejected-incompatible=The plugin requires a core API version incompatible with the current core
plugin.install.outcome.rejected-unsafe=The plugin package contains path-traversal entries (Zip Slip) and was rejected
plugin.install.outcome.failed=An error occurred during installation; the install directory was left unchanged
