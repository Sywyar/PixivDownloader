config.template.section.ai=---- AI / Large language model (LLM) ----
config.template.ai.enabled.comment=Enable AI calls (default off; when off, all calls are rejected outright)
config.template.ai.base-url.comment=OpenAI-compatible endpoint (e.g. https://api.openai.com/v1, https://api.deepseek.com; the GUI provider preset can fill this in)
config.template.ai.api-key.comment=API key (never appears in logs or any response; may be left empty for local models like Ollama)
config.template.ai.model.comment=Model name (e.g. gpt-4o-mini / deepseek-chat / qwen-plus)
config.template.ai.use-proxy.comment=Whether this config's requests go through the HTTP proxy (using proxy.host:proxy.port); usually on for overseas providers, off for China-based ones, independent of the global proxy.enabled
config.template.section.narration-tts=---- AI audiobook / multi-voice narration TTS engine ----
config.template.narration-tts.engine.comment=Narration engine: the TTS engine id for multi-voice narration; only configure the sub-keys of the engine you pick (see the per-engine groups below, each named by its engine id)
config.template.narration-tts.voxcpm.base-url.comment=VoxCPM OpenAI-compatible endpoint (e.g. http://127.0.0.1:8000/v1, must include /v1; started by the user via vllm serve openbmb/VoxCPM2 --omni, the --omni flag is required to expose the audio endpoint; leave blank to disable this engine)
config.template.narration-tts.voxcpm.api-key.comment=VoxCPM API key (vLLM may leave it empty by default; never appears in logs or any response)
config.template.narration-tts.voxcpm.model.comment=VoxCPM model name (default openbmb/VoxCPM2)
config.template.narration-tts.voxcpm.voice.comment=The voice field of the OpenAI-compatible /audio/speech; it does not decide the timbre (VoxCPM derives that from the inline description / reference audio). Voice-design / cloning models like VoxCPM usually have no preset voices (the server reply Invalid voice '...'. Supported: none means the preset list is empty), so any voice value gets rejected; leave it blank (default) to omit the field, and only fill a voice name if a particular build explicitly requires one
config.template.narration-tts.voxcpm.response-format.comment=Audio output format (wav / pcm, default wav)
config.template.narration-tts.voxcpm.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (using proxy.host:proxy.port); VoxCPM is usually a local/intranet service, off by default, independent of the global proxy.enabled
config.template.narration-tts.voxcpm.enable-clone.comment=Whether to enable reference-voice cloning (clone a character's timbre from its standard/reference voice while per-line emotion still applies); off falls back to the inline voice profile even when a reference exists
config.template.narration-tts.voxcpm.clone-mode.comment=How cloning works when a reference voice is set: controllable (default) sends only the reference audio and keeps per-line emotion; hifi also sends the reference transcript for the highest fidelity but ignores per-line emotion, and only takes effect when that character's reference has a transcript, otherwise that line falls back to controllable cloning
config.template.narration-tts.voxcpm.max-new-tokens.comment=Token cap for every VoxCPM synthesis request (voice-design and cloning; guards the known vllm-omni bug where the stop token may not fire and generation runs away); 0 means no cap, raise it if long sentences get truncated (lowering it affects plain narration as well as cloning)
config.template.narration-tts.mimo.base-url.comment=MiMo OpenAI-compatible base URL (default https://api.xiaomimimo.com/v1; the engine appends /chat/completions)
config.template.narration-tts.mimo.api-key.comment=MiMo API key (sent via the api-key header, not Bearer; never appears in logs or any response; unavailable until set)
config.template.narration-tts.mimo.model.comment=Preset-voice model used when a preset voice id is configured (default mimo-v2.5-tts)
config.template.narration-tts.mimo.voice-design-model.comment=Model used to design a voice from the character persona when no preset voice is set (default mimo-v2.5-tts-voicedesign)
config.template.narration-tts.mimo.voice-clone-model.comment=Model used to clone a character's voice from its reference audio (default mimo-v2.5-tts-voiceclone)
config.template.narration-tts.mimo.voice.comment=Preset voice id (e.g. Chloe); if set uses the preset-voice model with this voice, blank uses the voice-design model from the persona
config.template.narration-tts.mimo.response-format.comment=Audio output format (wav / pcm16, default wav)
config.template.narration-tts.mimo.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (proxy.host:proxy.port); MiMo is a cloud service, enable as needed, independent of global proxy.enabled
config.template.narration-tts.mimo.enable-clone.comment=Whether to enable reference-audio cloning (use the clone model when a character has a reference audio); off falls back to voice-design
config.template.narration-tts.cosyvoice.base-url.comment=CosyVoice OpenAI-compatible base URL (e.g. http://127.0.0.1:8000/v1; the engine appends /audio/speech; deploy it yourself via vox-box / Xinference, field names vary by deployment; blank means unavailable)
config.template.narration-tts.cosyvoice.api-key.comment=CosyVoice API key (optional for self-hosted servers; never appears in logs or any response)
config.template.narration-tts.cosyvoice.model.comment=CosyVoice model name (default CosyVoice2-0.5B)
config.template.narration-tts.cosyvoice.voice.comment=Preset voice / speaker sent in voice-design (e.g. 中文女); preset names differ by deployment, blank means not sent
config.template.narration-tts.cosyvoice.response-format.comment=Audio output format (wav / mp3 / pcm, default wav)
config.template.narration-tts.cosyvoice.use-proxy.comment=Whether this engine's requests go through the HTTP proxy; CosyVoice is usually a local/LAN service, off by default, independent of global proxy.enabled
config.template.narration-tts.cosyvoice.enable-clone.comment=Whether to enable reference-audio cloning (send reference_audio to clone the timbre; the instruct still controls per-line emotion); off falls back to the instruct description
config.template.narration-tts.fish.base-url.comment=Fish Audio base URL (default https://api.fish.audio; the engine appends /v1/tts)
config.template.narration-tts.fish.api-key.comment=Fish Audio API key (Authorization: Bearer; never appears in logs or any response; unavailable until set)
config.template.narration-tts.fish.model.comment=Fish model (sent via the model header, e.g. s1 / s2-pro, default s1)
config.template.narration-tts.fish.reference-id.comment=Voice model id (reference_id) pre-created/uploaded in the Fish console, determines the timbre; blank uses the account default voice. Fish does not synthesize a voice from a text description; per-line emotion is injected as inline markers
config.template.narration-tts.fish.format.comment=Audio output format (mp3 / wav / pcm / opus, default mp3)
config.template.narration-tts.fish.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (proxy.host:proxy.port), independent of global proxy.enabled
config.template.narration-tts.minimax.base-url.comment=MiniMax base URL (default https://api.minimax.io/v1; the engine appends /t2a_v2; the China site is https://api.minimaxi.chat/v1)
config.template.narration-tts.minimax.api-key.comment=MiniMax API key (Authorization: Bearer; never appears in logs or any response; unavailable until set)
config.template.narration-tts.minimax.group-id.comment=MiniMax account GroupId (19-digit number from the console; required by T2A v2, sent as a URL query parameter and paired with the API key; unavailable until set)
config.template.narration-tts.minimax.model.comment=MiniMax model name (default speech-2.8-hd)
config.template.narration-tts.minimax.voice-id.comment=MiniMax preset voice id (e.g. English_expressive_narrator); MiniMax has no per-line natural-language voice channel, a preset voice is required, blank means unavailable
config.template.narration-tts.minimax.emotion.comment=Optional fixed emotion (happy/sad/angry/fearful/disgusted/surprised/calm/fluent/whisper), blank uses the model default; the engine maps per-line emotion keywords first and falls back to this setting
config.template.narration-tts.minimax.format.comment=Audio output format (mp3 / wav / pcm / flac, default mp3)
config.template.narration-tts.minimax.sample-rate.comment=Audio sample rate (Hz, default 32000)
config.template.narration-tts.minimax.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (proxy.host:proxy.port), independent of global proxy.enabled
config.template.narration-tts.elevenlabs.base-url.comment=ElevenLabs base URL (default https://api.elevenlabs.io; the engine appends /v1/text-to-speech/{voice_id})
config.template.narration-tts.elevenlabs.api-key.comment=ElevenLabs API key (sent via the xi-api-key header, not Bearer; never appears in logs or any response; unavailable until set)
config.template.narration-tts.elevenlabs.model.comment=ElevenLabs model id (default eleven_v3; inline emotion tags are only parsed by v3, older models like eleven_multilingual_v2 read the bracketed tag aloud)
config.template.narration-tts.elevenlabs.voice-id.comment=Voice id pre-created/cloned in the ElevenLabs console, determines the timbre; required, blank means unavailable. Per-line emotion is injected as inline bracketed audio tags
config.template.narration-tts.elevenlabs.output-format.comment=Audio output format (the output_format query param, e.g. mp3_44100_128 / pcm_24000 / opus_48000_128, default mp3_44100_128)
config.template.narration-tts.elevenlabs.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (proxy.host:proxy.port), independent of global proxy.enabled
config.template.narration-tts.qwen.base-url.comment=Alibaba DashScope (Model Studio) base URL (default https://dashscope.aliyuncs.com/api/v1 for Beijing; the Singapore region is https://dashscope-intl.aliyuncs.com/api/v1; the engine appends /services/aigc/multimodal-generation/generation)
config.template.narration-tts.qwen.api-key.comment=DashScope API key (Authorization: Bearer; never appears in logs or any response; unavailable until set)
config.template.narration-tts.qwen.model.comment=Qwen TTS model name (default qwen3-tts-flash)
config.template.narration-tts.qwen.voice.comment=Preset voice (e.g. Cherry / Ryan / Dylan); blank uses the model default
config.template.narration-tts.qwen.language-type.comment=Optional text language hint (e.g. Chinese / English / Japanese), blank auto-detects; setting it makes pronunciation / intonation more natural
config.template.narration-tts.qwen.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (proxy.host:proxy.port), independent of global proxy.enabled
config.template.narration-tts.doubao.base-url.comment=ByteDance Volcengine speech synthesis base URL (default https://openspeech.bytedance.com; the engine appends /api/v1/tts, the HTTP non-streaming query path)
config.template.narration-tts.doubao.app-id.comment=Volcengine speech app id (speech console)
config.template.narration-tts.doubao.access-token.comment=Volcengine speech access token (sent via Authorization: Bearer;<token> with a semicolon; never appears in logs or any response; unavailable until set)
config.template.narration-tts.doubao.cluster.comment=Business cluster (default volcano_tts)
config.template.narration-tts.doubao.voice-type.comment=Preset voice id (voice_type, e.g. zh_female_wanqudashu_moon_bigtts); required, blank means unavailable
config.template.narration-tts.doubao.encoding.comment=Audio encoding / format (mp3 / wav / pcm / ogg_opus, default mp3)
config.template.narration-tts.doubao.emotion.comment=Optional fixed emotion (e.g. happy/sad/angry/scare/hate/surprise/comfort and other Volcengine-supported values), blank uses the model default; the engine maps per-line emotion keywords first and falls back to this setting; only emotion-capable voices (e.g. *_bigtts) take effect
config.template.narration-tts.doubao.use-proxy.comment=Whether this engine's requests go through the HTTP proxy (proxy.host:proxy.port), independent of global proxy.enabled
