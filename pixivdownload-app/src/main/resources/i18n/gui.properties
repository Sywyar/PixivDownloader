gui.welcome.advanced.body=以下是可选的进阶能力，按需了解即可；不需要也完全不影响日常下载与浏览。看完点「下一步」即完成引导。
gui.welcome.status.subtitle=这一步确认本地后端服务已正常运行——这是使用所有功能的前提，你无需做任何操作，等待就绪后点「下一步」即可。
