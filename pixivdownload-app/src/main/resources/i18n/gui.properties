gui.welcome.proxy.title=3. 代理设置
gui.welcome.proxy.body=后端的对外网络访问都会经此 HTTP 代理：访问 Pixiv（浏览、搜索，下载图片/动图/小说/封面，收藏）、在线更新（检查并下载新版本）、下载内置 FFmpeg（动图转换所需）、在线 TTS（听书的 Edge 神经语音）。可在这里开启/关闭代理并设置代理地址；之后也可在「配置」标签页随时修改。
gui.welcome.proxy.enabled=启用代理
gui.welcome.proxy.host=代理主机
gui.welcome.proxy.port=代理端口
gui.welcome.proxy.point.usage=普通本机使用时一般保持开启，并填写本地代理（默认 127.0.0.1:7890）。
gui.welcome.proxy.point.docker=运行在 Docker 容器中时，127.0.0.1 通常无法连到宿主机代理，请按需关闭代理，或填入容器可达的代理地址。
gui.welcome.proxy.point.change=代理配置保存到 config.yaml，会立即生效；之后可在「配置」标签页随时调整。
gui.welcome.proxy.invalid.host=启用代理时请填写代理主机
gui.welcome.proxy.invalid.port=代理端口必须是 1-65535 之间的整数
gui.welcome.proxy.failed=保存代理配置失败：{0}
gui.welcome.start.title=4. 开始下载
gui.welcome.start.body=推荐用网页端下载，无需安装任何浏览器扩展。点下方按钮打开下载页，粘贴内容即可批量下载。
gui.welcome.start.button=打开下载页
gui.welcome.start.waiting=在浏览器打开下载页后将自动进入下一步
gui.welcome.scripts.title=进阶：站内增强
gui.welcome.scripts.body=两个油猴脚本能做到网页端做不到的事：“页面批量”可在 Pixiv 站内直接抓取当前页作品，“工具箱”增强 Pixiv 浏览体验。其余下载用网页端即可，无需安装。
gui.welcome.scripts.button=查看脚本
gui.welcome.ffmpeg.title=进阶：动图支持
gui.welcome.ffmpeg.body=只有下载动图（Ugoira）才需要 ffmpeg；普通图片与小说下载不依赖它。
gui.welcome.ffmpeg.button=前往设置
gui.welcome.ffmpeg.state.ready=已检测到 ffmpeg
gui.welcome.ffmpeg.state.missing=未检测到 ffmpeg（仅影响动图）
gui.welcome.status.point1=绿点常亮并显示「运行中」即代表服务就绪。
gui.welcome.status.point2=显示「正在启动」时请稍候，首次启动可能在初始化数据库。
gui.welcome.status.point3=若长时间无法就绪或显示启动失败，可到「状态」标签页查看日志排查。
gui.welcome.config.point.account=用户名 + 密码用于登录下载页 / 监控页等需要鉴权的页面；密码至少 6 位，请牢记。
gui.welcome.config.point.mode=solo（单人）：仅你自己使用，所有页面需登录，不受配额与限流限制，适合个人本机使用。multi（多人）：允许他人作为访客访问，访客受人均配额与请求限流约束，可配合邀请码控制可见范围。
gui.welcome.config.point.change=之后如需修改账号或模式，可在「配置」标签页调整或重新运行安装流程。
gui.welcome.config.done.body=首次安装已完成，可以直接开始下载。点「下一步」继续了解后续功能。
gui.welcome.start.point.kinds=支持的内容：单个/多个作品链接、画师主页（按用户 ID 下载其全部作品）、关键词搜索、整个系列；插画 / 漫画 / 动图 / 小说均可。
gui.welcome.start.point.keepopen=下载在后端进行，但请保持下载页打开，直到队列全部提交完成（页面会持续把队列发送给后端）。
gui.welcome.start.point.formats=可在下载页设置文件名模板、小说格式（TXT/HTML/EPUB）与系列合订本等选项。
gui.welcome.scripts.intro=绝大多数下载用网页端即可，无需任何脚本。只有以下两种网页端做不到的能力依赖油猴脚本：
gui.welcome.scripts.point.page=「页面批量」：在 Pixiv 站内（搜索 / 排行 / 关注动态等任意列表页）直接抓取当前页作品并批量下载。
gui.welcome.scripts.point.toolbox=「工具箱」：增强 Pixiv 站内浏览体验（如对已下载过的作品加标记等）。
gui.welcome.scripts.install=安装方式：先安装浏览器扩展 Tampermonkey，再到下载页的「油猴脚本」卡片一键安装；其余脚本均非必需。
gui.welcome.ffmpeg.intro=只有「下载动图（Ugoira）」才需要 ffmpeg：它用于把动图的逐帧图片合成为 webp。普通图片、漫画、小说下载都不需要它。
gui.welcome.ffmpeg.state=当前状态：{0}
gui.welcome.ffmpeg.install=未检测到时，可在「状态」标签页一键下载内置 ffmpeg，或自行安装并将其加入系统 PATH。
gui.welcome.done.reopen.title=随时重看引导
gui.welcome.done.reopen=网页端的「操作指引」可随时在下载页 / 画廊页左下角的「操作指引」按钮重新打开；本引导首页在全部完成前每次启动都会自动出现。
