gui.config.field.download.root-folder.help=图片保存的根目录（相对或绝对路径）
gui.config.field.download.root-folder.label=下载根目录
gui.config.field.download.user-flat-folder.help=勾选即与批量导入单作品相同的扁平结构，否则会在下载根目录中创建一个以作者用户名的文件夹来保存 User 模式下载作品文件
gui.config.field.download.user-flat-folder.label=User 模式扁平目录
gui.config.field.download.max-concurrent.help=同时下载的图片/作品数上限（≥1），专用线程池，超出的作品排队等待；调小可降低被 Pixiv 限流的概率。修改后需重启服务才能生效
gui.config.field.download.max-concurrent.label=最大并发下载数（图片）
gui.config.field.download.novel-max-concurrent.help=同时下载的小说数上限（≥1），专用线程池，与图片下载相互隔离、互不抢线程。修改后需重启服务才能生效
gui.config.field.download.novel-max-concurrent.label=最大并发下载数（小说）
gui.config.field.download.novel-translate-max-concurrent.help=「下载即自动翻译」的并发上限（≥1），专用线程池，与下载相互隔离；同一系列章节按提交序串行翻译。修改后需重启服务才能生效
gui.config.field.download.novel-translate-max-concurrent.label=最大并发翻译数（小说）
gui.config.field.multi-mode.delete-after-hours.help=timed-delete 模式：下载后多少小时自动删除文件
gui.config.field.multi-mode.delete-after-hours.label=定时删除（小时）
gui.config.field.multi-mode.limit-page.help=限制搜索模式“向后补充 N 页”的最大 N 值；0 = 不限制，仅多人模式生效
gui.config.field.multi-mode.limit-page.label=搜索模式自动补页上限
gui.config.field.multi-mode.post-download-mode.help=pack-and-delete：打包后删除源文件；never-delete：保留；timed-delete：超时后删除
gui.config.field.multi-mode.post-download-mode.label=下载后处理模式
gui.config.field.multi-mode.quota.archive-expire-minutes.help=达到配额后生成的压缩包下载链接的有效时间
gui.config.field.multi-mode.quota.archive-expire-minutes.label=压缩包有效期（分钟）
gui.config.field.multi-mode.quota.enabled.help=为每位用户设置下载数量限制
gui.config.field.multi-mode.quota.enabled.label=启用下载配额
gui.config.field.multi-mode.quota.limit-image.help=0 = 不限制；设置后超出的作品按比例计算配额消耗
gui.config.field.multi-mode.quota.limit-image.label=单作品图片数上限
gui.config.field.multi-mode.quota.max-artworks.help=每个用户在一个重置周期内最多可下载的作品数量
gui.config.field.multi-mode.quota.max-artworks.label=每周期最多下载作品数
gui.config.field.multi-mode.quota.max-proxy-requests.help=每用户每重置周期内最多发起的搜索及代理请求次数（0 = 不限制，独立于下载配额）
gui.config.field.multi-mode.quota.max-proxy-requests.label=搜索/代理请求次数上限
gui.config.field.multi-mode.quota.archive-max-concurrent.help=同时进行的配额归档打包数上限（≥1），专用线程池，与图片/小说下载相互隔离。修改后需重启服务才能生效
gui.config.field.multi-mode.quota.archive-max-concurrent.label=最大并发归档打包数
gui.config.field.multi-mode.quota.reset-period-hours.help=经过多少小时后，用户配额自动重置
gui.config.field.multi-mode.quota.reset-period-hours.label=配额重置周期（小时）
gui.config.field.multi-mode.request-limit-minute.help=每个用户每分钟最多允许的 API 请求次数（0 = 不限制）
gui.config.field.multi-mode.request-limit-minute.label=每分钟最大请求数
gui.config.field.multi-mode.static-resource-request-limit-minute.help=多人模式未登录游客每个 IP 每分钟最多允许的 HTML、JS、CSS、字体等静态资源请求次数（0 = 不限制）
gui.config.field.multi-mode.static-resource-request-limit-minute.label=游客静态资源频率限制（次/分钟）
gui.config.field.guest-invite.request-limit-minute.help=邀请访客每个邀请码每分钟最多允许的 API 请求次数（0 = 不限制）；solo / multi 两种模式下均生效，管理员不受限
gui.config.field.guest-invite.request-limit-minute.label=邀请访客 API 频率限制（次/分钟）
gui.config.field.guest-invite.static-resource-request-limit-minute.help=邀请访客每个邀请码每分钟最多允许的 HTML、JS、CSS、字体等静态资源请求次数（0 = 不限制）；solo / multi 两种模式下均生效
gui.config.field.guest-invite.static-resource-request-limit-minute.label=邀请访客静态资源频率限制（次/分钟）
gui.config.field.guest-invite.tts-request-limit-minute.help=邀请访客每个邀请码每分钟最多允许的在线 TTS（语音合成）请求次数（0 = 不限制）；管理员与浏览器内置语音均不受限
gui.config.field.guest-invite.tts-request-limit-minute.label=邀请访客在线语音合成频率限制（次/分钟）
gui.config.field.plugin-catalog.enabled.help=是否启用插件市场（受信 catalog）。默认关闭，开启前不联网、不访问任何仓库；开启后管理员可在「插件市场」页浏览并安装官方 / 自定义仓库的插件。修改后需重启服务才能生效
gui.config.field.plugin-catalog.enabled.label=启用插件市场
gui.config.field.plugin-catalog.official-repository-enabled.help=是否启用内嵌的官方默认仓库（默认启用）。仅在插件市场开启时生效，可单独禁用以只使用自定义仓库。修改后需重启服务才能生效
gui.config.field.plugin-catalog.official-repository-enabled.label=启用官方默认仓库
gui.config.field.plugin-catalog.connect-timeout-ms.help=拉取仓库清单 / 下载插件包的全局连接超时（毫秒），可被单个仓库覆盖。修改后需重启服务才能生效
gui.config.field.plugin-catalog.connect-timeout-ms.label=连接超时（毫秒）
gui.config.field.plugin-catalog.read-timeout-ms.help=拉取仓库清单 / 下载插件包的全局读取超时（毫秒），可被单个仓库覆盖。修改后需重启服务才能生效
gui.config.field.plugin-catalog.read-timeout-ms.label=读取超时（毫秒）
