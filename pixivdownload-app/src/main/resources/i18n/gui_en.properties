gui.config.market.repo.proxy-trusted.risk=The "trusted proxy" policy fetches through the application-wide proxy (proxy.*) and follows at most one redirect within a built-in host allowlist, relaxing some of the direct-strict network rules; package integrity is still enforced by size / SHA-256 / signature (fail-closed) checks. Enable it only for repositories you fully trust.
