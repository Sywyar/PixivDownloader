gui.config.market.repo.risk=Security note: you vouch for the trustworthiness of any custom repository - only add ones you fully trust. "Direct strict" (default) is HTTPS-only, rejects non-public addresses and forbids redirects; "trusted proxy" uses the application-wide proxy and follows one redirect only to allowlisted hosts; "custom" lets you adjust those constraints individually. Package size / SHA-256 / signature checks stay fail-closed under every policy, but source trust remains your responsibility.
