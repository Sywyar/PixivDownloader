common.help=操作指引
common.progress={0} / {1}
common.skip=跳过
common.prev=上一步
common.next=下一步
common.done=完成

batch.cookie.title=① 填入 Pixiv Cookie
batch.cookie.body=想下载需要登录才能看的作品（如 R-18、关注限定）时，在这里粘贴你的 Pixiv Cookie。只下载公开作品可以跳过这一步。
batch.mode.title=② 选择下载方式
batch.mode.body=按需切换：粘贴作品链接批量导入、按画师 ID 下载其全部作品、关键词搜索下载，或下载整个系列。
batch.start.title=③ 开始下载
batch.start.body=添加好要下载的内容后，点这里开始。下载期间请保持本页打开（队列会持续提交到后端），全部完成后再关闭。
batch.queue.title=④ 查看进度
batch.queue.body=这里实时显示下载状态与队列，失败的条目可以一键重试。
batch.gallery.title=⑤ 浏览成果
batch.gallery.body=下载完成的作品都进入本地画廊，点这里随时回看与管理。

batch.cookie-import.install.title=① 安装体验增强工具箱
batch.cookie-import.install.body=一键导入需要 pixiv.net 上的「体验增强工具箱」配合。引导期间页面其它内容不可点击，请点击下方高亮的「体验增强工具箱」安装按钮，安装后才能进入下一步。若你已安装包含工具箱的 All-in-One 合并包，可直接点「我已安装 All-in-One」。
batch.cookie-import.install.have-aio=我已安装 All-in-One
batch.cookie-import.ready.title=② 开始导入
batch.cookie-import.ready.body=请确保已在本浏览器登录 Pixiv。点击「完成」后会打开 Pixiv 页面自动获取 Cookie 并返回，几秒内完成。

gallery.search.title=① 搜索已下载作品
gallery.search.body=输入作品标题或画师名快速查找你下载过的内容，搜索范围可在左侧下拉切换。
gallery.filter.title=② 按条件筛选
gallery.filter.body=点开筛选可按标签、作者、分级等组合过滤，精准定位想看的作品。
gallery.views.title=③ 切换浏览视图
gallery.views.body=在全部图片、按作者、按系列漫画等视图间切换，用不同维度浏览收藏。
gallery.grid.title=④ 浏览与管理
gallery.grid.body=这里展示已下载的作品，点击可查看大图、加入收藏夹或做进一步管理。
gallery.download.title=⑤ 继续下载更多
gallery.download.body=想下载新作品时，从这里回到下载页。点「完成」结束本指引后，请回到 PixivDownloader 程序窗口，那里会自动继续后续引导。

# ── 新用户跨页向导（onboarding.*） ──────────────────────────────────────
onboarding.common.skip=跳过指引
onboarding.common.next=下一步
onboarding.common.done=完成
onboarding.common.copy=复制
onboarding.common.copied=已复制

onboarding.welcome.title=👋 欢迎使用 PixivDownloader
onboarding.welcome.intro=初次见面！我会带你下载第一份示例作品，熟悉整个流程。先告诉我，怎么称呼你？
onboarding.welcome.name-placeholder=输入你的称呼（可留空）
onboarding.welcome.default-name=朋友

onboarding.network.title=① 检查网络是否可达
onboarding.network.intro=你好，{name}！开始之前，先检查后端能否连上 Pixiv（全程经你配置的代理）。
onboarding.network.checking=正在检测网络…
onboarding.network.checking-btn=检测中…
onboarding.network.ok=Pixiv 可达：{ping}ms
onboarding.network.fail=无法连接 Pixiv，请检查代理 / 网络设置
onboarding.network.fail-hint=常见原因：代理未开启或端口不对。请在程序的「设置 / config.yaml」中配置 proxy.host / proxy.port 后重试。
onboarding.network.retry=重试
onboarding.network.start-download=开始下载第一份作品

onboarding.orient.progress=认识下载页 · {step}/4
onboarding.orient.cookie.title=① Cookie 区域
onboarding.orient.cookie.body=这里填写你的 Pixiv Cookie。想下载需要登录才能看的作品（R-18、关注限定等）时，必须先在这里保存 Cookie；本次示例是全年龄作品，可以先不配置。
onboarding.orient.scripts.title=② 油猴脚本区域
onboarding.orient.scripts.body=这里可以安装配套的油猴脚本：在 Pixiv 站内一键导入登录 Cookie、抓取作品链接、批量下载等。本次示例用不到，先了解即可。
onboarding.orient.tabs.title=③ 下载方式
onboarding.orient.tabs.body=这里切换不同的下载方式：快捷获取我的收藏 / 关注 / 作品、批量导入单作品链接、按画师 ID 下载、关键词搜索、整系列下载。
onboarding.orient.choose.title=④ 选择下载方式
onboarding.orient.choose.body=第一次，我们来使用「批量导入单作品」作为示例。已为你切换到该模式，点「下一步」开始下载示例作品。

onboarding.download.progress=下载示例 · {step}/5
onboarding.download.paste.title=① 粘贴示例作品链接
onboarding.download.paste.body=复制下面这个示例作品链接，粘贴到高亮的输入框里：
onboarding.download.paste.ok=✓ 已识别示例作品，点「下一步」继续
onboarding.download.paste.foreign=检测到其它内容，请先完成指引哦～本步只粘贴上面的示例链接
onboarding.download.queue.title=② 加入下载队列
onboarding.download.queue.body=点击高亮的「导入并加入队列」按钮，把示例作品加入下载队列。
onboarding.download.filters.title=③ 附加筛选
onboarding.download.filters.body=可按内容分级、AI、标签、类型、页数、收藏数等条件过滤要下载的作品，不符合条件的会在下载时自动跳过。先了解一下，这一步暂不修改。
onboarding.download.settings.title=④ 下载设置
onboarding.download.settings.body=这里设置作品间隔、并发数、是否跳过已下载、下载后自动收藏、文件名格式等。先了解一下，这一步暂不修改。
onboarding.download.start.title=⑤ 开始下载
onboarding.download.start.body=点击高亮的「开始下载」按钮。下载期间请保持本页打开。

onboarding.monitor.title=⏳ 正在下载示例作品
onboarding.monitor.body=正在下载，请稍候…下方的状态栏与下载队列会实时显示进度，完成后会自动带你去画廊查看。
onboarding.monitor.body.no-result=正在下载，请稍候…下方的状态栏与下载队列会实时显示进度，完成后会提示你查看下载结果。
onboarding.monitor.success.title=🎉 下载成功！
onboarding.monitor.success.body=第一份作品已下载到本地。点击高亮的「画廊」入口，去看看你的成果吧。
onboarding.monitor.success.no-result.body=第一份作品已下载到本地。当前没有可打开的下载结果入口，指引已完成。
onboarding.monitor.fail.title=下载未成功
onboarding.monitor.fail.body=示例作品下载失败了。请检查 Cookie 与网络 / 代理后重试。
onboarding.monitor.fail.retry=重新下载

onboarding.gallery.progress=认识画廊 · {step}/{total}
onboarding.gallery.views.title=① 浏览视图
onboarding.gallery.views.body=左侧可在「全部图片 / 按作者 / 按系列漫画」之间切换，用不同维度浏览你下载的作品；下方还有收藏夹与各页面导航。
onboarding.gallery.search.title=② 搜索
onboarding.gallery.search.body=输入作品标题、画师名、标签等快速查找已下载的内容；左侧下拉可切换搜索范围。
onboarding.gallery.filter.title=③ 筛选
onboarding.gallery.filter.body=点开筛选可按排序、分级、AI、格式、收藏夹、系列等条件组合过滤，精准定位想看的作品。
onboarding.gallery.grid.title=④ 作品网格
onboarding.gallery.grid.body=下载完成的作品都展示在这里，点任意一张卡片即可进入作品详情页。
onboarding.gallery.card.title=🖼 这是你刚下载的作品
onboarding.gallery.card.body=点击这张高亮的作品卡片，进入作品详情页。
onboarding.gallery.card.body-fallback=你下载的作品会出现在这里，点任意一张卡片可进入作品详情页。

onboarding.redirect.title=👋 欢迎使用 PixivDownloader
onboarding.redirect.body=新手指引从「下载页」开始，会带你下载第一份示例作品。要现在前往吗？
onboarding.redirect.later=以后再说
onboarding.redirect.go=前往下载页

onboarding.detail.viewer.title=① 作品图区
onboarding.detail.viewer.body=这里展示作品的图片，点击任意图片可放大查看；多图作品会逐页平铺浏览。
onboarding.detail.actions.title=② 功能区
onboarding.detail.actions.body=作品的操作区：展开 / 收起多图、跳转 Pixiv 原作品、作品展示，以及删除本地作品等，旁边还显示页数与格式信息。
onboarding.detail.meta.title=③ 简介区
onboarding.detail.meta.body=作品标题、简介与标签都在这里。点标签可在画廊里筛选同标签的作品。
onboarding.detail.author.title=④ 作者区
onboarding.detail.author.body=作品的作者（画师）信息。点击可查看该作者在本地的其他作品，或跳转其 Pixiv 主页。
onboarding.detail.series.title=⑤ 系列 / 相关区
onboarding.detail.series.body=若作品属于某个系列，这里可翻阅同系列其他话；下方还会推荐相关作品。

onboarding.done.title=🎉 新手指引完成！
onboarding.done.body=你已经走完了从下载到浏览的完整流程。接下来可以用「快捷获取 / 搜索 / 系列」等方式批量下载更多作品，尽情探索吧！
onboarding.done.close=开始使用
