switch.required=必须插件，不可停用。
switch.enable=点击启用
switch.disable=点击停用

# —— 卡片描述（按来源的通用描述；待后端补每插件简介后替换） ——
desc.built-in=内置插件，随主程序一起编译发布。
desc.external=外置插件，可在运行期加载 / 启停 / 卸载。
desc.not-installed=该插件尚未安装。把插件包（zip / jar）放入工作目录的 plugins/ 文件夹后重启以加载。

# —— 核心 API / 依赖 ——
api.requires=核心 API {version}
api.any=不限核心 API 版本
deps.count={n} 个依赖
deps.optional=（可选）

# —— 运行期动词 ——
action.load=加载
action.start=启动
action.quiesce=静默
action.stop=停止
action.unload=卸下
action.remove=删除
action.restart=重启
action.reload=重载
action.none=暂无可执行的操作
action.done=已执行：{action}
action.failed=操作失败：{message}
action.error.generic=操作失败

# —— 恢复 / 补齐模式 ——
recovery.title=恢复 / 补齐模式
recovery.desc=缺少必须的下载插件（download-workbench），正常业务功能未开放。请安装或修复该必须插件后重启。

# —— 本地插件包安装弹窗（消费 POST /api/plugins/install；事务落盘并即时激活） ——
install.title=安装本地插件包
install.desc=选择本地 .jar / .zip 插件包。系统会先校验，再卸下旧版本、原子替换并立即激活；失败时自动恢复原版本。
install.pick=选择插件包…
install.no-file=未选择文件
install.choose-file=请先选择要安装的插件包（.jar / .zip）。
install.invalid-extension=仅支持 .jar / .zip 插件包，请重新选择。
install.advanced=高级选项
install.allow-downgrade=允许安装更低版本（覆盖已安装的更高版本）。
install.cancel=取消
install.submit=安装
install.close=关闭
install.restart-note=插件包已落盘，但当前运行时无法即时激活；请重启后确认状态。
install.activated-note=插件已安装并在当前进程中激活。
install.rollback-note=新版本激活失败，已恢复原版本。
install.outcome-code=结果代码
install.field.plugin-id=插件 ID
install.field.version=版本
install.field.previous-version=原版本
install.field.operation=事务操作
install.field.runtime-phase=运行阶段
install.field.rollback-version=已恢复版本
install.field.transaction-id=事务 ID
install.errors=诊断信息
install.warnings=尚未满足的依赖
install.toast.accepted=插件已安装并激活。
install.toast.rejected=未安装：{message}
install.error.generic=安装请求失败，请重试。

# —— 更新机制 ——
update.available=有新版本可更新到 v{latest}
update.updating=更新中…
operation.running=正在执行：{operation}

# —— 核心 / 计划任务宿主插件展示名 + 简介（经 displayNamespace=plugins 由后端解析；勿删） ——
name.core=核心
summary.core=核心壳：承载启动、鉴权、数据库、资源注册与插件管理等基础能力（必须）。
name.schedule=计划任务宿主
summary.schedule=承载计划任务的调度安全壳与计划任务管理 API（必须）。
