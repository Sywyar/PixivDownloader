# —— 类别 / 标签 / 徽标 ——
kind.core=核心
kind.feature=功能
tag.required=必须
tag.managed=可热管理
badge.required=必须
verification.verified-official=官方签名
verification.verified-custom=自定义仓库签名
verification.unverified-local=本地未验证
verification.unsigned-allowed=用户放行未签名
verification.signature-required=缺少签名
