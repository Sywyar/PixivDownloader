# 插件管理页（plugin-manage.html）文案。
# 注意：nav.brand / nav.label 与 name.* / summary.* 由后端引用（导航贡献 + 核心/计划任务宿主插件展示名经
# displayNamespace=plugins 解析），勿删除或改键名。

# —— 导航 / 页面 chrome ——
nav.brand=Pixiv 下载助手
nav.label=插件管理
logout=退出
page.title=插件管理 · Pixiv 下载助手
page.heading=插件管理
page.subtitle=扩展下载助手的能力 — 翻译、转码、备份与通知，按需启用 / 停用。
refresh=刷新
install.open=安装本地插件
search.placeholder=搜索插件名称或标签…
result.count={n} 个结果
disclaimer=插件运行于本地，仅供个人学习与研究使用 · 请尊重创作者版权 · 本工具与 Pixiv 无任何关联

# —— 市场 / 已安装 分段控件（与插件市场页互链；plugin-market 启用时才出现「市场」入口，禁用即整体撤销）——
seg.market=市场
seg.installed=已安装

# —— 概览统计 ——
stat.total=已安装插件
stat.enabled=已启用
stat.external=外置插件
stat.required=必须插件

# —— 筛选标签 ——
tab.all=全部
tab.enabled=已启用
tab.disabled=已禁用
tab.external=外置

# —— 加载 / 空状态 ——
status.loading=正在加载插件状态…
status.error=加载插件状态失败，请重试。
