mode.title=Usage Mode
mode.solo=Personal Mode
mode.solo.desc=For personal use only. Access requires login verification, and you can choose whether to stay signed in. All settings (cookie, options, and queue) are stored on the server and shared across your devices.
mode.multi=Multi-user Mode
mode.multi.desc=For a shared service. Login is not required. Each user's settings are stored independently in that user's browser local storage.
proxy.title=Proxy Settings
proxy.hint=All of the backend's outbound traffic goes through this HTTP proxy: accessing Pixiv (browsing, searching, downloading images/ugoira/novels/covers, bookmarking), online updates (checking and downloading new versions), downloading the bundled FFmpeg (needed for ugoira conversion), and online TTS (the Edge neural voices used by "Listen"). When running in a Docker container, 127.0.0.1 usually cannot reach a proxy on the host, so disable it or enter a proxy address reachable from the container.
