# Features
features.eyebrow=Features · 特性
features.title=不止下载，是一整套<em style="font-family:'Instrument Serif',serif;font-style:italic;background:linear-gradient(120deg,var(--accent),var(--accent-3));-webkit-background-clip:text;color:transparent"> 收藏管线。</em>
features.f1.title=漫画 · 动图 · 小说 全格式
features.f1.body=插画 / 漫画 / 动图（Ugoira → WebP）/ 小说（TXT / HTML / EPUB + 封面 + 合订）四条独立管线，共享同一个 SQLite 历史库。
features.f2.title=本地画廊 + 作品详情
features.f2.body=侧栏检索 / 标签 - 作者三模式筛选 / 灯箱预览 / 系列上下章 / 相关作品 / 同作者其他作品。下完即可在本地浏览。
features.f3.title=收藏夹归档 + 自定义模板
features.f3.body=支持自定义图标 / 独立下载目录的收藏夹；文件名模板：<code>{artwork_id}_p{page}</code>、<code>{author_name}</code>、<code>{R18+}</code> 等占位符自由组合。
features.f4.title=多人模式 · 配额 · 邀请码
features.f4.body=solo / multi 两套模式。多人模式下每个 UUID 独立配额，超额打包归档为 ZIP；可签发限定 Tag / 作者 / 分级的邀请码，访客只能看你允许的作品。
features.f5.title=暗色模式 + 多语言
features.f5.body=所有面向用户的新页面走 i18n bundle（中文 / English），主题切换持久化。CSS 变量驱动，深色模式与亮色模式视觉对齐。
features.f6.title=SQLite WAL + GUI 工具
features.f6.body=本地库记录每件作品的 ID / 标题 / 文件夹 / 格式 / R-18 / AI / 标签。Swing GUI 自带状态面板、配置编辑、图片分类、目录有效性检查、数据回填工具。

# CTA
cta.eyebrow=Get Started · 开始使用
cta.title=三步，把它<em style="font-family:'Instrument Serif',serif;font-style:italic;background:linear-gradient(120deg,var(--accent-2),var(--accent-3));-webkit-background-clip:text;color:transparent">跑起来。</em>
cta.lead=Windows installer 一键安装；其他平台 Java 17 + HTTP 代理即可。
cta.step1.title=下载并启动
cta.step1.body=Windows 直接装 <code>*-win-x64-setup.exe</code>（含 GUI 管家）；其他平台从 Releases 下载 <code>PixivDownload.jar</code> 后 <code>java -jar</code>。
cta.step2.title=首次配置 setup
cta.step2.body=浏览器自动打开 <code>/setup.html</code>，选择 <code>solo</code> / <code>multi</code> 模式，设置用户名密码，配置好就能开搜。
cta.step3.title=直接用 pixiv-batch
cta.step3.body=访问 <code>/pixiv-batch.html</code>，四个 tab 任选；想要原页面下载按钮可在 <code>🧩 油猴脚本</code> 卡片一键安装。
foot.line1=PixivDownloader · Spring Boot 3.5.7 · Java 17 · SQLite WAL
foot.line2=made with ♥ by Sywyar

log.i18n-init-failed=i18n 初始化失败
