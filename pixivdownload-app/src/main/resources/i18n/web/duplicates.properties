controls.threshold=dHash 阈值
controls.ahash-threshold=aHash 阈值
controls.threshold.title=dHash 检测图像「结构」（轮廓与形状）：调大 = 匹配更宽松，能找出更多大致相似的图，但更易误判；调小 = 更严格，只挑出结构高度雷同的图。
controls.ahash-threshold.title=aHash 检测图像「明暗」（整体亮度分布，作辅助确认）：调大 = 容忍更大的明暗差异；调小 = 要求明暗也几乎一致，进一步减少误判。
threshold.hint=dHash 检测「结构」：调大→匹配更宽松（找出更多相似图、但更易误判），调小→更严格（只合并结构高度雷同的图）。aHash 检测「明暗」：调大→容忍更大明暗差异，调小→要求明暗也几乎一致、进一步减少误判。补充：两个阈值都是「允许的差异上限」（汉明距离 0–64），需同时满足才判为相似；都为 0（默认）时只合并指纹完全相同的图，最严格。
