page.title=Pixiv 批量下载器 — 初始配置
header.title=Pixiv 批量下载器 — 初始配置
welcome.title=欢迎使用
welcome.body=检测到这是首次运行，请完成以下初始配置。<br>配置完成后将不会再次显示此页面。
account.title=管理员账号
field.username=用户名
field.username.placeholder=设置管理员用户名
field.password=密码（至少 6 位）
field.password.placeholder=设置密码
field.confirm-password=确认密码
field.confirm-password.placeholder=再次输入密码
mode.title=使用模式
mode.solo=自用模式
mode.solo.desc=仅供个人使用。访问需要登录验证，可选择是否保持登录状态。所有配置（Cookie、设置、队列）统一保存在服务器，多设备共享同一状态。
mode.multi=多人使用模式
mode.multi.desc=多人共享服务。无需登录，每个用户的配置独立保存在各自浏览器的本地存储中，互不干扰。
proxy.title=代理设置
proxy.hint=后端的对外网络访问都会经此 HTTP 代理：访问 Pixiv（浏览、搜索，下载图片/动图/小说/封面，收藏）、在线更新（检查并下载新版本）、下载内置 FFmpeg（动图转换所需）、在线 TTS（听书的 Edge 神经语音）。若运行在 Docker 容器中，127.0.0.1 通常无法连到宿主机代理，请按需关闭或填入容器可达的代理地址。
proxy.enabled=启用代理
proxy.host=代理主机
proxy.host.placeholder=例如 127.0.0.1
proxy.port=代理端口
proxy.port.placeholder=例如 7890
proxy.validation.host-required=启用代理时请填写代理主机
proxy.validation.port-invalid=代理端口必须是 1-65535 之间的整数
button.submit=完成配置
validation.username-required=请填写用户名
validation.password-short=密码长度至少 6 位
validation.password-mismatch=两次密码输入不一致
status.saving=正在保存配置...
status.failed=配置失败
status.complete=配置完成！正在跳转...
status.redirecting=正在跳转...
status.network-error=网络错误：{message}
