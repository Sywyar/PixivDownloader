spring.application.name=PixivDownload
server.port=6999
# 取得凭证请求头允许 16 KiB；为请求行、会话 Cookie 与常规浏览器头保留余量。
server.max-http-request-header-size=32KB
spring.config.import=optional:file:${pixivdownload.config-dir:./config}/config.yaml,optional:file:./config.yaml
mybatis.configuration.map-underscore-to-camel-case=true

# 文件上传（multipart）上限：覆盖 Spring Boot 默认的 1MB，使参考音（≤8MB，见 NarrationReferenceVoiceController）等
# 合法上传能进入控制器走业务校验；超过本硬上限的请求由 GlobalExceptionHandler 统一转 413/400，而非 Tomcat 原始错误页。
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Actuator：仅暴露 health / info 供容器探针使用，绝不暴露 env/beans/configprops 等可能泄露配置的端点。
# health 不返回 details（show-details=never），避免向未登录访客泄露数据源、磁盘等内部信息。
# /actuator/health 与 /actuator/info 在 AuthFilter 中白名单放行（见 isPublicActuatorEndpoint）。
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false
