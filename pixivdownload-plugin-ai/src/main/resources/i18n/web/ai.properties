plugin.name=AI
plugin.summary=OpenAI 兼容聊天与自动翻译能力。
gui.config.ai.modality.label=模态
gui.config.ai.modality.help=选择要配置的 AI 模态：「文本模型」是通用大语言模型（OpenAI 兼容，供翻译 / 听小说剧本分析等使用）；「TTS 模型」是多角色听小说朗读的语音合成引擎（beta，可用但尚不稳定）。两类配置同时保存并生效，下拉仅切换当前编辑项
gui.config.ai.modality.text=文本模型
gui.config.ai.modality.tts=TTS 模型（beta）
gui.config.field.ai.enabled.label=启用 AI
gui.config.field.ai.enabled.help=关闭时所有 AI 调用都会被拒绝；开启后相关功能可调用所配置的大语言模型
gui.config.field.ai.base-url.label=API 地址
gui.config.field.ai.base-url.help=OpenAI 兼容端点，如 https://api.openai.com/v1；选择上方"服务商预设"可自动填入
gui.config.field.ai.api-key.label=API Key
gui.config.field.ai.api-key.help=在对应服务商控制台创建；绝不会出现在日志或任何响应中。本地模型（如 Ollama / LM Studio）通常可留空
gui.config.field.ai.model.label=模型
gui.config.field.ai.model.help=要调用的模型名，如 gpt-4o-mini / deepseek-chat / qwen-plus；模型更新较快，请以服务商文档为准
gui.config.field.ai.use-proxy.label=使用代理
gui.config.field.ai.use-proxy.help=开启后本配置的请求走 HTTP 代理（地址取代理设置的 host:port）；海外厂商通常需开启、国内厂商无需。独立于全局代理开关
gui.config.ai.preset.label=服务商预设
gui.config.ai.preset.help=选中后会自动填入并锁定 API 地址，并按预设回填模型与"使用代理"建议值；如需自定义端点请选择"自定义"
gui.config.ai.test-button.label=测试 AI 连接
gui.config.ai.test-button.help=用当前表单设置（无需先保存）向模型发送一条极短探测消息，成功即代表地址 / 密钥 / 模型 / 网络可用
gui.config.ai.test.notice.sending=正在测试 AI 连接，请稍候…
gui.config.ai.test.notice.success=AI 连接成功，模型回复：{0}
gui.config.ai.test.notice.failed=AI 连接失败：{0}
gui.config.ai.test.notice.unreachable=无法连接到后端服务，请确认服务正在运行
