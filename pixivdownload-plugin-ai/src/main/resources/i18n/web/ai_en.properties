ai.preset.help.api-key=Create an API key in the provider's developer console and paste it into "API key" below. Pricing and rate limits vary; consult the official docs.
ai.preset.help.anthropic=Claude is accessed via its OpenAI-compatible endpoint (/v1/chat/completions, using the API key as a Bearer token). Create an API key in the Anthropic console; some native features are unavailable on the compatible endpoint.
ai.preset.help.gemini=Gemini is accessed via its OpenAI-compatible endpoint (/v1beta/openai). Create an API key in Google AI Studio.
ai.preset.help.dashscope=Create an API key (sk-...) in the Alibaba Cloud Model Studio (DashScope) console.
ai.preset.help.doubao=Create an API key in the Volcengine Ark console; the "Model" field accepts a model name or an endpoint ID (ep-...).
ai.preset.help.ernie=Baidu Qianfan V2 uses your account security credential as the Bearer token; see the Qianfan console docs for how to obtain it.
ai.preset.help.spark=iFlytek Spark uses the HTTP service auth credential (APIPassword) from the console as the API key.
ai.preset.help.minimax=Create an API key in the MiniMax open platform (China site api.minimaxi.com; for the international site use api.minimax.io); some endpoints also need a GroupId — see the official docs.
ai.preset.help.local=Local / self-hosted (Ollama, LM Studio, vLLM, etc.). No real API key required (leave empty or use any value); self-host open-source models (e.g. MiMo) and enter the matching model name here.
ai.preset.help.aggregator=Aggregator / routing platform where one key reaches many models. "Model" must use the platform's full model identifier (e.g. openai/gpt-4o-mini).
ai.preset.help.custom=Custom: fill in the OpenAI-compatible API base URL / model yourself; provide the API key as your provider requires.
batch.auto-translate-label=Auto-translate newly downloaded novels
batch.translate-lang-label=Target language:
batch.translate-lang-default=english
batch.translate-seg-label=Segment size:
batch.translate-glossary-hint=Auto-translation always uses the novel's / series' default term glossary; a specific glossary cannot be selected here. Segment size 0 means translate the whole chapter at once. Admin-only and requires AI to be configured first.
