# i18n keys for push notification message text (used by PushMessageFactory / test push).
# - Adding a scenario: add push.message.{id}.title and push.message.{id}.body (Markdown source) here and in the zh file.
# - body uses lightweight Markdown (**bold** / links / line breaks \n); {{key}} placeholders match the mail template's keys.
# - Only push message text lives here; logs / config.yaml comments stay in messages.properties.
# - Title and body never contain cookie / PHPSESSID / any credential.

# ── Test push (GUI "Test this channel" button) ──────────────────────────────
push.test.message.title=Pixiv Downloader test push
push.test.message.body=If you received this **formatted** message, this push channel is configured correctly.

