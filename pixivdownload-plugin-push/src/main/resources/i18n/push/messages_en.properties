# ── Scheduled-task auto-suspend scenarios (paired with mail templates; same id and placeholders) ──
push.message.overuse-paused.title=⚠️ Overuse warning detected, scheduled tasks paused
push.message.overuse-paused.body=Pixiv sent an "overuse" warning to account **{{account_id}}**, and **{{tasks_count}}** scheduled task(s) for it have been paused automatically.\n\n- Warning time: {{warning_time}}\n- Paused at: {{trigger_time}}\n\nAffected tasks:\n{{tasks_list_md}}\n\nResume from the "Scheduled Tasks" page after assessing the risk.
push.message.auth-expired.title=🔑 Scheduled task auth expired, re-authorization required
push.message.auth-expired.body=The login session (cookie) bound to scheduled task **{{task_name}}** (ID {{task_id}}) has expired, and the task has been suspended automatically.\n\n- Task type: {{task_type}}\n- Trigger: {{task_trigger}}\n- Suspended at: {{trigger_time}}\n- Recovery: resumes only after re-authorizing the cookie (no automatic retry)\n\nRe-authorize the cookie on the "Scheduled Tasks" page; it will resume and retry the isolated works first.
push.message.circuit-breaker.title=🛑 Scheduled task circuit-broken
push.message.circuit-breaker.body=Scheduled task **{{task_name}}** (ID {{task_id}}) failed **{{consecutive_failures}}** times in a row and tripped the circuit breaker, so it has been suspended.\n\n- Task type: {{task_type}}\n- Trigger: {{task_trigger}}\n- Suspended at: {{trigger_time}}\n- Recovery: resumes only after re-authorizing the cookie (no automatic retry)\n- Last failure: {{last_error_excerpt}}\n\nCheck and re-authorize the cookie on the "Scheduled Tasks" page.
push.message.pending-exhausted.title=🧩 Work exhausted auto-retry, manual action required
push.message.pending-exhausted.body=The {{work_kind}} work **{{work_id}}** in scheduled task **{{task_name}}** (ID {{task_id}}) still fails after **{{attempts}}** automatic retries, so auto-retry has stopped.\n\n- Task type: {{task_type}}\n- Trigger: {{task_trigger}}\n- Work link: {{work_url}}\n- Triggered at: {{trigger_time}}\n- Next scheduled run: {{next_run_time}}\n- Last failure: {{last_error_excerpt}}\n\nOpen the "🧩 Pending retries" panel on the "Scheduled Tasks" page to handle it manually.
push.message.degraded-anonymous.title=ℹ️ Scheduled task cookie expired, auto-degraded to restricted mode
push.message.degraded-anonymous.body=The login session (cookie) bound to scheduled task **{{task_name}}** (ID {{task_id}}) has expired, but this task needs no cookie, so this run was auto-degraded to restricted mode and completed successfully.\n\n- Task type: {{task_type}}\n- Trigger: {{task_trigger}}\n- New downloads this run: {{completed}}\n- Run time: {{trigger_time}}\n- Next scheduled run: {{next_run_time}}\n\nThe expired cookie snapshot has been cleared. To fetch R-18 / restricted content, re-authorize the cookie on the "Scheduled Tasks" page.
push.message.run-failed.title=❌ Scheduled task run failed
push.message.run-failed.body=Scheduled task **{{task_name}}** (ID {{task_id}}) failed this run and could not finish discovery/downloading; it will retry on the next cycle.\n\n- Task type: {{task_type}}\n- Trigger: {{task_trigger}}\n- Failed at: {{trigger_time}}\n- Next scheduled run: {{next_run_time}}\n- Failure reason: {{last_error_excerpt}}\n\nIf it keeps failing, check the configuration and network/proxy on the "Scheduled Tasks" page (sent once when the status turns failed).
push.message.run-summary.title=✅ Scheduled task finished, {{completed}} new download(s)
push.message.run-summary.body=Scheduled task **{{task_name}}** (ID {{task_id}}) ran successfully with **{{completed}}** new download(s).\n\n- Task type: {{task_type}}\n- Trigger: {{task_trigger}}\n- Run time: {{trigger_time}}\n- Next scheduled run: {{next_run_time}}

