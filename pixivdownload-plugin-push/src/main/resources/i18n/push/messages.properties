# ── 计划任务自动挂起场景（与邮件模板成对维护，id 与占位符一致）──────────────────
push.message.overuse-paused.title=⚠️ 检测到过度访问警告，已暂停计划任务
push.message.overuse-paused.body=Pixiv 向账号 **{{account_id}}** 发来「过度访问」警告，已自动暂停该账号下的 **{{tasks_count}}** 个计划任务。\n\n- 警告时间：{{warning_time}}\n- 暂停时间：{{trigger_time}}\n\n受影响任务：\n{{tasks_list_md}}\n\n请到「计划任务」页面确认风险后再恢复。
push.message.auth-expired.title=🔑 计划任务鉴权失效，需重新授权
push.message.auth-expired.body=计划任务 **{{task_name}}**（ID {{task_id}}）绑定的登录态（Cookie）已失效，已自动挂起。\n\n- 任务类型：{{task_type}}\n- 触发方式：{{task_trigger}}\n- 挂起时间：{{trigger_time}}\n- 恢复方式：需重新授权 Cookie 后才会继续（不会自动重试）\n\n请到「计划任务」页面重新授权 Cookie，授权后会自动恢复并优先重试被隔离的作品。
push.message.circuit-breaker.title=🛑 计划任务熔断挂起
push.message.circuit-breaker.body=计划任务 **{{task_name}}**（ID {{task_id}}）连续失败 **{{consecutive_failures}}** 次，已触发熔断并挂起。\n\n- 任务类型：{{task_type}}\n- 触发方式：{{task_trigger}}\n- 挂起时间：{{trigger_time}}\n- 恢复方式：需重新授权 Cookie 后才会继续（不会自动重试）\n- 最近失败：{{last_error_excerpt}}\n\n请到「计划任务」页面检查并重新授权 Cookie。
push.message.pending-exhausted.title=🧩 作品自动重试已达上限，需人工处理
push.message.pending-exhausted.body=计划任务 **{{task_name}}**（ID {{task_id}}）中的{{work_kind}}作品 **{{work_id}}** 自动重试 **{{attempts}}** 次后仍失败，已停止自动重试。\n\n- 任务类型：{{task_type}}\n- 触发方式：{{task_trigger}}\n- 作品链接：{{work_url}}\n- 触发时间：{{trigger_time}}\n- 下次预定运行：{{next_run_time}}\n- 最近失败：{{last_error_excerpt}}\n\n请到「计划任务」页面展开「🧩 待重试」面板手动处理。
push.message.degraded-anonymous.title=ℹ️ 计划任务 Cookie 失效，已自动降级为受限模式
push.message.degraded-anonymous.body=计划任务 **{{task_name}}**（ID {{task_id}}）绑定的登录态（Cookie）已失效，但本任务无需 Cookie，本轮已自动降级为受限模式并成功完成。\n\n- 任务类型：{{task_type}}\n- 触发方式：{{task_trigger}}\n- 本轮新下载：{{completed}}\n- 运行时间：{{trigger_time}}\n- 下次预定运行：{{next_run_time}}\n\n已自动清除失效 Cookie 快照；如需抓取 R-18 / 受限内容，请到「计划任务」页面重新授权 Cookie。
push.message.run-failed.title=❌ 计划任务运行失败
push.message.run-failed.body=计划任务 **{{task_name}}**（ID {{task_id}}）本轮运行失败，未能完成发现 / 下载，将在下个周期自动重试。\n\n- 任务类型：{{task_type}}\n- 触发方式：{{task_trigger}}\n- 失败时间：{{trigger_time}}\n- 下次预定运行：{{next_run_time}}\n- 失败原因：{{last_error_excerpt}}\n\n若持续失败，请到「计划任务」页面检查配置与网络 / 代理（仅状态转入失败时通知一次）。
push.message.run-summary.title=✅ 计划任务运行完成，新增 {{completed}} 个下载
push.message.run-summary.body=计划任务 **{{task_name}}**（ID {{task_id}}）本轮运行成功，新增 **{{completed}}** 个下载。\n\n- 任务类型：{{task_type}}\n- 触发方式：{{task_trigger}}\n- 运行时间：{{trigger_time}}\n- 下次预定运行：{{next_run_time}}

