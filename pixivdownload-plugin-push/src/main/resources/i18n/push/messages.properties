push.sample.tasks-list-html=示例计划任务（ID 42）<br>另一个计划任务（ID 43）<br>第三个计划任务（ID 44）
push.sample.tasks-list-md=- 示例计划任务（ID 42）\n- 另一个计划任务（ID 43）\n- 第三个计划任务（ID 44）
