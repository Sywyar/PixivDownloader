plugin.name=Push notifications
plugin.summary=Push notification channels for scheduled task alerts.
gui.config.notification.service.label=Notification service
gui.config.notification.hint=Enabled services all take effect; the dropdown only switches the service currently being edited
gui.config.notification.service.help=Pick the service to edit; every enabled service sends notifications simultaneously
gui.config.notification.service.bark=Bark
gui.config.notification.service.dingtalk=DingTalk
gui.config.notification.service.telegram=Telegram
gui.config.notification.service.feishu=Feishu
gui.config.notification.service.wecom=WeCom
gui.config.notification.service.pushplus=PushPlus
gui.config.notification.service.serverchan=ServerChan
gui.config.notification.service.webhook=Custom Webhook
gui.config.push.test-current-button.label=Test this channel
gui.config.push.test-current-button.help=Send a test message only to the currently selected channel using the current form values (no need to save first)
gui.config.push.test.notice.current-success=Test push sent successfully
gui.config.push.test.notice.current-failed=Test push failed: {0}
gui.config.push.test.notice.current-skipped=The current channel is not fully filled in; skipped
gui.config.push.test-all.button.label=Send all message templates
gui.config.push.test-all.button.help=Send every notification message to the current channel one by one using the current form values (no need to save first), to preview how each notification looks on this channel
gui.config.push.test-all.notice.sending=Sending all message templates, please wait…
gui.config.push.test-all.notice.success=All message templates sent successfully ({0} in total)
gui.config.push.test-all.notice.partial=Some messages sent: {0}/{1} ({2})
gui.config.push.test-all.notice.skipped=The current channel is not fully filled in; skipped
gui.config.field.push.enabled.label=Enable push
gui.config.field.push.enabled.help=Master switch for push; when off, no channel sends
gui.config.field.push.use-proxy.help=When on, this channel's requests go through the HTTP proxy (using the proxy host:port); independent of the global proxy switch
gui.config.field.push.bark.enabled.label=Enable Bark
gui.config.field.push.bark.enabled.help=Bark is a push app for iOS; when on, it receives test / notification messages
gui.config.field.push.bark.server.label=Bark server
gui.config.field.push.bark.server.help=The official public server is https://api.day.app; a self-hosted URL also works
gui.config.field.push.bark.device-key.label=Device key
gui.config.field.push.bark.device-key.help=Found in the Bark app; never appears in logs
gui.config.field.push.bark.sound.label=Sound
gui.config.field.push.bark.sound.help=Optional sound name; empty uses the app default
gui.config.field.push.bark.use-proxy.label=Bark uses proxy
gui.config.field.push.dingtalk.enabled.label=Enable DingTalk
gui.config.field.push.dingtalk.enabled.help=DingTalk group custom robot; when on, it receives test / notification messages
gui.config.field.push.dingtalk.access-token.label=Access token
gui.config.field.push.dingtalk.access-token.help=After creating the DingTalk robot you get a webhook URL like https://oapi.dingtalk.com/robot/send?access_token=xxxx; paste the part after access_token= here. Never appears in logs
gui.config.field.push.dingtalk.secret.label=Signing secret
gui.config.field.push.dingtalk.secret.help=When creating the DingTalk robot, tick "Sign" (加签) under Security Settings and paste the generated SEC-prefixed secret here (it cannot be viewed again after the page closes, so copy it promptly); leave empty if you use "keyword" or "IP allowlist". Never appears in logs
gui.config.field.push.dingtalk.use-proxy.label=DingTalk uses proxy
gui.config.field.push.telegram.enabled.label=Enable Telegram
gui.config.field.push.telegram.enabled.help=Telegram Bot; when on, it receives test / notification messages (a proxy is usually required in some regions)
gui.config.field.push.telegram.bot-token.label=Bot token
gui.config.field.push.telegram.bot-token.help=Obtained from @BotFather; never appears in logs
gui.config.field.push.telegram.chat-id.label=Chat ID
gui.config.field.push.telegram.chat-id.help=Target chat id (user / group / channel)
gui.config.field.push.telegram.use-proxy.label=Telegram uses proxy
gui.config.field.push.feishu.enabled.label=Enable Feishu
gui.config.field.push.feishu.enabled.help=Feishu (Lark) group custom robot; when on, it receives test / notification messages
gui.config.field.push.feishu.webhook-key.label=Webhook key
gui.config.field.push.feishu.webhook-key.help=The key at the end of the Feishu robot webhook URL (the part after .../bot/v2/hook/); never appears in logs
gui.config.field.push.feishu.secret.label=Signing secret
gui.config.field.push.feishu.secret.help=Filled when the robot's security setting is "signature"; leave empty for "keyword" or "IP allowlist". Never appears in logs
gui.config.field.push.feishu.use-proxy.label=Feishu uses proxy
gui.config.field.push.wecom.enabled.label=Enable WeCom
gui.config.field.push.wecom.enabled.help=WeCom (Enterprise WeChat) group robot; when on, it receives test / notification messages
gui.config.field.push.wecom.key.label=Robot key
gui.config.field.push.wecom.key.help=The key in the WeCom group-robot webhook URL; never appears in logs
gui.config.field.push.wecom.use-proxy.label=WeCom uses proxy
gui.config.field.push.pushplus.enabled.label=Enable PushPlus
gui.config.field.push.pushplus.enabled.help=PushPlus pushes to WeChat; when on, it receives test / notification messages
gui.config.field.push.pushplus.token.label=Token
gui.config.field.push.pushplus.token.help=PushPlus user token; get it on the site or by replying "token" to the PushPlus official account. Never appears in logs
gui.config.field.push.pushplus.use-proxy.label=PushPlus uses proxy
gui.config.field.push.serverchan.enabled.label=Enable ServerChan
gui.config.field.push.serverchan.enabled.help=ServerChan (Turbo / 3) pushes to WeChat; when on, it receives test / notification messages
gui.config.field.push.serverchan.send-key.label=SendKey
gui.config.field.push.serverchan.send-key.help=ServerChan SendKey; an sctp- prefix auto-routes to the ServerChan3 endpoint. Never appears in logs
gui.config.field.push.serverchan.use-proxy.label=ServerChan uses proxy
gui.config.field.push.webhook.enabled.label=Enable custom Webhook
gui.config.field.push.webhook.enabled.help=Universal channel: your own URL + body template; works with Discord / Slack / ntfy / Gotify, etc.
gui.config.field.push.webhook.url.label=URL
gui.config.field.push.webhook.url.help=Target URL (http/https)
gui.config.field.push.webhook.content-type.label=Content type
gui.config.field.push.webhook.content-type.help=Request Content-Type, default application/json
gui.config.field.push.webhook.body-template.label=Body template
gui.config.field.push.webhook.body-template.help=Supports {{title}} / {{content}} placeholders; empty uses {"title":"{{title}}","content":"{{content}}"}. Values are JSON-escaped for JSON types
gui.config.field.push.webhook.use-proxy.label=Webhook uses proxy
gui.config.push.test-button.label=Test push
gui.config.push.test-button.help=Send a test message through every enabled channel using the current form values (no need to save first)
gui.config.push.test.notice.sending=Sending test push, please wait…
gui.config.push.test.notice.success=All test pushes sent successfully ({0} channel(s))
gui.config.push.test.notice.partial=Test push partially succeeded: {0}/{1} channel(s) ({2})
gui.config.push.test.notice.none=No enabled and fully-filled push channel
gui.config.push.test.notice.unreachable=Cannot reach the backend service; please confirm it is running
