gui.config.push.test-all.notice.skipped=当前渠道未填写完整，已跳过
gui.config.field.push.enabled.label=启用推送
gui.config.field.push.enabled.help=推送总开关；关闭时所有通道都不发送
gui.config.field.push.use-proxy.help=开启后本通道的请求走 HTTP 代理（地址取代理设置的 host:port）；独立于全局代理开关
gui.config.field.push.bark.enabled.label=启用 Bark
gui.config.field.push.bark.enabled.help=Bark 是 iOS 上的推送 App；开启后接收测试 / 通知消息
gui.config.field.push.bark.server.label=Bark 服务器
gui.config.field.push.bark.server.help=官方公共服务器为 https://api.day.app，也可填自建地址
gui.config.field.push.bark.device-key.label=设备 Key
gui.config.field.push.bark.device-key.help=在 Bark App 中获取；绝不会出现在日志中
gui.config.field.push.bark.sound.label=提示音
gui.config.field.push.bark.sound.help=可选提示音名称，留空使用 App 默认
gui.config.field.push.bark.use-proxy.label=Bark 使用代理
gui.config.field.push.dingtalk.enabled.label=启用钉钉
gui.config.field.push.dingtalk.enabled.help=钉钉群自定义机器人；开启后接收测试 / 通知消息
gui.config.field.push.dingtalk.access-token.label=Access Token
gui.config.field.push.dingtalk.access-token.help=创建钉钉机器人后会得到形如 https://oapi.dingtalk.com/robot/send?access_token=xxxx 的 Webhook 链接，把 access_token= 后面那一段填到这里；绝不会出现在日志中
gui.config.field.push.dingtalk.secret.label=加签密钥
gui.config.field.push.dingtalk.secret.help=创建钉钉机器人时在「安全设置」里勾选「加签」，把生成的 SEC 开头密钥填到这里（该密钥关闭页面后无法再查看，请及时复制）；若改用「自定义关键词」或「IP 白名单」则留空。绝不会出现在日志中
gui.config.field.push.dingtalk.use-proxy.label=钉钉使用代理
gui.config.field.push.telegram.enabled.label=启用 Telegram
gui.config.field.push.telegram.enabled.help=Telegram Bot；开启后接收测试 / 通知消息（国内通常需开启代理）
gui.config.field.push.telegram.bot-token.label=Bot Token
gui.config.field.push.telegram.bot-token.help=向 @BotFather 申请获得；绝不会出现在日志中
gui.config.field.push.telegram.chat-id.label=Chat ID
gui.config.field.push.telegram.chat-id.help=目标会话 id（用户 / 群 / 频道）
gui.config.field.push.telegram.use-proxy.label=Telegram 使用代理
gui.config.field.push.feishu.enabled.label=启用飞书
gui.config.field.push.feishu.enabled.help=飞书群自定义机器人；开启后接收测试 / 通知消息
gui.config.field.push.feishu.webhook-key.label=Webhook Key
gui.config.field.push.feishu.webhook-key.help=飞书机器人 Webhook 地址末段的 key（.../bot/v2/hook/ 之后那一段）；绝不会出现在日志中
gui.config.field.push.feishu.secret.label=签名密钥
gui.config.field.push.feishu.secret.help=机器人安全设置选「签名校验」时填写；若用「自定义关键词」或「IP 白名单」则留空。绝不会出现在日志中
gui.config.field.push.feishu.use-proxy.label=飞书使用代理
gui.config.field.push.wecom.enabled.label=启用企业微信
gui.config.field.push.wecom.enabled.help=企业微信群机器人；开启后接收测试 / 通知消息
gui.config.field.push.wecom.key.label=机器人 Key
gui.config.field.push.wecom.key.help=企业微信群机器人 Webhook 链接中的 key；绝不会出现在日志中
gui.config.field.push.wecom.use-proxy.label=企业微信使用代理
gui.config.field.push.pushplus.enabled.label=启用 PushPlus
gui.config.field.push.pushplus.enabled.help=PushPlus（推送加），推送到微信；开启后接收测试 / 通知消息
gui.config.field.push.pushplus.token.label=Token
gui.config.field.push.pushplus.token.help=PushPlus 用户令牌；在官网或「pushplus 推送加」公众号回复 token 获取。绝不会出现在日志中
gui.config.field.push.pushplus.use-proxy.label=PushPlus 使用代理
gui.config.field.push.serverchan.enabled.label=启用 Server 酱
gui.config.field.push.serverchan.enabled.help=Server 酱（Turbo / ³），推送到微信；开启后接收测试 / 通知消息
gui.config.field.push.serverchan.send-key.label=SendKey
gui.config.field.push.serverchan.send-key.help=Server 酱 SendKey；sctp 前缀会自动走 Server 酱³ 端点。绝不会出现在日志中
gui.config.field.push.serverchan.use-proxy.label=Server 酱使用代理
gui.config.field.push.webhook.enabled.label=启用自定义 Webhook
gui.config.field.push.webhook.enabled.help=万能通道：自填 URL + 请求体模板，可对接 Discord / Slack / ntfy / Gotify 等
gui.config.field.push.webhook.url.label=URL
gui.config.field.push.webhook.url.help=目标地址（http/https）；可能包含令牌，按凭证安全保存且不会写入日志
gui.config.field.push.webhook.content-type.label=内容类型
gui.config.field.push.webhook.content-type.help=请求 Content-Type，默认 application/json
gui.config.field.push.webhook.body-template.label=请求体模板
gui.config.field.push.webhook.body-template.help=支持 {{title}} / {{content}} 占位符；留空用 {"title":"{{title}}","content":"{{content}}"}。JSON 类型时占位符值自动转义
gui.config.field.push.webhook.use-proxy.label=Webhook 使用代理
gui.config.push.test-button.label=测试推送
gui.config.push.test-button.help=用当前表单设置（无需先保存）向所有已勾选启用的通道各发一条测试消息
gui.config.push.test.notice.sending=正在发送测试推送，请稍候…
gui.config.push.test.notice.success=测试推送已全部发送成功（共 {0} 个通道）
