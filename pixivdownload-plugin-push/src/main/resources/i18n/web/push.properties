gui.config.push.test-all.button.label=发送所有消息模板
gui.config.push.test-all.button.help=用当前表单设置（无需先保存）向当前渠道逐条发送全部通知消息，便于预览各类通知在该渠道的实际呈现
gui.config.push.test-all.notice.sending=正在发送所有消息模板，请稍候…
gui.config.push.test-all.notice.success=所有消息模板已全部发送成功（共 {0} 条）
