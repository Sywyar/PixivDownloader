name: Nightly Build

on:
  schedule:
    - cron: '33 18 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLUGIN_SIGNING_KEY_ID: pixivdownloader-official-root-2026-07

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      date: ${{ steps.vars.outputs.date }}

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve next version
        id: vars
        shell: bash
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname --list 'v*' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          LATEST_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          NIGHTLY_VERSION="${NEXT_VERSION}-nightly.$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          echo "version=$NIGHTLY_VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

  build-jar:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -Dapp.release.version=${{ needs.resolve-version.outputs.version }}

      - name: Stage executable JAR
        run: |
          BOOT_JAR=$(ls pixivdownload-app/target/PixivDownload-*-boot.jar | head -n 1 || true)
          if [ -z "$BOOT_JAR" ]; then
            BOOT_JAR=$(ls pixivdownload-app/target/PixivDownload-*.jar | head -n 1 || true)
          fi
          if [ -z "$BOOT_JAR" ]; then
            echo "No app jar found" >&2
            exit 1
          fi
          mkdir -p build/release-jars
          OUTPUT_JAR="build/release-jars/PixivDownload-${{ needs.resolve-version.outputs.version }}.jar"
          cp "$BOOT_JAR" "$OUTPUT_JAR"
          jar tf "$OUTPUT_JAR" | grep -q '^BOOT-INF/' || {
            echo "Selected jar is not a Spring Boot executable jar: $OUTPUT_JAR" >&2
            exit 1
          }
          ls -l build/release-jars/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: build/release-jars/*.jar

      - name: Prepare plugin signing private key
        shell: pwsh
        env:
          PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64: ${{ secrets.PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64 }}
          PLUGIN_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.PLUGIN_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64) -and [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM)) {
            throw "Missing GitHub Actions secret PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64 or PLUGIN_SIGNING_PRIVATE_KEY_PEM."
          }
          $signingDir = Join-Path $env:RUNNER_TEMP "pixivdownload-plugin-signing"
          New-Item -ItemType Directory -Force -Path $signingDir | Out-Null
          $privateKeyFile = Join-Path $signingDir "official-ed25519-private-key.pem"
          if (-not [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64)) {
            $privateKeyBytes = [System.Convert]::FromBase64String(($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64 -replace '\s', ''))
            [System.IO.File]::WriteAllBytes($privateKeyFile, $privateKeyBytes)
          } else {
            $pem = $env:PLUGIN_SIGNING_PRIVATE_KEY_PEM
            $pem = $pem.Replace('\r\n', "`n").Replace('\n', "`n").Replace('\r', "`n")
            [System.IO.File]::WriteAllText($privateKeyFile, $pem.Trim() + "`n", (New-Object System.Text.UTF8Encoding($false)))
          }
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "PLUGIN_SIGNING_PRIVATE_KEY_FILE=$privateKeyFile`n", (New-Object System.Text.UTF8Encoding($false)))

      - name: Assemble plugin distributions
        shell: pwsh
        run: |
          $version = '${{ needs.resolve-version.outputs.version }}'
          $distRoot = "build/plugin-distributions"
          New-Item -ItemType Directory -Force -Path $distRoot | Out-Null
          ./scripts/assemble-plugin-distribution.ps1 `
            -Version $version `
            -OutputDir "$distRoot/core-shell-only" `
            -CoreShellOnly
          ./scripts/assemble-plugin-distribution.ps1 `
            -Version $version `
            -OutputDir "$distRoot/default-downloader" `
            -DefaultDownloader `
            -OfficialKeyId $env:PLUGIN_SIGNING_KEY_ID `
            -PrivateKeyFile $env:PLUGIN_SIGNING_PRIVATE_KEY_FILE
          ./scripts/assemble-plugin-distribution.ps1 `
            -Version $version `
            -OutputDir "$distRoot/full-offline" `
            -OfficialKeyId $env:PLUGIN_SIGNING_KEY_ID `
            -PrivateKeyFile $env:PLUGIN_SIGNING_PRIVATE_KEY_FILE
          foreach ($name in @("core-shell-only", "default-downloader", "full-offline")) {
            $source = Join-Path $distRoot $name
            $zip = Join-Path $distRoot "PixivDownload-$version-$name.zip"
            Compress-Archive -Path (Join-Path $source "*") -DestinationPath $zip -Force
          }

      - name: Upload plugin distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distributions
          path: build/plugin-distributions/PixivDownload-*.zip

      - name: Cleanup plugin signing private key
        if: always()
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_FILE)) {
            Remove-Item -LiteralPath $env:PLUGIN_SIGNING_PRIVATE_KEY_FILE -Force -ErrorAction SilentlyContinue
          }

      - name: Stage official plugin inputs
        shell: bash
        run: |
          mkdir -p build/plugin-inputs
          cp pixivdownload-plugin-download-workbench/target/pixivdownload-plugin-download-workbench-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-gui-theme/target/pixivdownload-plugin-gui-theme-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-stats/target/pixivdownload-plugin-stats-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-gallery/target/pixivdownload-plugin-gallery-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-novel-gallery/target/pixivdownload-plugin-novel-gallery-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-notification/target/pixivdownload-plugin-notification-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-push/target/pixivdownload-plugin-push-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-mail/target/pixivdownload-plugin-mail-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-tts/target/pixivdownload-plugin-tts-*.jar build/plugin-inputs/
          cp pixivdownload-plugin-ai/target/pixivdownload-plugin-ai-*.jar build/plugin-inputs/
          # Keep only distributable plugin jars (exclude sources/javadoc if ever produced).
          rm -f build/plugin-inputs/*-sources.jar build/plugin-inputs/*-javadoc.jar
          ls -l build/plugin-inputs/

      - name: Upload plugin inputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-inputs
          path: build/plugin-inputs/*.jar

      - name: Stage release userscripts
        shell: bash
        run: |
          mkdir -p build/release-userscripts
          cp "build/generated-userscripts/Pixiv All-in-One.user.js" build/release-userscripts/
          cp "Pixiv 单作品图片下载器(Local Download).user.js" build/release-userscripts/

      - name: Upload userscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: userscripts
          path: build/release-userscripts/*.user.js

  build-windows-installer:
    needs: [resolve-version, build-jar]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/jar

      - name: Download plugin inputs artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-inputs
          path: artifacts/plugin-inputs

      - name: Build plugin signature tool
        shell: powershell
        run: .\mvnw.cmd "-pl" "pixivdownload-plugin-signature" "-am" "package" "-DskipTests" "-Dexec.skip=true"

      - name: Prepare plugin signing private key
        shell: powershell
        env:
          PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64: ${{ secrets.PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64 }}
          PLUGIN_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.PLUGIN_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64) -and [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM)) {
            throw "Missing GitHub Actions secret PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64 or PLUGIN_SIGNING_PRIVATE_KEY_PEM."
          }
          $signingDir = Join-Path $env:RUNNER_TEMP "pixivdownload-plugin-signing"
          New-Item -ItemType Directory -Force -Path $signingDir | Out-Null
          $privateKeyFile = Join-Path $signingDir "official-ed25519-private-key.pem"
          if (-not [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64)) {
            $privateKeyBytes = [System.Convert]::FromBase64String(($env:PLUGIN_SIGNING_PRIVATE_KEY_PEM_BASE64 -replace '\s', ''))
            [System.IO.File]::WriteAllBytes($privateKeyFile, $privateKeyBytes)
          } else {
            $pem = $env:PLUGIN_SIGNING_PRIVATE_KEY_PEM
            $pem = $pem.Replace('\r\n', "`n").Replace('\n', "`n").Replace('\r', "`n")
            [System.IO.File]::WriteAllText($privateKeyFile, $pem.Trim() + "`n", (New-Object System.Text.UTF8Encoding($false)))
          }
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "PLUGIN_SIGNING_PRIVATE_KEY_FILE=$privateKeyFile`n", (New-Object System.Text.UTF8Encoding($false)))

      - name: Package Windows setup
        shell: pwsh
        run: |
          $version = '${{ needs.resolve-version.outputs.version }}'
          $jars = @(Get-ChildItem artifacts/jar/PixivDownload-*.jar -File)
          if ($jars.Count -ne 1) {
            throw "Expected exactly one executable JAR artifact under artifacts/jar, found $($jars.Count)"
          }
          $jar = $jars[0]
          $pluginsDir = (Resolve-Path artifacts/plugin-inputs).Path
          ./scripts/package-local.ps1 `
            -Version $version `
            -PrebuiltJar $jar.FullName `
            -PrebuiltPluginsDir $pluginsDir `
            -OfficialKeyId $env:PLUGIN_SIGNING_KEY_ID `
            -PrivateKeyFile $env:PLUGIN_SIGNING_PRIVATE_KEY_FILE `
            -SkipPortable `
            -SkipOfflinePortable

      - name: Cleanup plugin signing private key
        if: always()
        shell: powershell
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_PRIVATE_KEY_FILE)) {
            Remove-Item -LiteralPath $env:PLUGIN_SIGNING_PRIVATE_KEY_FILE -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/out/*-setup.exe

  release-nightly:
    needs: [resolve-version, build-jar, build-windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download plugin distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-distributions
          path: artifacts/plugin-distributions

      - name: Download userscript artifact
        uses: actions/download-artifact@v4
        with:
          name: userscripts
          path: artifacts/userscripts

      - name: Diff changelog since last nightly
        id: changelog
        shell: bash
        run: |
          git fetch --tags origin 2>/dev/null || true

          if git rev-parse --verify nightly^{commit} >/dev/null 2>&1; then
            # nightly tag exists: diff CHANGELOG.md between last nightly and HEAD
            git diff nightly -- CHANGELOG.md \
              | awk '/^\+\+\+/ { next } /^\+/ { sub(/^\+/, ""); print }' > CHANGELOG_DIFF.md
          else
            # First nightly build: fall back to full [Unreleased] section
            awk '
              /^## \[Unreleased\]/ { found=1; next }
              /^## \[/ { if (found) exit }
              found { print }
            ' CHANGELOG.md > CHANGELOG_DIFF.md
          fi

          if [ -s CHANGELOG_DIFF.md ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate update.json
        shell: bash
        env:
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          INSTALLER=$(ls artifacts/*-win-x64-setup.exe 2>/dev/null | head -n1 || true)
          if [ -z "$INSTALLER" ]; then
            echo "No installer artifact found for update manifest" >&2
            exit 1
          fi

          FILENAME=$(basename "$INSTALLER")
          SHA256=$(sha256sum "$INSTALLER" | awk '{print $1}')
          SIZE=$(stat -c%s "$INSTALLER")
          LATEST_VERSION="${{ needs.resolve-version.outputs.version }}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          ASSET_URL="https://github.com/${GH_REPOSITORY}/releases/download/nightly/${FILENAME}"
          NOTES_URL="https://github.com/${GH_REPOSITORY}/releases/tag/nightly"

          jq -n \
            --arg latestVersion "$LATEST_VERSION" \
            --arg releaseDate "$RELEASE_DATE" \
            --rawfile releaseNotes CHANGELOG_DIFF.md \
            --arg releaseNotesUrl "$NOTES_URL" \
            --arg assetUrl "$ASSET_URL" \
            --arg assetSha256 "$SHA256" \
            --argjson assetSize "$SIZE" \
            '{
              latestVersion: $latestVersion,
              releaseDate: $releaseDate,
              releaseNotes: $releaseNotes,
              releaseNotesUrl: $releaseNotesUrl,
              assets: {
                "win-x64-installer": {
                  url: $assetUrl,
                  sha256: $assetSha256,
                  sizeBytes: $assetSize
                }
              }
            }' > artifacts/update.json

          echo "Generated update.json:"
          cat artifacts/update.json

      - name: Build release body
        shell: bash
        run: |
          cat > RELEASE_BODY.md <<'EOF'
          > ⚠️ 这是自动构建的每夜版，可能包含未测试的功能和 bug。
          > This is an automated nightly build. It may contain untested features and bugs.

          **构建日期 / Build Date:** ${{ needs.resolve-version.outputs.date }}
          **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          ## 使用说明 / Usage

          ### Windows 安装器
          下载 `PixivDownload-*-win-x64-setup.exe` 并运行。

          ### JAR 包（跨平台）
          需要 Java 17+：
          ```
          java -jar PixivDownload-*.jar
          ```
          推荐下载 `PixivDownload-*-default-downloader.zip`，解压后在目录内运行其中的 `PixivDownload-*.jar`。该包已包含签名后的 required `download-workbench` 插件、`.sha256`、`.sig`、provenance sidecar 和 `plugins-manifest.json`。

          `PixivDownload-*-full-offline.zip` 在 default 包基础上额外包含官方可选插件，适合离线部署。单独的 `PixivDownload-*.jar` 或 `PixivDownload-*-core-shell-only.zip` 只包含核心壳，缺少 required 插件时会进入恢复 / 修复模式，下载页和下载 API 不会开放。
          EOF

          if [ "${{ steps.changelog.outputs.has_notes }}" = "true" ]; then
            echo "" >> RELEASE_BODY.md
            echo "## 本日变更 / Today's Changes" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            cat CHANGELOG_DIFF.md >> RELEASE_BODY.md
          fi

      - name: Update nightly tag
        shell: bash
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Delete old nightly assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The nightly version embeds a unique build id, so old release assets
          # would otherwise accumulate forever. Remove every existing asset on
          # the `nightly` release before re-uploading.
          if gh release view nightly >/dev/null 2>&1; then
            gh release view nightly --json assets --jq '.assets[].name' \
              | while IFS= read -r asset; do
                  [ -n "$asset" ] || continue
                  echo "Deleting old asset: $asset"
                  gh release delete-asset nightly "$asset" --yes || true
                done
          fi

      - name: Create/Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build ${{ needs.resolve-version.outputs.version }}"
          body_path: RELEASE_BODY.md
          prerelease: true
          files: |
            artifacts/PixivDownload-*.jar
            artifacts/*-setup.exe
            artifacts/plugin-distributions/*.zip
            artifacts/userscripts/*.user.js
            artifacts/update.json
