# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on version tag pushes
  push:
    tags:
      - 'v*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf build/pages
          mkdir -p build/pages
          cp -R src/main/resources/static/. build/pages/
          cp src/main/resources/static/intro.html build/pages/index.html

          # GitHub Pages project sites are served from /<repo>/, so root-relative
          # local asset paths like /intro/intro.css would miss the repository prefix.
          sed -i -E 's#(src|href)="/(js|vendor|intro)/#\1="\2/#g' build/pages/index.html build/pages/intro.html

          test -f build/pages/intro/intro.css
          test -f build/pages/intro/intro.js
          test -f build/pages/js/pixiv-i18n.js
          test -f build/pages/js/pixiv-lang-switcher.js
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/pages'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
