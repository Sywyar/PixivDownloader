# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on version tag pushes
  push:
    tags:
      - 'v*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf build/pages
          mkdir -p build/pages
          cp -R src/main/resources/static/. build/pages/
          cp src/main/resources/static/intro.html build/pages/index.html

          # GitHub Pages project sites are served from /<repo>/, so root-relative
          # local asset paths like /intro/intro.css would miss the repository prefix.
          sed -i -E 's#(src|href)="/(js|vendor|intro)/#\1="\2/#g' build/pages/index.html build/pages/intro.html

          test -f build/pages/intro/intro.css
          test -f build/pages/intro/intro.js
          test -f build/pages/js/pixiv-i18n.js
          test -f build/pages/js/pixiv-lang-switcher.js
      - name: Build static i18n bundles
        shell: bash
        run: |
          # The Pages site has no Spring backend, so /api/i18n/* is unreachable.
          # pixiv-i18n.js falls back to i18n-static/{namespace}.{lang}.json.
          mkdir -p build/pages/i18n-static
          python3 - <<'PY'
          import json, pathlib

          SRC = pathlib.Path("src/main/resources/i18n/web")
          OUT = pathlib.Path("build/pages/i18n-static")
          # namespace -> (zh properties file, en properties file)
          NAMESPACES = {
              "intro": ("intro.properties", "intro_en.properties"),
              "common": ("common.properties", "common_en.properties"),
          }
          # canonical tag -> list of file names to also emit (short aliases)
          LANG_ALIASES = {"zh-CN": ["zh"], "en-US": ["en"]}

          def load_props(path):
              messages = {}
              for raw in path.read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line or line[0] in ("#", "!"):
                      continue
                  if "=" not in line:
                      continue
                  key, _, value = raw.partition("=")
                  messages[key.strip()] = value.strip()
              return messages

          for ns, (zh_file, en_file) in NAMESPACES.items():
              for tag, src_name in (("zh-CN", zh_file), ("en-US", en_file)):
                  messages = load_props(SRC / src_name)
                  payload = json.dumps({"messages": messages}, ensure_ascii=False)
                  for name in [tag] + LANG_ALIASES.get(tag, []):
                      (OUT / f"{ns}.{name}.json").write_text(payload, encoding="utf-8")
                  print(f"wrote {ns} {tag}: {len(messages)} keys")
          PY

          test -s build/pages/i18n-static/intro.en-US.json
          test -s build/pages/i18n-static/intro.zh-CN.json
          test -s build/pages/i18n-static/common.en-US.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/pages'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
