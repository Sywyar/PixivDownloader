name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: PixivDownload
  APP_VENDOR: sywyar
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JRE_MODULES: java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.sql.rowset,java.xml,jdk.crypto.cryptoki,jdk.crypto.ec,jdk.httpserver,jdk.management,jdk.unsupported,jdk.zipfs

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: mvn package -DskipTests -Dapp.release.version=${{ steps.vars.outputs.version }}

      - name: Rename JAR
        run: |
          VERSION=${GITHUB_REF_NAME:-snapshot}
          mv target/PixivDownload-*.jar target/PixivDownload-${VERSION}.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/PixivDownload-*.jar

      - name: Upload userscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: userscripts
          path: build/generated-userscripts/*.user.js

  build-windows-installer:
    needs: build-jar
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/jar

      - name: Stage JAR for jpackage
        shell: bash
        run: |
          mkdir -p build/input
          cp artifacts/jar/PixivDownload-*.jar "build/input/PixivDownload-${{ steps.vars.outputs.version }}.jar"

      - name: Build trimmed runtime with jlink
        shell: bash
        run: |
          jlink \
            --add-modules "$JRE_MODULES" \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2 \
            --output build/runtime

      - name: Build online app-image
        shell: bash
        run: |
          jpackage \
            --type app-image \
            --name "$APP_NAME" \
            --app-version "${{ steps.vars.outputs.version }}" \
            --vendor "$APP_VENDOR" \
            --input build/input \
            --main-jar "PixivDownload-${{ steps.vars.outputs.version }}.jar" \
            --main-class "$MAIN_CLASS" \
            --runtime-image build/runtime \
            --icon src/main/resources/static/favicon.ico \
            --java-options "-Dfile.encoding=UTF-8" \
            --dest build/app-image-online

      - name: Patch launcher to request administrator rights
        shell: pwsh
        run: |
          ./scripts/set-windows-exe-requested-execution-level.ps1 `
            -Path "build/app-image-online/PixivDownload/PixivDownload.exe" `
            -Level "requireAdministrator"

      - name: Download FFmpeg payload
        shell: bash
        run: |
          mkdir -p build/ffmpeg/unpack
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip" -o build/ffmpeg/ffmpeg.zip
          unzip -q build/ffmpeg/ffmpeg.zip -d build/ffmpeg/unpack
          cp build/ffmpeg/unpack/ffmpeg-*-win64-lgpl/bin/ffmpeg.exe build/ffmpeg/ffmpeg.exe
          cp build/ffmpeg/unpack/ffmpeg-*-win64-lgpl/bin/ffprobe.exe build/ffmpeg/ffprobe.exe
          cat > build/ffmpeg/ffmpeg-LGPL.txt << 'LGPL_EOF'
          FFmpeg is licensed under the LGPL v2.1.
          Source code: https://ffmpeg.org
          Build: BtbN FFmpeg Builds (https://github.com/BtbN/FFmpeg-Builds)
          LGPL License: https://www.gnu.org/licenses/old-licenses/lgpl-2.1.html
          LGPL_EOF

      - name: Assemble offline app-image
        shell: bash
        run: |
          mkdir -p build/app-image-full
          cp -R build/app-image-online/PixivDownload build/app-image-full/
          cp build/ffmpeg/ffmpeg.exe build/app-image-full/PixivDownload/
          cp build/ffmpeg/ffprobe.exe build/app-image-full/PixivDownload/
          mkdir -p build/app-image-full/PixivDownload/licenses
          cp build/ffmpeg/ffmpeg-LGPL.txt build/app-image-full/PixivDownload/licenses/

      - name: Package portable zip files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/out | Out-Null
          Compress-Archive -Path build/app-image-online/PixivDownload -DestinationPath "build/out/PixivDownload-${{ steps.vars.outputs.version }}-win-x64-online-portable.zip"
          Compress-Archive -Path build/app-image-full/PixivDownload -DestinationPath "build/out/PixivDownload-${{ steps.vars.outputs.version }}-win-x64-portable.zip"

      - name: Verify WiX toolset
        shell: pwsh
        run: |
          foreach ($tool in @("heat.exe", "candle.exe", "light.exe")) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              throw "Missing required WiX tool: $tool"
            }
          }

      - name: Harvest app-image for WiX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/wix | Out-Null
          heat.exe dir "build/app-image-online/PixivDownload" `
            -cg AppFiles `
            -dr INSTALLFOLDER `
            -platform x64 `
            -srd `
            -sfrag `
            -gg `
            -var var.AppImageDir `
            -out "build/wix/AppFiles.wxs"
          ./scripts/fix-wix-per-user-keypaths.ps1 `
            -Path "build/wix/AppFiles.wxs" `
            -RegistryRoot "HKLM" `
            -RegistryKey "Software\sywyar\PixivDownload\Components"

      - name: Build localized MSI variants
        shell: pwsh
        run: |
          $cultures = @(
            @{
              Culture = 'zh-CN'
              Wxl = 'packaging/windows/installer.zh-CN.wxl'
              License = 'packaging/windows/license.zh-CN.rtf'
            },
            @{
              Culture = 'en-US'
              Wxl = 'packaging/windows/installer.en-US.wxl'
              License = 'packaging/windows/license.en-US.rtf'
            }
          )
          $variants = @(
            @{
              Name = 'with-ffmpeg'
              IncludeFfmpeg = 'yes'
              RequiresPayload = $true
            },
            @{
              Name = 'no-ffmpeg'
              IncludeFfmpeg = 'no'
              RequiresPayload = $false
            }
          )

          foreach ($variant in $variants) {
            $candleArgs = @(
              '-nologo'
              '-arch', 'x64'
              '-ext', 'WixUIExtension'
              '-dVersion=${{ steps.vars.outputs.version }}'
              '-dAppImageDir=build/app-image-online/PixivDownload'
              "-dIncludeFfmpeg=$($variant.IncludeFfmpeg)"
              '-out', 'build/wix/'
              'packaging/windows/installer.wxs'
              'build/wix/AppFiles.wxs'
            )
            if ($variant.RequiresPayload) {
              $candleArgs += @(
                '-dFfmpegExe=build/ffmpeg/ffmpeg.exe'
                '-dFfprobeExe=build/ffmpeg/ffprobe.exe'
                '-dFfmpegLicense=build/ffmpeg/ffmpeg-LGPL.txt'
              )
            }
            & candle.exe @candleArgs
            if ($LASTEXITCODE -ne 0) {
              throw "candle.exe failed for $($variant.Name) with exit code $LASTEXITCODE"
            }

            foreach ($culture in $cultures) {
              $lightArgs = @(
                '-nologo'
                '-ext', 'WixUIExtension'
                "-cultures:$($culture.Culture)"
                '-loc', $culture.Wxl
                "-dWixUILicenseRtf=$($culture.License)"
                '-sice:ICE61'
                '-sice:ICE64'
                '-sice:ICE91'
                '-out', "build/out/PixivDownload-${{ steps.vars.outputs.version }}-win-x64-$($culture.Culture)-$($variant.Name).msi"
                'build/wix/installer.wixobj'
                'build/wix/AppFiles.wixobj'
              )
              & light.exe @lightArgs
              if ($LASTEXITCODE -ne 0) {
                throw "light.exe failed for $($culture.Culture) / $($variant.Name) with exit code $LASTEXITCODE"
              }
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            build/out/*.msi
            build/out/*-portable.zip

  release:
    needs: [build-jar, build-windows-installer]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download userscript artifact
        uses: actions/download-artifact@v4
        with:
          name: userscripts
          path: artifacts/userscripts

      - name: Build release notes
        shell: bash
        run: |
          awk '
            BEGIN {
              version_header = "[" ENVIRON["GITHUB_REF_NAME"] "]"
            }
            /^## \[/ {
              if (found) {
                exit
              }
              if (index($0, version_header) > 0) {
                found = 1
                next
              }
            }
            found {
              print
            }
          ' CHANGELOG.md > RELEASE_BODY.md

          if [ ! -s RELEASE_BODY.md ]; then
            echo "No changelog entry found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          cat >> RELEASE_BODY.md <<'EOF'

          ## 使用说明

          ### Windows 在线便携版

          下载 `PixivDownload-*-win-x64-online-portable.zip`，解压后直接运行 `PixivDownload/PixivDownload.exe`。
          该版本体积最小，已内置精简 JRE。如果系统已经安装 FFmpeg，下载这个版本即可；普通图片下载也可以直接使用。若系统里没有 FFmpeg 且需要 Ugoira 动图转 WebP，请在 GUI 的“状态”页点击“下载 FFmpeg”。

          ### Windows 离线便携版

          下载 `PixivDownload-*-win-x64-portable.zip`，解压后直接运行 `PixivDownload/PixivDownload.exe`。
          该版本已内置精简 JRE 和 FFmpeg，开箱即用，适合未安装 FFmpeg 或离线环境。

          ### Windows MSI 安装包

          当前发布包含以下 4 种 MSI：
          - `PixivDownload-*-win-x64-zh-CN-with-ffmpeg.msi`
          - `PixivDownload-*-win-x64-zh-CN-no-ffmpeg.msi`
          - `PixivDownload-*-win-x64-en-US-with-ffmpeg.msi`
          - `PixivDownload-*-win-x64-en-US-no-ffmpeg.msi`

          选择规则：
          - `zh-CN` / `en-US` 表示安装器界面语言
          - `with-ffmpeg` 表示安装包内置 FFmpeg，开箱即用，但体积更大
          - `no-ffmpeg` 表示安装包不内置 FFmpeg，体积更小，适合系统已安装 FFmpeg 或不需要 Ugoira 转 WebP 的场景
          - MSI 安装向导不提供安装时切换语言，也不再提供 FFmpeg 组件勾选页，请在下载时直接选好版本

          ### JAR 包（跨平台）

          需要已安装 Java 17+，通过命令行运行：

          ```
          java -jar PixivDownload-${{ github.ref_name }}.jar
          ```

          ### 网页端一站式下载

          启动后访问 `http://localhost:6999/pixiv-batch.html`，无需安装油猴脚本即可完成大部分批量下载操作。
          访问 `http://localhost:6999/monitor.html` 查看下载进度和历史记录。

          ### 油猴脚本

          如仍需使用油猴脚本，登录后打开 `http://localhost:6999/pixiv-batch.html`，点击页面顶部的“油猴脚本”卡片并安装对应脚本。部署在非 localhost 服务器时，`@connect` 会自动替换为实际地址。
          如果只想安装一个脚本，优先选择 `Pixiv All-in-One.user.js`。它整合了页面批量下载、User 批量下载、URL 批量导入和单作品下载（Java 后端版），`Local download` 仍保持独立脚本。
          如果多合一脚本遇到问题，请先尝试对应的独立脚本；如果独立版本正常、只有多合一异常，请附带复现步骤和环境信息提交 issue。

          ## 详细说明请查看 README
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PixivDownload-${{ github.ref_name }}.jar
            artifacts/*.msi
            artifacts/*-portable.zip
            artifacts/userscripts/*.user.js
            *.user.js
          body_path: RELEASE_BODY.md
