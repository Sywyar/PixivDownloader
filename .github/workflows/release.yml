name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Draft release tag, for example v1.8.2'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  draft-quality-gate:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/quality-gate.yml

  publish-plugins:
    if: github.event_name == 'push'
    uses: ./.github/workflows/publish-plugins.yml
    secrets: inherit

  build-jar:
    needs: publish-plugins
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: mvn package -DskipTests -Dapp.release.version=${{ steps.vars.outputs.version }}

      - name: Verify packaged distribution boundaries
        run: |
          mvn -B -ntp -pl pixivdownload-app -am test -Dtest=DistributionPackagingBoundaryTest -Dsurefire.failIfNoSpecifiedTests=false -Ddistribution.packaging.require-artifacts=true -Dexec.skip=true
          REPORT=$(find pixivdownload-app/target/surefire-reports -name '*DistributionPackagingBoundaryTest.txt' -print -quit)
          test -n "$REPORT"
          grep -Eq 'Tests run: [1-9][0-9]*, Failures: 0, Errors: 0, Skipped: 0' "$REPORT"

      - name: Stage executable JAR
        run: |
          BOOT_JAR=$(ls pixivdownload-app/target/PixivDownload-*-boot.jar | head -n 1 || true)
          if [ -z "$BOOT_JAR" ]; then
            BOOT_JAR=$(ls pixivdownload-app/target/PixivDownload-*.jar | head -n 1 || true)
          fi
          if [ -z "$BOOT_JAR" ]; then
            echo "No app jar found" >&2
            exit 1
          fi
          VERSION=${GITHUB_REF_NAME:-snapshot}
          mkdir -p build/release-jars
          OUTPUT_JAR="build/release-jars/PixivDownload-${VERSION}.jar"
          cp "$BOOT_JAR" "$OUTPUT_JAR"
          jar tf "$OUTPUT_JAR" | grep -q '^BOOT-INF/' || {
            echo "Selected jar is not a Spring Boot executable jar: $OUTPUT_JAR" >&2
            exit 1
          }
          ls -l build/release-jars/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: build/release-jars/*.jar

      - name: Stage official plugin inputs from signed catalog
        shell: pwsh
        run: |
          $signatureTools = @(Get-ChildItem pixivdownload-plugin-signature/target/pixivdownload-plugin-signature-*.jar -File |
            Where-Object { $_.Name -notlike "*-sources.jar" -and $_.Name -notlike "*-javadoc.jar" } |
            Sort-Object LastWriteTime -Descending)
          if ($signatureTools.Count -lt 1) {
            throw "Could not find pixivdownload-plugin-signature tool jar."
          }
          $signatureTool = $signatureTools[0]
          ./scripts/stage-official-plugin-inputs-from-catalog.ps1 `
            -OutputDir build/plugin-inputs `
            -SignatureToolJar $signatureTool.FullName `
            -IncludeOptional

      - name: Assemble full-offline distribution
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $distRoot = "build/plugin-distributions"
          New-Item -ItemType Directory -Force -Path $distRoot | Out-Null
          $signatureTools = @(Get-ChildItem pixivdownload-plugin-signature/target/pixivdownload-plugin-signature-*.jar -File |
            Where-Object { $_.Name -notlike "*-sources.jar" -and $_.Name -notlike "*-javadoc.jar" } |
            Sort-Object LastWriteTime -Descending)
          if ($signatureTools.Count -lt 1) {
            throw "Could not find pixivdownload-plugin-signature tool jar."
          }
          $signatureTool = $signatureTools[0]
          ./scripts/assemble-plugin-distribution.ps1 `
            -Version $version `
            -OutputDir "$distRoot/full-offline" `
            -PrebuiltPluginsDir build/plugin-inputs `
            -SignatureToolJar $signatureTool.FullName
          $source = Join-Path $distRoot "full-offline"
          $zip = Join-Path $distRoot "PixivDownload-$version-full-offline.zip"
          Compress-Archive -Path (Join-Path $source "*") -DestinationPath $zip -Force

      - name: Upload plugin inputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-inputs
          path: build/plugin-inputs/*

      - name: Upload plugin distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distributions
          path: build/plugin-distributions/PixivDownload-*-full-offline.zip

  build-windows-installer:
    needs: build-jar
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/jar

      - name: Download plugin inputs artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-inputs
          path: artifacts/plugin-inputs

      - name: Build plugin signature tool
        shell: powershell
        run: .\mvnw.cmd "-pl" "pixivdownload-plugin-signature" "-am" "package" "-DskipTests" "-Dexec.skip=true"

      - name: Package Windows setup
        shell: pwsh
        run: |
          $version = '${{ steps.vars.outputs.version }}'
          $jars = @(Get-ChildItem artifacts/jar/PixivDownload-*.jar -File)
          if ($jars.Count -ne 1) {
            throw "Expected exactly one executable JAR artifact under artifacts/jar, found $($jars.Count)"
          }
          $jar = $jars[0]
          $pluginsDir = (Resolve-Path artifacts/plugin-inputs).Path
          $signatureTools = @(Get-ChildItem pixivdownload-plugin-signature/target/pixivdownload-plugin-signature-*.jar -File |
            Where-Object { $_.Name -notlike "*-sources.jar" -and $_.Name -notlike "*-javadoc.jar" } |
            Sort-Object LastWriteTime -Descending)
          if ($signatureTools.Count -lt 1) {
            throw "Could not find pixivdownload-plugin-signature tool jar."
          }
          $signatureTool = $signatureTools[0]
          ./scripts/package-local.ps1 `
            -Version $version `
            -PrebuiltJar $jar.FullName `
            -PrebuiltPluginsDir $pluginsDir `
            -SignatureToolJar $signatureTool.FullName `
            -SkipPortable `
            -SkipOfflinePortable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/out/*-setup.exe

  release:
    needs: [build-jar, build-windows-installer]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download plugin distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-distributions
          path: artifacts/plugin-distributions

      - name: Build release notes
        shell: bash
        run: |
          awk '
            BEGIN {
              version_header = "[" ENVIRON["GITHUB_REF_NAME"] "]"
            }
            /^## \[/ {
              if (found) {
                exit
              }
              if (index($0, version_header) > 0) {
                found = 1
                next
              }
            }
            found {
              print
            }
          ' CHANGELOG.md > CHANGELOG_EXCERPT.md

          if [ ! -s CHANGELOG_EXCERPT.md ]; then
            echo "No changelog entry found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          cat > RELEASE_BODY.md <<'EOF'
          > [!NOTE]
          > 自 v1.8.0 版本更新中，我大量优化了网页的布局和功能统一性，希望可以让使用变得更方便和直观，如果有任何优化建议和问题欢迎提出issue
          > 发布附件仅提供 Windows 安装包和离线全量包，避免用户在多个 JAR / 插件分发包之间选择。

          EOF
          cat CHANGELOG_EXCERPT.md >> RELEASE_BODY.md

          cat >> RELEASE_BODY.md <<'EOF'

          ## 使用说明

          ### Windows 安装包
          下载 `PixivDownload-*-win-x64-setup.exe` 并运行。安装包支持语言选择，并在“附加功能”页提供“下载并安装 FFmpeg”和官方可选插件安装选项。

          FFmpeg 不再内置到安装包中；勾选该选项后，安装器会在主程序安装完成后联网下载 FFmpeg，并显示独立下载/解压进度。未勾选或下载失败时，普通图片下载不受影响，后续也可以在 GUI 的“状态”页点击“下载 FFmpeg”重试。
          官方可选插件会从签名官方清单安装并启用；清单网络获取超时或失败时会使用安装包内置的签名清单快照。

          ### 离线全量包（跨平台）
          下载 `PixivDownload-${{ github.ref_name }}-full-offline.zip`，解压后在目录内运行：

          ```
          java -Dfile.encoding=UTF-8 -jar PixivDownload-${{ github.ref_name }}.jar
          ```

          该包包含核心壳、签名后的 required `download-workbench` 插件、全部官方可选插件、`.sha256`、`.sig`、provenance sidecar 和 `plugins-manifest.json`，适合离线部署或非 Windows 环境。Release 不再提供独立 JAR、core-shell-only 包或 default-downloader 包作为普通下载附件。

          ### 网页端一站式下载

          确认 `plugins/` 下已有 `download-workbench` 插件后，启动并访问 `http://localhost:6999/pixiv-batch.html`，无需安装油猴脚本即可完成大部分批量下载操作。
          访问 `http://localhost:6999/monitor.html` 查看下载进度和历史记录。

          ## 详细说明请查看 README
          EOF

      - name: Generate update manifest
        shell: bash
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          INSTALLER=$(ls artifacts/*-win-x64-setup.exe 2>/dev/null | head -n1 || true)
          if [ -z "$INSTALLER" ]; then
            echo "No installer artifact found for update manifest" >&2
            exit 1
          fi

          FILENAME=$(basename "$INSTALLER")
          SHA256=$(sha256sum "$INSTALLER" | awk '{print $1}')
          SIZE=$(stat -c%s "$INSTALLER")
          LATEST_VERSION="${GH_REF_NAME#v}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          ASSET_URL="https://github.com/${GH_REPOSITORY}/releases/download/${GH_REF_NAME}/${FILENAME}"
          NOTES_URL="https://github.com/${GH_REPOSITORY}/releases/tag/${GH_REF_NAME}"

          jq -n \
            --arg latestVersion "$LATEST_VERSION" \
            --arg releaseDate "$RELEASE_DATE" \
            --rawfile releaseNotes CHANGELOG_EXCERPT.md \
            --arg releaseNotesUrl "$NOTES_URL" \
            --arg assetUrl "$ASSET_URL" \
            --arg assetSha256 "$SHA256" \
            --argjson assetSize "$SIZE" \
            '{
              latestVersion: $latestVersion,
              releaseDate: $releaseDate,
              releaseNotes: $releaseNotes,
              releaseNotesUrl: $releaseNotesUrl,
              assets: {
                "win-x64-installer": {
                  url: $assetUrl,
                  sha256: $assetSha256,
                  sizeBytes: $assetSize
                }
              }
            }' > artifacts/update.json

          echo "Generated update.json:"
          cat artifacts/update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          files: |
            artifacts/*-setup.exe
            artifacts/plugin-distributions/*-full-offline.zip
            artifacts/update.json
          body_path: RELEASE_BODY.md

  create-draft-release:
    needs: draft-quality-gate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify draft tag targets the tested commit
        shell: bash
        env:
          DRAFT_TAG: ${{ inputs.tag_name }}
        run: |
          git check-ref-format "refs/tags/$DRAFT_TAG"
          if TAG_COMMIT=$(git rev-parse --verify "refs/tags/$DRAFT_TAG^{commit}" 2>/dev/null); then
            test "$TAG_COMMIT" = "$GITHUB_SHA"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.tag_name }}
          draft: true
          prerelease: ${{ contains(inputs.tag_name, '-beta') }}
          generate_release_notes: true
