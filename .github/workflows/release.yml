name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: PixivDownload
  APP_VENDOR: sywyar
  # Spring Boot 3.2+ fat jar 使用这个 launcher
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  # 精简运行时包含的 JDK 模块：
  #   java.desktop - Swing（ImageClassifier）
  #   java.sql     - SQLite JDBC
  #   java.naming/security.* - Spring Security / JNDI
  #   jdk.crypto.ec - HTTPS 椭圆曲线密码
  #   jdk.unsupported - 部分库依赖的 sun.misc.Unsafe
  JRE_MODULES: java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.sql.rowset,java.xml,jdk.crypto.cryptoki,jdk.crypto.ec,jdk.httpserver,jdk.management,jdk.unsupported,jdk.zipfs

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Rename JAR
        run: |
          VERSION=${GITHUB_REF_NAME:-snapshot}
          mv target/PixivDownload-*.jar target/PixivDownload-${VERSION}.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/PixivDownload-*.jar

  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        shell: bash
        run: mvn package -DskipTests

      - name: Resolve version & locate jar
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          JAR=$(ls target/PixivDownload-*.jar | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          echo "jar_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Stage jar for jpackage
        shell: bash
        run: |
          mkdir -p build/input
          cp "${{ steps.vars.outputs.jar }}" "build/input/PixivDownload-${{ steps.vars.outputs.version }}.jar"

      - name: Build trimmed runtime with jlink
        shell: bash
        run: |
          jlink \
            --add-modules "$JRE_MODULES" \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2 \
            --output build/runtime

      - name: Download FFmpeg
        shell: bash
        run: |
          # FFmpeg 版本：ffmpeg-master-latest-win64-lgpl
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip" -o build/ffmpeg.zip
          unzip -q build/ffmpeg.zip -d build/
          # 静态构建只需要单个 exe
          mkdir -p build/resources
          cp build/ffmpeg-*-win64-lgpl/bin/ffmpeg.exe build/resources/
          cp build/ffmpeg-*-win64-lgpl/bin/ffprobe.exe build/resources/
          # LGPL 许可声明
          cat > build/resources/ffmpeg-LGPL.txt << 'LGPL_EOF'
          FFmpeg is licensed under the LGPL v2.1.
          Source code: https://ffmpeg.org
          Build: BtbN FFmpeg Builds (https://github.com/BtbN/FFmpeg-Builds)
          LGPL License: https://www.gnu.org/licenses/old-licenses/lgpl-2.1.html
          LGPL_EOF

      - name: Build portable app-image
        shell: bash
        run: |
          jpackage \
            --type app-image \
            --name "$APP_NAME" \
            --app-version "${{ steps.vars.outputs.version }}" \
            --vendor "$APP_VENDOR" \
            --input build/input \
            --main-jar "PixivDownload-${{ steps.vars.outputs.version }}.jar" \
            --main-class "$MAIN_CLASS" \
            --runtime-image build/runtime \
            --resource-dir build/resources \
            --icon src/main/resources/static/favicon.ico \
            --java-options "-Dfile.encoding=UTF-8" \
            --dest build/out

      - name: Copy FFmpeg to app-image
        shell: bash
        run: |
          # jpackage 不会自动包含资源目录中的 exe，需要手动复制
          # 注意：这里路径从 build/input/ 改为 build/resources/
          cp build/resources/ffmpeg.exe build/out/PixivDownload/
          cp build/resources/ffprobe.exe build/out/PixivDownload/
          # LGPL 许可声明
          mkdir -p build/out/PixivDownload/licenses
          cat > build/out/PixivDownload/licenses/ffmpeg-LGPL.txt << 'LGPL_EOF'
          FFmpeg is licensed under the LGPL v2.1.
          Source code: https://ffmpeg.org
          Build: BtbN FFmpeg Builds (https://github.com/BtbN/FFmpeg-Builds)
          LGPL License: https://www.gnu.org/licenses/old-licenses/lgpl-2.1.html
          LGPL_EOF

      - name: Zip portable app-image
        shell: pwsh
        run: |
          $zip = "build/out/PixivDownload-${{ steps.vars.outputs.version }}-win-x64-portable.zip"
          Compress-Archive -Path build/out/PixivDownload -DestinationPath $zip

      - name: Build MSI installer
        shell: bash
        run: |
          jpackage \
            --type msi \
            --name "$APP_NAME" \
            --app-version "${{ steps.vars.outputs.version }}" \
            --vendor "$APP_VENDOR" \
            --input build/input \
            --main-jar "PixivDownload-${{ steps.vars.outputs.version }}.jar" \
            --main-class "$MAIN_CLASS" \
            --runtime-image build/runtime \
            --resource-dir build/resources \
            --icon src/main/resources/static/favicon.ico \
            --java-options "-Dfile.encoding=UTF-8" \
            --win-dir-chooser \
            --win-menu \
            --win-shortcut \
            --win-per-user-install \
            --dest build/out

      - name: Rename MSI
        shell: bash
        run: |
          cd build/out
          for f in *.msi; do
            mv "$f" "PixivDownload-${{ steps.vars.outputs.version }}-win-x64.msi"
          done

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            build/out/*.msi
            build/out/*-portable.zip

  release:
    needs: [build-jar, build-windows-installer]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PixivDownload-${{ github.ref_name }}.jar
            artifacts/*.msi
            artifacts/*-portable.zip
            *.user.js
          generate_release_notes: true
          body: |
            ## 使用说明

            ### ⚡ Windows 便携版（推荐）

            下载 `PixivDownload-*-win-x64-portable.zip`，解压后直接运行 `PixivDownload/PixivDownload.exe`。
            免安装，更新版本时直接覆盖解压即可。已内嵌精简 JRE 和 FFmpeg，无需单独安装 Java。

            ### ☕ MSI 安装包

            下载 `PixivDownload-*-win-x64.msi`，双击安装，同样内嵌 JRE 和 FFmpeg。

            ### ☕ JAR 包（跨平台）

            需要已安装 Java 17+，通过命令行运行：

            ```
            java -jar PixivDownload-${{ github.ref_name }}.jar
            ```
            
            ### 🌐 网页端一站式下载

            启动后访问 `http://localhost:6999/pixiv-batch.html`，无需安装油猴脚本(无法实现页面批量这样全站抓取的功能)即可完成所有批量下载操作：

            访问 `http://localhost:6999/monitor.html` 查看下载进度和历史记录。

            ### 🔧 油猴脚本

            若仍需使用油猴脚本，登录后打开 `http://localhost:6999/pixiv-batch.html`，点击页面顶部的「🧩 油猴脚本」卡片展开，点击对应脚本的「⬇ 安装」按钮。部署在非 localhost 服务器时，`@connect` 会自动替换为实际地址。
            
            ## 详细说明请查看 README

