name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Draft release tag, for example v1.8.2'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-jar:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: mvn package -DskipTests -Dapp.release.version=${{ steps.vars.outputs.version }}

      - name: Rename JAR
        run: |
          VERSION=${GITHUB_REF_NAME:-snapshot}
          mv pixivdownload-app/target/PixivDownload-*.jar pixivdownload-app/target/PixivDownload-${VERSION}.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: pixivdownload-app/target/PixivDownload-*.jar

      - name: Stage release userscripts
        shell: bash
        run: |
          mkdir -p build/release-userscripts
          cp "build/generated-userscripts/Pixiv All-in-One.user.js" build/release-userscripts/
          cp "Pixiv 单作品图片下载器(Local Download).user.js" build/release-userscripts/

      - name: Upload userscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: userscripts
          path: build/release-userscripts/*.user.js

  build-windows-installer:
    needs: build-jar
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/jar

      - name: Package Windows setup
        shell: pwsh
        run: |
          $version = '${{ steps.vars.outputs.version }}'
          $jar = Get-ChildItem artifacts/jar/PixivDownload-*.jar -File | Select-Object -First 1
          if (-not $jar) {
            throw "Could not find downloaded JAR artifact under artifacts/jar"
          }
          ./scripts/package-local.ps1 `
            -Version $version `
            -PrebuiltJar $jar.FullName `
            -SkipPortable `
            -SkipOfflinePortable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/out/*-setup.exe

  release:
    needs: [build-jar, build-windows-installer]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download userscript artifact
        uses: actions/download-artifact@v4
        with:
          name: userscripts
          path: artifacts/userscripts

      - name: Build release notes
        shell: bash
        run: |
          awk '
            BEGIN {
              version_header = "[" ENVIRON["GITHUB_REF_NAME"] "]"
            }
            /^## \[/ {
              if (found) {
                exit
              }
              if (index($0, version_header) > 0) {
                found = 1
                next
              }
            }
            found {
              print
            }
          ' CHANGELOG.md > CHANGELOG_EXCERPT.md

          if [ ! -s CHANGELOG_EXCERPT.md ]; then
            echo "No changelog entry found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          cat > RELEASE_BODY.md <<'EOF'
          > [!NOTE]
          > 自 v1.8.0 版本更新中，我大量优化了网页的布局和功能统一性，希望可以让使用变得更方便和直观，如果有任何优化建议和问题欢迎提出issue
          > 自 v1.8.1 版本更新后，不再提供zip便携安装包，如果有需要，可以根据README中的开发指南进行本地打包

          EOF
          cat CHANGELOG_EXCERPT.md >> RELEASE_BODY.md

          cat >> RELEASE_BODY.md <<'EOF'

          ## 使用说明

          ### Windows 安装器
          下载 `PixivDownload-*-win-x64-setup.exe` 并运行。安装器支持语言选择，并在“可选安装任务”页提供“下载并安装 FFmpeg”选项。

          FFmpeg 不再内置到安装包中；勾选该选项后，安装器会在主程序安装完成后联网下载 FFmpeg，并显示独立下载/解压进度。未勾选或下载失败时，普通图片下载不受影响，后续也可以在 GUI 的“状态”页点击“下载 FFmpeg”重试。

          Release 不再提供 Windows 便携 zip 包。

          ### JAR 包（跨平台）

          需要已安装 Java 17+，通过命令行运行：

          ```
          java -jar PixivDownload-${{ github.ref_name }}.jar
          ```

          ### 网页端一站式下载

          启动后访问 `http://localhost:6999/pixiv-batch.html`，无需安装油猴脚本即可完成大部分批量下载操作。
          访问 `http://localhost:6999/monitor.html` 查看下载进度和历史记录。

          ### 油猴脚本

          如仍需使用油猴脚本，登录后打开 `http://localhost:6999/pixiv-batch.html`，点击页面顶部的“油猴脚本”卡片并安装对应脚本。部署在非 localhost 服务器时，`@connect` 会自动替换为实际地址。

          Release 附件只提供 `Pixiv All-in-One.user.js` 和 `Pixiv 单作品图片下载器(Local download).user.js`。All-in-One 已整合页面批量下载、User 批量下载、URL 批量导入和单作品下载（Java 后端版）；如需这些功能的独立脚本，可通过 `pixiv-batch.html` 的“油猴脚本”卡片安装，或在 GitHub 代码区下载对应 `.user.js` 源文件。

          ## 详细说明请查看 README
          EOF

      - name: Generate update manifest
        shell: bash
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          INSTALLER=$(ls artifacts/*-win-x64-setup.exe 2>/dev/null | head -n1 || true)
          if [ -z "$INSTALLER" ]; then
            echo "No installer artifact found for update manifest" >&2
            exit 1
          fi

          FILENAME=$(basename "$INSTALLER")
          SHA256=$(sha256sum "$INSTALLER" | awk '{print $1}')
          SIZE=$(stat -c%s "$INSTALLER")
          LATEST_VERSION="${GH_REF_NAME#v}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          ASSET_URL="https://github.com/${GH_REPOSITORY}/releases/download/${GH_REF_NAME}/${FILENAME}"
          NOTES_URL="https://github.com/${GH_REPOSITORY}/releases/tag/${GH_REF_NAME}"

          jq -n \
            --arg latestVersion "$LATEST_VERSION" \
            --arg releaseDate "$RELEASE_DATE" \
            --rawfile releaseNotes CHANGELOG_EXCERPT.md \
            --arg releaseNotesUrl "$NOTES_URL" \
            --arg assetUrl "$ASSET_URL" \
            --arg assetSha256 "$SHA256" \
            --argjson assetSize "$SIZE" \
            '{
              latestVersion: $latestVersion,
              releaseDate: $releaseDate,
              releaseNotes: $releaseNotes,
              releaseNotesUrl: $releaseNotesUrl,
              assets: {
                "win-x64-installer": {
                  url: $assetUrl,
                  sha256: $assetSha256,
                  sizeBytes: $assetSize
                }
              }
            }' > artifacts/update.json

          echo "Generated update.json:"
          cat artifacts/update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          files: |
            artifacts/PixivDownload-${{ github.ref_name }}.jar
            artifacts/*-setup.exe
            artifacts/userscripts/*.user.js
            artifacts/update.json
          body_path: RELEASE_BODY.md

  create-draft-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          draft: true
          prerelease: ${{ contains(inputs.tag_name, '-beta') }}
          generate_release_notes: true
