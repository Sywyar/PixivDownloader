name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: PixivDownload
  APP_VENDOR: sywyar
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JRE_MODULES: java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.sql.rowset,java.xml,jdk.crypto.cryptoki,jdk.crypto.ec,jdk.httpserver,jdk.management,jdk.unsupported,jdk.zipfs

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: mvn package -DskipTests -Dapp.release.version=${{ steps.vars.outputs.version }}

      - name: Rename JAR
        run: |
          VERSION=${GITHUB_REF_NAME:-snapshot}
          mv target/PixivDownload-*.jar target/PixivDownload-${VERSION}.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/PixivDownload-*.jar

      - name: Stage release userscripts
        shell: bash
        run: |
          mkdir -p build/release-userscripts
          cp "build/generated-userscripts/Pixiv All-in-One.user.js" build/release-userscripts/
          cp "Pixiv 单作品图片下载器(Local download).user.js" build/release-userscripts/

      - name: Upload userscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: userscripts
          path: build/release-userscripts/*.user.js

  build-windows-installer:
    needs: build-jar
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Fix Git UTF-8 filenames
        run: git config --global core.quotepath false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/jar

      - name: Stage JAR for jpackage
        shell: bash
        run: |
          mkdir -p build/input
          cp artifacts/jar/PixivDownload-*.jar "build/input/PixivDownload-${{ steps.vars.outputs.version }}.jar"

      - name: Build trimmed runtime with jlink
        shell: bash
        run: |
          jlink \
            --add-modules "$JRE_MODULES" \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2 \
            --output build/runtime

      - name: Build app-image
        shell: bash
        run: |
          jpackage \
            --type app-image \
            --name "$APP_NAME" \
            --app-version "${{ steps.vars.outputs.version }}" \
            --vendor "$APP_VENDOR" \
            --input build/input \
            --main-jar "PixivDownload-${{ steps.vars.outputs.version }}.jar" \
            --main-class "$MAIN_CLASS" \
            --runtime-image build/runtime \
            --icon src/main/resources/static/favicon.ico \
            --java-options "-Dfile.encoding=UTF-8" \
            --dest build/app-image-online

      - name: Patch launcher to request administrator rights
        shell: pwsh
        run: |
          ./scripts/set-windows-exe-requested-execution-level.ps1 `
            -Path "build/app-image-online/PixivDownload/PixivDownload.exe" `
            -Level "requireAdministrator"

      - name: Download FFmpeg payload
        shell: bash
        run: |
          mkdir -p build/ffmpeg/unpack
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip" -o build/ffmpeg/ffmpeg.zip
          unzip -q build/ffmpeg/ffmpeg.zip -d build/ffmpeg/unpack
          cp build/ffmpeg/unpack/ffmpeg-*-win64-lgpl/bin/ffmpeg.exe build/ffmpeg/ffmpeg.exe
          cp build/ffmpeg/unpack/ffmpeg-*-win64-lgpl/bin/ffprobe.exe build/ffmpeg/ffprobe.exe
          cat > build/ffmpeg/ffmpeg-LGPL.txt << 'LGPL_EOF'
          FFmpeg is licensed under the LGPL v2.1.
          Source code: https://ffmpeg.org
          Build: BtbN FFmpeg Builds (https://github.com/BtbN/FFmpeg-Builds)
          LGPL License: https://www.gnu.org/licenses/old-licenses/lgpl-2.1.html
          LGPL_EOF

      - name: Assemble offline app-image
        shell: bash
        run: |
          mkdir -p build/app-image-full
          cp -R build/app-image-online/PixivDownload build/app-image-full/
          cp build/ffmpeg/ffmpeg.exe build/app-image-full/PixivDownload/
          cp build/ffmpeg/ffprobe.exe build/app-image-full/PixivDownload/
          mkdir -p build/app-image-full/PixivDownload/licenses
          cp build/ffmpeg/ffmpeg-LGPL.txt build/app-image-full/PixivDownload/licenses/

      - name: Package portable zip files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/out | Out-Null
          Compress-Archive -Path build/app-image-online/PixivDownload -DestinationPath "build/out/PixivDownload-${{ steps.vars.outputs.version }}-win-x64-online-portable.zip"
          Compress-Archive -Path build/app-image-full/PixivDownload -DestinationPath "build/out/PixivDownload-${{ steps.vars.outputs.version }}-win-x64-portable.zip"

      - name: Build Windows setup
        shell: pwsh
        run: |
          function Get-InnoSetupCompiler {
            $command = Get-Command "iscc.exe" -ErrorAction SilentlyContinue
            if ($command) {
              return $command.Source
            }

            $candidates = @()
            $programFilesX86 = ${env:ProgramFiles(x86)}
            if (-not [string]::IsNullOrWhiteSpace($programFilesX86)) {
              $candidates += Join-Path $programFilesX86 "Inno Setup 6\ISCC.exe"
            }
            if (-not [string]::IsNullOrWhiteSpace($env:ProgramFiles)) {
              $candidates += Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"
            }

            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            throw "Missing required command: iscc.exe"
          }

          $version = '${{ steps.vars.outputs.version }}'
          $installerVersion = [regex]::Match($version, '\d+(?:\.\d+){0,2}').Value
          if ([string]::IsNullOrWhiteSpace($installerVersion)) {
            throw "Could not derive installer version from '$version'"
          }

          $iscc = Get-InnoSetupCompiler
          $iscc = ./scripts/prepare-inno-admin-loader.ps1 `
            -CompilerPath $iscc `
            -OutputDirectory "build/inno-admin-loader"
          $appImageDir = (Resolve-Path "build/app-image-online/PixivDownload").Path
          $outputDir = (Resolve-Path "build/out").Path
          & $iscc `
            "/DAppVersion=$version" `
            "/DInstallerVersion=$installerVersion" `
            "/DAppImageDir=$appImageDir" `
            "/DOutputDir=$outputDir" `
            "packaging/windows/inno/PixivDownload.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with exit code $LASTEXITCODE"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            build/out/*-setup.exe
            build/out/*-portable.zip

  release:
    needs: [build-jar, build-windows-installer]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifacts/

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download userscript artifact
        uses: actions/download-artifact@v4
        with:
          name: userscripts
          path: artifacts/userscripts

      - name: Build release notes
        shell: bash
        run: |
          awk '
            BEGIN {
              version_header = "[" ENVIRON["GITHUB_REF_NAME"] "]"
            }
            /^## \[/ {
              if (found) {
                exit
              }
              if (index($0, version_header) > 0) {
                found = 1
                next
              }
            }
            found {
              print
            }
          ' CHANGELOG.md > RELEASE_BODY.md

          if [ ! -s RELEASE_BODY.md ]; then
            echo "No changelog entry found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          cat >> RELEASE_BODY.md <<'EOF'

          ## 使用说明

          ### Windows 安装器
          下载 `PixivDownload-*-win-x64-setup.exe` 并运行。安装器支持语言选择，并在“可选安装任务”页提供“下载并安装 FFmpeg”选项。

          FFmpeg 不再内置到安装包中；勾选该选项后，安装器会在主程序安装完成后联网下载 FFmpeg，并显示独立下载/解压进度。未勾选或下载失败时，普通图片下载不受影响，后续也可以在 GUI 的“状态”页点击“下载 FFmpeg”重试。

          ### Windows 在线便携版
          下载 `PixivDownload-*-win-x64-online-portable.zip`，解压后运行 `PixivDownload/PixivDownload.exe`。便携版内置精简 JRE，但不内置 FFmpeg。

          ### Windows 完整便携版
          下载 `PixivDownload-*-win-x64-portable.zip`，解压后运行 `PixivDownload/PixivDownload.exe`。该版本内置精简 JRE、FFmpeg 和 ffprobe，适合未安装 FFmpeg 或需要离线使用的环境。

          ### JAR 包（跨平台）

          需要已安装 Java 17+，通过命令行运行：

          ```
          java -jar PixivDownload-${{ github.ref_name }}.jar
          ```

          ### 网页端一站式下载

          启动后访问 `http://localhost:6999/pixiv-batch.html`，无需安装油猴脚本即可完成大部分批量下载操作。
          访问 `http://localhost:6999/monitor.html` 查看下载进度和历史记录。

          ### 油猴脚本

          如仍需使用油猴脚本，登录后打开 `http://localhost:6999/pixiv-batch.html`，点击页面顶部的“油猴脚本”卡片并安装对应脚本。部署在非 localhost 服务器时，`@connect` 会自动替换为实际地址。

          Release 附件只提供 `Pixiv All-in-One.user.js` 和 `Pixiv 单作品图片下载器(Local download).user.js`。All-in-One 已整合页面批量下载、User 批量下载、URL 批量导入和单作品下载（Java 后端版）；如需这些功能的独立脚本，可通过 `pixiv-batch.html` 的“油猴脚本”卡片安装，或在 GitHub 代码区下载对应 `.user.js` 源文件。

          ## 详细说明请查看 README
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PixivDownload-${{ github.ref_name }}.jar
            artifacts/*-setup.exe
            artifacts/*-portable.zip
            artifacts/userscripts/*.user.js
          body_path: RELEASE_BODY.md
