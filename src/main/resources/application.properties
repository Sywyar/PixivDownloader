spring.application.name=PixivDownload
server.port=6999
spring.config.import=optional:file:${pixivdownload.config-dir:./config}/config.yaml,optional:file:./config.yaml
mybatis.configuration.map-underscore-to-camel-case=true

# Actuator：仅暴露 health / info 供容器探针使用，绝不暴露 env/beans/configprops 等可能泄露配置的端点。
# health 不返回 details（show-details=never），避免向未登录访客泄露数据源、磁盘等内部信息。
# /actuator/health 与 /actuator/info 在 AuthFilter 中白名单放行（见 isPublicActuatorEndpoint）。
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false
