gui.welcome.done.title=All set
gui.welcome.done.body=All done — onboarding is complete! You can download and browse normally now. Enjoy.
gui.welcome.done.button=Go to Status
gui.welcome.done.point.start=Download: paste a work link / artist ID / keyword on the download page to batch download.
gui.welcome.done.point.advanced=Advanced capabilities (userscripts, ugoira ffmpeg) can be revisited anytime on the previous "Advanced" page or the relevant pages.
gui.welcome.advanced.title=Advanced (optional)
gui.welcome.advanced.body=The following are optional, advanced capabilities — learn them only if you need them; they don't affect everyday downloading or browsing. Click Next when done to finish onboarding.
gui.welcome.status.subtitle=This step confirms the local backend is running — the prerequisite for everything else. You don't need to do anything; click Next once it's ready.
