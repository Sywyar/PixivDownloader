gui.welcome.proxy.title=3. Proxy settings
gui.welcome.proxy.body=All of the backend's outbound traffic goes through this HTTP proxy: accessing Pixiv (browsing, searching, downloading images/ugoira/novels/covers, bookmarking), online updates (checking and downloading new versions), downloading the bundled FFmpeg (needed for ugoira conversion), and online TTS (the Edge neural voices used by "Listen"). Enable or disable the proxy and set its address here; you can change it anytime later on the "Config" tab.
gui.welcome.proxy.enabled=Enable proxy
gui.welcome.proxy.host=Proxy host
gui.welcome.proxy.port=Proxy port
gui.welcome.proxy.point.usage=For normal local use, keep it enabled and point it at your local proxy (default 127.0.0.1:7890).
gui.welcome.proxy.point.docker=When running in a Docker container, 127.0.0.1 usually cannot reach a proxy on the host. Disable the proxy or enter an address reachable from the container.
gui.welcome.proxy.point.change=Proxy settings are saved to config.yaml and take effect immediately; you can adjust them anytime on the "Config" tab.
gui.welcome.proxy.invalid.host=Please enter a proxy host when the proxy is enabled
gui.welcome.proxy.invalid.port=Proxy port must be an integer between 1 and 65535
gui.welcome.proxy.failed=Failed to save proxy settings: {0}
gui.welcome.start.title=4. Start downloading
gui.welcome.start.body=Downloading from the web UI is recommended and needs no browser extension. Open the download page below and paste content to batch download.
gui.welcome.start.button=Open download page
gui.welcome.start.waiting=Advances automatically once you open the download page in your browser
gui.welcome.gallery.title=5. Browse downloaded works
gui.welcome.gallery.body=Downloaded works land in the local gallery, where you browse, search and organize them — this is where you confirm your downloads.
gui.welcome.gallery.button=Open gallery
gui.welcome.gallery.waiting=Returns here automatically after you finish the on-page guide in the gallery
gui.welcome.scripts.title=Advanced: on-site enhancements
gui.welcome.scripts.body=Two userscripts do what the web UI can't: "Page Scrape" grabs works directly from Pixiv pages, and the "Toolbox" enhances browsing on Pixiv. Everything else works fine from the web UI with nothing to install.
gui.welcome.scripts.button=View scripts
gui.welcome.ffmpeg.title=Advanced: animation support
gui.welcome.ffmpeg.body=ffmpeg is only needed to download ugoira (animations); regular images and novels don't require it.
gui.welcome.ffmpeg.button=Go to settings
gui.welcome.ffmpeg.state.ready=ffmpeg detected
gui.welcome.ffmpeg.state.missing=ffmpeg not found (affects ugoira only)
gui.welcome.status.point1=A steady green dot with "Running" means the service is ready.
gui.welcome.status.point2=While it shows "Starting", please wait — the first launch may be initializing the database.
gui.welcome.status.point3=If it never becomes ready or shows a failure, check the log on the "Status" tab.
gui.welcome.config.point.account=The username + password are used to log into authenticated pages (download / monitor, etc.). Password must be at least 6 characters — remember it.
gui.welcome.config.point.mode=solo (single): only you use it; all pages require login, no quota/rate limits — best for personal local use. multi: lets others in as guests; guests are subject to per-user quota and rate limits, and you can scope visibility with invite codes.
gui.welcome.config.point.change=You can change the account or mode later on the "Config" tab or by re-running setup.
gui.welcome.config.done.body=First-run setup is complete and you can start downloading. Click Next to learn about the remaining features.
gui.welcome.start.point.kinds=Supported: single/multiple work links, an artist page (download all their works by user ID), keyword search, a whole series; illustrations / manga / ugoira / novels.
gui.welcome.start.point.keepopen=Downloads run on the backend, but keep the download page open until the whole queue has been submitted (the page keeps streaming the queue to the backend).
gui.welcome.start.point.formats=On the download page you can set the filename template, novel format (TXT/HTML/EPUB), series omnibus and more.
gui.welcome.gallery.point.search=Search by title / artist, and combine filters by tag, author, age rating, series, etc.
gui.welcome.gallery.point.collections=Supports collections, by-author / by-series views; works and novels are managed together.
gui.welcome.gallery.point.guide=The "Guide" button at the bottom-left of the gallery walks you through your first browse; when finished, this app window comes back to the front automatically.
gui.welcome.scripts.intro=Almost all downloading works from the web UI with no scripts. Only these two web-UI-impossible capabilities need a userscript:
gui.welcome.scripts.point.page="Page Scrape": grab works from the current Pixiv list page (search / ranking / following feed, etc.) directly and batch download them.
gui.welcome.scripts.point.toolbox="Toolbox": enhances on-site Pixiv browsing (e.g. marking already-downloaded works).
gui.welcome.scripts.install=How to install: install the Tampermonkey browser extension first, then one-click install from the "Userscripts" card on the download page; the other scripts are not required.
gui.welcome.ffmpeg.intro=Only "downloading ugoira (animations)" needs ffmpeg: it composes the animation frames into a webp. Regular images, manga and novels don't need it.
gui.welcome.ffmpeg.state=Current status: {0}
gui.welcome.ffmpeg.install=When not found, you can one-click download the bundled ffmpeg on the "Status" tab, or install it yourself and add it to the system PATH.
gui.welcome.done.reopen.title=Re-open the guide anytime
gui.welcome.done.reopen=The web "Guide" can be re-opened anytime via the bottom-left "Guide" button on the download / gallery pages; this onboarding Home reappears on every launch until everything is complete.
