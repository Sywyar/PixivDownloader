gui.config.group.schedule=计划任务
gui.config.field.schedule.enabled.label=启用计划任务调度
gui.config.field.schedule.enabled.help=关闭后调度 tick 直接跳过，所有计划任务都不运行（已创建的任务保留，不删除）。默认启用
gui.config.field.schedule.tick-interval-ms.label=调度检查间隔（毫秒）
gui.config.field.schedule.tick-interval-ms.help=每隔多久检查一次到期任务，默认 60000（60 秒）。该项由启动时的定时器解析，修改后需重启才生效（不支持热重载）
gui.config.field.schedule.max-tasks.label=最大计划任务数
gui.config.field.schedule.max-tasks.help=单库最多可创建的计划任务数，防滥用。默认 100
gui.config.field.schedule.inbox-check-every.label=站内信检查间隔（作品数）
gui.config.field.schedule.inbox-check-every.help=cookie 绑定任务每成功下载这么多个作品就读一次站内信，检测 Pixiv 过度访问警告（跳过/过滤不计）。默认 500
gui.config.field.schedule.auth-failure-circuit-breaker.label=单作品连续失败熔断阈值
gui.config.field.schedule.auth-failure-circuit-breaker.help=同一轮内单作品连续抓取失败达到此次数即判定登录态失效、挂起任务等待重新授权。默认 5
gui.config.field.schedule.pending-max-attempts.label=待重试最大次数
gui.config.field.schedule.pending-max-attempts.help=被隔离的失败作品自动重试的最大次数，到上限即标记为需人工处理、停止自动重试。默认 5
gui.config.field.schedule.overuse-defer-default-minutes.label=过度访问延迟恢复默认分钟数
gui.config.field.schedule.overuse-defer-default-minutes.help=账号因过度访问暂停后，「稍后继续」默认延迟的分钟数（最低 60）。默认 60
gui.config.validation.schedule-tick-min=调度检查间隔不能小于 1000 毫秒
gui.config.validation.schedule-defer-min=延迟恢复分钟数不能小于 60
