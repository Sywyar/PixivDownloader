ai.preset.help.api-key=在该服务商的开放平台 / 控制台创建 API Key，粘贴到下方"API Key"。各家计费与限额请以官方文档为准。
ai.preset.help.anthropic=Claude 通过其 OpenAI 兼容端点接入（/v1/chat/completions，用 API Key 作为 Bearer）。在 Anthropic 控制台创建 API Key；部分原生特性在兼容端点下不可用。
ai.preset.help.gemini=Gemini 通过其 OpenAI 兼容端点接入（/v1beta/openai）。在 Google AI Studio 创建 API Key。
ai.preset.help.dashscope=在阿里云百炼（DashScope）控制台创建 API Key（形如 sk-...）。
ai.preset.help.doubao=在火山引擎方舟（Ark）控制台创建 API Key；"模型"处可填模型名或接入点 ID（ep-...）。
ai.preset.help.ernie=百度千帆 V2 使用账号的安全认证密钥作为 Bearer Token；具体获取方式见千帆控制台文档。
ai.preset.help.spark=讯飞星火使用控制台中 HTTP 服务接口的认证密钥（APIPassword）作为 API Key。
ai.preset.help.minimax=在 MiniMax 开放平台创建 API Key（国内站 api.minimaxi.com，国际站请改用 api.minimax.io）；部分接口还需 GroupId，详见官方文档。
ai.preset.help.local=本地 / 自托管（Ollama、LM Studio、vLLM 等）。无需真实 API Key（可留空或随意填写）；开源模型（如 MiMo 等）自托管后在此填入对应模型名即可。
ai.preset.help.aggregator=聚合 / 路由平台，一个 Key 可访问多家模型。"模型"需使用该平台的完整模型标识（如 openai/gpt-4o-mini）。
ai.preset.help.custom=自定义：自行填写 OpenAI 兼容端点的 API 地址 / 模型；API Key 按服务商要求填写。
