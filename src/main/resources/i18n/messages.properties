config.template.proxy.enabled.comment=是否启用 HTTP 代理（用于全部对外访问：Pixiv、在线更新、下载 FFmpeg、在线 TTS）
config.template.proxy.host.comment=代理服务器地址
config.template.proxy.port.comment=代理服务器端口
config.template.multi-mode.quota.enabled.comment=是否启用下载配额限制
config.template.multi-mode.quota.max-artworks.comment=每用户每周期最多下载作品数
