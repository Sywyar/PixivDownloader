config.template.multi-mode.static-resource-request-limit-minute.comment=多人模式游客每 IP 每分钟最大静态资源请求次数（0 表示不限制）
config.template.multi-mode.limit-page.comment=搜索模式“向后补充 N 页”上限（0 表示不限制，仅多人模式生效）
config.template.guest-invite.request-limit-minute.comment=邀请访客每邀请码每分钟最大 API 请求次数（0 表示不限制；管理员不受限）
config.template.guest-invite.static-resource-request-limit-minute.comment=邀请访客每邀请码每分钟最大静态资源请求次数（0 表示不限制；solo / multi 两种模式下均生效）
config.template.guest-invite.tts-request-limit-minute.comment=邀请访客每邀请码每分钟最大在线 TTS（语音合成）请求次数（0 表示不限制；管理员不受限）
config.template.setup.login-rate-limit-minute.comment=每个 IP 每分钟最多允许的登录尝试次数（0 = 不限制）
