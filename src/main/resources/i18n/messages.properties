cli.prompt.new-password-confirm=再次输入新密码以确认：
cli.headless.setup-required.title=无头模式启动失败：尚未完成首次初始化。
cli.headless.setup-required.detail=未在 {0} 找到已完成的 setup_config.json。
cli.headless.setup-required.hint=请先使用以下启动参数完成初始化，然后再以普通方式启动服务：
config.template.section.mail=---- 邮件 / SMTP（计划任务通知）----
config.template.mail.enabled.comment=是否启用邮件发送（关闭时所有发信都跳过；默认关闭）
config.template.mail.host.comment=SMTP 主机（如 smtp.163.com / smtp.qq.com，按服务商在 GUI 中选择预设可自动填入）
config.template.mail.port.comment=SMTP 端口（默认 587；SSL 通常 465，STARTTLS 通常 587）
config.template.mail.security.comment=加密方式：none / ssl / starttls（默认 starttls；ssl 即俗称 SMTPS）
config.template.mail.username.comment=SMTP 用户名（通常是完整邮箱地址）
config.template.mail.password.comment=SMTP 密码 / 授权码 / 应用专用密码（绝不会出现在日志或邮件正文中）
config.template.mail.from.comment=发件人邮箱（留空时回退用 mail.username）
config.template.mail.to.comment=收件人邮箱；支持逗号分隔多个
config.template.mail.socks-proxy.comment=可选 SOCKS 代理，格式 host:port；为空表示直连（既有 HTTP 代理不承载 SMTP）
config.template.mail.subject-prefix.comment=邮件主题前缀（默认 [PixivDownloader]，会拼接在模板标题前）
mail.error.settings-missing=未提供 SMTP 配置
mail.error.host-missing=请填写 SMTP 主机
mail.error.recipients-missing=请填写至少一个收件人
mail.error.template-failed=邮件模板渲染失败
mail.log.send.skipped.disabled=邮件发送未启用（mail.enabled=false），跳过
mail.log.send.skipped.no-host=邮件发送跳过：未配置 SMTP 主机
mail.log.send.skipped.no-recipients=邮件发送跳过：未配置收件人
mail.log.send.success=邮件已发送给 {0}（SMTP 主机 {1}）
mail.log.send.failed=邮件发送失败：{0}
mail.log.test.success=测试邮件已发送给 {0}（SMTP 主机 {1}）
mail.log.test.failed=测试邮件发送失败：{0}
mail.log.test.template-failed=测试邮件模板渲染失败：{0}
config.template.section.ai=---- AI / 大语言模型（LLM）----
config.template.ai.enabled.comment=是否启用 AI 调用（默认关闭；关闭时所有调用直接拒绝）
config.template.ai.base-url.comment=OpenAI 兼容端点地址（如 https://api.openai.com/v1、https://api.deepseek.com；在 GUI 中选择服务商预设可自动填入）
config.template.ai.api-key.comment=API Key（绝不会出现在日志或任何响应中；本地模型如 Ollama 可留空）
config.template.ai.model.comment=模型名（如 gpt-4o-mini / deepseek-chat / qwen-plus）
config.template.ai.use-proxy.comment=本配置的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port）；海外厂商通常需开启、国内厂商无需，独立于全局 proxy.enabled
config.template.section.narration-tts=---- AI 听小说 / 多角色朗读 TTS 引擎 ----
config.template.narration-tts.engine.comment=朗读引擎：多角色朗读所用的 TTS 引擎 id，仅需配置所选引擎对应的子项（见下方以引擎 id 命名的各分组）
config.template.narration-tts.voxcpm.base-url.comment=VoxCPM 的 OpenAI 兼容地址（如 http://127.0.0.1:8000/v1，需带 /v1；由用户自行以 vllm serve openbmb/VoxCPM2 --omni 启动，缺少 --omni 不会暴露音频端点；留空则该引擎不可用）
config.template.narration-tts.voxcpm.api-key.comment=VoxCPM API Key（vLLM 默认可留空；绝不会出现在日志或任何响应中）
config.template.narration-tts.voxcpm.model.comment=VoxCPM 模型名（默认 openbmb/VoxCPM2）
config.template.narration-tts.voxcpm.voice.comment=OpenAI 兼容 /audio/speech 的 voice 字段，不决定音色（VoxCPM 音色由内联描述/参考音承载）；VoxCPM 这类 voice-design/克隆模型通常无任何预设音色（服务端报 Invalid voice '...'. Supported: none 即指预设列表为空），带任何 voice 值都会被拒，故默认留空=不下发该字段，仅当某构建明确要求某个 voice 名时才填
config.template.narration-tts.voxcpm.response-format.comment=音频输出格式（wav / pcm，默认 wav）
config.template.narration-tts.voxcpm.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port）；VoxCPM 多为本机/内网服务，默认关闭，独立于全局 proxy.enabled
config.template.narration-tts.voxcpm.enable-clone.comment=是否启用参考音克隆（角色配了标准音/参考音时用其音色克隆，逐句情绪仍生效）；关闭则即便已配参考音也退回内联音色描述
config.template.narration-tts.voxcpm.clone-mode.comment=配了参考音时的克隆方式：controllable（可控克隆，默认）只送参考音、保住逐句情绪；hifi（Hi-Fi 续写）额外送参考音转录，保真度最高但忽略逐句情绪，且仅在该角色参考音带转录时生效、否则该句自动降回可控克隆
config.template.narration-tts.voxcpm.max-new-tokens.comment=所有 VoxCPM 合成请求（voice-design 与克隆）的生成 token 上限（兜底 vllm-omni 已知 bug：停止符可能不触发导致无限生成）；0 表示不限制，长句被截断时可调高（调低会同时作用于普通朗读与克隆）
config.template.narration-tts.mimo.base-url.comment=MiMo 的 OpenAI 兼容地址（默认 https://api.xiaomimimo.com/v1，引擎在其后拼接 /chat/completions）
config.template.narration-tts.mimo.api-key.comment=MiMo API Key（经 api-key 请求头发送，非 Bearer；绝不会出现在日志或任何响应中；未配置则该引擎不可用）
config.template.narration-tts.mimo.model.comment=配了「预置音色 id」时使用的预置音色模型（默认 mimo-v2.5-tts）
config.template.narration-tts.mimo.voice-design-model.comment=未配预置音色时按角色画像生成音色所用的模型（默认 mimo-v2.5-tts-voicedesign）
config.template.narration-tts.mimo.voice-clone-model.comment=角色配了参考音时用其音色克隆所用的模型（默认 mimo-v2.5-tts-voiceclone）
config.template.narration-tts.mimo.voice.comment=预置音色 id（如 Chloe / 茉莉）：填写则用预置音色模型 + 该音色，留空则用描述音色模型按画像生成
config.template.narration-tts.mimo.response-format.comment=音频输出格式（wav / pcm16，默认 wav）
config.template.narration-tts.mimo.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port）；MiMo 为云服务，按需开启，独立于全局 proxy.enabled
config.template.narration-tts.mimo.enable-clone.comment=是否启用参考音克隆（角色配了参考音时用克隆模型复刻音色）；关闭则退回描述音色
config.template.narration-tts.cosyvoice.base-url.comment=CosyVoice 的 OpenAI 兼容地址（如 http://127.0.0.1:8000/v1，引擎在其后拼接 /audio/speech；由用户自行部署 vox-box / Xinference 等，不同部署字段名略有差异；留空则该引擎不可用）
config.template.narration-tts.cosyvoice.api-key.comment=CosyVoice API Key（自建服务默认可留空；绝不会出现在日志或任何响应中）
config.template.narration-tts.cosyvoice.model.comment=CosyVoice 模型名（默认 CosyVoice2-0.5B）
config.template.narration-tts.cosyvoice.voice.comment=voice-design 时下发的预置音色 / 角色（如 中文女）；不同部署预置名不同，留空则不下发
config.template.narration-tts.cosyvoice.response-format.comment=音频输出格式（wav / mp3 / pcm，默认 wav）
config.template.narration-tts.cosyvoice.use-proxy.comment=本引擎的请求是否走 HTTP 代理；CosyVoice 多为本机/内网服务，默认关闭，独立于全局 proxy.enabled
config.template.narration-tts.cosyvoice.enable-clone.comment=是否启用参考音克隆（以 reference_audio 送参考音克隆音色，自然语言 instruct 仍控制逐句情绪）；关闭则退回 instruct 描述
config.template.narration-tts.fish.base-url.comment=Fish Audio 地址（默认 https://api.fish.audio，引擎在其后拼接 /v1/tts）
config.template.narration-tts.fish.api-key.comment=Fish Audio API Key（Authorization: Bearer；绝不会出现在日志或任何响应中；未配置则该引擎不可用）
config.template.narration-tts.fish.model.comment=Fish 模型（经 model 请求头发送，如 s1 / s2-pro，默认 s1）
config.template.narration-tts.fish.reference-id.comment=Fish 控制台预创建/上传的声音模型 id（reference_id），决定音色；留空则用账户默认音色。Fish 不支持纯文本描述生成音色，逐句情绪以行内标记注入
config.template.narration-tts.fish.format.comment=音频输出格式（mp3 / wav / pcm / opus，默认 mp3）
config.template.narration-tts.fish.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port），独立于全局 proxy.enabled
config.template.narration-tts.minimax.base-url.comment=MiniMax 地址（默认 https://api.minimax.io/v1，引擎在其后拼接 /t2a_v2；国内站点为 https://api.minimaxi.chat/v1）
config.template.narration-tts.minimax.api-key.comment=MiniMax API Key（Authorization: Bearer；绝不会出现在日志或任何响应中；未配置则该引擎不可用）
config.template.narration-tts.minimax.group-id.comment=MiniMax 账户 GroupId（控制台可见的 19 位数字；T2A v2 必填，作为 URL 查询参数随请求下发、与 API Key 配对；未配置则该引擎不可用）
config.template.narration-tts.minimax.model.comment=MiniMax 模型名（默认 speech-2.8-hd）
config.template.narration-tts.minimax.voice-id.comment=MiniMax 预置音色 id（如 English_expressive_narrator）；MiniMax 无逐句自然语言音色通道，必须指定预置音色，留空则该引擎不可用
config.template.narration-tts.minimax.emotion.comment=可选固定情绪（happy/sad/angry/fearful/disgusted/surprised/calm/fluent/whisper），留空用模型默认；引擎会先按逐句情绪关键词自动映射，未命中再回退本设置
config.template.narration-tts.minimax.format.comment=音频输出格式（mp3 / wav / pcm / flac，默认 mp3）
config.template.narration-tts.minimax.sample-rate.comment=音频采样率（Hz，默认 32000）
config.template.narration-tts.minimax.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port），独立于全局 proxy.enabled
config.template.narration-tts.elevenlabs.base-url.comment=ElevenLabs 地址（默认 https://api.elevenlabs.io，引擎在其后拼接 /v1/text-to-speech/{voice_id}）
config.template.narration-tts.elevenlabs.api-key.comment=ElevenLabs API Key（经 xi-api-key 请求头发送，非 Bearer；绝不会出现在日志或任何响应中；未配置则该引擎不可用）
config.template.narration-tts.elevenlabs.model.comment=ElevenLabs 模型 id（默认 eleven_v3；行内情绪标签仅 v3 解析，旧模型如 eleven_multilingual_v2 会把方括号标签读出来）
config.template.narration-tts.elevenlabs.voice-id.comment=ElevenLabs 控制台预建 / 克隆的声音 id（voice_id），决定音色；必填，留空则该引擎不可用。逐句情绪以行内方括号音频标签注入
config.template.narration-tts.elevenlabs.output-format.comment=音频输出格式（query 参数 output_format，如 mp3_44100_128 / pcm_24000 / opus_48000_128，默认 mp3_44100_128）
config.template.narration-tts.elevenlabs.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port），独立于全局 proxy.enabled
config.template.narration-tts.qwen.base-url.comment=阿里 DashScope（百炼）地址（默认 https://dashscope.aliyuncs.com/api/v1 北京区；国际区为 https://dashscope-intl.aliyuncs.com/api/v1；引擎在其后拼接 /services/aigc/multimodal-generation/generation）
config.template.narration-tts.qwen.api-key.comment=DashScope API Key（Authorization: Bearer；绝不会出现在日志或任何响应中；未配置则该引擎不可用）
config.template.narration-tts.qwen.model.comment=Qwen TTS 模型名（默认 qwen3-tts-flash）
config.template.narration-tts.qwen.voice.comment=预置音色（如 Cherry / Ryan / Dylan）；留空则用模型默认
config.template.narration-tts.qwen.language-type.comment=可选文本语言提示（如 Chinese / English / Japanese），留空则自动判别；指定后发音 / 语调更自然
config.template.narration-tts.qwen.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port），独立于全局 proxy.enabled
config.template.narration-tts.doubao.base-url.comment=字节火山引擎语音合成地址（默认 https://openspeech.bytedance.com，引擎在其后拼接 /api/v1/tts，HTTP 非流式 query 路径）
config.template.narration-tts.doubao.app-id.comment=火山语音应用 appid（语音控制台）
config.template.narration-tts.doubao.access-token.comment=火山语音 access-token（经 Authorization: Bearer;<token> 发送，带分号；绝不会出现在日志或任何响应中；未配置则该引擎不可用）
config.template.narration-tts.doubao.cluster.comment=业务集群（默认 volcano_tts）
config.template.narration-tts.doubao.voice-type.comment=预置音色 id（voice_type，如 zh_female_wanqudashu_moon_bigtts）；必填，留空则该引擎不可用
config.template.narration-tts.doubao.encoding.comment=音频编码 / 格式（mp3 / wav / pcm / ogg_opus，默认 mp3）
config.template.narration-tts.doubao.emotion.comment=可选固定情绪（如 happy/sad/angry/scare/hate/surprise/comfort 等火山支持的枚举），留空用模型默认；引擎会先按逐句情绪关键词自动映射，未命中再回退本设置；仅支持情绪的音色（如 *_bigtts）生效
config.template.narration-tts.doubao.use-proxy.comment=本引擎的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port），独立于全局 proxy.enabled
ai.error.disabled=AI 功能未启用（ai.enabled=false）
ai.error.settings-missing=未提供 AI 配置
ai.error.base-url-missing=请填写 API 地址（base-url）
ai.error.model-missing=请填写模型名
ai.error.messages-missing=对话消息为空
ai.error.empty-response=未能从模型获得有效回复
ai.log.chat.success=AI 调用完成：type={0}, model={1}, took={2}ms, prompt={3} tokens, completion={4} tokens
ai.log.chat.failed=AI 调用失败：type={0}, model={1}, took={2}ms, err={3}
config.template.section.push=---- 推送通知（多通道）----
config.template.push.enabled.comment=推送总开关（关闭时所有通道都不发送；默认关闭）
config.template.push.use-proxy.comment=本通道的请求是否走 HTTP 代理（地址取 proxy.host:proxy.port），独立于全局 proxy.enabled
config.template.push.bark.enabled.comment=是否启用 Bark 通道（iOS 推送）
config.template.push.bark.server.comment=Bark 服务器地址（官方公共服务器 https://api.day.app，可改为自建）
config.template.push.bark.device-key.comment=Bark 设备 key（绝不会出现在日志中）
config.template.push.bark.sound.comment=可选提示音名（留空用 App 默认）
config.template.push.dingtalk.enabled.comment=是否启用钉钉自定义机器人通道
config.template.push.dingtalk.access-token.comment=钉钉机器人 Webhook 的 access_token（绝不会出现在日志中）
config.template.push.dingtalk.secret.comment=「加签」安全设置密钥（SEC 开头）；用关键词 / IP 白名单安全设置时留空（绝不会出现在日志中）
config.template.push.telegram.enabled.comment=是否启用 Telegram Bot 通道
config.template.push.telegram.bot-token.comment=Telegram Bot token（绝不会出现在日志中）
config.template.push.telegram.chat-id.comment=目标会话 id（用户 / 群 / 频道）
config.template.push.feishu.enabled.comment=是否启用飞书自定义机器人通道
config.template.push.feishu.webhook-key.comment=飞书 Webhook 地址末段的 hook key（绝不会出现在日志中）
config.template.push.feishu.secret.comment=「签名校验」安全设置密钥；用关键词 / IP 白名单安全设置时留空（绝不会出现在日志中）
config.template.push.wecom.enabled.comment=是否启用企业微信群机器人通道
config.template.push.wecom.key.comment=企业微信群机器人 Webhook 的 key（绝不会出现在日志中）
config.template.push.pushplus.enabled.comment=是否启用 PushPlus（推送加）通道
config.template.push.pushplus.token.comment=PushPlus 用户令牌 token（绝不会出现在日志中）
config.template.push.serverchan.enabled.comment=是否启用 Server 酱通道
config.template.push.serverchan.send-key.comment=Server 酱 SendKey（sctp 前缀自动走 Server 酱³ 端点；绝不会出现在日志中）
config.template.push.webhook.enabled.comment=是否启用自定义 Webhook 通道
config.template.push.webhook.url.comment=目标 URL（http/https）；可对接 Discord / Slack / ntfy / Gotify 等
config.template.push.webhook.content-type.comment=请求内容类型（默认 application/json）
config.template.push.webhook.body-template.comment=请求体模板，支持 {{title}} / {{content}} 占位符；留空用 {"title":"{{title}}","content":"{{content}}"}（JSON 类型时占位符值自动转义）
push.log.send.success=推送已发送：channel={0}, status={1}, took={2}ms
push.log.send.failed=推送发送失败：channel={0}, took={1}ms, err={2}
push.log.channel.error=推送通道异常：channel={0}, err={1}
push.log.skipped.disabled=推送未启用（push.enabled=false），跳过
push.log.skipped.no-channel=推送跳过：没有已启用且配置完整的通道
