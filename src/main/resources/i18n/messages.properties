config.template.multi-mode.quota.archive-expire-minutes.comment=压缩包下载链接有效时间（分钟）
config.template.multi-mode.quota.limit-image.comment=单作品图片数上限（0=不限制）；超出后按 ceil(图片数/limit-image) 个作品计算配额
config.template.multi-mode.quota.max-proxy-requests.comment=每用户每重置周期内最多发起的搜索/代理请求次数（0=不限制）
config.template.multi-mode.quota.archive-max-concurrent.comment=同时进行的配额归档打包数上限（≥1，专用线程池）；修改后需重启
config.template.multi-mode.post-download-mode.comment=下载后处理模式（三选一）：
config.template.multi-mode.post-download-mode.pack-and-delete=pack-and-delete  打包后删除源文件（默认）
config.template.multi-mode.post-download-mode.never-delete=never-delete     打包后保留源文件；再次下载同一作品直接返回已完成
config.template.multi-mode.post-download-mode.timed-delete=timed-delete     打包后保留源文件；超过 delete-after-hours 后自动删除
config.template.multi-mode.delete-after-hours.comment=timed-delete 模式：下载后多少小时自动删除（小时）
