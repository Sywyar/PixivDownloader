mail.template.mail-config-success.subject=✅ Mail configuration successful
mail.template.mail-config-success.brand=Pixiv Downloader
mail.template.mail-config-success.category=Config Test
mail.template.mail-config-success.eyebrow=SMTP CONFIGURATION
mail.template.mail-config-success.heading=✅ Mail configuration successful
mail.template.mail-config-success.greeting=Hello, {{username}}:
mail.template.mail-config-success.body-para1=Congratulations! If you can read this message, your SMTP configuration for {{app_name}} is working.
mail.template.mail-config-success.body-para2=From now on, scheduled tasks that need administrator attention (overuse warnings, expired login cookies, etc.) will reach you through this channel.
mail.template.mail-config-success.info-card.label=Details
mail.template.mail-config-success.info-card.app=Application
mail.template.mail-config-success.info-card.host=SMTP host
mail.template.mail-config-success.info-card.time=Sent at
mail.template.mail-config-success.note.label=Note:
mail.template.mail-config-success.note.text=This is an SMTP configuration test email. If you did not trigger a test from the GUI settings page, you can safely ignore it.
mail.template.mail-config-success.signature=— The Pixiv Downloader team
mail.template.mail-config-success.footer.auto=This email is sent automatically. Please do not reply directly.
mail.template.mail-config-success.footer.copyright=© 2026 PixivDownloader · AGPL-3.0 LICENSED
mail.template.placeholder.administrator=administrator

