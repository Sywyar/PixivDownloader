# ── overuse-paused: overuse warning → account-level pause ────────────
mail.template.overuse-paused.subject=⚠️ Overuse warning detected, scheduled tasks paused
mail.template.overuse-paused.category=Safety Pause
mail.template.overuse-paused.eyebrow=OVERUSE WARNING
mail.template.overuse-paused.heading=⚠️ Overuse warning detected; tasks for this account are paused
mail.template.overuse-paused.body-para1=Pixiv sent an "overuse" warning message to this account. To avoid a ban from continuing heavy downloads in a short window, all scheduled tasks for this account have been automatically paused.
mail.template.overuse-paused.body-para2=Resume later from the "Scheduled Tasks" page: choose "I understand, continue later" to defer, or "Ignore the risk, keep downloading" once you have assessed the risk.
mail.template.overuse-paused.info-card.label=Details
mail.template.overuse-paused.info-card.account=Account ID
mail.template.overuse-paused.info-card.tasks=Affected tasks
mail.template.overuse-paused.info-card.warning-time=Warning time
mail.template.overuse-paused.info-card.trigger-time=Paused at
mail.template.overuse-paused.note.label=Message excerpt:
mail.template.overuse-paused.note.text=Below is an excerpt of the Pixiv warning; please read it before deciding how to resume.

# ── auth-expired: dead cookie → task-level suspension ────────────────
mail.template.auth-expired.subject=🔑 Scheduled task auth expired, re-authorization required
mail.template.auth-expired.category=Auth Expired
mail.template.auth-expired.eyebrow=SESSION EXPIRED
mail.template.auth-expired.heading=🔑 Scheduled task login session has expired
mail.template.auth-expired.body-para1=The login session (cookie) bound to the scheduled task below has expired and can no longer fetch restricted content, so the task has been automatically suspended.
mail.template.auth-expired.body-para2=Please re-authorize the cookie for this task on the "Scheduled Tasks" page; it will resume automatically and retry the previously isolated works first.
mail.template.auth-expired.info-card.label=Details
mail.template.auth-expired.info-card.task=Task name
mail.template.auth-expired.info-card.task-id=Task ID
mail.template.auth-expired.info-card.reason=Reason
mail.template.auth-expired.info-card.trigger-time=Suspended at
mail.template.auth-expired.reason.cookie_dead=Login session expired (cookie expired or revoked)
mail.template.auth-expired.note.label=Tip:
mail.template.auth-expired.note.text=Make sure you are still logged in within the browser before re-authorizing; this email contains no cookie or password.

# ── circuit-breaker: consecutive per-work failures → suspension ──────
mail.template.circuit-breaker.subject=🛑 Scheduled task circuit-broken ({{consecutive_failures}} consecutive failures)
mail.template.circuit-breaker.category=Circuit Break
mail.template.circuit-breaker.eyebrow=CIRCUIT BREAKER
mail.template.circuit-breaker.heading=🛑 Scheduled task suspended after consecutive failures
mail.template.circuit-breaker.body-para1=The scheduled task below failed to fetch individual works multiple times in a row within one run. The system concluded the login session may have expired mid-run and tripped the circuit breaker, suspending the task to avoid spinning.
mail.template.circuit-breaker.body-para2=Please check and re-authorize the cookie on the "Scheduled Tasks" page; it will resume automatically and retry the previously isolated works first.
mail.template.circuit-breaker.info-card.label=Details
mail.template.circuit-breaker.info-card.task=Task name
mail.template.circuit-breaker.info-card.task-id=Task ID
mail.template.circuit-breaker.info-card.failures=Consecutive failures
mail.template.circuit-breaker.info-card.trigger-time=Suspended at
mail.template.circuit-breaker.note.label=Last failure:
mail.template.circuit-breaker.note.text=Below is an excerpt of the most recent failure reason (redacted, contains no credentials).

