# i18n keys for email body / subject (referenced by MailTemplateRegistry's {{i18n:...}} placeholders).
# - When adding a new email template: drop {id}.html into mail/templates/ and add every key it needs to
#   both this file and the Chinese sibling.
# - Only pure copy belongs here; error codes / log lines / config.yaml comments stay in messages.properties.

