mail.template.mail-config-success.greeting=Hello, {{username}}:
mail.template.mail-config-success.body-para1=Congratulations! If you can read this message, your SMTP configuration for {{app_name}} is working.
mail.template.mail-config-success.body-para2=From now on, scheduled tasks that need administrator attention (overuse warnings, expired login cookies, etc.) will reach you through this channel.
