# ── overuse-paused：过度访问警告 → 账号级暂停 ─────────────────────────
mail.template.overuse-paused.subject=⚠️ 检测到过度访问警告，已暂停计划任务
mail.template.overuse-paused.category=安全暂停
mail.template.overuse-paused.eyebrow=OVERUSE WARNING
mail.template.overuse-paused.heading=⚠️ 检测到过度访问警告，已暂停同账号计划任务
mail.template.overuse-paused.body-para1=Pixiv 向该账号发来了「过度访问」站内信警告。为避免短时间内继续大量下载导致账号被封禁，系统已自动暂停该账号下的所有计划任务。
mail.template.overuse-paused.body-para2=请稍后再到「计划任务」页面恢复：可选择「我已知晓，稍后继续」延迟恢复，或在确认风险后选择「无视风险，继续下载」。
mail.template.overuse-paused.info-card.label=关键信息
mail.template.overuse-paused.info-card.account=账号 ID
mail.template.overuse-paused.info-card.tasks=受影响任务数
mail.template.overuse-paused.info-card.warning-time=警告时间
mail.template.overuse-paused.info-card.trigger-time=暂停时间
mail.template.overuse-paused.note.label=站内信摘要：
mail.template.overuse-paused.note.text=以下为 Pixiv 警告正文摘要，请阅读后再决定如何恢复。

# ── auth-expired：cookie 失效 → 任务级挂起 ────────────────────────────
mail.template.auth-expired.subject=🔑 计划任务鉴权失效，需重新授权
mail.template.auth-expired.category=鉴权失效
mail.template.auth-expired.eyebrow=SESSION EXPIRED
mail.template.auth-expired.heading=🔑 计划任务登录态已失效
mail.template.auth-expired.body-para1=以下计划任务绑定的登录态（Cookie）已失效，无法继续抓取受限内容，系统已自动挂起该任务。
mail.template.auth-expired.body-para2=请到「计划任务」页面对该任务重新授权 Cookie；授权成功后会自动恢复运行，并优先重试此前被隔离的作品。
mail.template.auth-expired.info-card.label=关键信息
mail.template.auth-expired.info-card.task=任务名称
mail.template.auth-expired.info-card.task-id=任务 ID
mail.template.auth-expired.info-card.reason=原因
mail.template.auth-expired.info-card.trigger-time=挂起时间
mail.template.auth-expired.reason.cookie_dead=登录态失效（Cookie 已过期或被注销）
mail.template.auth-expired.note.label=提示：
mail.template.auth-expired.note.text=重新授权前请确认你在浏览器中仍处于已登录状态；本邮件不含任何 Cookie 或密码信息。

# ── circuit-breaker：单作品连续失败熔断 ───────────────────────────────
mail.template.circuit-breaker.subject=🛑 计划任务熔断挂起（连续失败 {{consecutive_failures}} 次）
