mail.template.circuit-breaker.body-para2=请到「计划任务」页面检查并重新授权 Cookie；授权成功后会自动恢复运行，并优先重试此前被隔离的作品。
mail.template.circuit-breaker.info-card.label=关键信息
mail.template.circuit-breaker.info-card.task=任务名称
mail.template.circuit-breaker.info-card.task-id=任务 ID
mail.template.circuit-breaker.info-card.failures=连续失败次数
mail.template.circuit-breaker.info-card.trigger-time=挂起时间
mail.template.circuit-breaker.note.label=最近一次失败：
