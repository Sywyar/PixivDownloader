# ── 计划任务（管理员专用） ─────────────────────────────────────────────
mode.schedule=⏰ 计划任务
schedule.title=计划任务管理
schedule.intro=后台按固定周期或 Cron 表达式自动发现并下载新作品。计划任务以管理员身份运行，仅管理员可见。要新建计划任务，请切换到 User / Search / 系列模式，配置好下载与筛选设置后，在下方「存为计划任务」中保存；也可在「快捷获取」里点进某个画师（或打开「我的作品」）预览到作品后，按该画师存为 User 模式计划任务。
schedule.save.title=⏰ 存为计划任务
schedule.save.intro=把当前模式的来源（画师 / 搜索 / 系列）连同上方全部下载与筛选设置打成快照，创建一个在后台自动运行的计划任务（仅管理员）。任务会按设定的触发方式周期性地发现新作品、跳过已下载的，再按快照里的设置自动下载，整个过程无需浏览器或油猴脚本在场。请先在 User / Search / 系列模式下配置好来源、下载与筛选，再到这里命名并保存；在「快捷获取」里点进某个画师（或打开「我的作品」）预览到作品后，也会出现本卡片，按该画师创建 User 模式计划任务。
