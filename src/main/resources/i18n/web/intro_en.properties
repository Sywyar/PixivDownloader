# Features
features.eyebrow=Features
features.title=Not just a downloader — a full<em style="font-family:'Instrument Serif',serif;font-style:italic;background:linear-gradient(120deg,var(--accent),var(--accent-3));-webkit-background-clip:text;color:transparent"> archive pipeline.</em>
features.f1.title=Manga · Ugoira · Novel — every format
features.f1.body=Four independent pipelines (illustration / manga / ugoira → WebP / novel as TXT · HTML · EPUB + cover + omnibus) sharing the same SQLite history database.
features.f2.title=Local gallery + artwork detail
features.f2.body=Sidebar nav / three-mode tag-author filtering / lightbox / prev-next chapter / related works / same-artist works. Browsable locally the moment a download finishes.
features.f3.title=Collections + custom templates
features.f3.body=Collections with custom icons and per-collection download roots. File-name templates: <code>{artwork_id}_p{page}</code>, <code>{author_name}</code>, <code>{R18+}</code> and more.
features.f4.title=Multi-user · quota · invite codes
features.f4.body=Solo / multi modes. Each UUID gets its own quota in multi mode; over-quota downloads are zipped as archives. Issue invite codes scoped to tags / authors / age ratings.
features.f5.title=Dark mode + i18n
features.f5.body=Every user-facing new page goes through the i18n bundle (Chinese / English); theme is persisted. CSS variables drive the design, so dark and light parity comes for free.
features.f6.title=SQLite WAL + GUI tools
features.f6.body=A local DB records every work's ID / title / folder / format / R-18 / AI / tags. A Swing GUI provides a status panel, config editor, image classifier, directory validation and DB backfill tools.

# CTA
cta.eyebrow=Get Started
cta.title=Three steps,<em style="font-family:'Instrument Serif',serif;font-style:italic;background:linear-gradient(120deg,var(--accent-2),var(--accent-3));-webkit-background-clip:text;color:transparent"> and you're running.</em>
cta.lead=One-click Windows installer; on other platforms, Java 17 + an HTTP proxy is enough.
cta.step1.title=Download and start
cta.step1.body=Windows: install <code>*-win-x64-setup.exe</code> (ships with the GUI manager). Other platforms: grab <code>PixivDownload.jar</code> from Releases and run <code>java -jar</code>.
cta.step2.title=First-time setup
cta.step2.body=Your browser opens <code>/setup.html</code>; pick <code>solo</code> or <code>multi</code> mode, set a username and password, and you're ready to search.
cta.step3.title=Use pixiv-batch directly
cta.step3.body=Visit <code>/pixiv-batch.html</code> and use any of the four tabs. Want native page download buttons? Install them in one click from the <code>🧩 Userscripts</code> card.
