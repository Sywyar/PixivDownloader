page.title=PixivDownloader — Archive your Pixiv collection in one click
page.description=Local Pixiv batch downloader: full support for manga, illustrations, ugoira and novels. Comes with a local gallery, collections, series downloads and multi-user quota. Spring Boot + Tampermonkey.

