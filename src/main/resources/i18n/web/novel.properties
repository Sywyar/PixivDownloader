tts.hint.browser=浏览器引擎：完全离线、即时、免费；音质与可用语言取决于系统已安装的语音包。
tts.hint.edge=在线引擎（Edge 神经语音）：音质自然、语言丰富、免费；需联网（经后端代理），有轻微合成延迟。
tts.hint.narration=富感情朗读（beta，可用但尚不稳定）：由后端 AI 把整章逐句归属到说话人，每个角色用固定音色经富情感引擎逐句合成多角色有声书；需在后端配置朗读引擎（仅管理员可用）。首次播放才会触发分析，可在「朗读分析设置 → 朗读花名册」中编辑各角色音色、处理冲突。
tts.hint.narration-debug=调试模式：富感情朗读引擎当前不可用，已允许选中本引擎仅用于运行分析、查看说话人与音色结果；逐句语音合成会失败。
