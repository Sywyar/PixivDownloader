controls.label=Filter controls
controls.threshold=dHash threshold
controls.ahash-threshold=aHash threshold
controls.threshold.title=dHash detects image STRUCTURE (outline & shape): higher = looser matching, finds more roughly-similar images but risks false matches; lower = stricter, only structurally near-identical images group.
controls.ahash-threshold.title=aHash detects image BRIGHTNESS (overall tonal distribution, secondary confirmation): higher = tolerates larger brightness differences; lower = requires near-identical brightness, further reducing false matches.
threshold.hint=dHash detects STRUCTURE: higher → looser matching (more similar images, more false matches), lower → stricter (only structurally near-identical images group). aHash detects BRIGHTNESS: higher → tolerates larger brightness differences, lower → requires near-identical brightness, further reducing false matches. Note: both thresholds are the "max allowed difference" (Hamming distance 0–64) and must both be met; both at 0 (the default) groups only images with identical fingerprints — the strictest.
