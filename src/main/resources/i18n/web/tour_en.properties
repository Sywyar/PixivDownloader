batch.cookie.title=1. Paste your Pixiv cookie
batch.cookie.body=To download login-only works (R-18, follower-only, etc.), paste your Pixiv cookie here. You can skip this if you only need public works.
batch.mode.title=2. Pick a download mode
batch.mode.body=Switch as needed: import works by link, download an artist's full gallery by user ID, search by keyword, or grab a whole series.
batch.start.title=3. Start downloading
batch.start.body=Once you've added what you want, click here. Keep this page open while downloading — the queue is submitted to the backend continuously — and close it only after everything finishes.
batch.queue.title=4. Track progress
batch.queue.body=Live status and the queue show up here; failed items can be retried with one click.
batch.gallery.title=5. Browse the results
batch.gallery.body=Finished works land in the local gallery. Open it here anytime to review and manage them.

gallery.search.title=1. Search downloaded works
gallery.search.body=Type a title or artist name to quickly find what you've downloaded. Switch the search scope from the dropdown on the left.
gallery.filter.title=2. Filter by criteria
gallery.filter.body=Open filters to combine tags, authors, age rating and more to pinpoint exactly what you want.
gallery.views.title=3. Switch views
gallery.views.body=Move between All, By Author and By Manga Series views to browse your collection from different angles.
gallery.grid.title=4. Browse and manage
gallery.grid.body=Downloaded works appear here. Click one to view it large, add it to a collection, or manage it further.
gallery.download.title=5. Download more
gallery.download.body=Head back to the download page from here whenever you want new works. After you click "Done" to finish this guide, return to the PixivDownload app window — it will continue the onboarding there automatically.
