batch.cookie.title=1. Paste your Pixiv cookie
batch.cookie.body=To download login-only works (R-18, follower-only, etc.), paste your Pixiv cookie here. You can skip this if you only need public works.
batch.mode.title=2. Pick a download mode
batch.mode.body=Switch as needed: import works by link, download an artist's full gallery by user ID, search by keyword, or grab a whole series.
batch.start.title=3. Start downloading
batch.start.body=Once you've added what you want, click here. Keep this page open while downloading — the queue is submitted to the backend continuously — and close it only after everything finishes.
batch.queue.title=4. Track progress
batch.queue.body=Live status and the queue show up here; failed items can be retried with one click.
batch.gallery.title=5. Browse the results
batch.gallery.body=Finished works land in the local gallery. Open it here anytime to review and manage them.

batch.cookie-import.install.title=1. Install the Experience Toolbox
batch.cookie-import.install.body=One-click import needs the "Experience Toolbox" userscript running on pixiv.net. The rest of the page is locked during this guide — click the highlighted "Experience Toolbox" install button below; you can proceed only after installing it. If you already installed the All-in-One bundle (which includes the toolbox), just click "I already installed All-in-One".
batch.cookie-import.install.have-aio=I already installed All-in-One
batch.cookie-import.ready.title=2. Start the import
batch.cookie-import.ready.body=Make sure you are logged in to Pixiv in this browser. After you click Done, a Pixiv page opens, fetches the cookie automatically and returns within a few seconds.

gallery.search.title=1. Search downloaded works
gallery.search.body=Type a title or artist name to quickly find what you've downloaded. Switch the search scope from the dropdown on the left.
gallery.filter.title=2. Filter by criteria
gallery.filter.body=Open filters to combine tags, authors, age rating and more to pinpoint exactly what you want.
gallery.views.title=3. Switch views
gallery.views.body=Move between All, By Author and By Manga Series views to browse your collection from different angles.
gallery.grid.title=4. Browse and manage
gallery.grid.body=Downloaded works appear here. Click one to view it large, add it to a collection, or manage it further.
gallery.download.title=5. Download more
gallery.download.body=Head back to the download page from here whenever you want new works. After you click "Done" to finish this guide, return to the PixivDownloader app window — it will continue the onboarding there automatically.

# ── New-user cross-page onboarding (onboarding.*) ────────────────────────
onboarding.common.skip=Skip guide
onboarding.common.next=Next
onboarding.common.done=Done
onboarding.common.copy=Copy
onboarding.common.copied=Copied

onboarding.welcome.title=👋 Welcome to PixivDownloader
onboarding.welcome.intro=Nice to meet you! I'll walk you through downloading your first example work. First, what should I call you?
onboarding.welcome.name-placeholder=Enter a name (optional)
onboarding.welcome.default-name=there

onboarding.network.title=1. Check connectivity
onboarding.network.intro=Hi, {name}! Before we start, let's check whether the backend can reach Pixiv (through your configured proxy).
onboarding.network.checking=Checking connectivity…
onboarding.network.checking-btn=Checking…
onboarding.network.ok=Pixiv reachable: {ping}ms
onboarding.network.fail=Can't reach Pixiv — check your proxy / network settings
onboarding.network.fail-hint=Common cause: the proxy is off or the port is wrong. Set proxy.host / proxy.port in the app's Settings / config.yaml, then retry.
onboarding.network.retry=Retry
onboarding.network.start-download=Download my first work

onboarding.orient.progress=Meet the download page · {step}/4
onboarding.orient.cookie.title=1. Cookie area
onboarding.orient.cookie.body=Paste your Pixiv cookie here. To download login-only works (R-18, follower-only, etc.) you must save a cookie first; this example is all-ages, so you can skip it for now.
onboarding.orient.scripts.title=2. Userscripts area
onboarding.orient.scripts.body=Here you can install the companion userscripts: one-click cookie import on pixiv.net, grabbing artwork links, batch downloading and more. You won't need them for this example — just good to know.
onboarding.orient.tabs.title=3. Download modes
onboarding.orient.tabs.body=Switch between download modes here: quick-fetch your bookmarks / follows / works, import works by link, download by artist ID, search by keyword, or grab a whole series.
onboarding.orient.choose.title=4. Pick a mode
onboarding.orient.choose.body=For your first time, let's use "Import works by link" as the example. I've switched to that mode for you — click "Next" to start downloading the example.

onboarding.download.progress=Example download · {step}/5
onboarding.download.paste.title=1. Paste the example link
onboarding.download.paste.body=Copy the example artwork link below and paste it into the highlighted box:
onboarding.download.paste.ok=✓ Example recognized — click "Next" to continue
onboarding.download.paste.foreign=Other content detected. Please follow the guide — this step only takes the example link above.
onboarding.download.queue.title=2. Add to the queue
onboarding.download.queue.body=Click the highlighted "Import and add to queue" button to add the example to your download queue.
onboarding.download.filters.title=3. Extra filters
onboarding.download.filters.body=Filter works by content rating, AI, tags, type, page count, bookmarks and more — works that don't match are skipped during download. Just have a look; don't change anything this step.
onboarding.download.settings.title=4. Download settings
onboarding.download.settings.body=Set the per-work interval, concurrency, skip-already-downloaded, auto-bookmark after download, filename template and more here. Just have a look; don't change anything this step.
onboarding.download.start.title=5. Start downloading
onboarding.download.start.body=Click the highlighted "Start" button. Keep this page open while it downloads.

onboarding.monitor.title=⏳ Downloading the example
onboarding.monitor.body=Downloading, please wait… the status bar and download queue below update in real time; we'll take you to the gallery when it's done.
onboarding.monitor.success.title=🎉 Download complete!
onboarding.monitor.success.body=Your first work is saved locally. Click the highlighted "Gallery" link to see your result.
onboarding.monitor.fail.title=Download didn't succeed
onboarding.monitor.fail.body=The example failed to download. Check your cookie and network / proxy, then retry.
onboarding.monitor.fail.retry=Download again

onboarding.gallery.progress=Meet the gallery · {step}/{total}
onboarding.gallery.views.title=1. Browse views
onboarding.gallery.views.body=Switch between All / By Author / By Manga Series on the left to browse your downloads from different angles; collections and page navigation are below.
onboarding.gallery.search.title=2. Search
onboarding.gallery.search.body=Type a title, artist name, tag and more to quickly find what you've downloaded; switch the search scope from the dropdown on the left.
onboarding.gallery.filter.title=3. Filter
onboarding.gallery.filter.body=Open filters to combine sort, rating, AI, format, collections, series and more to pinpoint exactly what you want.
onboarding.gallery.grid.title=4. Work grid
onboarding.gallery.grid.body=Downloaded works show up here. Click any card to open its detail page.
onboarding.gallery.card.title=🖼 This is the work you just downloaded
onboarding.gallery.card.body=Click this highlighted card to open the artwork detail page.
onboarding.gallery.card.body-fallback=Your downloaded works appear here. Click any card to open its detail page.

onboarding.redirect.title=👋 Welcome to PixivDownloader
onboarding.redirect.body=The new-user guide starts on the download page and walks you through your first example download. Go there now?
onboarding.redirect.later=Maybe later
onboarding.redirect.go=Go to download page

onboarding.detail.viewer.title=1. Artwork images
onboarding.detail.viewer.body=The work's images show here. Click any image to enlarge it; multi-page works are tiled page by page.
onboarding.detail.actions.title=2. Actions
onboarding.detail.actions.body=The action bar for this work: expand / collapse multi-page images, open the original on Pixiv, the showcase, and delete the local work — with page count and format shown alongside.
onboarding.detail.meta.title=3. Description
onboarding.detail.meta.body=Title, description and tags live here. Click a tag to filter works with the same tag in the gallery.
onboarding.detail.author.title=4. Author
onboarding.detail.author.body=The artist's info. Click to see their other works stored locally, or open their Pixiv profile.
onboarding.detail.series.title=5. Series / related
onboarding.detail.series.body=If the work belongs to a series, browse other episodes here; related works are recommended below.

onboarding.done.title=🎉 Onboarding complete!
onboarding.done.body=You've gone through the whole flow from download to browsing. Next, try Quick Fetch / Search / Series to batch-download more. Enjoy exploring!
onboarding.done.close=Get started
