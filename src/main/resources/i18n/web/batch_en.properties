dialog.search-order-popular=Falls back to latest sorting when Pixiv Premium is unavailable
dialog.search-premium=⚠ Popular sorting requires Pixiv Premium. Pixiv will fall back to latest sorting if you are not subscribed.
dialog.search-batch-warning=Fetches a page range of Pixiv search results, dedupes them, then paginates locally (60/page) keeping Pixiv's returned order. Large ranges cause many requests. In solo mode it is unlimited; in multi mode each fetch is capped by multi-mode.limit-page unless you are an admin.
dialog.series-add-all-warning=Queue All will request every page in this series (12 manga works per page, 30 novels per page). Large series can take time and increase Pixiv request volume. Currently loaded {loaded} / {total} pages. Continue?
dialog.verify-files=Checks whether the recorded folder exists, whether it is empty, and whether it contains image files. If invalid, the artwork will be downloaded again.
dialog.confirm-clear-queue=Force clear the queue? This force-stops and deletes all related download tasks (including the artwork currently downloading, no matter how much has been downloaded). Terminated downloads will not be recorded, and this cannot be undone.
dialog.confirm-clear-cookie=Clear the saved Cookie? You will need to paste and save a Cookie again to access login-required content.
dialog.confirm-reparse=Force clear the current queue and parse again? This force-stops and deletes all related download tasks (including the artwork currently downloading). Terminated downloads will not be recorded.

