mode.schedule=⏰ Scheduled
schedule.title=Scheduled Task Manager
schedule.intro=Automatically discover and download new artworks in the background on a fixed interval or cron schedule. Tasks run as the admin and are admin-only. To create one, switch to User / Search / Series mode, configure the download and filter settings, then save it under "Save as scheduled task" below; or, in Quick fetch, open an artist (or "My works") to preview their works and save a User-mode task for that artist.
schedule.save.title=⏰ Save as scheduled task
schedule.save.intro=Snapshot the current mode's source (artist / search / series) together with all download and filter settings above into a task that runs automatically in the background (admin-only). The task periodically discovers new works on the chosen trigger, skips already-downloaded ones, and downloads the rest using the snapshotted settings — no browser or userscript required. Configure the source, download, and filter settings under User / Search / Series mode first, then name and save it here. This card also appears in Quick fetch once you open an artist (or "My works") and preview their works, letting you create a User-mode task for that artist.
