hint.import-bare-id=A bare numeric ID is treated as an illustration by default (equivalent to https://www.pixiv.net/artworks/{id}); to parse it as a novel, add a <code>novel:</code> section header line above it.
hint.import-section-header=A section header <code>artwork:</code> / <code>novel:</code> stands on its own line (case-insensitive, half- or full-width colon accepted); every following "bare ID / id | title" line is parsed as that kind until the next section header or end of input. Full URLs are always parsed by their own kind regardless of which section they fall under.
hint.import-title-optional=The title can be left empty; the real title will be fetched before download. Compatible with exports from One-Tab, N-Tab, and similar tab managers.
hint.import-reimport=The lists generated by “Export All” and “Export Undownloaded” below can also be imported directly.

