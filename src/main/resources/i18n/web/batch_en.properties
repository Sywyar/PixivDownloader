schedule.field.interval.hint=Runs automatically every this many minutes, counted from the last run (e.g. 1440 = once a day, 60 = hourly).
schedule.field.cron.hint=Uses Spring's 6-field format "second minute hour day month weekday" (note the leading seconds field — one more than the common 5-field Unix cron). Examples: 0 0 3 * * * = 03:00:00 daily; 0 0 */6 * * * = every 6 hours; 0 30 8 * * 1 = 08:30:00 every Monday.
schedule.field.fetch-limit=First-run fetch limit:
schedule.field.fetch-limit.hint.watermark=Scheduled tasks only. The first run puts at most this many newest works into the current run queue (already-downloaded skips and filter skips also count); later runs only pick up newly posted works incrementally and older backlog is not back-filled. 0 = full fetch: the first run tries to download this source's entire backlog, which for large sources can trigger Pixiv's over-access warning or even an account ban — you'll be asked to confirm on save.
schedule.field.fetch-limit.hint.per-run=Scheduled tasks only. This source has no reliable "newest" ordering, so the limit acts as a per-run cap: each run downloads at most this many not-yet-downloaded works (already-downloaded works are skipped for free and don't count, but works skipped by your filters still count), draining the backlog over successive runs. Set it to 0 if you want it to always fetch every work in full (no cap) — but with 0 the first run tries to download everything at once, which for large sources can trigger Pixiv's over-access warning, so you'll be asked to confirm on save.
