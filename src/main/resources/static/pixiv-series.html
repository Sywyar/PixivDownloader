<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixivDownload</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <style>
        :root {
            --sidebar-width: 300px;
            --sidebar-collapsed: 64px;
            --card-radius: 8px;
            --bg: #ffffff;
            --surface: #ffffff;
            --line: #efefef;
            --text: #111111;
            --muted: #aaaaaa;
            --muted-2: #bbbbbb;
            --text-secondary: #333333;
            --brand: #0096fa;
            --danger: #dc2626;
            --control-bg: #ffffff;
            --control-muted-bg: #fafafa;
            --hover-bg: #f5f5f5;
            --soft-bg: #f7fbff;
            --scrollbar-thumb: #dddddd;
            --on-brand: #ffffff;
            --sidebar-shadow: 8px 0 40px rgba(0, 0, 0, 0.08);
            --focus-ring: rgba(0, 150, 250, 0.28);
            --card-shadow: rgba(0, 0, 0, 0.1);
            --veil-gradient: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.15));
            --badge-page-bg: rgba(0, 0, 0, 0.6);
            --badge-r18-bg: rgba(220, 38, 38, 0.85);
            --badge-r18g-bg: rgba(185, 28, 28, 0.9);
            --badge-ai-bg: rgba(139, 92, 246, 0.85);
            --overlay-bg: rgba(0, 0, 0, 0.3);
            --current-bg: rgba(0, 150, 250, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #101216;
            --surface: #171a21;
            --line: #2a303b;
            --text: #f4f7fb;
            --muted: #8d98aa;
            --muted-2: #748094;
            --text-secondary: #d6dde8;
            --brand: #4bb3ff;
            --danger: #f87171;
            --control-bg: #1e2330;
            --control-muted-bg: #151922;
            --hover-bg: #222838;
            --soft-bg: rgba(75, 179, 255, 0.1);
            --scrollbar-thumb: #3b4352;
            --sidebar-shadow: 8px 0 40px rgba(0, 0, 0, 0.38);
            --focus-ring: rgba(75, 179, 255, 0.34);
            --card-shadow: rgba(0, 0, 0, 0.34);
            --current-bg: rgba(75, 179, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button, input {
            font-family: inherit;
        }

        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            position: sticky;
            top: 0;
            background: var(--surface);
            box-shadow: var(--sidebar-shadow);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.25s ease, min-width 0.25s ease, transform 0.25s ease;
            z-index: 10;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
            min-width: var(--sidebar-collapsed);
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
            padding: 20px 0;
        }

        .sidebar-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #0096fa 0%, #46b8ff 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-brand);
        }

        .sidebar-logo svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .sidebar-brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-brand {
            display: none;
        }

        .sidebar-toggle {
            margin-left: auto;
            width: 28px;
            height: 28px;
            border: none;
            background: var(--control-muted-bg);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .sidebar-toggle:hover {
            background: var(--hover-bg);
            color: var(--brand);
        }

        .sidebar-toggle svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.25s;
        }

        .sidebar.collapsed .sidebar-toggle {
            margin-left: 0;
        }

        .sidebar.collapsed .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 8px;
        }

        .sidebar.collapsed .section-header {
            justify-content: center;
            padding: 16px 0 8px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted-2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sidebar.collapsed .section-title {
            display: none;
        }

        .sidebar-nav {
            padding: 0 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            color: inherit;
        }

        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 0;
        }

        .nav-item:hover {
            background: var(--hover-bg);
        }

        .nav-item.current {
            cursor: default;
            pointer-events: none;
        }

        .nav-item.current .nav-icon,
        .nav-item.current .nav-label {
            color: var(--brand);
            font-weight: 600;
        }

        .nav-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text-secondary);
        }

        .nav-icon svg {
            width: 16px;
            height: 16px;
        }

        .nav-label {
            font-size: 14px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar.collapsed .nav-label {
            display: none;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--line);
            margin: 8px 16px;
        }

        .sidebar.collapsed .sidebar-divider {
            margin: 8px 10px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--line);
        }

        .sidebar.collapsed .sidebar-footer {
            padding: 12px 8px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            overflow: hidden;
        }

        .sidebar.collapsed .user-card {
            justify-content: center;
            padding: 8px 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0096fa, #46b8ff);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-brand);
            font-size: 13px;
            font-weight: 600;
        }

        .user-info {
            overflow: hidden;
        }

        .sidebar.collapsed .user-info {
            display: none;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 11px;
            color: var(--muted);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .mobile-menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            border: none;
            background: var(--control-muted-bg);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .mobile-menu-btn:hover {
            background: var(--hover-bg);
            color: var(--brand);
        }

        .mobile-menu-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .search-box {
            flex: 1;
            max-width: 520px;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--control-muted-bg);
            transition: border-color 0.15s, background 0.15s;
        }

        .search-box:focus-within {
            border-color: var(--brand);
            background: var(--surface);
        }

        .search-box svg {
            width: 16px;
            height: 16px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .search-box input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            font-size: 13px;
            color: var(--text);
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        .topbar-actions {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .pixiv-lang-switcher--default {
            color: var(--text-secondary) !important;
        }

        .pixiv-lang-switcher--default .pixiv-lang-switcher__select {
            border-color: var(--line) !important;
            background: var(--control-bg) !important;
            color: var(--text-secondary) !important;
        }

        .pixiv-lang-switcher--default .pixiv-lang-switcher__select option {
            background: var(--surface);
            color: var(--text);
        }

        .pixiv-theme-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--control-bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .pixiv-theme-toggle:hover {
            border-color: var(--brand);
            color: var(--brand);
            background: var(--hover-bg);
        }

        .pixiv-theme-toggle svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .series-wrapper {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .series-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            padding: 6px 0 22px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 18px;
        }

        .series-kicker {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .series-title {
            font-size: 28px;
            line-height: 1.25;
            font-weight: 750;
            color: var(--text);
            overflow-wrap: anywhere;
        }

        .series-author {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .series-author[href]:hover {
            color: var(--brand);
        }

        .series-author svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .series-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 36px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--control-bg);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--brand);
            color: var(--brand);
            background: var(--hover-bg);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--brand);
            border-color: var(--brand);
            color: var(--on-brand);
        }

        .btn-primary:hover:not(:disabled) {
            color: var(--on-brand);
            background: var(--brand);
        }

        .btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .meta-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 30px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--control-muted-bg);
            color: var(--text-secondary);
            font-size: 12px;
        }

        .meta-chip svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .gallery-status {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .empty-state {
            padding: 80px 16px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .chapter-card {
            display: block;
            cursor: pointer;
            animation: cardIn 0.3s ease both;
        }

        .chapter-card:hover .chapter-thumb {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--card-shadow);
        }

        .chapter-card.current .chapter-thumb {
            outline: 2px solid var(--brand);
            outline-offset: 2px;
        }

        .chapter-card.novel .chapter-thumb {
            aspect-ratio: 3 / 4;
        }

        .chapter-thumb {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: var(--card-radius);
            background: var(--control-muted-bg);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .chapter-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .chapter-cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: var(--muted);
            text-align: center;
            font-size: 13px;
            line-height: 1.45;
            word-break: break-word;
            background: var(--control-muted-bg);
        }

        .thumb-veil {
            position: absolute;
            inset: auto 0 0;
            height: 40%;
            background: var(--veil-gradient);
            pointer-events: none;
        }

        .thumb-badges {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .thumb-badge-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .thumb-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0;
            color: var(--on-brand);
        }

        .thumb-badge.r18 {
            background: var(--badge-r18-bg);
        }

        .thumb-badge.r18g {
            background: var(--badge-r18g-bg);
            border: 1px solid var(--on-brand);
        }

        .thumb-badge.ai {
            background: var(--badge-ai-bg);
        }

        .thumb-badge.pages {
            background: var(--badge-page-bg);
            backdrop-filter: blur(4px);
        }

        .thumb-badge.current {
            background: var(--brand);
        }

        .chapter-meta {
            padding-top: 8px;
        }

        .chapter-title-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .chapter-order {
            flex-shrink: 0;
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.35;
            padding-top: 1px;
        }

        .chapter-title {
            min-width: 0;
            font-size: 13px;
            line-height: 1.35;
            font-weight: 600;
            color: var(--text);
            display: -webkit-box;
            overflow: hidden;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow-wrap: anywhere;
        }

        .chapter-sub {
            margin-top: 3px;
            font-size: 12px;
            line-height: 1.3;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 24px 0 8px;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 32px;
            height: 32px;
            padding: 0 10px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: var(--control-bg);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--brand);
            color: var(--brand);
        }

        .page-btn.active {
            background: var(--brand);
            color: var(--on-brand);
            border-color: var(--brand);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-ellipsis {
            padding: 0 4px;
            color: var(--muted);
            font-size: 13px;
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay-bg);
            z-index: 99;
        }

        .mobile-overlay.active {
            display: block;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (min-width: 768px) {
            .chapter-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .chapter-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
                gap: 16px;
            }
        }

        @media (min-width: 1400px) {
            .chapter-grid {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                z-index: 100;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex;
            }

            .topbar {
                padding: 12px 16px;
            }

            .search-box {
                max-width: none;
            }

            .series-wrapper {
                padding: 16px;
            }

            .series-hero {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .series-actions {
                justify-content: flex-start;
            }

            .series-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-brand" data-i18n="sidebar.brand"></span>
            <button class="sidebar-toggle" id="sidebarToggle" type="button" data-i18n-title="sidebar.toggle.title">
                <svg viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </div>

        <div class="section-header">
            <span class="section-title" data-i18n="section.navigation"></span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/pixiv-gallery.html">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.gallery"></span>
            </a>
            <div class="nav-item current" aria-current="page" data-i18n-title="nav.current">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.series-directory"></span>
            </div>
            <a class="nav-item" href="/pixiv-batch.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.download"></span>

            <a class="nav-item" href="/monitor.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>

                <span class="nav-label" data-i18n="nav.monitor"></span>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">P</div>
                <div class="user-info">

                </div>

        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main class="main-content">
        <div class="topbar">
            <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria-label="button.open-menu">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <label class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder">
            </label>
            <div class="topbar-actions" id="langSwitcherAnchor"></div>
        </div>

        <div class="series-wrapper">
            <section class="series-hero">
                <div>
                    <div class="series-kicker" data-i18n="page.kicker"></div>
                    <h1 class="series-title" id="seriesTitle"></h1>
                    <a class="series-author" id="seriesAuthor" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span id="seriesAuthorName"></span>
                    </a>
                </div>
                <div class="series-actions">
                    <a class="btn" id="backToArtworkBtn" href="#" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        <span data-i18n="button.back-to-artwork"></span>
                    </a>
                    <a class="btn btn-primary" id="openGalleryFilterBtn" href="/pixiv-gallery.html">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span data-i18n="button.open-gallery-filter"></span>
                    </a>
                </div>
            </section>

            <div class="meta-strip" id="metaStrip"></div>
            <div class="gallery-status" id="seriesStatus" data-i18n="status.loading"></div>
            <section class="chapter-grid" id="chapterGrid"></section>
            <nav class="pagination" id="pagination"></nav>
        </div>
    </main>
</div>

<script>
    const state = {
        type: 'artwork',
        seriesId: null,
        currentId: null,
        initialSeriesTitle: '',
        detail: null,
        page: 0,
        size: 60,
        totalPages: 0,
        totalElements: 0,
        search: '',
        items: [],
    };

    let pageI18n = null;
    let searchTimer = null;

    const ImageCache = (() => {
        const PREFIX = 'pxImg:';
        const mem = new Map();

        function get(url) {
            if (mem.has(url)) return mem.get(url);
            try {
                const cached = sessionStorage.getItem(PREFIX + url);
                if (cached) {
                    mem.set(url, cached);
                    return cached;
                }
            } catch (_) {
            }
            return null;
        }

        function put(url, dataUri) {
            mem.set(url, dataUri);
            try {
                sessionStorage.setItem(PREFIX + url, dataUri);
            } catch (_) {
            }
        }

        return {get, put};
    })();

    function interpolate(template, vars) {
        if (!vars) return String(template);
        return String(template).replace(/\{([a-zA-Z0-9_.-]+)\}/g, (match, name) => {
            return Object.prototype.hasOwnProperty.call(vars, name) ? String(vars[name]) : match;
        });
    }

    function t(key, fallback, vars) {
        if (pageI18n) {
            return pageI18n.t('series:' + key, fallback, vars);
        }
        return interpolate(fallback != null ? fallback : key, vars);
    }

    function isNovelMode() {
        return state.type === 'novel';
    }

    function modeKey(key) {
        return isNovelMode() ? `${key}-novel` : key;
    }

    function modeText(key, artworkFallback, novelFallback, vars) {
        return t(modeKey(key), isNovelMode() ? novelFallback : artworkFallback, vars);
    }

    function applyStaticPageTranslations() {
        document.title = state.detail && state.detail.title
            ? modeText('page.title-with-name', '{title} - Manga Series', '{title} - Novel Series', {title: state.detail.title})
            : modeText('page.title', 'Manga Series Directory', 'Novel Series Directory');
        if (pageI18n) {
            pageI18n.apply(document.body);
        }
        applyModeTranslations();
        renderSeriesHeader();
        renderMeta();
        renderStatus();
        renderGrid(state.items);
        renderPagination();
    }

    function applyModeTranslations() {
        const setText = (selector, text) => {
            const el = document.querySelector(selector);
            if (el) el.textContent = text;
        };
        setText('.series-kicker', modeText('page.kicker', 'Manga Series Directory', 'Novel Series Directory'));
        setText('.nav-item.current .nav-label', modeText('nav.series-directory', 'Manga Series Directory', 'Novel Series Directory'));
        setText('#backToArtworkBtn span', modeText('button.back-to-artwork', 'Back to Current Artwork', 'Back to Current Novel'));
        setText('#openGalleryFilterBtn span', modeText('button.open-gallery-filter', 'Filter in Gallery', 'Filter in Novel Gallery'));
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.placeholder = modeText('search.placeholder', 'Search this series...', 'Search this novel series...');
        }
    }

    async function initPageI18n() {
        pageI18n = await PixivI18n.create({namespaces: ['series', 'common']});
        await PixivLangSwitcher.mount({
            mountPoint: document.getElementById('langSwitcherAnchor'),
            i18n: pageI18n,
            onChange: function (nextClient) {
                pageI18n = nextClient;
                applyStaticPageTranslations();
            }
        });
        PixivTheme.mount({
            mountPoint: document.getElementById('langSwitcherAnchor')
        });
        applyStaticPageTranslations();
    }

    async function api(url, options = {}) {
        const res = await fetch(url, {
            credentials: 'same-origin',
            ...options,
            headers: {
                'Accept': 'application/json',
                ...(options.headers || {}),
            },
        });
        if (res.status === 401) {
            window.location.href = '/login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
            throw new Error('Unauthorized');
        }
        if (!res.ok) {
            let msg = `HTTP ${res.status}`;
            try {
                const j = await res.json();
                if (j && j.error) msg = j.error;
                else if (j && j.message) msg = j.message;
            } catch (_) {
            }
            throw new Error(msg);
        }
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) return res.json();
        return res.text();
    }

    function readParams() {
        const params = new URLSearchParams(location.search);
        state.type = params.get('type') === 'novel' ? 'novel' : 'artwork';
        const seriesId = Number(params.get('seriesId') || params.get('id'));
        const currentId = Number(params.get('currentId') || params.get('novelId') || params.get('artworkId'));
        const order = Number(params.get('order'));
        state.seriesId = Number.isFinite(seriesId) && seriesId > 0 ? seriesId : null;
        state.currentId = Number.isFinite(currentId) && currentId > 0 ? currentId : null;
        state.initialSeriesTitle = params.get('seriesTitle') || '';
        if (Number.isFinite(order) && order > 0) {
            state.page = Math.floor((order - 1) / state.size);
        }
    }

    async function loadSeries() {
        if (!state.seriesId) {
            document.getElementById('seriesTitle').textContent = t('status.missing-id', 'Missing series id');
            document.getElementById('seriesStatus').textContent = modeText(
                'status.missing-id-hint',
                'Open this page from an artwork in a manga series.',
                'Open this page from a novel in a novel series.'
            );
            return;
        }
        renderLoading();
        if (isNovelMode()) {
            state.detail = buildNovelDetail();
            renderSeriesHeader();
            renderMeta();
            await loadArtworks();
            return;
        }
        try {
            const detail = await api(`/api/series/${state.seriesId}`);
            state.detail = detail;
            renderSeriesHeader();
            renderMeta();
            await loadArtworks();
        } catch (e) {
            document.getElementById('seriesTitle').textContent = modeText(
                'status.load-failed-title',
                'Unable to load series',
                'Unable to load novel series'
            );
            document.getElementById('seriesStatus').textContent = t('status.load-failed', 'Load failed: {message}', {message: e.message});
            document.getElementById('chapterGrid').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }
    }

    async function loadArtworks() {
        if (isNovelMode()) {
            await loadNovels();
            return;
        }
        const params = new URLSearchParams();
        params.set('page', String(state.page));
        params.set('size', String(state.size));
        params.set('sort', 'series');
        params.set('order', 'asc');
        params.set('seriesId', String(state.seriesId));
        if (state.search) params.set('search', state.search);
        try {
            document.getElementById('seriesStatus').textContent = t('status.loading-artworks', 'Loading chapters...');
            const resp = await api('/api/gallery/artworks?' + params.toString());
            state.items = resp.content || [];
            state.totalPages = resp.totalPages || 0;
            state.totalElements = resp.totalElements || 0;
            if (!state.items.length && state.totalElements > 0 && state.page > 0) {
                state.page = 0;
                await loadArtworks();
                return;
            }
            renderMeta();
            renderStatus();
            renderGrid(state.items);
            renderPagination();
        } catch (e) {
            document.getElementById('seriesStatus').textContent = t('status.load-failed', 'Load failed: {message}', {message: e.message});
            document.getElementById('chapterGrid').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }
    }

    async function loadNovels() {
        const params = new URLSearchParams();
        params.set('page', String(state.page));
        params.set('size', String(state.size));
        params.set('sort', 'series');
        params.set('order', 'asc');
        params.set('seriesId', String(state.seriesId));
        if (state.search) params.set('search', state.search);
        try {
            document.getElementById('seriesStatus').textContent = t('status.loading-novels', 'Loading novels...');
            const resp = await api('/api/gallery/novels?' + params.toString());
            state.items = resp.content || [];
            state.totalPages = resp.totalPages || 0;
            state.totalElements = resp.totalElements || 0;
            if (!state.items.length && state.totalElements > 0 && state.page > 0) {
                state.page = 0;
                await loadNovels();
                return;
            }
            state.detail = buildNovelDetail();
            renderSeriesHeader();
            renderMeta();
            renderStatus();
            renderGrid(state.items);
            renderPagination();
        } catch (e) {
            document.getElementById('seriesStatus').textContent = t('status.load-failed', 'Load failed: {message}', {message: e.message});
            document.getElementById('chapterGrid').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }
    }

    function buildNovelDetail() {
        const first = state.items.find(item => Number(item.seriesId) === Number(state.seriesId)) || state.items[0] || {};
        const updatedTime = state.items.reduce((max, item) => Math.max(max, Number(item.time || 0)), 0);
        return {
            seriesId: state.seriesId,
            title: state.initialSeriesTitle || (state.detail && state.detail.title)
                || modeText('series.default', 'Series #{id}', 'Series #{id}', {id: state.seriesId}),
            authorId: first.authorId || null,
            authorName: first.authorName || '',
            novelCount: state.totalElements || state.items.length || 0,
            updatedTime: updatedTime || null,
        };
    }

    function renderLoading() {
        document.getElementById('seriesTitle').textContent = t('status.loading', 'Loading...');
        document.getElementById('seriesStatus').textContent = t('status.loading', 'Loading...');
        document.getElementById('chapterGrid').innerHTML = '';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('metaStrip').innerHTML = '';
    }

    function renderSeriesHeader() {
        const titleEl = document.getElementById('seriesTitle');
        const authorEl = document.getElementById('seriesAuthor');
        const authorNameEl = document.getElementById('seriesAuthorName');
        const galleryBtn = document.getElementById('openGalleryFilterBtn');
        const backBtn = document.getElementById('backToArtworkBtn');
        const detail = state.detail;

        if (!detail) {
            titleEl.textContent = state.seriesId
                ? modeText('series.default', 'Series #{id}', 'Series #{id}', {id: state.seriesId})
                : '';
            authorEl.style.display = 'none';
            galleryBtn.href = isNovelMode() ? '/pixiv-novel-gallery.html' : '/pixiv-gallery.html';
            return;
        }

        const title = detail.title || modeText('series.default', 'Series #{id}', 'Series #{id}', {id: detail.seriesId});
        titleEl.textContent = title;
        document.title = modeText('page.title-with-name', '{title} - Manga Series', '{title} - Novel Series', {title});
        galleryBtn.href = isNovelMode()
            ? buildNovelGalleryFilterHref({seriesId: detail.seriesId, seriesTitle: title})
            : buildGalleryFilterHref({seriesId: detail.seriesId, seriesTitle: title});

        if (state.currentId) {
            backBtn.href = isNovelMode()
                ? `/pixiv-novel.html?id=${state.currentId}`
                : `/pixiv-artwork.html?id=${state.currentId}`;
            backBtn.style.display = 'inline-flex';
        } else {
            backBtn.style.display = 'none';
        }

        if (detail.authorId || detail.authorName) {
            const name = detail.authorName || t('author.default', 'Author {id}', {id: detail.authorId});
            authorNameEl.textContent = detail.authorId
                ? t('author.with-id', '{name} · #{id}', {name, id: detail.authorId})
                : name;
            if (detail.authorId) {
                authorEl.href = isNovelMode()
                    ? buildPixivAuthorHref(detail.authorId)
                    : buildPixivSeriesHref(detail.authorId, detail.seriesId);
            } else {
                authorEl.removeAttribute('href');
            }
            authorEl.style.display = 'inline-flex';
        } else {
            authorEl.style.display = 'none';
        }
    }

    function renderMeta() {
        const strip = document.getElementById('metaStrip');
        const detail = state.detail;
        if (!detail) {
            strip.innerHTML = '';
            return;
        }
        const chips = [
            metaChip('id', t('meta.series-id', 'Series ID: {id}', {id: detail.seriesId}), 'M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'),
            metaChip('count', modeText(
                'meta.local-count',
                '{count} downloaded chapters',
                '{count} downloaded novels',
                {count: isNovelMode() ? (detail.novelCount || 0) : (detail.artworkCount || 0)}
            ), 'M3 6h18 M3 12h18 M3 18h18'),
        ];
        if (state.totalElements) {
            chips.push(metaChip('shown', modeText(
                'meta.filtered-count',
                '{count} matching chapters',
                '{count} matching novels',
                {count: state.totalElements}
            ), 'M22 3H2l8 9.46V19l4 2v-8.54L22 3z'));
        }
        if (detail.updatedTime) {
            chips.push(metaChip('updated', t('meta.updated', 'Updated {time}', {time: formatTime(detail.updatedTime)}), 'M12 8v4l3 3 M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z'));
        }
        strip.innerHTML = chips.join('');
    }

    function metaChip(type, text, path) {
        return `
            <span class="meta-chip" data-type="${escapeHtml(type)}">
                <svg viewBox="0 0 24 24"><path d="${escapeHtml(path)}"/></svg>
                ${escapeHtml(text)}
            </span>
        `;
    }

    function renderStatus() {
        const status = document.getElementById('seriesStatus');
        if (!state.seriesId) return;
        if (!state.totalElements) {
            status.textContent = state.search
                ? modeText('status.no-matching-artworks', 'No matching chapters', 'No matching novels')
                : modeText('status.no-artworks', 'No downloaded chapters in this series', 'No downloaded novels in this series');
            return;
        }
        const from = state.page * state.size + 1;
        const to = Math.min((state.page + 1) * state.size, state.totalElements);
        status.textContent = modeText('status.range', '{total} chapters, {from}-{to} shown', '{total} novels, {from}-{to} shown', {
            total: state.totalElements,
            from,
            to,
        });
    }

    function renderGrid(items) {
        const grid = document.getElementById('chapterGrid');
        if (!state.seriesId) return;
        if (isNovelMode()) {
            renderNovelGrid(items, grid);
            return;
        }
        if (!items.length) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">' +
                escapeHtml(state.search
                    ? t('status.no-matching-artworks', 'No matching chapters')
                    : t('status.no-artworks', 'No downloaded chapters in this series')) +
                '</div>';
            return;
        }
        grid.innerHTML = items.map(item => {
            const xRestrict = item.xRestrict;
            const isR18 = xRestrict === 1;
            const isR18G = xRestrict === 2;
            const isAi = item.isAi === true;
            const pages = item.count || 1;
            const isCurrent = state.currentId && String(item.artworkId) === String(state.currentId);
            return `
                <a class="chapter-card ${isCurrent ? 'current' : ''}" href="/pixiv-artwork.html?id=${item.artworkId}" data-id="${item.artworkId}">
                    <div class="chapter-thumb">
                        <img data-src="/api/downloaded/thumbnail/${item.artworkId}/0" alt="${escapeHtml(item.title || '')}" loading="lazy">
                        <div class="thumb-veil"></div>
                        <div class="thumb-badges">
                            <div class="thumb-badge-group">
                                ${item.seriesOrder ? `<span class="thumb-badge current">#${escapeHtml(item.seriesOrder)}</span>` : ''}
                                ${isCurrent ? `<span class="thumb-badge current">${escapeHtml(t('chapter.current', 'Current'))}</span>` : ''}
                                ${isR18G ? '<span class="thumb-badge r18g">R-18G</span>' : isR18 ? '<span class="thumb-badge r18">R-18</span>' : ''}
                                ${isAi ? '<span class="thumb-badge ai">AI</span>' : ''}
                            </div>
                            ${pages > 1 ? `<span class="thumb-badge pages">${pages}P</span>` : ''}
                        </div>
                    </div>
                    <div class="chapter-meta">
                        <div class="chapter-title-row">
                            ${item.seriesOrder ? `<span class="chapter-order">#${escapeHtml(item.seriesOrder)}</span>` : ''}
                            <div class="chapter-title">${escapeHtml(item.title || t('status.untitled', 'Untitled'))}</div>
                        </div>
                        <div class="chapter-sub">${escapeHtml(chapterSubText(item))}</div>
                    </div>
                </a>
            `;
        }).join('');
        grid.querySelectorAll('img[data-src]').forEach(img => loadThumbnail(img));
        if (state.currentId) {
            requestAnimationFrame(() => {
                const current = grid.querySelector('.chapter-card.current');
                if (current) {
                    current.scrollIntoView({block: 'nearest'});
                }
            });
        }
    }

    function renderNovelGrid(items, grid) {
        if (!items.length) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">' +
                escapeHtml(state.search
                    ? t('status.no-matching-artworks-novel', 'No matching novels')
                    : t('status.no-artworks-novel', 'No downloaded novels in this series')) +
                '</div>';
            return;
        }
        grid.innerHTML = items.map(item => {
            const xRestrict = item.xRestrict;
            const isR18 = xRestrict === 1;
            const isR18G = xRestrict === 2;
            const isAi = item.isAi === true;
            const isOriginal = item.isOriginal === true;
            const isCurrent = state.currentId && String(item.novelId) === String(state.currentId);
            const title = item.title || t('status.untitled', 'Untitled');
            const cover = item.coverExt
                ? `<img src="/api/gallery/novel/${item.novelId}/cover" alt="${escapeHtml(title)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'chapter-cover-placeholder',textContent:this.alt}))">`
                : `<div class="chapter-cover-placeholder">${escapeHtml(title)}</div>`;
            return `
                <a class="chapter-card novel ${isCurrent ? 'current' : ''}" href="/pixiv-novel.html?id=${item.novelId}" data-id="${item.novelId}">
                    <div class="chapter-thumb">
                        ${cover}
                        <div class="thumb-veil"></div>
                        <div class="thumb-badges">
                            <div class="thumb-badge-group">
                                ${item.seriesOrder ? `<span class="thumb-badge current">#${escapeHtml(item.seriesOrder)}</span>` : ''}
                                ${isCurrent ? `<span class="thumb-badge current">${escapeHtml(t('chapter.current', 'Current'))}</span>` : ''}
                                ${isR18G ? '<span class="thumb-badge r18g">R-18G</span>' : isR18 ? '<span class="thumb-badge r18">R-18</span>' : ''}
                                ${isAi ? '<span class="thumb-badge ai">AI</span>' : ''}
                                ${isOriginal ? `<span class="thumb-badge pages">${escapeHtml(t('chapter.original', 'Original'))}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="chapter-meta">
                        <div class="chapter-title-row">
                            ${item.seriesOrder ? `<span class="chapter-order">#${escapeHtml(item.seriesOrder)}</span>` : ''}
                            <div class="chapter-title">${escapeHtml(title)}</div>
                        </div>
                        <div class="chapter-sub">${escapeHtml(chapterSubText(item))}</div>
                    </div>
                </a>
            `;
        }).join('');
        if (state.currentId) {
            requestAnimationFrame(() => {
                const current = grid.querySelector('.chapter-card.current');
                if (current) {
                    current.scrollIntoView({block: 'nearest'});
                }
            });
        }
    }

    function chapterSubText(item) {
        const parts = [];
        if (isNovelMode()) {
            if (item.novelId) parts.push(t('chapter.id', 'ID: {id}', {id: item.novelId}));
            if (item.wordCount && item.wordCount > 0) parts.push(t('chapter.words', '{count} words', {count: item.wordCount}));
            else if (item.textLength && item.textLength > 0) parts.push(t('chapter.text-length', '{count} characters', {count: item.textLength}));
            const readingText = formatReadingTime(item.readingTimeSeconds);
            if (readingText) parts.push(readingText);
            if (item.xLanguage) parts.push(item.xLanguage);
            return parts.join(' · ');
        }
        if (item.artworkId) parts.push(t('chapter.id', 'ID: {id}', {id: item.artworkId}));
        if (item.count) parts.push(t('chapter.pages', '{count} pages', {count: item.count}));
        return parts.join(' · ');
    }

    function formatReadingDuration(seconds) {
        const total = Math.floor(Number(seconds || 0));
        if (!Number.isFinite(total) || total <= 0) return '';
        const hour = Math.floor(total / 3600);
        const minute = Math.floor((total % 3600) / 60);
        const second = total % 60;
        const parts = [];
        if (hour > 0) parts.push(t('duration.hour', '{count} h', {count: hour}));
        if (minute > 0) parts.push(t('duration.minute', '{count} min', {count: minute}));
        if (second > 0 && hour === 0) parts.push(t('duration.second', '{count} sec', {count: second}));
        if (!parts.length) parts.push(t('duration.second', '{count} sec', {count: total}));
        return parts.join(' ');
    }

    function formatReadingTime(seconds) {
        const text = formatReadingDuration(seconds);
        return text ? t('chapter.reading-time', 'Reading: {time}', {time: text}) : '';
    }

    async function loadThumbnail(img) {
        const url = img.dataset.src;
        img.removeAttribute('data-src');
        const cached = ImageCache.get(url);
        if (cached) {
            img.src = cached;
            return;
        }
        try {
            const resp = await api(url);
            if (resp && resp.success && resp.image) {
                const ext = (resp.extension || 'jpg').toLowerCase();
                const src = `data:image/${ext === 'jpg' ? 'jpeg' : ext};base64,${resp.image}`;
                img.src = src;
                ImageCache.put(url, src);
            }
        } catch (_) {
        }
    }

    function renderPagination() {
        const pag = document.getElementById('pagination');
        if (state.totalPages <= 1) {
            pag.innerHTML = '';
            return;
        }
        const pages = buildPageWindow(state.page, state.totalPages);
        const parts = [];
        parts.push(`<button class="page-btn" data-page="${state.page - 1}" ${state.page === 0 ? 'disabled' : ''}>${escapeHtml(t('pagination.prev', 'Previous'))}</button>`);
        for (const p of pages) {
            if (p === '...') parts.push('<span class="page-ellipsis">...</span>');
            else parts.push(`<button class="page-btn ${p === state.page ? 'active' : ''}" data-page="${p}">${p + 1}</button>`);
        }
        parts.push(`<button class="page-btn" data-page="${state.page + 1}" ${state.page >= state.totalPages - 1 ? 'disabled' : ''}>${escapeHtml(t('pagination.next', 'Next'))}</button>`);
        pag.innerHTML = parts.join('');
        pag.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.disabled) return;
                const p = Number(btn.dataset.page);
                if (p < 0 || p >= state.totalPages) return;
                state.page = p;
                loadArtworks();
                document.querySelector('.series-wrapper').scrollTop = 0;
                window.scrollTo({top: 0, behavior: 'smooth'});
            });
        });
    }

    function buildPageWindow(current, total) {
        const windowSet = new Set([0, total - 1, current, current - 1, current + 1]);
        const pages = [...windowSet].filter(n => n >= 0 && n < total).sort((a, b) => a - b);
        const out = [];
        for (let i = 0; i < pages.length; i++) {
            if (i > 0 && pages[i] - pages[i - 1] > 1) out.push('...');
            out.push(pages[i]);
        }
        return out;
    }

    function buildGalleryFilterHref({seriesId, seriesTitle, authorId, authorName} = {}) {
        const params = new URLSearchParams();
        if (seriesId != null) params.set('filterSeriesId', String(seriesId));
        if (seriesTitle) params.set('filterSeriesTitle', seriesTitle);
        if (authorId != null) params.set('filterAuthorId', String(authorId));
        if (authorName) params.set('filterAuthorName', authorName);
        return '/pixiv-gallery.html' + (params.toString() ? '?' + params.toString() : '');
    }

    function buildNovelGalleryFilterHref({seriesId, seriesTitle} = {}) {
        const params = new URLSearchParams();
        if (seriesId != null) params.set('seriesId', String(seriesId));
        if (seriesTitle) params.set('seriesTitle', seriesTitle);
        return '/pixiv-novel-gallery.html' + (params.toString() ? '?' + params.toString() : '');
    }

    function buildPixivSeriesHref(authorId, seriesId) {
        return `https://www.pixiv.net/user/${authorId}/series/${seriesId}`;
    }

    function buildPixivAuthorHref(authorId) {
        return `https://www.pixiv.net/users/${authorId}`;
    }

    function formatTime(epochMillis) {
        if (!epochMillis) return '';
        const date = new Date(Number(epochMillis));
        if (Number.isNaN(date.getTime())) return '';
        const locale = pageI18n ? pageI18n.lang : undefined;
        return new Intl.DateTimeFormat(locale, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
        }).format(date);
    }

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/[&<>"']/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[m]));
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function openMobileSidebar() {
        document.getElementById('sidebar').classList.add('mobile-open');
        document.getElementById('mobileOverlay').classList.add('active');
    }

    function closeMobileSidebar() {
        document.getElementById('sidebar').classList.remove('mobile-open');
        document.getElementById('mobileOverlay').classList.remove('active');
    }

    document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
    document.getElementById('mobileMenuBtn').addEventListener('click', openMobileSidebar);
    document.getElementById('mobileOverlay').addEventListener('click', closeMobileSidebar);
    document.getElementById('searchInput').addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            state.search = e.target.value.trim();
            state.page = 0;
            loadArtworks();
        }, 220);
    });

    (async function init() {
        readParams();
        await initPageI18n();
        await loadSeries();
    })();
</script>
</body>
