<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixivDownload</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <link rel="stylesheet" href="/css/admin-visibility.css">
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/pixiv-series/pixiv-series.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-brand" data-i18n="sidebar.brand"></span>
            <button class="sidebar-toggle" id="sidebarToggle" type="button" data-i18n-title="sidebar.toggle.title">
                <svg viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </div>

        <div class="section-header">
            <span class="section-title" data-i18n="gallery:section.view"></span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" id="navViewAll" href="/pixiv-gallery.html">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.all"></span>
            </a>
            <a class="nav-item" id="navViewAuthors" href="/pixiv-gallery.html?view=authors">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.authors"></span>
            </a>
            <a class="nav-item active" id="navViewSeries" href="/pixiv-gallery.html?view=series">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.series"></span>
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="gallery:section.collections"></span>
            <a class="section-add" id="btnCreateCollection" href="/pixiv-gallery.html?createCollection=1"
               data-i18n-title="gallery:collection.new" data-i18n-aria-label="gallery:collection.new">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </a>
        </div>
        <div class="sidebar-nav" id="collectionList"></div>

        <div class="sidebar-divider"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="section.navigation"></span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" id="navGalleryHome" href="/pixiv-gallery.html">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.gallery"></span>
            </a>
            <a class="nav-item" href="/pixiv-batch.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.download"></span>
            </a>
            <a class="nav-item" href="/monitor.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.monitor"></span>
            </a>
            <a class="nav-item admin-only" id="navInviteManage" href="/pixiv-invite-manage.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="gallery:nav.invite-manage"></span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">P</div>
                <div class="user-info">
                    <div class="user-name" data-i18n="user.name"></div>
                    <div class="user-status" data-i18n="status.online"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main class="main-content">
        <div class="topbar">
            <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria-label="button.open-menu">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <label class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder">
            </label>
            <div class="topbar-actions" id="langSwitcherAnchor"></div>
        </div>

        <div class="series-wrapper">
            <section class="series-hero">
                <div class="series-hero-cover" id="seriesCover" style="display:none">
                    <img id="seriesCoverImg" alt=""
                         onerror="document.getElementById('seriesCover').style.display='none'">
                </div>
                <div class="series-hero-main">
                    <div class="series-kicker" data-i18n="page.kicker"></div>
                    <h1 class="series-title" id="seriesTitle"></h1>
                    <a class="series-author" id="seriesAuthor" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span id="seriesAuthorName"></span>
                    </a>
                </div>
                <div class="series-actions">
                    <a class="btn" id="backToArtworkBtn" href="#" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        <span data-i18n="button.back-to-artwork"></span>
                    </a>
                    <button class="btn" id="refreshMetaBtn" type="button" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        <span id="refreshMetaLabel" data-i18n="button.refresh-meta"></span>
                    </button>
                    <a class="btn btn-primary" id="openGalleryFilterBtn" href="/pixiv-gallery.html">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span data-i18n="button.open-gallery-filter"></span>
                    </a>
                </div>
            </section>

            <div class="meta-strip" id="metaStrip"></div>
            <div class="series-description" id="seriesDescription" style="display:none"></div>
            <div class="gallery-status" id="seriesStatus" data-i18n="status.loading"></div>
            <section class="chapter-grid" id="chapterGrid"></section>
            <nav class="pagination" id="pagination"></nav>
        </div>
    </main>
</div>

<script src="/pixiv-series/pixiv-series.js"></script>
</body>
</html>
