<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - Pixiv Gallery</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <script src="/js/pixiv-onboarding.js"></script>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/css/lang-theme-switcher.css">
    <link rel="stylesheet" href="/css/pixiv-onboarding.css">
    <link rel="stylesheet" href="/pixiv-artwork/pixiv-artwork.css">
</head>
<body>
<div class="topbar">
    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
        </svg>
        <span id="backBtnLabel">返回</span>
    </button>
    <a class="back-btn" href="/pixiv-gallery.html?view=all"><span id="galleryBtnLabel">画廊</span></a>
    <span class="topbar-title" id="topbarTitle"></span>
    <div class="topbar-actions" id="langSwitcherAnchor"></div>
</div>

<div class="wrapper" id="mainWrapper">
    <div class="main-col">
        <div class="panel" id="viewerPanel">
            <div class="loading-placeholder" id="viewerLoading">加载中...</div>
            <div class="viewer" id="viewer" style="display:none">
                <div class="viewer-image" id="mainImage"></div>
                <div class="more-pages" id="morePages"></div>
                <div class="viewer-actions">
                    <button class="expand-btn" id="expandBtn" style="display:none">展开全部 (<span
                            id="totalPageCount"></span>)
                    </button>
                    <button class="expand-btn" id="collapseBtn" style="display:none">收起</button>
                    <button class="heart-btn" id="heartBtn" type="button" style="display:none">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        <span id="heartLabel">收藏</span>
                    </button>
                    <a class="expand-btn external-link-btn" id="pixivArtworkLink" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
                        <span id="pixivArtworkLinkLabel">Pixiv 原作品链接</span>
                    </a>
                    <a class="expand-btn showcase-link-btn" id="showcaseLink" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
                        <span id="showcaseLinkLabel">作品展示(娱乐性功能)</span>
                    </a>
                    <button class="expand-btn delete-btn" id="deleteArtworkBtn" type="button" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/>
                            <line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                        <span id="deleteBtnLabel">删除</span>
                    </button>
                    <span class="meta-info" id="metaInfo"></span>
                </div>
                <div class="viewer-series-nav" id="seriesNav" style="display:none">
                    <a class="expand-btn" id="seriesPrevBtn" href="#" style="display:none"></a>
                    <a class="expand-btn" id="seriesIndexBtn" href="#" style="display:none"></a>
                    <a class="expand-btn" id="seriesNextBtn" href="#" style="display:none"></a>
                </div>
            </div>
        </div>

        <div class="panel" id="detailPanel" style="display:none">
            <h1 class="artwork-title" id="artworkTitle"></h1>
            <div class="artwork-stats" id="artworkStats"></div>
            <div class="artwork-desc" id="artworkDesc"></div>
            <div class="panel-title" id="detailTagsTitle">标签</div>
            <div class="tags" id="tagList"></div>
        </div>

        <div class="panel" id="seriesPanel" style="display:none">
            <div class="series-panel-head">
                <div class="panel-title" id="seriesPanelTitle">本系列漫画</div>
                <a class="series-view-all" id="seriesViewAllLink" href="/pixiv-gallery.html?view=all">查看全部</a>
            </div>
            <div class="by-author-wrap">
                <button class="thumb-strip-arrow left" id="bySeriesPrev" type="button" title="上一组">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <div class="thumb-strip" id="bySeriesList"></div>
                <button class="thumb-strip-arrow right" id="bySeriesNext" type="button" title="下一组">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="panel" id="relatedPanel" style="display:none">
            <div class="panel-title" id="relatedPanelTitle">相关作品</div>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </div>

    <div class="side-col">
        <div class="panel" id="authorPanel" style="display:none">
            <div class="panel-title" id="authorPanelTitle">画师</div>
            <div class="author-card">
                <a class="author-card-link" id="authorCard" href="/pixiv-gallery.html?view=all">
                    <div class="author-avatar" id="authorAvatar">?</div>
                    <div class="author-info">
                        <div class="author-name" id="authorName">未知</div>
                    </div>
                </a>
                <div class="author-meta">
                    <div class="author-id" id="authorId"></div>
                    <a class="author-external-link" id="pixivAuthorLink" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
                        <span id="pixivAuthorLinkLabel">Pixiv 主页 ↗</span>
                    </a>
                </div>
            </div>
            <div class="panel-title by-author-title" id="byAuthorTitle">该画师的其他作品</div>
            <div class="by-author-wrap" id="byAuthorWrap">
                <button class="thumb-strip-arrow left" id="byAuthorPrev" type="button" title="上一组">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <div class="thumb-strip" id="byAuthorList"></div>
                <button class="thumb-strip-arrow right" id="byAuthorNext" type="button" title="下一组">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <button class="lightbox-nav prev" onclick="lightboxNav(-1); event.stopPropagation()">‹</button>
    <img id="lightboxImage" alt="">
    <button class="lightbox-nav next" onclick="lightboxNav(1); event.stopPropagation()">›</button>
    <div class="lightbox-info" id="lightboxInfo"></div>
</div>

<div class="modal-backdrop" id="modalAddToCollection">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="addToCollectionTitle">添加到收藏夹</span>
            <button class="modal-close" onclick="closeAddToCollectionModal()">×</button>
        </div>
        <div class="modal-body">
            <div style="display:flex; gap:6px; margin-bottom:16px">
                <input class="form-input" id="quickCreateName" placeholder="快速新建收藏夹" maxlength="40"
                       style="flex:1">
                <button class="btn" id="quickCreateBtn">新建</button>
            </div>
            <div class="collection-list" id="addToCollectionList"></div>
        </div>
        <div class="modal-foot">
            <button class="btn" id="addToCollectionDoneBtn" onclick="closeAddToCollectionModal()">完成</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modalDeleteArtwork">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="deleteArtworkTitle">删除作品</span>
            <button class="modal-close" id="deleteArtworkClose" type="button">×</button>
        </div>
        <div class="modal-body">
            <p class="delete-modal-text" id="deleteArtworkMessage">确定要删除这个作品吗？该作品的图片文件与下载记录都会被永久删除，且无法恢复。</p>
        </div>
        <div class="modal-foot">
            <button class="btn" id="deleteArtworkCancel" type="button">取消</button>
            <button class="btn btn-danger" id="deleteArtworkConfirm" type="button">删除</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/pixiv-artwork/pixiv-artwork.js"></script>
</body>
</html>
