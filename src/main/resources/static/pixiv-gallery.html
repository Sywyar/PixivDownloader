<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixiv Gallery</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --sidebar-width: 300px;
            --sidebar-collapsed: 64px;
            --card-radius: 8px;
            --bg: #ffffff;
            --surface: #ffffff;
            --line: #efefef;
            --text: #111111;
            --muted: #aaaaaa;
            --muted-2: #bbbbbb;
            --text-secondary: #333333;
            --brand: #0096fa;
            --danger: #dc2626;
            --filter-must: #2563eb;
            --filter-must-bg: rgba(37, 99, 235, 0.08);
            --filter-not: #dc2626;
            --filter-not-bg: rgba(220, 38, 38, 0.08);
            --filter-or: #16a34a;
            --filter-or-bg: rgba(22, 163, 74, 0.08);
            --sidebar-shadow: 8px 0 40px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font-family: inherit;
        }

        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            position: sticky;
            top: 0;
            background: var(--surface);
            box-shadow: var(--sidebar-shadow);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.25s ease, min-width 0.25s ease;
            z-index: 10;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
            min-width: var(--sidebar-collapsed);
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
            padding: 20px 0;
        }

        .sidebar-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #0096fa 0%, #46b8ff 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .sidebar-brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-brand {
            display: none;
        }

        .sidebar-toggle {
            margin-left: auto;
            width: 28px;
            height: 28px;
            border: none;
            background: #f5f5f5;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .sidebar-toggle:hover {
            background: #eeeeee;
        }

        .sidebar-toggle svg {
            width: 16px;
            height: 16px;
            stroke: #666;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.25s;
        }

        .sidebar.collapsed .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        .sidebar.collapsed .sidebar-toggle {
            margin-left: 0;
        }

        .sidebar-nav {
            padding: 0 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            overflow: hidden;
            color: inherit;
        }

        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 0;
        }

        .nav-item:hover {
            background: #f5f5f5;
        }

        .nav-item.active {
            background: #f0f4ff;
        }

        .nav-item.active .nav-icon {
            color: #4a6cf7;
        }

        .nav-item.active .nav-label {
            color: #4a6cf7;
            font-weight: 500;
        }

        .nav-item.current {
            cursor: default;
            pointer-events: none;
        }

        .nav-item.current .nav-icon {
            color: var(--brand);
        }

        .nav-item.current .nav-label {
            color: var(--brand);
            font-weight: 600;
        }

        .nav-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #666;
        }

        .nav-icon svg {
            width: 16px;
            height: 16px;
        }

        .nav-label {
            font-size: 14px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar.collapsed .nav-label {
            display: none;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--line);
            margin: 8px 16px;
        }

        .sidebar.collapsed .sidebar-divider {
            margin: 8px 10px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 8px;
        }

        .sidebar.collapsed .section-header {
            justify-content: center;
            padding: 16px 0 8px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted-2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sidebar.collapsed .section-title {
            display: none;
        }

        .section-add {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-add:hover {
            background: #f0f4ff;
            color: var(--brand);
        }

        .section-add svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar.collapsed .section-add {
            display: none;
        }

        .collection-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar.collapsed .collection-item {
            justify-content: center;
            padding: 0;
        }

        .collection-item:hover {
            background: #f5f5f5;
        }

        .collection-item.selected {
            background: rgba(0, 150, 250, 0.08);
        }

        .collection-item.selected .collection-label {
            color: var(--brand);
            font-weight: 500;
        }

        .collection-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #fff0f6;
            color: #e84393;
            overflow: hidden;
        }

        .collection-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .collection-icon svg {
            width: 14px;
            height: 14px;
        }

        .collection-label {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar.collapsed .collection-label {
            display: none;
        }

        .collection-count {
            font-size: 12px;
            color: var(--muted-2);
            flex-shrink: 0;
        }

        .sidebar.collapsed .collection-count {
            display: none;
        }

        .collection-menu {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--muted);
            border-radius: 4px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .collection-item:hover .collection-menu {
            display: flex;
        }

        .collection-menu:hover {
            background: #eee;
            color: var(--text);
        }

        .collection-menu svg {
            width: 14px;
            height: 14px;
        }

        .sidebar.collapsed .collection-menu {
            display: none !important;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--line);
        }

        .sidebar.collapsed .sidebar-footer {
            padding: 12px 8px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
        }

        .sidebar.collapsed .user-card {
            justify-content: center;
            padding: 8px 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0096fa, #46b8ff);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .user-info {
            overflow: hidden;
        }

        .sidebar.collapsed .user-info {
            display: none;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 11px;
            color: var(--muted);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .search-box {
            flex: 1;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fafafa;
            transition: border-color 0.15s, background 0.15s;
        }

        .search-box:focus-within {
            border-color: var(--brand);
            background: #fff;
        }

        .search-box svg {
            width: 16px;
            height: 16px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 40px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .filter-btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .filter-btn.active {
            border-color: var(--brand);
            color: var(--brand);
            background: rgba(0, 150, 250, 0.08);
        }

        .filter-btn svg {
            width: 14px;
            height: 14px;
        }

        .filter-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 0 4px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .filter-badge.visible {
            display: inline-flex;
        }

        .filter-panel {
            border-bottom: 1px solid var(--line);
            background: #fafafa;
            padding: 16px 32px;
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .filter-panel.open {
            display: flex;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-row-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 64px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .chip:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .chip.active {
            border-color: var(--brand);
            color: var(--brand);
            background: rgba(0, 150, 250, 0.08);
            font-weight: 500;
        }

        .chip.filter-selected .tag-trans,
        .chip.filter-selected .chip-count {
            color: currentColor;
            opacity: 0.72;
        }

        .chip.filter-selected.mode-must {
            border-color: var(--filter-must);
            color: var(--filter-must);
            background: var(--filter-must-bg);
            font-weight: 500;
        }

        .chip.filter-selected.mode-not {
            border-color: var(--filter-not);
            color: var(--filter-not);
            background: var(--filter-not-bg);
            font-weight: 500;
        }

        .chip.filter-selected.mode-or {
            border-color: var(--filter-or);
            color: var(--filter-or);
            background: var(--filter-or-bg);
            font-weight: 500;
        }

        .chip .chip-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            overflow: hidden;
            background: #fff0f6;
            color: #e84393;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .chip .chip-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chip .chip-icon svg {
            width: 10px;
            height: 10px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .filter-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }

        .filter-chip-list .chip-empty {
            font-size: 12px;
            color: var(--muted);
        }

        .filter-tags-row {
            align-items: flex-start;
        }

        #filterTagsRow {
            margin-top: 8px;
        }

        #filterAuthorsRow {
            margin-top: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
        }

        .filter-tags-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
            min-width: 0;
        }

        .filter-tags-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-mode-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1 1 auto;
            min-width: 0;
        }

        #tagFilterReset,
        #authorFilterReset {
            margin-left: auto;
            flex-shrink: 0;
        }

        #tagExpandToggle,
        #authorExpandToggle {
            flex-shrink: 0;
        }

        .filter-mode-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-mode-btn.active {
            font-weight: 600;
        }

        .filter-mode-btn.mode-must.active {
            border-color: var(--filter-must);
            color: var(--filter-must);
            background: var(--filter-must-bg);
        }

        .filter-mode-btn.mode-not.active {
            border-color: var(--filter-not);
            color: var(--filter-not);
            background: var(--filter-not-bg);
        }

        .filter-mode-btn.mode-or.active {
            border-color: var(--filter-or);
            color: var(--filter-or);
            background: var(--filter-or-bg);
        }

        .tag-search-box {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            transition: border-color 0.15s;
        }

        .tag-search-box:focus-within {
            border-color: var(--brand);
        }

        .tag-search-box svg {
            width: 12px;
            height: 12px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .tag-search-box input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 12px;
            font-family: inherit;
            color: var(--text);
            width: 160px;
        }

        .tag-search-box input::placeholder {
            color: var(--muted);
        }

        .chip .tag-trans {
            color: var(--muted);
            margin-left: 4px;
            font-size: 11px;
        }

        .chip-count {
            color: var(--muted);
            margin-left: 4px;
            font-size: 11px;
        }

        #filterTagChips, #filterAuthorChips {
            max-height: 64px;
            overflow: hidden;
            position: relative;
            transition: max-height 0.2s ease;
        }

        #filterTagChips.expanded, #filterAuthorChips.expanded {
            max-height: 600px;
            overflow-y: auto;
        }

        #filterTagChips:not(.expanded).has-overflow::after,
        #filterAuthorChips:not(.expanded).has-overflow::after {
            content: '…';
            position: absolute;
            right: 0;
            bottom: 0;
            padding: 2px 10px 2px 24px;
            font-size: 14px;
            color: var(--muted);
            background: linear-gradient(90deg, rgba(250, 250, 250, 0) 0%, #fafafa 40%, #fafafa 100%);
            pointer-events: none;
        }

        .filter-reset {
            margin-left: auto;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
        }

        .filter-reset:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .gallery-wrapper {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .gallery-status {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .empty-state {
            padding: 80px 16px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .work-card {
            display: block;
            cursor: pointer;
            animation: cardIn 0.3s ease both;
        }

        .work-card:hover .work-thumb {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .work-thumb {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: var(--card-radius);
            background: #f5f5f5;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .work-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb-veil {
            position: absolute;
            inset: auto 0 0;
            height: 40%;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.15));
            pointer-events: none;
        }

        .thumb-badges {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .thumb-badge-group {
            display: flex;
            gap: 4px;
        }

        .thumb-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 20px;
            padding: 0 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .thumb-badge.r18 {
            color: #fff;
            background: rgba(220, 38, 38, 0.85);
        }

        .thumb-badge.r18g {
            color: #fff;
            background: rgba(185, 28, 28, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .thumb-badge.ai {
            color: #fff;
            background: rgba(139, 92, 246, 0.85);
        }

        .thumb-badge.pages {
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        .thumb-heart {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, background 0.15s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .thumb-heart:hover {
            transform: scale(1.1);
        }

        .thumb-heart svg {
            width: 16px;
            height: 16px;
            stroke: #666;
            fill: none;
            stroke-width: 2;
        }

        .thumb-heart.liked svg {
            fill: var(--danger);
            stroke: var(--danger);
        }

        .work-meta {
            padding-top: 8px;
        }

        .work-title {
            font-size: 13px;
            line-height: 1.35;
            font-weight: 600;
            color: var(--text);
            display: -webkit-box;
            overflow: hidden;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .work-author {
            margin-top: 2px;

        @media (min-width: 1400px) {

        .pagination {

            height: 32px;
            padding: 0 10px;

            border: 1px solid var(--line);

            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--brand);
            color: var(--brand);
        }

        .page-btn.active {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        .page-btn:disabled {

            cursor: not-allowed;

        .page-ellipsis {

        .modal-backdrop {

            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .modal-head {
            padding: 20px 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            color: var(--muted);
            font-size: 18px;
        }

        .modal-close:hover {
            background: #f5f5f5;
            color: var(--text);
        }

        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
        }

        .modal-foot {
            padding: 12px 24px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid var(--line);
        }

        .form-field {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--brand);
        }

        .form-input:disabled {
            background: #f7f7f7;
            color: var(--text-secondary);
            cursor: default;
        }

        .form-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .info-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--muted-2);
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            cursor: help;
            flex-shrink: 0;
        }

        .download-root-settings {
            display: none;
            margin-top: 10px;
        }

        .download-root-settings.visible {
            display: block;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 36px;
            padding: 0 16px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--brand);
            color: var(--brand);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        .btn-primary:hover:not(:disabled) {
            background: #0087e0;
            border-color: #0087e0;
            color: #fff;
        }

        .btn-danger {
            color: var(--danger);
            border-color: #fca5a5;
        }

        .btn-danger:hover:not(:disabled) {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .collection-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 320px;
            overflow-y: auto;
        }

        .collection-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .collection-row:hover {
            background: #f5f5f5;
        }

        .collection-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .collection-row-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: #fff0f6;
            color: #e84393;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .collection-row-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .collection-row-icon svg {
            width: 14px;
            height: 14px;
        }

        .collection-row-name {
            flex: 1;
            font-size: 13px;
            color: var(--text);
        }

        .icon-preview {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            flex-shrink: 0;
        }

        .icon-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .icon-preview svg {
            width: 24px;
            height: 24px;
        }

        .icon-upload-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-upload-wrap input[type="file"] {
            display: none;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 2000;
        }

        .toast {
            padding: 10px 16px;
            border-radius: 8px;
            color: #fff;
            background: #333;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            animation: toastIn 0.2s ease;
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.success {
            background: #10b981;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .context-menu {
            position: fixed;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            padding: 4px;
            min-width: 140px;
            z-index: 1500;
            display: none;
        }

        .context-menu.open {
            display: block;
        }

        .context-item {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-item:hover {
            background: #f5f5f5;
            color: var(--text);
        }

        .context-item.danger {
            color: var(--danger);
        }

        .context-item.danger:hover {
            background: #fef2f2;
        }

        .mobile-menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .mobile-menu-btn svg {
            width: 18px;
            height: 18px;
            stroke: #666;
            fill: none;
            stroke-width: 2;
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        .mobile-overlay.active {
            display: block;
        }

        .filter-summary-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #f7fbff;
        }

        .filter-summary-bar.visible {
            display: flex;
        }

        .filter-summary-bar .label {
            font-size: 12px;
            color: var(--brand);
        }

        .filter-summary-bar .name {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            min-width: 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .filter-summary-item.mode-must {
            color: var(--filter-must);
        }

        .filter-summary-item.mode-not {
            color: var(--filter-not);
        }

        .filter-summary-item.mode-or {
            color: var(--filter-or);
        }

        .filter-summary-bar .clear {
            margin-left: auto;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid rgba(0, 150, 250, 0.24);
            background: #fff;
            color: var(--brand);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-summary-bar .clear:hover {
            border-color: var(--brand);
            background: rgba(0, 150, 250, 0.08);
        }

        .author-view {
            display: none;
            flex-direction: column;
            gap: 0;
        }

        .author-view.active {
            display: flex;
        }

        .author-row {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
        }

        .author-row:last-child {
            border-bottom: none;
        }

        .author-row-info {
            width: 25%;
            min-width: 180px;
            max-width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 16px;
        }

        .author-row-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            word-break: break-all;
            transition: color 0.15s;
        }

        .author-row-name:hover {
            color: var(--brand);
        }

        .author-row-count {
            font-size: 12px;
            color: var(--muted);
        }

        .author-row-actions {
            margin-top: 4px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .author-row-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 26px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .author-row-btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .author-row-works {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        .author-works-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            padding: 2px 40px; /* leave space for arrow overlay */
            scrollbar-width: thin;
        }

        .author-works-strip::-webkit-scrollbar {
            height: 6px;
        }

        .author-works-strip::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .author-work-card {
            flex: 0 0 auto;
            width: 140px;
            cursor: pointer;
            scroll-snap-align: start;
        }

        .author-work-thumb {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 8px;
            overflow: hidden;
            background: #f5f5f5;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .author-work-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .author-work-card:hover .author-work-thumb {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        .author-work-title {
            margin-top: 6px;
            font-size: 12px;
            line-height: 1.3;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .author-work-pages {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
        }

        .author-works-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.15s;
        }

        .author-works-arrow:hover:not(:disabled) {
            color: var(--brand);
            border-color: var(--brand);
        }

        .author-works-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .author-works-arrow svg {
            width: 16px;
            height: 16px;
        }

        .author-works-arrow.left {
            left: 0;
        }

        .author-works-arrow.right {
            right: 0;
        }

        .author-works-empty {
            padding: 24px;
            font-size: 13px;
            color: var(--muted);
            text-align: center;
        }

        .author-works-loading {
            padding: 24px;
            font-size: 13px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                z-index: 100;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .gallery-wrapper {
                padding: 16px;
            }

            .topbar {
                padding: 12px 16px;
            }

            .filter-panel {
                padding: 14px 16px;
            }

            .mobile-menu-btn {
                display: flex !important;
            }

            .author-row {
                flex-direction: column;
                gap: 10px;
            }

            .author-row-info {
                width: 100%;
                max-width: none;
                padding-right: 0;
            }
        }
    </style>
</head>

<script>
    const state = {
        view: 'all', // 'all' | 'authors'
        page: 0,
        size: 24,
        sort: 'date',
        order: 'desc',
        search: '',
        r18: 'any',
        ai: 'any',
        formats: new Set(),
        collectionIds: new Set(),
        tagFilters: {
            must: new Set(),
            not: new Set(),
            or: new Set(),
            queue: {
                must: [],
                not: [],
                or: [],
            },
            mode: 'must',
        },
        authorFilters: {
            must: new Set(),
            not: new Set(),
            or: new Set(),
            queue: {
                must: [],
                not: [],
                or: [],
            },
            mode: 'must',
        },
        authorNames: new Map(),
        totalPages: 0,
        totalElements: 0,
        collections: [],
        tags: [],
        tagNames: new Map(),
        tagTranslatedNames: new Map(),
        tagFilterText: '',
        tagsExpanded: false,
        authorOptions: [],
        authorFilterText: '',
        authorsExpanded: false,
        activeArtworkId: null,
        collectionMembership: new Map(),
        editingCollection: null,
        pendingIconFile: null,
        pendingIconClear: false,
        authors: {
            page: 0,
            size: 10,
            totalPages: 0,
            totalElements: 0,
            content: [],
        },
    };

    const AUTHOR_WORKS_PER_ROW = 30;

    const TAG_COLLAPSED_MAX_HEIGHT = 64;
    const AUTHOR_CHIPS_COLLAPSED_MAX_HEIGHT = 64;
    const AUTHOR_FILTER_OPTIONS_SIZE = 200;
    const FILTER_MODE_META = {
        must: {label: '必须有', className: 'mode-must'},
        not: {label: '不能有', className: 'mode-not'},
        or: {label: '或者有', className: 'mode-or'},
    };
    const GALLERY_FILTER_QUERY_KEYS = [
        'filterTagId',
        'filterTag',
        'filterTagTranslated',
        'filterAuthorId',
        'filterAuthorName',
        'openFilter',
    ];

    // ---------- Image cache (in-memory + sessionStorage for thumbs) ----------
    const ImageCache = (() => {
        const PREFIX = 'pxImg:';
        const mem = new Map();
        const isThumb = url => url.includes('/thumbnail/');

        function get(url) {
            if (mem.has(url)) return mem.get(url);
            if (isThumb(url)) {
                try {
                    const v = sessionStorage.getItem(PREFIX + url);
                    if (v) {
                        mem.set(url, v);
                        return v;
                    }
                } catch (_) {
                }
            }
            return null;
        }

        function put(url, dataUri) {
            mem.set(url, dataUri);
            if (!isThumb(url)) return;
            try {
                sessionStorage.setItem(PREFIX + url, dataUri);
            } catch (_) {
                // Quota exceeded — evict half of stored thumbs and retry once
                const keys = [];
                for (let i = 0; i < sessionStorage.length; i++) {
                    const k = sessionStorage.key(i);
                    if (k && k.startsWith(PREFIX)) keys.push(k);
                }
                keys.slice(0, Math.max(1, Math.floor(keys.length / 2)))
                    .forEach(k => {
                        try {
                            sessionStorage.removeItem(k);
                        } catch (_) {
                        }
                    });
                try {
                    sessionStorage.setItem(PREFIX + url, dataUri);
                } catch (_) {
                }
            }
        }

        return {get, put};
    })();

    const HEART_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    let pageI18n = null;
    
    function interpolate(template, vars) {
        if (!vars) {
            return String(template);
        }
        return String(template).replace(/\{([a-zA-Z0-9_.-]+)\}/g, (match, name) => {
            return Object.prototype.hasOwnProperty.call(vars, name) ? String(vars[name]) : match;
        });
    }

    function t(key, fallback, vars) {
        if (pageI18n) {
            return pageI18n.t('gallery:' + key, fallback, vars);
        }
        return interpolate(fallback != null ? fallback : key, vars);
    }

    function uiLang() {
        return pageI18n ? pageI18n.lang : 'zh-CN';
    }

    function listSeparator() {
        return uiLang() === 'en-US' ? ', ' : '、';
    }

    function applyStaticPageTranslations() {
        document.title = t('page.title', 'Pixiv Gallery');
        if (pageI18n) {
            pageI18n.apply(document.body);
        }
        updateOrderToggleLabel();
        syncCollectionFormTitle();
    }

    async function initPageI18n() {
        pageI18n = await PixivI18n.create({namespaces: ['gallery', 'common']});
        await PixivLangSwitcher.mount({
            mountPoint: document.getElementById('langSwitcherAnchor'),
            i18n: pageI18n,
            onChange: function (nextClient) {
                pageI18n = nextClient;
                applyStaticPageTranslations();
                renderCollections();
                renderTagChips();
                renderAuthorChips();
                syncTagFilterBar();
                syncAuthorFilterBar();
                if (state.activeArtworkId != null) {
                    renderAddToCollectionList();
                }
                reloadCurrentView();
            }
        });
        applyStaticPageTranslations();
    }

    // ---------- API helpers ----------
    async function api(url, options = {}) {
        const res = await fetch(url, {
            credentials: 'same-origin',
            ...options,
            headers: {
                'Accept': 'application/json',
                ...(options.headers || {}),
            },
        });
        if (res.status === 401) {
            window.location.href = '/login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
            throw new Error('Unauthorized');
        }
        if (!res.ok) {
            let msg = `HTTP ${res.status}`;
            try {
                const j = await res.json();
                if (j && j.error) msg = j.error;
                else if (j && j.message) msg = j.message;
            } catch (_) {
            }
            throw new Error(msg);
        }
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) return res.json();
        return res.text();
    }

    function toast(msg, type = '') {
        const container = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = 'toast' + (type ? ' ' + type : '');
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 2800);
    }

    function normalizeFilterText(value) {
        if (value == null) return '';
        return String(value).trim().toLowerCase();
    }

    function rememberTagOption(tag) {
        if (!tag || tag.tagId == null) return;
        if (tag.name) state.tagNames.set(tag.tagId, tag.name);
        if (tag.translatedName) state.tagTranslatedNames.set(tag.tagId, tag.translatedName);
    }

    function getFilterBucket(kind) {
        return kind === 'tag' ? state.tagFilters : state.authorFilters;
    }

    function getFilterMode(kind) {
        return getFilterBucket(kind).mode;
    }

    function setFilterMode(kind, mode) {
        const bucket = getFilterBucket(kind);
        if (!FILTER_MODE_META[mode] || bucket.mode === mode) return;
        bucket.mode = mode;
        renderFilterModeButtons(kind);
    }

    function getFilterSelectionMode(kind, id) {
        const bucket = getFilterBucket(kind);
        if (bucket.must.has(id)) return 'must';
        if (bucket.not.has(id)) return 'not';
        if (bucket.or.has(id)) return 'or';
        return null;
    }

    function getFilterSelectionRank(kind, id) {
        const mode = getFilterSelectionMode(kind, id);
        if (mode === 'must') return 0;
        if (mode === 'not') return 1;
        if (mode === 'or') return 2;
        return 3;
    }

    function removeFilterQueueItem(bucket, mode, id) {
        const queue = bucket.queue[mode];
        const index = queue.indexOf(id);
        if (index >= 0) queue.splice(index, 1);
    }

    function clearFilterSelection(kind, id) {
        const bucket = getFilterBucket(kind);
        ['must', 'not', 'or'].forEach(mode => {
            bucket[mode].delete(id);
            removeFilterQueueItem(bucket, mode, id);
        });
    }

    function setFilterSelectionMode(kind, id, mode, metadata = {}) {
        if (!FILTER_MODE_META[mode]) return;
        if (kind === 'tag') {
            rememberTagOption({tagId: id, ...metadata});
        } else if (metadata.name) {
            state.authorNames.set(id, metadata.name);
        }
        const bucket = getFilterBucket(kind);
        clearFilterSelection(kind, id);
        bucket[mode].add(id);
        bucket.queue[mode].push(id);
    }

    function getFilterQueueIndex(kind, id) {
        const mode = getFilterSelectionMode(kind, id);
        if (!mode) return Number.MAX_SAFE_INTEGER;
        const index = getFilterBucket(kind).queue[mode].indexOf(id);
        return index >= 0 ? index : Number.MAX_SAFE_INTEGER;
    }

    function compareFilterSelectionOrder(kind, leftId, rightId) {
        const rankDiff = getFilterSelectionRank(kind, leftId) - getFilterSelectionRank(kind, rightId);
        if (rankDiff !== 0) return rankDiff;
        if (getFilterSelectionMode(kind, leftId) == null) return 0;
        return getFilterQueueIndex(kind, leftId) - getFilterQueueIndex(kind, rightId);
    }

    function getAllFilterIds(kind) {
        const bucket = getFilterBucket(kind);
        return [...new Set([
            ...bucket.queue.must,
            ...bucket.queue.not,
            ...bucket.queue.or,
            ...bucket.must,
            ...bucket.not,
            ...bucket.or,
        ])];
    }

    function getFilterCount(kind) {
        const bucket = getFilterBucket(kind);
        return bucket.must.size + bucket.not.size + bucket.or.size;
    }

    function clearFilterSearch(kind) {
        if (kind === 'tag') {
            clearTimeout(tagSearchTimer);
            state.tagFilterText = '';
            document.getElementById('tagSearchInput').value = '';
            return;
        }
        clearTimeout(authorSearchTimer);
        state.authorFilterText = '';
        document.getElementById('authorSearchInput').value = '';
    }

    function clearFilterSelections(kind) {
        const bucket = getFilterBucket(kind);
        bucket.must.clear();
        bucket.not.clear();
        bucket.or.clear();
        bucket.queue.must.length = 0;
        bucket.queue.not.length = 0;
        bucket.queue.or.length = 0;
    }

    function resetFilterKind(kind) {
        clearFilterSelections(kind);
        clearFilterSearch(kind);
        getFilterBucket(kind).mode = 'must';
        renderFilterModeButtons(kind);
        state.page = 0;
        if (kind === 'author') {
            syncAuthorFilterBar();
            renderAuthorChips();
        } else {
            syncTagFilterBar();
            renderTagChips();
        }
        updateFilterBadge();
        refreshGalleryForCurrentState();
    }

    function renderFilterModeButtons(kind) {
        const containerId = kind === 'tag' ? 'tagModeButtons' : 'authorModeButtons';
        const currentMode = getFilterMode(kind);
        const container = document.getElementById(containerId);
        if (!container) return;
        container.querySelectorAll('[data-filter-mode]').forEach(btn => {
            const mode = btn.dataset.filterMode;
            btn.classList.toggle('active', mode === currentMode);
            btn.setAttribute('aria-pressed', mode === currentMode ? 'true' : 'false');
        });
    }

    function toggleFilterSelection(kind, id, metadata = {}) {
        const bucket = getFilterBucket(kind);
        const targetMode = bucket.mode;
        const currentMode = getFilterSelectionMode(kind, id);
        if (currentMode !== targetMode) {
            setFilterSelectionMode(kind, id, targetMode, metadata);
        } else {
            clearFilterSelection(kind, id);
        }
    }

    function formatAuthorLabel(id) {
        const name = state.authorNames.get(id);
        return name ? `${name} (#${id})` : `#${id}`;
    }

    function formatTagLabel(id) {

    function buildFilterSummarySegment(ids, label, modeClass, formatter) {
        if (!ids.length) return null;
        const names = ids.map(id => escapeHtml(formatter(id)));
        const summary = names.length <= 3
            ? names.join(', ')
            : `${names.slice(0, 2).join(', ')} +${names.length}`;
        return `<span class="filter-summary-item ${modeClass}">${escapeHtml(label)}${summary}</span>`;
    }

    function buildTagFilterSummary(ids, label, modeClass) {
        return buildFilterSummarySegment(ids, label, modeClass, formatTagLabel);
    }

    async function resolveIncomingTagOption(params) {
        const tagId = Number(params.get('filterTagId'));
        const tagName = (params.get('filterTag') || '').trim();
        const translatedName = (params.get('filterTagTranslated') || '').trim();
        const normalizedTagName = normalizeFilterText(tagName);
        const normalizedTranslatedName = normalizeFilterText(translatedName);

        if (Number.isFinite(tagId) && tagId > 0) {
            const loaded = state.tags.find(t => t.tagId === tagId);
            if (loaded) return loaded;
        }

        if (normalizedTagName) {
            const loadedByName = state.tags.find(t => normalizeFilterText(t.name) === normalizedTagName);
            if (loadedByName) return loadedByName;
        }

        if (normalizedTagName || normalizedTranslatedName) {
            try {
                const lookupParams = new URLSearchParams();
                if (tagName) lookupParams.set('name', tagName);
                if (translatedName) lookupParams.set('translatedName', translatedName);
                return await api('/api/gallery/tags/lookup?' + lookupParams.toString());
            } catch (_) {
                // Ignore lookup failures and fall back below.
            }
        }

        if (Number.isFinite(tagId) && tagId > 0) {
            return {
                tagId,
                name: tagName || state.tagNames.get(tagId) || t('tag.default', 'Tag #{id}', {id: tagId}),
                translatedName: translatedName || state.tagTranslatedNames.get(tagId) || null,
                artworkCount: 0,
            };
        }
        return null;
    }

    async function applyNavigationFiltersFromQuery() {
        const params = new URLSearchParams(location.search);
        const hasNavigationFilter = GALLERY_FILTER_QUERY_KEYS.some(key => params.has(key));
        if (!hasNavigationFilter) return;

        let changed = false;

        const tag = await resolveIncomingTagOption(params);
        if (tag && tag.tagId != null) {
            clearFilterSelections('tag');
            setFilterSelectionMode('tag', tag.tagId, 'must', {
                name: tag.name,
                translatedName: tag.translatedName,
            });
            setFilterMode('tag', 'must');
            changed = true;
        }

        const authorId = Number(params.get('filterAuthorId'));
        const authorName = (params.get('filterAuthorName') || '').trim();
        if (Number.isFinite(authorId) && authorId > 0) {
            clearFilterSelections('author');
            setFilterSelectionMode('author', authorId, 'must', {name: authorName});
            setFilterMode('author', 'must');
            changed = true;
        }

        if (params.get('openFilter') === '1' || changed) {
            setFilterPanelOpen(true);
        }

        if (changed) {
            state.page = 0;
            syncTagFilterBar();
            syncAuthorFilterBar();
            renderTagChips();
            renderAuthorChips();
            updateFilterBadge();
        }

        clearNavigationFilterQuery();
    }

    function defaultCollectionDownloadRoot() {
        return '/{collection_name}';
    }

    function syncCollectionDownloadRootControls() {
        const enabled = document.getElementById('collectionDownloadRootEnabled').checked;
        const input = document.getElementById('collectionDownloadRoot');
        if (enabled && !input.value.trim()) {
            input.value = defaultCollectionDownloadRoot();
        }
        document.getElementById('collectionDownloadRootSettings').classList.toggle('visible', enabled);
        renderCollectionDownloadRootPreview();
    }

    function renderCollectionDownloadRootPreview() {
        const preview = document.getElementById('collectionDownloadRootPreview');
        const inputValue = document.getElementById('collectionDownloadRoot').value.trim();
        if (!document.getElementById('collectionDownloadRootEnabled').checked || !inputValue) {
            preview.value = '';
            return;
        }
        const expanded = expandCollectionDownloadRoot(inputValue);
        preview.value = isAbsoluteCollectionDownloadRoot(expanded)
            ? expanded
            : joinPreviewPath('{download.root-folder}', stripLeadingPathSeparators(expanded));
    }

    function expandCollectionDownloadRoot(value) {
        return value.replaceAll('{collection_name}', safeCollectionNamePathSegment());
    }

    function safeCollectionNamePathSegment() {
        const raw = document.getElementById('collectionFormName').value.trim();
        if (!raw) return '{collection_name}';
        const sanitized = Array.from(raw, ch => /[\/\\:*?"<>|\x00-\x1F\x7F]/.test(ch) ? '_' : ch).join('').trim();
        return sanitized && sanitized !== '.' && sanitized !== '..' ? sanitized : '{collection_name}';
    }

    function isAbsoluteCollectionDownloadRoot(value) {
        return /^[A-Za-z]:[\\/]/.test(value) || /^[\\/]{2}[^\\/]+[\\/][^\\/]+/.test(value);
    }

    function stripLeadingPathSeparators(value) {
        return value.replace(/^[\\/]+/, '');
    }

    function joinPreviewPath(root, relativePath) {
        return relativePath ? `${root}/${relativePath}` : root;
    }

    function readCollectionDownloadRoot() {
        const enabled = document.getElementById('collectionDownloadRootEnabled').checked;
        if (!enabled) {
            return null;
        }
        return document.getElementById('collectionDownloadRoot').value.trim();
    }

    function hasControlCharacter(value) {
        return /[\x00-\x1F\x7F]/.test(value);
    }

    function renderTagChips() {
        const box = document.getElementById('filterTagChips');
        const toggleBtn = document.getElementById('tagExpandToggle');
        const kw = state.tagFilterText.trim().toLowerCase();
        let filtered = kw
            ? state.tags.filter(t =>
                (t.name && t.name.toLowerCase().includes(kw)) ||
                (t.translatedName && t.translatedName.toLowerCase().includes(kw)))
            : state.tags.slice();

        // 已选标签置顶，未选按原顺序（后端已按使用量降序）
        filtered.sort((a, b) => compareFilterSelectionOrder('tag', a.tagId, b.tagId));

        const loadedIds = new Set(filtered.map(t => t.tagId));
        const missing = getAllFilterIds('tag').filter(id => !loadedIds.has(id));
        if (missing.length) {
            const stubs = missing.map(id => ({
                tagId: id,
                name: state.tagNames.get(id) || t('tag.default', 'Tag #{id}', {id}),
                translatedName: state.tagTranslatedNames.get(id) || null,
                artworkCount: 0,
            }));
            filtered = stubs.concat(filtered);
            filtered.sort((a, b) => compareFilterSelectionOrder('tag', a.tagId, b.tagId));
        }

        const expanded = state.tagsExpanded || kw.length > 0;

        if (filtered.length === 0) {
            box.innerHTML = state.tags.length
                ? '<span class="chip-empty">' + escapeHtml(t('status.no-matching-tags', 'No matching tags')) + '</span>'
                : '<span class="chip-empty">' + escapeHtml(t('status.no-tags', 'No tags')) + '</span>';
            box.classList.remove('has-overflow');
            box.classList.toggle('expanded', expanded);
            toggleBtn.style.display = 'none';
            return;
        }

        box.innerHTML = filtered.map(t => {
            const mode = getFilterSelectionMode('tag', t.tagId);
            const meta = mode ? FILTER_MODE_META[mode] : null;
            const trans = t.translatedName
                ? `<span class="tag-trans">${escapeHtml(t.translatedName)}</span>`
                : '';
            const count = t.artworkCount > 0
                ? `<span class="chip-count">${t.artworkCount}</span>`
                : '';
            return `<button class="chip ${mode ? `filter-selected ${meta.className}` : ''}" type="button" data-tag-id="${t.tagId}">
                ${escapeHtml(t.name || '')}
                ${trans}
                ${count}
            </button>`;
        }).join('');
        const tagById = new Map(filtered.map(t => [String(t.tagId), t]));
        box.querySelectorAll('.chip[data-tag-id]').forEach(chip => {
            chip.addEventListener('click', () => toggleTagFilter(tagById.get(chip.dataset.tagId)));

    // ---------- Author filter ----------
    async function loadAuthorOptions() {
        try {
            const params = new URLSearchParams();
            params.set('page', 0);
            params.set('size', AUTHOR_FILTER_OPTIONS_SIZE);
            params.set('sort', 'artworks');
            const resp = await api('/api/authors/paged?' + params.toString());
            state.authorOptions = resp.content || [];
            state.authorOptions.forEach(author => {
                if (author && author.authorId != null && author.name) {
                    state.authorNames.set(author.authorId, author.name);
                }
            });
        } catch (e) {
            console.error('load author options failed', e);
            state.authorOptions = [];
        }
        renderAuthorChips();
    }

    function renderAuthorChips() {
        const box = document.getElementById('filterAuthorChips');
        const toggleBtn = document.getElementById('authorExpandToggle');
        if (!state.authorOptions.length) {
            box.innerHTML = '<span class="chip-empty">' + escapeHtml(t('status.no-authors', 'No authors')) + '</span>';
            toggleBtn.style.display = 'none';
            return;
        }
        const kw = state.authorFilterText.trim().toLowerCase();
        let filtered = kw
            ? state.authorOptions.filter(a =>
                (a.name && a.name.toLowerCase().includes(kw)) ||
                String(a.authorId).includes(kw))
            : state.authorOptions.slice();

        // 已选作者置顶
        filtered.sort((a, b) => compareFilterSelectionOrder('author', a.authorId, b.authorId));

        // 若选中的作者不在加载的前 N 个里，补齐到列表首部
        const loadedIds = new Set(filtered.map(a => a.authorId));
        const missing = getAllFilterIds('author').filter(id => !loadedIds.has(id));
        if (missing.length) {
            const stubs = missing.map(id => ({
                authorId: id,
                name: state.authorNames.get(id) || t('author.default', 'Author {id}', {id}),
                artworkCount: 0,
            }));
            filtered = stubs.concat(filtered);
            filtered.sort((a, b) => compareFilterSelectionOrder('author', a.authorId, b.authorId));
        }

        const expanded = state.authorsExpanded || kw.length > 0;

        if (filtered.length === 0) {
            box.innerHTML = '<span class="chip-empty">' + escapeHtml(t('status.no-matching-authors', 'No matching authors')) + '</span>';
            box.classList.remove('has-overflow');
            box.classList.toggle('expanded', expanded);
            toggleBtn.style.display = 'none';
            return;
        }

        box.innerHTML = filtered.map(a => {
            const mode = getFilterSelectionMode('author', a.authorId);
            const meta = mode ? FILTER_MODE_META[mode] : null;
            const count = a.artworkCount > 0
                ? `<span class="chip-count">${a.artworkCount}</span>`
                : '';
            return `<button class="chip ${mode ? `filter-selected ${meta.className}` : ''}" type="button" data-author-id="${a.authorId}" title="#${a.authorId}">
                ${escapeHtml(a.name || t('author.default', 'Author {id}', {id: a.authorId}))}
                ${count}
            </button>`;
        }).join('');
        box.querySelectorAll('.chip[data-author-id]').forEach(chip => {
            chip.addEventListener('click', () => {
                const id = Number(chip.dataset.authorId);
                const opt = state.authorOptions.find(a => a.authorId === id);
                toggleAuthorFilter(id, opt ? opt.name : state.authorNames.get(id));
            });
        });
        box.classList.toggle('expanded', expanded);

        requestAnimationFrame(() => {
            const hasOverflow = box.scrollHeight > AUTHOR_CHIPS_COLLAPSED_MAX_HEIGHT + 2;
            box.classList.toggle('has-overflow', hasOverflow && !expanded);
            if (hasOverflow || expanded) {
                toggleBtn.style.display = '';
                toggleBtn.textContent = state.authorsExpanded
                    ? t('filter.collapse', 'Collapse')
                    : t('filter.expand', 'Expand All');
                toggleBtn.classList.toggle('active', state.authorsExpanded);
            } else {
                toggleBtn.style.display = 'none';
            }
        });
    }

    function toggleAuthorFilter(authorId, authorName) {
        toggleFilterSelection('author', authorId, {name: authorName});
        refreshAuthorFilter();
    }

    function setAuthorFilterExclusive(authorId, authorName) {
        clearFilterSelections('author');
        if (authorId) {
            setFilterSelectionMode('author', authorId, 'must', {name: authorName});
        }
        setFilterMode('author', 'must');
        refreshAuthorFilter({switchToAll: true});
    }

    function clearAuthorFilter() {
        clearFilterSelections('author');
        refreshAuthorFilter();
    }

    function refreshAuthorFilter({switchToAll = false} = {}) {
        state.page = 0;
        syncAuthorFilterBar();
        renderAuthorChips();
        updateFilterBadge();
        if (switchToAll || state.view !== 'all') {
            switchView('all');
