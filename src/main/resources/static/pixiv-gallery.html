<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixiv Gallery</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <script src="/js/invite-modals.js"></script>
    <link rel="stylesheet" href="/css/admin-visibility.css">
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/pixiv-gallery/pixiv-gallery.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-brand" data-i18n="sidebar.brand">Pixiv Gallery</span>
            <button class="sidebar-toggle" onclick="toggleSidebar()" data-i18n-title="sidebar.toggle.title" title="Toggle sidebar">
                <svg viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </div>

        <div class="section-header">
            <span class="section-title" data-i18n="section.view">视图</span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item active" data-view="all" href="#">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.all">全部图片</span>
            </a>
            <a class="nav-item" href="/pixiv-novel-gallery.html">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        <line x1="9" y1="7" x2="15" y2="7"/>
                        <line x1="9" y1="11" x2="15" y2="11"/>
                        <line x1="9" y1="15" x2="13" y2="15"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="novel:gallery.type.novel">小说</span>
            </a>
            <a class="nav-item" data-view="authors" href="#">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.authors">按作者查看图片</span>
            </a>
            <a class="nav-item" data-view="series" href="#">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.series">按系列漫画查看</span>
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="section.collections">收藏夹</span>
            <button class="section-add" id="btnCreateCollection" data-i18n-title="collection.new" title="新建收藏夹">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>

        <div class="sidebar-nav" id="collectionList"></div>

        <div class="sidebar-divider"></div>

        <div class="section-header">
            <span class="section-title" data-i18n="section.navigation">导航</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item current" aria-current="page" data-i18n-title="nav.current" title="当前页面">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.gallery">画廊</span>
            </div>
            <a class="nav-item" href="/pixiv-batch.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.download">下载</span>
            </a>
            <a class="nav-item" href="/monitor.html" target="_blank" rel="noopener">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.monitor">监控</span>
            </a>
            <a class="nav-item admin-only" id="navInviteManage" href="/pixiv-invite-manage.html">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.invite-manage">邀请码管理</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button type="button" class="nav-item admin-only" id="btnInviteGuest" style="width:100%; margin-bottom:8px; background:none; border:none; text-align:left; cursor:pointer;">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <span class="nav-label" data-i18n="nav.invite-guest">邀请访客</span>
            </button>
            <div class="user-card">
                <div class="user-avatar">P</div>
                <div class="user-info">
                    <div class="user-name">Pixiv User</div>
                    <div class="user-status" data-i18n="status.online">在线</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <main class="main-content">
        <div class="topbar">
            <button class="mobile-menu-btn" onclick="openMobileSidebar()">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <label class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder" placeholder="搜索作品标题或画师...">
            </label>
            <button class="filter-btn" id="filterToggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                </svg>
                <span data-i18n="filter.label">筛选</span>
                <span class="filter-badge" id="filterBadge">0</span>
            </button>
            <div class="topbar-actions" id="langSwitcherAnchor"></div>
        </div>

        <div class="filter-panel" id="filterPanel">
            <div class="filter-row">
                <span class="filter-row-label" data-i18n="filter.sort.label">排序</span>
                <button class="chip active" data-sort="date" data-i18n="filter.sort.date">时间</button>
                <button class="chip" data-sort="artworkId" data-i18n="filter.sort.artwork-id">作品 ID</button>
                <button class="chip" data-sort="imgs" data-i18n="filter.sort.image-count">图片数</button>
                <button class="chip" data-sort="status" data-i18n="filter.sort.status">状态</button>
                <button class="chip" data-sort="authorId" data-i18n="filter.sort.author-id">画师 ID</button>
                <button class="chip" data-sort="tags" data-i18n="filter.sort.tags">标签数</button>
                <button class="chip" data-sort="series" data-i18n="filter.sort.series">漫画系列</button>
                <button class="chip" id="orderToggle" data-order="desc" style="margin-left:auto">↓ 降序</button>
            </div>
            <div class="filter-row">
                <span class="filter-row-label" data-i18n="filter.r18.label">R-18</span>
                <button class="chip active" data-r18="any" data-i18n="filter.option.all">全部</button>
                <button class="chip" data-r18="r18plus">R-18+</button>
                <button class="chip" data-r18="r18" data-i18n="filter.r18.only">仅 R-18</button>
                <button class="chip" data-r18="r18g" data-i18n="filter.r18.only-g">仅 R-18G</button>
                <button class="chip" data-r18="no" data-i18n="filter.option.exclude">排除</button>
            </div>
            <div class="filter-row">
                <span class="filter-row-label" data-i18n="filter.ai.label">AI</span>
                <button class="chip active" data-ai="any" data-i18n="filter.option.all">全部</button>
                <button class="chip" data-ai="yes" data-i18n="filter.ai.only">仅 AI</button>
                <button class="chip" data-ai="no" data-i18n="filter.option.exclude">排除</button>
            </div>
            <div class="filter-row">
                <span class="filter-row-label" data-i18n="filter.format.label">格式</span>
                <button class="chip" data-format="jpg">JPG</button>
                <button class="chip" data-format="png">PNG</button>
                <button class="chip" data-format="gif">GIF</button>
                <button class="chip" data-format="webp">WEBP</button>
            </div>
            <div class="filter-row" id="filterCollectionsRow">
                <span class="filter-row-label" data-i18n="filter.collections.label">收藏夹</span>
                <div class="filter-chip-list" id="filterCollectionChips"></div>
            </div>
            <div class="filter-row filter-tags-row" id="filterSeriesRow">
                <span class="filter-row-label" data-i18n="filter.series.label">漫画系列</span>
                <div class="filter-tags-main">
                    <div class="filter-tags-controls">
                        <label class="tag-search-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            <input type="text" id="seriesSearchInput" data-i18n-placeholder="filter.series.search.placeholder" placeholder="搜索漫画系列...">
                        </label>
                        <button class="chip" id="seriesFilterReset" type="button" data-i18n="filter.reset">重置筛选</button>
                        <button class="chip" id="seriesExpandToggle" type="button" data-i18n="filter.expand">展开全部</button>
                    </div>
                    <div class="filter-chip-list" id="filterSeriesChips"></div>
                </div>
            </div>
            <div class="filter-row filter-tags-row" id="filterTagsRow">
                <span class="filter-row-label" data-i18n="filter.tags.label">标签</span>
                <div class="filter-tags-main">
                    <div class="filter-tags-controls">
                        <label class="tag-search-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            <input type="text" id="tagSearchInput" data-i18n-placeholder="filter.tags.search.placeholder" placeholder="搜索标签...">
                        </label>
                        <div class="filter-mode-group" id="tagModeButtons">
                            <button class="filter-mode-btn mode-must active" data-filter-kind="tag" data-filter-mode="must" type="button" data-i18n="filter.mode.must">必须有</button>
                            <button class="filter-mode-btn mode-not" data-filter-kind="tag" data-filter-mode="not" type="button" data-i18n="filter.mode.not">不能有</button>
                            <button class="filter-mode-btn mode-or" data-filter-kind="tag" data-filter-mode="or" type="button" data-i18n="filter.mode.or">或者有</button>
                        </div>
                        <button class="chip" id="tagFilterReset" type="button" data-i18n="filter.reset">重置筛选</button>
                        <button class="chip" id="tagExpandToggle" type="button" data-i18n="filter.expand">展开全部</button>
                    </div>
                    <div class="filter-chip-list" id="filterTagChips"></div>
                </div>
            </div>
            <div class="filter-row filter-tags-row" id="filterAuthorsRow">
                <span class="filter-row-label" data-i18n="filter.authors.label">作者</span>
                <div class="filter-tags-main">
                    <div class="filter-tags-controls">
                        <label class="tag-search-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            <input type="text" id="authorSearchInput" data-i18n-placeholder="filter.authors.search.placeholder" placeholder="搜索作者...">
                        </label>
                        <div class="filter-mode-group" id="authorModeButtons">
                            <button class="filter-mode-btn mode-must active" data-filter-kind="author" data-filter-mode="must" type="button" data-i18n="filter.mode.must">必须有</button>
                            <button class="filter-mode-btn mode-not" data-filter-kind="author" data-filter-mode="not" type="button" data-i18n="filter.mode.not">不能有</button>
                            <button class="filter-mode-btn mode-or" data-filter-kind="author" data-filter-mode="or" type="button" data-i18n="filter.mode.or">或者有</button>
                        </div>
                        <button class="chip" id="authorFilterReset" type="button" data-i18n="filter.reset">重置筛选</button>
                        <button class="chip" id="authorExpandToggle" type="button" data-i18n="filter.expand">展开全部</button>
                    </div>
                    <div class="filter-chip-list" id="filterAuthorChips"></div>
                </div>
            </div>
            <button class="filter-reset" id="filterReset" data-i18n="filter.reset">重置筛选</button>
        </div>

        <div class="gallery-wrapper">
            <div class="filter-summary-bar" id="tagFilterBar">
                <span class="label" data-i18n="summary.tags">标签筛选：</span>
                <span class="name" id="tagFilterName"></span>
                <button class="clear" id="tagFilterClear" data-i18n="filter.clear">清除筛选</button>
            </div>
            <div class="filter-summary-bar" id="authorFilterBar">
                <span class="label" data-i18n="summary.authors">仅显示作者：</span>
                <span class="name" id="authorFilterName"></span>
                <button class="clear" id="authorFilterClear" data-i18n="filter.clear">清除筛选</button>
            </div>
            <div class="filter-summary-bar" id="seriesFilterBar">
                <span class="label" data-i18n="summary.series">仅显示系列：</span>
                <span class="name" id="seriesFilterName"></span>
                <button class="clear" id="seriesFilterClear" data-i18n="filter.clear">清除筛选</button>
            </div>
            <div class="gallery-status" id="galleryStatus" data-i18n="status.loading">加载中...</div>
            <section class="gallery-grid" id="galleryGrid"></section>
            <nav class="pagination" id="pagination"></nav>
            <section class="author-view" id="authorView"></section>
            <nav class="pagination" id="authorPagination"></nav>
        </div>
    </main>
</div>

<div class="modal-backdrop" id="modalCollectionForm">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="collectionFormTitle">新建收藏夹</span>
            <button class="modal-close" onclick="closeCollectionFormModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-field">
                <label class="form-label" data-i18n="form.name">名称</label>
                <input class="form-input" id="collectionFormName" maxlength="40" data-i18n-placeholder="form.name.placeholder" placeholder="例如：喜欢的作品">
            </div>
            <div class="form-field">
                <label class="form-label" data-i18n="form.icon">图标（可选）</label>
                <div class="icon-upload-wrap">
                    <div class="icon-preview" id="collectionFormIconPreview">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </div>
                    <div style="flex:1">
                        <button class="btn" onclick="document.getElementById('collectionFormIconFile').click()" data-i18n="button.choose-image">
                            选择图片
                        </button>
                        <button class="btn" id="collectionFormIconClear" style="display:none; margin-left:8px" data-i18n="button.clear">清除
                        </button>
                        <input type="file" id="collectionFormIconFile" accept="image/png,image/jpeg,image/webp">
                        <div class="form-hint" data-i18n="form.icon.hint">支持 PNG / JPG / WEBP，最大 1MB</div>
                    </div>
                </div>
            </div>
            <div class="form-field">
                <label class="checkbox-row">
                    <input type="checkbox" id="collectionDownloadRootEnabled">
                    <span data-i18n="form.download-root.toggle">为此文件夹修改下载目录</span>
                    <span class="info-icon"
                          data-i18n-title="form.download-root.tooltip"
                          title="只会将在批量下载中设定了收藏到这个收藏夹时会保存到这个目录中，并不会将手动收藏的作品移动到这个目录下">!</span>
                </label>
                <div class="download-root-settings" id="collectionDownloadRootSettings">
                    <input class="form-input" id="collectionDownloadRoot" maxlength="500"
                           data-i18n-placeholder="form.download-root.placeholder" placeholder="/{collection_name}">
                    <div class="form-hint" data-i18n="form.download-root.hint">
                        相对目录会保存到 download.root-folder 下；检测到绝对目录时会直接使用该目录。
                    </div>
                    <div class="form-field" style="margin-top:10px; margin-bottom:0">
                        <label class="form-label" data-i18n="form.download-root.final">最终目录</label>
                        <input class="form-input" id="collectionDownloadRootPreview" disabled>
                        <div class="form-hint" data-i18n="form.download-root.module-hint">
                            模块变量：{collection_name} 会在下载时替换为收藏夹名称，名称中的路径分隔符等不安全字符会替换为 _。
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn" onclick="closeCollectionFormModal()" data-i18n="common:button.cancel">取消</button>
            <button class="btn btn-primary" id="collectionFormSubmit" data-i18n="common:button.save">保存</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modalAddToCollection">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" data-i18n="collection.add">添加到收藏夹</span>
            <button class="modal-close" onclick="closeAddToCollectionModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-field" style="margin-bottom:16px">
                <div style="display:flex; gap:6px">
                    <input class="form-input" id="quickCreateName" data-i18n-placeholder="collection.quick-create" placeholder="快速新建收藏夹" maxlength="40"
                           style="flex:1">
                    <button class="btn" id="quickCreateBtn" data-i18n="common:button.create">新建</button>
                </div>
            </div>
            <div class="collection-list" id="addToCollectionList"></div>
        </div>
        <div class="modal-foot">
            <button class="btn" onclick="closeAddToCollectionModal()" data-i18n="common:button.done">完成</button>
        </div>
    </div>
</div>

<div class="context-menu" id="collectionContextMenu">
    <div class="context-item" data-action="edit" data-i18n="collection.action.edit">编辑</div>
    <div class="context-item danger" data-action="delete" data-i18n="collection.action.delete">删除</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/pixiv-gallery/pixiv-gallery.js"></script>
</body>
</html>
