<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="invite:page.manage.title">邀请码管理</title>
<script src="/js/pixiv-i18n.js"></script>
<script src="/js/pixiv-lang-switcher.js"></script>
<script src="/js/pixiv-theme.js"></script>
<script src="/js/invite-modals.js"></script>
<link rel="stylesheet" href="/vendor/fonts/fonts.css">
<link rel="stylesheet" href="/pixiv-invite-manage/pixiv-invite-manage.css">
</head>
<body>
<header class="topbar">
    <span class="brand" data-i18n="invite:page.manage.title">邀请码管理</span>
    <a class="back-link" href="/pixiv-gallery.html?view=all" data-i18n="invite:header.back">← 返回画廊</a>
    <div class="topbar-actions" id="langSwitcherAnchor"></div>
</header>

<div class="wrap">
    <div class="toolbar">
        <button class="btn-primary" id="btnNewInvite" data-i18n="invite:toolbar.create">+ 新建邀请</button>
        <input type="text" id="searchBox" data-i18n-placeholder="invite:toolbar.search.placeholder" placeholder="搜索名称或邀请码">
        <button class="filter-chip active" data-filter="all" data-i18n="invite:filter.all">全部</button>
        <button class="filter-chip" data-filter="active" data-i18n="invite:filter.active">启用</button>
        <button class="filter-chip" data-filter="paused" data-i18n="invite:filter.paused">暂停</button>
        <button class="filter-chip" data-filter="expired" data-i18n="invite:filter.expired">已过期</button>
        <button class="filter-chip" data-filter="unused" data-i18n="invite:filter.unused">未使用</button>
    </div>
    <div class="bulk-actions">
        <div class="bulk-actions-title" data-i18n="invite:bulk.title">批量操作</div>
        <div class="bulk-actions-controls">
            <button class="btn-danger" id="btnDeleteExpired" type="button" data-i18n="invite:bulk.delete-expired">删除所有已过期的邀请码</button>
        </div>
    </div>
    <div id="tableContainer">
        <div class="empty" data-i18n="invite:loading">加载中…</div>
    </div>
</div>

<script src="/pixiv-invite-manage/pixiv-invite-manage.js"></script>
</body>
</html>
