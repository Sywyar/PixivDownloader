<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixiv 缩略图查看器</title>
  <link rel="stylesheet" href="/TumbriailTest/TumbriailTest.css">
</head>
<body>
<div class="container">
  <h1>Pixiv 缩略图查看器</h1>

  <div class="input-section">
    <div class="input-group">
      <label for="artworkId">作品 ID:</label>
      <input type="number" id="artworkId" placeholder="输入作品ID，例如：12345678">
    </div>
    <div class="input-group">
      <label for="page">页码:</label>
      <input type="number" id="page" placeholder="输入页码，例如：0" value="0">
    </div>
    <button id="fetchBtn">获取缩略图</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>正在请求数据...</p>
  </div>

  <div class="error-message" id="errorMessage"></div>

  <div class="results-section" id="resultsSection" style="display: none;">
    <div class="image-container">
      <h2>缩略图预览</h2>
      <img id="thumbnailImage" class="thumbnail" alt="缩略图">
      <div class="info-grid" id="imageInfo"></div>
    </div>

    <div class="response-container">
      <h2>API 响应数据</h2>
      <pre id="responseData" class="response-data"></pre>
    </div>
  </div>
</div>

<script src="/TumbriailTest/TumbriailTest.js"></script>
</body>
</html>
