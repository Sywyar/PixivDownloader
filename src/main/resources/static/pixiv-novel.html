<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.title">小说详情 - Pixiv Gallery</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <script src="/js/pixiv-novel-render.js"></script>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/css/lang-theme-switcher.css">
    <link rel="stylesheet" href="/pixiv-novel/pixiv-novel.css">
</head>
<body>
<div class="topbar">
    <button class="btn" onclick="history.back()" data-i18n="button.back">返回</button>
    <a class="btn" href="/pixiv-novel-gallery.html?view=all" data-i18n="button.gallery">画廊</a>
    <div class="topbar-actions">
        <span id="langSwitcherAnchor"></span>
        <button class="btn" id="ttsToggle" type="button" style="display:none" data-i18n="tts.listen">🎧 听书</button>
        <button class="heart-btn" id="heartBtn" type="button" style="display:none">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span id="heartLabel" data-i18n="button.favorite">收藏</span>
        </button>
        <a class="btn" id="btn-pixiv" href="#" target="_blank" rel="noopener" data-i18n="button.pixiv-novel">Pixiv 原小说链接</a>
        <button class="btn btn-danger" id="deleteNovelBtn" type="button" style="display:none" data-i18n="button.delete" data-i18n-title="button.delete">删除</button>
    </div>
</div>

<div class="main">
    <div id="loading" class="empty" data-i18n="status.loading">加载中...</div>
    <div id="root" style="display:none;">
        <div class="meta-card">
            <div class="cover-wrap" id="novel-cover" style="display:none;">
                <img id="novel-cover-img" alt="" onerror="document.getElementById('novel-cover').style.display='none'">
            </div>
            <div class="title" id="novel-title">—</div>
            <div class="by-author" id="novel-author">—</div>
            <div class="badges" id="novel-badges"></div>
            <div class="meta-row" id="novel-meta-row"></div>
            <div class="description" id="novel-description"></div>
            <div class="tags" id="novel-tags"></div>
        </div>

        <div class="series-nav" id="series-nav" style="display:none;">
            <a class="btn" id="series-prev" href="#" data-i18n="series.prev">上一章</a>
            <a class="btn" id="series-index" href="#" data-i18n="series.index">目录</a>
            <a class="btn" id="series-next" href="#" data-i18n="series.next">下一章</a>
        </div>

        <div class="content-card" id="content-card"></div>

        <div class="series-nav series-nav-bottom" id="series-nav-bottom" style="display:none;">
            <a class="btn" id="series-prev-bottom" href="#" data-i18n="series.prev">上一章</a>
            <a class="btn" id="series-index-bottom" href="#" data-i18n="series.index">目录</a>
            <a class="btn" id="series-next-bottom" href="#" data-i18n="series.next">下一章</a>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modalAddToCollection">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" data-i18n="panel.add-to-collection">添加到收藏夹</span>
            <button class="modal-close" id="addToCollectionClose" type="button">×</button>
        </div>
        <div class="modal-body">
            <div style="display:flex; gap:6px; margin-bottom:16px">
                <input class="form-input" id="quickCreateName" data-i18n-placeholder="placeholder.quick-create" placeholder="快速新建收藏夹" maxlength="40" style="flex:1">
                <button class="btn" id="quickCreateBtn" data-i18n="common:button.create" type="button">新建</button>
            </div>
            <div class="collection-list" id="addToCollectionList"></div>
        </div>
        <div class="modal-foot">
            <button class="btn" id="addToCollectionDone" data-i18n="common:button.done" type="button">完成</button>
        </div>
    </div>
</div>

<div class="tts-bar" id="ttsBar" style="display:none;">
    <div class="tts-progressbar" id="ttsProgressBar" data-i18n-title="tts.seek" title="点击跳转">
        <div class="tts-progressbar-fill" id="ttsProgressFill"></div>
    </div>
    <div class="tts-bar-main">
        <button class="tts-icon-btn tts-play" id="ttsPlayPause" type="button" data-i18n-title="tts.play" title="播放">▶</button>
        <button class="tts-icon-btn" id="ttsPrev" type="button" data-i18n-title="tts.prev" title="上一段">⏮</button>
        <button class="tts-icon-btn" id="ttsNext" type="button" data-i18n-title="tts.next" title="下一段">⏭</button>
        <button class="tts-icon-btn" id="ttsStop" type="button" data-i18n-title="tts.stop" title="停止">⏹</button>
        <span class="tts-progress" id="ttsProgress">0 / 0</span>
        <button class="tts-icon-btn tts-gear" id="ttsSettingsToggle" type="button" data-i18n-title="tts.settings" title="设置">⚙</button>
        <button class="tts-icon-btn tts-close" id="ttsClose" type="button" data-i18n-title="tts.close" title="关闭">×</button>
    </div>
    <div class="tts-settings" id="ttsSettings" style="display:none;">
        <div class="tts-field">
            <label data-i18n="tts.engine">引擎</label>
            <select id="ttsEngine">
                <option value="browser" data-i18n="tts.engine.browser">浏览器（离线）</option>
                <option value="edge" data-i18n="tts.engine.edge">在线（Edge 神经语音）</option>
            </select>
        </div>
        <div class="tts-field">
            <label data-i18n="tts.voice">语音</label>
            <select id="ttsVoice"></select>
        </div>
        <div class="tts-field tts-field-rate">
            <label data-i18n="tts.rate">语速</label>
            <input type="range" id="ttsRate" min="-50" max="100" step="10" value="0">
            <span class="tts-rate-value" id="ttsRateValue">0%</span>
        </div>
        <div class="tts-hint" id="ttsEngineHint"></div>
    </div>
</div>

<div class="modal-backdrop" id="modalDeleteNovel">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" data-i18n="delete.title">删除小说</span>
            <button class="modal-close" id="deleteNovelClose" type="button">×</button>
        </div>
        <div class="modal-body">
            <p class="delete-modal-text" data-i18n="delete.message">确定要删除这本小说吗？小说正文、封面等文件与下载记录都会被永久删除，且无法恢复。</p>
        </div>
        <div class="modal-foot">
            <button class="btn" id="deleteNovelCancel" type="button" data-i18n="delete.cancel">取消</button>
            <button class="btn btn-danger" id="deleteNovelConfirm" type="button" data-i18n="delete.confirm">删除</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/pixiv-novel/pixiv-novel-tts.js"></script>
<script src="/pixiv-novel/pixiv-novel.js"></script>
</body>
</html>
