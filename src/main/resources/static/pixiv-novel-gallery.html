<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="novel:gallery.type.novel">小说</title>
    <script src="/js/pixiv-i18n.js"></script>
    <script src="/js/pixiv-lang-switcher.js"></script>
    <script src="/js/pixiv-theme.js"></script>
    <style>
        .admin-only { display: none !important; }
        body.admin-mode .admin-only { display: revert !important; }
        body.admin-mode #navInviteManage { display: flex !important; }
        body:not(.admin-mode) #btnCreateCollection,
        body:not(.admin-mode) .thumb-heart { display: none !important; }
    </style>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <style>
        :root {
            --sidebar-width: 300px;
            --sidebar-collapsed: 64px;
            --bg: #ffffff;
            --surface: #ffffff;
            --line: #efefef;
            --text: #111111;
            --muted: #aaaaaa;
            --muted-2: #bbbbbb;
            --text-secondary: #333333;
            --brand: #0096fa;
            --danger: #dc2626;
            --filter-must: #2563eb;
            --filter-must-bg: rgba(37, 99, 235, 0.08);
            --filter-not: #dc2626;
            --filter-not-bg: rgba(220, 38, 38, 0.08);
            --filter-or: #16a34a;
            --filter-or-bg: rgba(22, 163, 74, 0.08);
            --sidebar-shadow: 8px 0 40px rgba(0, 0, 0, 0.08);
            --control-bg: #ffffff;
            --control-muted-bg: #fafafa;
            --hover-bg: #f5f5f5;
            --soft-bg: #f7fbff;
            --pink-soft-bg: #fff0f6;
            --scrollbar-thumb: #dddddd;
        }
        html[data-theme="dark"] {
            --bg: #101216;
            --surface: #171a21;
            --line: #2a303b;
            --text: #f4f7fb;
            --muted: #8d98aa;
            --muted-2: #748094;
            --text-secondary: #d6dde8;
            --brand: #4bb3ff;
            --danger: #f87171;
            --filter-must: #7aa7ff;
            --filter-must-bg: rgba(122, 167, 255, 0.16);
            --filter-not: #fb7185;
            --filter-not-bg: rgba(251, 113, 133, 0.16);
            --filter-or: #4ade80;
            --filter-or-bg: rgba(74, 222, 128, 0.16);
            --sidebar-shadow: 8px 0 40px rgba(0, 0, 0, 0.38);
            --control-bg: #1e2330;
            --control-muted-bg: #151922;
            --hover-bg: #222838;
            --soft-bg: rgba(75, 179, 255, 0.1);
            --pink-soft-bg: #3a2035;
            --scrollbar-thumb: #3b4352;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: var(--text);
            background: var(--bg);
        }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; }

        .app-shell { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            position: sticky;
            top: 0;
            background: var(--surface);
            box-shadow: var(--sidebar-shadow);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.25s ease, min-width 0.25s ease;
            z-index: 10;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); min-width: var(--sidebar-collapsed); }
        .sidebar-header {
            padding: 20px 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar.collapsed .sidebar-header { justify-content: center; padding: 20px 0; }
        .sidebar-logo {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #0096fa 0%, #46b8ff 100%);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar-logo svg { width: 18px; height: 18px; fill: white; }
        .sidebar-brand { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; }
        .sidebar.collapsed .sidebar-brand { display: none; }
        .sidebar-toggle {
            margin-left: auto;
            width: 28px; height: 28px;
            border: none;
            background: #f5f5f5;
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .sidebar-toggle:hover { background: #eeeeee; }
        .sidebar-toggle svg {
            width: 16px; height: 16px;
            stroke: #666; fill: none; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
            transition: transform 0.25s;
        }
        .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }
        .sidebar.collapsed .sidebar-toggle { margin-left: 0; }

        .sidebar-nav { padding: 0 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 0 12px; height: 44px;
            border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap; overflow: hidden;
            color: inherit;
        }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 0; }
        .nav-item:hover { background: #f5f5f5; }
        .nav-item.active { background: #f0f4ff; }
        .nav-item.active .nav-icon { color: #4a6cf7; }
        .nav-item.active .nav-label { color: #4a6cf7; font-weight: 500; }
        .nav-item.current { cursor: default; pointer-events: none; }
        .nav-item.current .nav-icon { color: var(--brand); }
        .nav-item.current .nav-label { color: var(--brand); font-weight: 600; }
        .nav-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: #666;
        }
        .nav-icon svg { width: 16px; height: 16px; }
        .nav-label { font-size: 14px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; }
        .sidebar.collapsed .nav-label { display: none; }

        .sidebar-divider { height: 1px; background: var(--line); margin: 8px 16px; }
        .sidebar.collapsed .sidebar-divider { margin: 8px 10px; }

        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 16px 8px;
        }
        .sidebar.collapsed .section-header { justify-content: center; padding: 16px 0 8px; }
        .section-title {
            font-size: 11px; font-weight: 600;
            color: var(--muted-2);
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .sidebar.collapsed .section-title { display: none; }
        .section-add {
            width: 20px; height: 20px;
            border-radius: 4px;
            border: none; background: transparent;
            color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .section-add:hover { background: #f0f4ff; color: var(--brand); }
        .section-add svg {
            width: 14px; height: 14px;
            stroke: currentColor; stroke-width: 2; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .sidebar.collapsed .section-add { display: none; }

        .collection-item {
            display: flex; align-items: center; gap: 12px;
            padding: 0 12px; height: 44px;
            border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap; overflow: hidden;
        }
        .sidebar.collapsed .collection-item { justify-content: center; padding: 0; }
        .collection-item:hover { background: #f5f5f5; }
        .collection-item.selected { background: rgba(0, 150, 250, 0.08); }
        .collection-item.selected .collection-label { color: var(--brand); font-weight: 500; }
        .collection-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: #fff0f6; color: #e84393;
            overflow: hidden;
        }
        .collection-icon img { width: 100%; height: 100%; object-fit: cover; }
        .collection-icon svg { width: 14px; height: 14px; }
        .collection-label { flex: 1; font-size: 14px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; }
        .sidebar.collapsed .collection-label { display: none; }
        .collection-count { font-size: 12px; color: var(--muted-2); flex-shrink: 0; }
        .sidebar.collapsed .collection-count { display: none; }

        .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--line); }
        .sidebar.collapsed .sidebar-footer { padding: 12px 8px; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; }
        .sidebar.collapsed .user-card { justify-content: center; padding: 8px 0; }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #0096fa, #46b8ff);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 13px; font-weight: 600;
        }
        .user-info { overflow: hidden; }
        .sidebar.collapsed .user-info { display: none; }
        .user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-status { font-size: 11px; color: var(--muted); }

        /* Main content */
        .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .topbar {
            padding: 16px 32px;
            display: flex; align-items: center; gap: 16px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
            position: sticky; top: 0; z-index: 5;
        }
        .topbar-actions { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }

        /* Lang/theme switcher style overrides */
        .pixiv-lang-switcher--default { color: var(--text-secondary) !important; }
        .pixiv-lang-switcher--default .pixiv-lang-switcher__select {
            border-color: var(--line) !important;
            background: var(--control-bg) !important;
            color: var(--text-secondary) !important;
        }
        .pixiv-lang-switcher--default .pixiv-lang-switcher__select option {
            background: var(--surface); color: var(--text);
        }
        .pixiv-theme-toggle {
            width: 32px; height: 32px;
            border: 1px solid var(--line); border-radius: 8px;
            background: var(--control-bg); color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .pixiv-theme-toggle:hover { border-color: var(--brand); color: var(--brand); background: var(--hover-bg); }
        .pixiv-theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .search-box {
            flex: 1; max-width: 480px;
            display: flex; align-items: center; gap: 10px;
            height: 40px; padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fafafa;
            transition: border-color 0.15s, background 0.15s;
        }
        .search-box:focus-within { border-color: var(--brand); background: #fff; }
        .search-box svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
        .search-box input {
            flex: 1; border: none; outline: none; background: transparent;
            font-size: 13px; font-family: inherit; color: var(--text);
        }
        .search-box input::placeholder { color: var(--muted); }

        .filter-btn {
            display: inline-flex; align-items: center; gap: 6px;
            height: 40px; padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 13px; color: var(--text-secondary);
            cursor: pointer; position: relative;
        }
        .filter-btn:hover { border-color: var(--brand); color: var(--brand); }
        .filter-btn.active { border-color: var(--brand); color: var(--brand); background: rgba(0, 150, 250, 0.08); }
        .filter-btn svg { width: 14px; height: 14px; }
        .filter-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 16px; height: 16px;
            border-radius: 8px;
            background: var(--danger); color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 0 4px;
            display: none;
            align-items: center; justify-content: center;
        }
        .filter-badge.visible { display: inline-flex; }

        /* Filter panel */
        .filter-panel {
            border-bottom: 1px solid var(--line);
            background: #fafafa;
            padding: 16px 32px;
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .filter-panel.open { display: flex; }
        .filter-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .filter-row-label {
            font-size: 12px; font-weight: 600;
            color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.05em;
            min-width: 64px;
        }
        .chip {
            display: inline-flex; align-items: center; gap: 4px;
            height: 28px; padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 12px; color: var(--text-secondary);
            cursor: pointer; transition: all 0.15s;
        }
        .chip:hover { border-color: var(--brand); color: var(--brand); }
        .chip.active { border-color: var(--brand); color: var(--brand); background: rgba(0,150,250,0.08); font-weight: 500; }
        .chip.filter-selected.mode-must { border-color: var(--filter-must); color: var(--filter-must); background: var(--filter-must-bg); font-weight: 500; }
        .chip.filter-selected.mode-not { border-color: var(--filter-not); color: var(--filter-not); background: var(--filter-not-bg); font-weight: 500; }
        .chip.filter-selected.mode-or { border-color: var(--filter-or); color: var(--filter-or); background: var(--filter-or-bg); font-weight: 500; }
        .chip-count { color: var(--muted); margin-left: 4px; font-size: 11px; }
        .chip .tag-trans { color: var(--muted); margin-left: 4px; font-size: 11px; }
        .chip .chip-icon {
            width: 16px; height: 16px;
            border-radius: 4px;
            overflow: hidden;
            background: var(--pink-soft-bg);
            color: #e84393;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .chip .chip-icon img { width: 100%; height: 100%; object-fit: cover; }
        .chip .chip-icon svg { width: 10px; height: 10px; }
        html[data-theme="dark"] .chip .chip-icon { background: var(--pink-soft-bg); }

        .filter-chip-list { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
        .filter-chip-list .chip-empty { font-size: 12px; color: var(--muted); }
        .filter-tags-row { align-items: flex-start; }
        #filterTagsRow, #filterSeriesRow { margin-top: 8px; }
        #filterAuthorsRow { margin-top: 12px; padding-top: 20px; border-top: 1px solid var(--line); }
        .filter-tags-main { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
        .filter-tags-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .filter-mode-group { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .filter-mode-btn {
            display: inline-flex; align-items: center; justify-content: center;
            height: 28px; padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff; color: var(--text-secondary);
            font-size: 12px; cursor: pointer;
        }
        .filter-mode-btn.active { font-weight: 600; }
        .filter-mode-btn.mode-must.active { border-color: var(--filter-must); color: var(--filter-must); background: var(--filter-must-bg); }
        .filter-mode-btn.mode-not.active { border-color: var(--filter-not); color: var(--filter-not); background: var(--filter-not-bg); }
        .filter-mode-btn.mode-or.active { border-color: var(--filter-or); color: var(--filter-or); background: var(--filter-or-bg); }
        .tag-search-box {
            display: inline-flex; align-items: center; gap: 6px;
            height: 28px; padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
        }
        .tag-search-box:focus-within { border-color: var(--brand); }
        .tag-search-box svg { width: 12px; height: 12px; color: var(--muted); flex-shrink: 0; }
        .tag-search-box input {
            border: none; outline: none; background: transparent;
            font-size: 12px; font-family: inherit; color: var(--text);
            width: 160px;
        }
        .tag-search-box input::placeholder { color: var(--muted); }
        #filterTagChips, #filterSeriesChips, #filterAuthorChips {
            max-height: 64px; overflow: hidden; transition: max-height 0.2s ease;
        }
        #filterTagChips.expanded, #filterSeriesChips.expanded, #filterAuthorChips.expanded {
            max-height: 600px; overflow-y: auto;
        }
        .filter-reset {
            align-self: flex-start;
            height: 30px; padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text-secondary);
            font-size: 12px; cursor: pointer;
        }
        .filter-reset:hover { border-color: var(--danger); color: var(--danger); }

        /* Filter summary bars */
        .filter-summary-bar {
            display: none;
            align-items: center; gap: 10px;
            padding: 10px 14px;
            margin-bottom: 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #f7fbff;
        }
        .filter-summary-bar.visible { display: flex; }
        .filter-summary-bar .label { font-size: 12px; color: var(--brand); }
        .filter-summary-bar .name { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
        .filter-summary-bar .clear {
            margin-left: auto;
            border: 1px solid var(--line); background: #fff;
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 4px 12px; font-size: 12px;
            cursor: pointer;
        }
        html[data-theme="dark"] .filter-summary-bar { background: var(--soft-bg); }

        /* Gallery */
        .gallery-wrapper { padding: 24px 32px; flex: 1; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            transition: border-color .15s, box-shadow .15s;
            cursor: pointer;
            display: flex; flex-direction: column; gap: 8px;
            min-height: 140px;
            overflow: hidden;
            position: relative;
        }
        .card:hover { border-color: var(--brand); box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
        .thumb-heart {
            position: absolute;
            right: 10px; bottom: 10px;
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .15s, background .15s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 2;
        }
        .thumb-heart:hover { transform: scale(1.1); }
        .thumb-heart svg {
            width: 16px; height: 16px;
            stroke: #666; fill: none; stroke-width: 2;
        }
        .thumb-heart.liked svg { fill: var(--danger); stroke: var(--danger); }
        html[data-theme="dark"] .thumb-heart { background: rgba(20, 24, 33, 0.88); }
        html[data-theme="dark"] .thumb-heart svg { stroke: var(--text-secondary); }
        .work-collections {
            font-size: 11px;
            line-height: 1.3;
            color: #e84393;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        html[data-theme="dark"] .work-collections { color: #ff8fbf; }
        .card-cover {
            margin: -16px -16px 4px;
            aspect-ratio: 3 / 4;
            background: var(--control-muted-bg);
            overflow: hidden;
        }
        .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-title {
            font-size: 15px; font-weight: 600;
            color: var(--text); line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-author { color: var(--text-secondary); font-size: 13px; }
        .card-meta { color: var(--muted); font-size: 12px; display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
        .badges { display: flex; flex-wrap: wrap; gap: 4px; }
        .badge {
            font-size: 11px; padding: 2px 8px;
            border-radius: 999px;
            background: var(--control-muted-bg);
            color: var(--text-secondary);
            border: 1px solid var(--line);
        }
        .badge.r18 { background: var(--pink-soft-bg); color: #d63384; border-color: transparent; }
        .badge.r18g { background: var(--danger); color: #fff; border-color: transparent; }
        .badge.ai { background: #fff7e0; color: #b87b00; border-color: transparent; }
        html[data-theme="dark"] .badge.ai { background: #3a2f00; color: #ffd166; }
        .badge.original { background: #e7f7ee; color: #167b3a; border-color: transparent; }
        html[data-theme="dark"] .badge.original { background: #133b22; color: #4cd47c; }

        .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }

        .pagination {
            margin: 24px 0 8px;
            display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
        }
        .pagination button {
            min-width: 36px; height: 32px;
            padding: 0 10px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--control-bg);
            color: var(--text-secondary);
            cursor: pointer; font-size: 13px;
        }
        .pagination button.active { background: var(--brand); color: #fff; border-color: var(--brand); }
        .pagination button[disabled] { opacity: .4; cursor: not-allowed; }

        /* Authors view */
        .author-view { display: none; flex-direction: column; gap: 0; }
        .author-view.active { display: flex; }
        .author-grid { display: flex; flex-direction: column; gap: 0; }
        .author-row {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
        }
        .author-row:last-child { border-bottom: none; }
        .author-row-info {
            width: 25%;
            min-width: 180px;
            max-width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 16px;
        }
        .author-row-name {
            font-size: 16px; font-weight: 600;
            color: var(--text);
            cursor: pointer;
            word-break: break-all;
            transition: color .15s;
        }
        .author-row-name:hover { color: var(--brand); }
        .author-row-count { font-size: 12px; color: var(--muted); }
        .author-row-actions {
            margin-top: 4px;
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .author-row-btn {
            display: inline-flex; align-items: center; gap: 4px;
            height: 26px; padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--control-bg);
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all .15s;
        }
        .author-row-btn:hover { border-color: var(--brand); color: var(--brand); }
        .author-row-works { flex: 1; min-width: 0; position: relative; }
        .author-works-strip {
            display: flex; gap: 10px;
            overflow-x: auto; overflow-y: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            padding: 2px 40px;
            scrollbar-width: thin;
        }
        .author-works-strip::-webkit-scrollbar { height: 6px; }
        .author-works-strip::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
        .author-work-card {
            flex: 0 0 auto;
            width: 140px;
            cursor: pointer;
            scroll-snap-align: start;
        }
        .author-work-thumb {
            position: relative;
            width: 140px; height: 140px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--control-muted-bg);
            transition: transform .15s, box-shadow .15s;
            display: flex; align-items: center; justify-content: center;
        }
        .author-work-thumb img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        .author-work-thumb-placeholder {
            font-size: 11px; color: var(--muted);
            padding: 8px; text-align: center;
            line-height: 1.3;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 4; -webkit-box-orient: vertical;
            word-break: break-word;
        }
        .author-work-card:hover .author-work-thumb {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, .12);
        }
        .author-work-title {
            margin-top: 6px;
            font-size: 12px; line-height: 1.3;
            color: var(--text);
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .author-work-pages {
            position: absolute;
            top: 6px; right: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            font-size: 10px; font-weight: 700;
        }
        .author-works-arrow {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2;
            color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
            transition: all .15s;
        }
        .author-works-arrow:hover:not(:disabled) {
            color: var(--brand); border-color: var(--brand);
        }
        .author-works-arrow:disabled { opacity: .3; cursor: not-allowed; }
        .author-works-arrow svg { width: 16px; height: 16px; }
        .author-works-arrow.left { left: 0; }
        .author-works-arrow.right { right: 0; }
        .author-works-empty, .author-works-loading {
            padding: 24px; font-size: 13px;
            color: var(--muted); text-align: center;
        }
        html[data-theme="dark"] .author-row-btn,
        html[data-theme="dark"] .author-works-arrow {
            background: var(--control-bg);
            color: var(--text-secondary);
        }
        html[data-theme="dark"] .author-work-thumb {
            background: var(--control-bg);
        }

        /* Series view */
        .series-view { display: none; flex-direction: column; gap: 0; }
        .series-view.active { display: flex; }
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }
        .series-card {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface);
            cursor: pointer;
            transition: transform .15s, box-shadow .15s, border-color .15s;
        }
        .series-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, .08);
            border-color: var(--brand);
        }
        .series-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        .series-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--muted);
        }
        .series-card-author {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }
        .series-card-count {
            font-size: 11px;
            background: var(--control-muted-bg);
            color: var(--text);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        /* Modal & toast */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 12px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
        }
        .modal-head {
            padding: 20px 24px 12px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--line);
        }
        .modal-title { font-size: 16px; font-weight: 700; }
        .modal-close {
            width: 28px; height: 28px;
            border: none; background: transparent;
            cursor: pointer; border-radius: 4px;
            color: var(--muted); font-size: 18px;
        }
        .modal-close:hover { background: var(--hover-bg); color: var(--text); }
        .modal-body { padding: 20px 24px; overflow-y: auto; }
        .modal-foot {
            padding: 12px 24px 20px;
            display: flex; justify-content: flex-end; gap: 8px;
            border-top: 1px solid var(--line);
        }
        .form-field { margin-bottom: 14px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%; height: 40px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--control-bg);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }
        .form-input:focus { border-color: var(--brand); }
        .form-input:disabled {
            background: var(--control-muted-bg);
            color: var(--text-secondary);
            cursor: default;
        }
        .form-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .info-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--muted-2);
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            cursor: help;
            flex-shrink: 0;
        }
        .download-root-settings {
            display: none;
            margin-top: 10px;
        }
        .download-root-settings.visible { display: block; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            height: 36px; padding: 0 16px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--control-bg);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all .15s;
        }
        .btn:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }
        .btn-primary:hover:not(:disabled) { color: #fff; opacity: .9; }
        .collection-list {
            display: flex; flex-direction: column;
            gap: 4px;
            max-height: 320px;
            overflow-y: auto;
        }
        .collection-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .collection-row:hover { background: var(--hover-bg); }
        .collection-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .collection-row-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--pink-soft-bg);
            color: #e84393;
            display: flex; align-items: center; justify-content: center;
        }
        .collection-row-icon img { width: 100%; height: 100%; object-fit: cover; }
        .collection-row-icon svg { width: 14px; height: 14px; }
        .collection-row-name { flex: 1; font-size: 13px; color: var(--text); }
        .collection-row .collection-count { font-size: 12px; color: var(--muted-2); flex-shrink: 0; }
        .icon-preview {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--control-muted-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            flex-shrink: 0;
        }
        .icon-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .icon-preview svg {
            width: 24px;
            height: 24px;
        }
        .icon-upload-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon-upload-wrap input[type="file"] { display: none; }
        .toast-container {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 8px;
            z-index: 2000;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 8px;
            color: #fff;
            background: #333;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            animation: toastIn .2s ease;
        }
        .toast.error { background: var(--danger); }
        .toast.success { background: #10b981; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        .mobile-menu-btn {
            display: none;
            width: 36px; height: 36px;
            border: none; background: #f5f5f5; border-radius: 8px;
            cursor: pointer; align-items: center; justify-content: center;
        }
        .mobile-menu-btn svg { width: 18px; height: 18px; stroke: #666; fill: none; stroke-width: 2; }
        .mobile-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }
        .mobile-overlay.active { display: block; }

        /* Dark mode */
        html[data-theme="dark"] .sidebar-toggle,
        html[data-theme="dark"] .mobile-menu-btn,
        html[data-theme="dark"] .filter-btn,
        html[data-theme="dark"] .chip,
        html[data-theme="dark"] .filter-mode-btn,
        html[data-theme="dark"] .tag-search-box,
        html[data-theme="dark"] .filter-reset,
        html[data-theme="dark"] .filter-summary-bar .clear {
            background: var(--control-bg); color: var(--text-secondary);
        }
        html[data-theme="dark"] .search-box,
        html[data-theme="dark"] .filter-panel {
            background: var(--control-muted-bg);
        }
        html[data-theme="dark"] .search-box:focus-within { background: var(--surface); }
        html[data-theme="dark"] .nav-item:hover,
        html[data-theme="dark"] .collection-item:hover,
        html[data-theme="dark"] .section-add:hover {
            background: var(--hover-bg);
        }
        html[data-theme="dark"] .nav-item.active,
        html[data-theme="dark"] .collection-item.selected {
            background: rgba(75, 179, 255, 0.12);
        }
        html[data-theme="dark"] .filter-btn.active,
        html[data-theme="dark"] .chip.active {
            border-color: var(--brand); color: var(--brand);
            background: rgba(75, 179, 255, 0.14);
        }
        html[data-theme="dark"] .collection-icon { background: var(--pink-soft-bg); }
        html[data-theme="dark"] .sidebar-toggle svg,
        html[data-theme="dark"] .mobile-menu-btn svg { stroke: var(--text-secondary); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); z-index: 100; }
            .sidebar.mobile-open { transform: translateX(0); }
            .gallery-wrapper { padding: 16px; }
            .topbar { padding: 12px 16px; }
            .filter-panel { padding: 14px 16px; }
            .mobile-menu-btn { display: flex !important; }
        }
    </style>
</head>

            </button>
        </div>
        <div class="sidebar-nav" id="collectionList"></div>

        <div class="sidebar-divider"></div>

        <div class="section-header">

        <nav class="sidebar-nav">

<script>
const PAGE_SIZE = 24;
const HEART_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';

let pageI18n;
const state = {
    view: 'all',                // 'all' | 'authors' | 'series'
    page: 0,
    sort: 'date',
    order: 'desc',
    r18: 'any',
    ai: 'any',
    search: '',
    collections: [],
    selectedCollections: new Set(),
    tags: [],
    selectedTags: new Map(),    // tagId -> 'must'|'not'|'or'
    tagMode: 'must',
    tagSearch: '',
    series: [],
    selectedSeries: new Map(),  // seriesId -> 'must'|'not'
    seriesMode: 'must',
    seriesSearch: '',
    authors: [],
    selectedAuthors: new Map(), // authorId -> 'must'|'not'|'or'
    authorMode: 'must',
    authorSearch: '',
    exclusiveAuthorId: null,
    exclusiveAuthorName: '',
    authorsView: { page: 0, totalPages: 0, content: [] },
    seriesView: { page: 0, totalPages: 0, content: [] },
    editingCollection: null,
    pendingIconFile: null,
    pendingIconClear: false
};

async function init() {
    pageI18n = await PixivI18n.create({ namespaces: ['gallery', 'novel', 'common'] });
    pageI18n.apply();
    updateOrderToggleLabel();
    await PixivLangSwitcher.mount({
        mountPoint: document.getElementById('langSwitcherAnchor'),
        i18n: pageI18n,
        showLabel: false,
        onChange: (next) => {
            pageI18n = next;
            pageI18n.apply();
            updateOrderToggleLabel();
            syncCollectionFormTitle();
            reloadCurrentView();
        }
    });
    PixivTheme.mount({ mountPoint: document.getElementById('langSwitcherAnchor') });
    setupEventHandlers();
    setupAdminMode();
    await loadCollections();
    await loadTags();
    await loadSeries();
    await loadAuthors();
    applyInitialUrlState();
    reloadCurrentView();
}

function applyInitialUrlState() {
    const params = new URLSearchParams(location.search);
    const ids = [];
    const addId = value => {
        const id = Number(value);
        if (Number.isInteger(id) && id > 0 && !ids.includes(id)) ids.push(id);
    };
    addId(params.get('seriesId'));
    (params.get('seriesIds') || '').split(',').forEach(addId);
    if (!ids.length) return;

    state.selectedSeries.clear();
    ids.forEach(id => state.selectedSeries.set(id, 'must'));
    if (ids.length === 1 && !state.series.some(s => Number(s.seriesId) === ids[0])) {
        const title = params.get('seriesTitle') || `#${ids[0]}`;
        state.series = [{ seriesId: ids[0], title, authorId: null, authorName: '', novelCount: 0 }, ...state.series];
    }
    state.view = 'all';
    state.page = 0;
    renderSeriesChips();
    updateFilterBadge();
}

function updateOrderToggleLabel() {
    const btn = document.getElementById('orderToggle');
    if (!btn) return;
    const key = btn.dataset.order === 'asc' ? 'filter.order.asc' : 'filter.order.desc';
    btn.textContent = pageI18n ? pageI18n.t(key, btn.textContent) : btn.textContent;
}

function setupEventHandlers() {
    // Search
    document.getElementById('searchInput').addEventListener('input', debounce(() => {
        state.search = document.getElementById('searchInput').value.trim();
        state.page = 0;
        reloadCurrentView();
    }, 250));
    // Filter toggle
    document.getElementById('filterToggle').addEventListener('click', () => {
        document.getElementById('filterPanel').classList.toggle('open');
        document.getElementById('filterToggle').classList.toggle('active');
    });
    // Sort chips
    document.querySelectorAll('.chip[data-sort]').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.chip[data-sort]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.sort = chip.dataset.sort;
            state.page = 0;
            reloadCurrentView();
        });
    });
    // Order toggle
    document.getElementById('orderToggle').addEventListener('click', () => {
        const btn = document.getElementById('orderToggle');
        const next = btn.dataset.order === 'desc' ? 'asc' : 'desc';
        btn.dataset.order = next;
        updateOrderToggleLabel();
        state.order = next;
        state.page = 0;
        reloadCurrentView();
    });
    // R18 chips
    document.querySelectorAll('.chip[data-r18]').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.chip[data-r18]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.r18 = chip.dataset.r18;
            state.page = 0;
            updateFilterBadge();
            reloadCurrentView();
        });
    });
    // AI chips
    document.querySelectorAll('.chip[data-ai]').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.chip[data-ai]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.ai = chip.dataset.ai;
            state.page = 0;
            updateFilterBadge();
            reloadCurrentView();
        });
    });
    // Mode group buttons (tag/author/series — series only must/not)
    bindModeGroup('tagModeButtons', mode => { state.tagMode = mode; });
    bindModeGroup('authorModeButtons', mode => { state.authorMode = mode; });
    // Search inputs
    document.getElementById('tagSearchInput').addEventListener('input', debounce(() => {
        state.tagSearch = document.getElementById('tagSearchInput').value.trim();
        loadTags();
    }, 250));
    document.getElementById('seriesSearchInput').addEventListener('input', debounce(() => {
        state.seriesSearch = document.getElementById('seriesSearchInput').value.trim();
        loadSeries();
    }, 250));
    document.getElementById('authorSearchInput').addEventListener('input', debounce(() => {
        state.authorSearch = document.getElementById('authorSearchInput').value.trim();
        loadAuthors();
    }, 250));
    // Reset / expand
    document.getElementById('tagFilterReset').addEventListener('click', () => { state.selectedTags.clear(); renderTagChips(); state.page = 0; updateFilterBadge(); reloadCurrentView(); });
    document.getElementById('seriesFilterReset').addEventListener('click', () => { state.selectedSeries.clear(); renderSeriesChips(); state.page = 0; updateFilterBadge(); reloadCurrentView(); });
    document.getElementById('authorFilterReset').addEventListener('click', () => { state.selectedAuthors.clear(); state.exclusiveAuthorId = null; renderAuthorChips(); updateAuthorFilterBar(); state.page = 0; updateFilterBadge(); reloadCurrentView(); });
    document.getElementById('tagExpandToggle').addEventListener('click', () => toggleExpand('filterTagChips', 'tagExpandToggle'));
    document.getElementById('seriesExpandToggle').addEventListener('click', () => toggleExpand('filterSeriesChips', 'seriesExpandToggle'));
    document.getElementById('authorExpandToggle').addEventListener('click', () => toggleExpand('filterAuthorChips', 'authorExpandToggle'));
    document.getElementById('filterReset').addEventListener('click', resetAllFilters);
    document.getElementById('authorFilterClear').addEventListener('click', () => {
        state.exclusiveAuthorId = null; state.selectedAuthors.clear(); renderAuthorChips(); updateAuthorFilterBar(); state.page = 0; updateFilterBadge(); reloadCurrentView();
    });

    // View nav
    document.getElementById('navViewAll').addEventListener('click', e => { e.preventDefault(); switchView('all'); });
    document.getElementById('navViewAuthors').addEventListener('click', e => { e.preventDefault(); switchView('authors'); });
    document.getElementById('navViewSeries').addEventListener('click', e => { e.preventDefault(); switchView('series'); });

    document.getElementById('btnCreateCollection').addEventListener('click', () => openCollectionFormModal(null));
    document.getElementById('collectionFormClose').addEventListener('click', closeCollectionFormModal);
    document.getElementById('collectionFormCancel').addEventListener('click', closeCollectionFormModal);
    document.getElementById('collectionFormIconChoose').addEventListener('click', () => {
        document.getElementById('collectionFormIconFile').click();
    });
    document.getElementById('collectionFormIconFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 1024 * 1024) {
            toast(pageI18n.t('gallery:toast.icon-too-large', '图标大小不能超过 1MB'), 'error');
            e.target.value = '';
            return;
        }
        state.pendingIconFile = file;
        state.pendingIconClear = false;
        updateFormIconPreview(state.editingCollection);
    });
    document.getElementById('collectionFormIconClear').addEventListener('click', () => {
        state.pendingIconFile = null;
        state.pendingIconClear = true;
        document.getElementById('collectionFormIconFile').value = '';
        updateFormIconPreview(state.editingCollection);
    });
    document.getElementById('collectionFormName').addEventListener('input', renderCollectionDownloadRootPreview);
    document.getElementById('collectionDownloadRoot').addEventListener('input', renderCollectionDownloadRootPreview);
    document.getElementById('collectionDownloadRootEnabled').addEventListener('change', syncCollectionDownloadRootControls);
    document.getElementById('collectionFormSubmit').addEventListener('click', submitCollectionForm);
    document.getElementById('modalCollectionForm').addEventListener('click', e => {
        if (e.target.id === 'modalCollectionForm') closeCollectionFormModal();
    });
}

function bindModeGroup(groupId, onChange) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.filter-mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            group.querySelectorAll('.filter-mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            onChange(btn.dataset.filterMode);
        });
    });
}

function toggleExpand(chipsId, btnId) {
    const el = document.getElementById(chipsId);
    el.classList.toggle('expanded');
    document.getElementById(btnId).textContent = el.classList.contains('expanded')
        ? pageI18n.t('filter.collapse', '收起')
        : pageI18n.t('filter.expand', '展开全部');
}

function resetAllFilters() {
    state.r18 = 'any'; state.ai = 'any';
    document.querySelectorAll('.chip[data-r18]').forEach(c => c.classList.toggle('active', c.dataset.r18 === 'any'));
    document.querySelectorAll('.chip[data-ai]').forEach(c => c.classList.toggle('active', c.dataset.ai === 'any'));
    state.selectedCollections.clear();
    state.selectedTags.clear(); state.selectedSeries.clear(); state.selectedAuthors.clear();
    state.exclusiveAuthorId = null;
    renderCollections(); renderTagChips(); renderSeriesChips(); renderAuthorChips();
    renderCollectionFilterChips(); updateAuthorFilterBar();
    state.page = 0;
    updateFilterBadge();
    reloadCurrentView();
}

function updateFilterBadge() {
    let n = 0;
    if (state.r18 !== 'any') n++;
    if (state.ai !== 'any') n++;
    if (state.selectedCollections.size) n += state.selectedCollections.size;
    if (state.selectedTags.size) n += state.selectedTags.size;
    if (state.selectedSeries.size) n += state.selectedSeries.size;
    if (state.selectedAuthors.size) n += state.selectedAuthors.size;
    if (state.exclusiveAuthorId != null) n++;
    const badge = document.getElementById('filterBadge');
    badge.textContent = String(n);
    badge.classList.toggle('visible', n > 0);
}

let lastTimer;
function debounce(fn, ms) {
    return (...args) => { clearTimeout(lastTimer); lastTimer = setTimeout(() => fn(...args), ms); };
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function openMobileSidebar() {
    document.getElementById('sidebar').classList.add('mobile-open');
    document.getElementById('mobileOverlay').classList.add('active');
}
function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('mobileOverlay').classList.remove('active');
}

async function setupAdminMode() {
    try {
        const ok = await fetch('/api/admin/invites/access-check', { credentials: 'same-origin' });
        if (ok.ok) document.body.classList.add('admin-mode');
    } catch (_) { /* not admin */ }
}

// ---------- Collection CRUD ----------
async function collectionApi(url, options = {}) {
    const r = await fetch(url, {
        credentials: 'same-origin',
        ...options,
        headers: {
            'Accept': 'application/json',
            ...(options.headers || {})
        }
    });
    if (r.status === 401) {
        window.location.href = '/login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
        throw new Error('Unauthorized');
    }
    if (!r.ok) {
        let msg = 'HTTP ' + r.status;
        try {
            const data = await r.json();
            if (data && data.error) msg = data.error;
            else if (data && data.message) msg = data.message;
        } catch (_) { /* keep HTTP status */ }
        throw new Error(msg);
    }
    const ct = r.headers.get('content-type') || '';
    return ct.includes('application/json') ? r.json() : r.text();
}

function openCollectionFormModal(collection) {
    state.editingCollection = collection;
    state.pendingIconFile = null;
    state.pendingIconClear = false;
    syncCollectionFormTitle();
    document.getElementById('collectionFormName').value = collection ? collection.name : '';
    document.getElementById('collectionDownloadRootEnabled').checked = !!(collection && collection.downloadRoot);
    const existingDownloadRoot = collection && collection.downloadRoot ? collection.downloadRoot : '';
    document.getElementById('collectionDownloadRoot').value = existingDownloadRoot || defaultCollectionDownloadRoot();
    syncCollectionDownloadRootControls();
    updateFormIconPreview(collection);
    document.getElementById('modalCollectionForm').classList.add('open');
    setTimeout(() => document.getElementById('collectionFormName').focus(), 50);
}

function closeCollectionFormModal() {
    document.getElementById('modalCollectionForm').classList.remove('open');
    state.editingCollection = null;
    state.pendingIconFile = null;
    state.pendingIconClear = false;
    document.getElementById('collectionFormIconFile').value = '';
    document.getElementById('collectionDownloadRootEnabled').checked = false;
    document.getElementById('collectionDownloadRoot').value = '';
    document.getElementById('collectionDownloadRootPreview').value = '';
    syncCollectionDownloadRootControls();
}

function syncCollectionFormTitle() {
    const title = document.getElementById('collectionFormTitle');
    if (!title || !pageI18n) return;
    title.textContent = state.editingCollection
        ? pageI18n.t('gallery:collection.form.edit', '编辑收藏夹')
        : pageI18n.t('gallery:collection.form.create', '新建收藏夹');
}

function defaultCollectionDownloadRoot() {
    return '/{collection_name}';
}

function syncCollectionDownloadRootControls() {
    const enabled = document.getElementById('collectionDownloadRootEnabled').checked;
    const input = document.getElementById('collectionDownloadRoot');
    if (enabled && !input.value.trim()) {
        input.value = defaultCollectionDownloadRoot();
    }
    document.getElementById('collectionDownloadRootSettings').classList.toggle('visible', enabled);
    renderCollectionDownloadRootPreview();
}

function renderCollectionDownloadRootPreview() {
    const preview = document.getElementById('collectionDownloadRootPreview');
    const inputValue = document.getElementById('collectionDownloadRoot').value.trim();
    if (!document.getElementById('collectionDownloadRootEnabled').checked || !inputValue) {
        preview.value = '';
        return;
    }
    const expanded = expandCollectionDownloadRoot(inputValue);
    preview.value = isAbsoluteCollectionDownloadRoot(expanded)
        ? expanded
        : joinPreviewPath('{download.root-folder}', stripLeadingPathSeparators(expanded));
}

function expandCollectionDownloadRoot(value) {
    return value.replaceAll('{collection_name}', safeCollectionNamePathSegment());
}

function safeCollectionNamePathSegment() {
    const raw = document.getElementById('collectionFormName').value.trim();
    if (!raw) return '{collection_name}';
    const sanitized = Array.from(raw, ch => /[\/\\:*?"<>|\x00-\x1F\x7F]/.test(ch) ? '_' : ch).join('').trim();
    return sanitized && sanitized !== '.' && sanitized !== '..' ? sanitized : '{collection_name}';
}

function isAbsoluteCollectionDownloadRoot(value) {
    return /^[A-Za-z]:[\\/]/.test(value) || /^[\\/]{2}[^\\/]+[\\/][^\\/]+/.test(value);
}

function stripLeadingPathSeparators(value) {
    return value.replace(/^[\\/]+/, '');
}

function joinPreviewPath(root, relativePath) {
    return relativePath ? `${root}/${relativePath}` : root;
}

function readCollectionDownloadRoot() {
    if (!document.getElementById('collectionDownloadRootEnabled').checked) return null;
    return document.getElementById('collectionDownloadRoot').value.trim();
}

function hasControlCharacter(value) {
    return /[\x00-\x1F\x7F]/.test(value);
}

function updateFormIconPreview(collection) {
    const preview = document.getElementById('collectionFormIconPreview');
    const clearBtn = document.getElementById('collectionFormIconClear');
    if (state.pendingIconFile) {
        const url = URL.createObjectURL(state.pendingIconFile);
        preview.innerHTML = `<img src="${url}" alt="">`;
        clearBtn.style.display = '';
    } else if (collection && collection.iconExt && !state.pendingIconClear) {
        preview.innerHTML = `<img src="/api/collections/${collection.id}/icon?v=${Date.now()}" alt="">`;
        clearBtn.style.display = '';
    } else {
        preview.innerHTML = HEART_SVG;
        clearBtn.style.display = 'none';
    }
}

async function submitCollectionForm() {
    const name = document.getElementById('collectionFormName').value.trim();
    if (!name) {
        toast(pageI18n.t('gallery:toast.name-required', '请输入名称'), 'error');
        return;
    }
    const downloadRoot = readCollectionDownloadRoot();
    if (document.getElementById('collectionDownloadRootEnabled').checked && !downloadRoot) {
        toast(pageI18n.t('gallery:toast.download-root-required', '请填写下载目录'), 'error');
        return;
    }
    if (downloadRoot && hasControlCharacter(downloadRoot)) {
        toast(pageI18n.t('gallery:toast.download-root-invalid', '下载目录不能包含控制字符'), 'error');
        return;
    }

    const btn = document.getElementById('collectionFormSubmit');
    btn.disabled = true;
    try {
        let collection;
        if (state.editingCollection) {
            await collectionApi(`/api/collections/${state.editingCollection.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            await collectionApi(`/api/collections/${state.editingCollection.id}/download-root`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ downloadRoot })
            });
            collection = { ...state.editingCollection, name, downloadRoot };
        } else {
            collection = await collectionApi('/api/collections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, downloadRoot })
            });
        }

        if (state.pendingIconFile) {
            const form = new FormData();
            form.append('file', state.pendingIconFile);
            await collectionApi(`/api/collections/${collection.id}/icon`, { method: 'POST', body: form });
        } else if (state.pendingIconClear && state.editingCollection) {
            await collectionApi(`/api/collections/${collection.id}/icon`, { method: 'DELETE' });
        }

        toast(
            state.editingCollection
                ? pageI18n.t('gallery:toast.saved', '已保存')
                : pageI18n.t('gallery:toast.created', '创建成功'),
            'success'
        );
        closeCollectionFormModal();
        await loadCollections();
    } catch (e) {
        toast(e.message || pageI18n.t('gallery:toast.save-failed', '保存失败'), 'error');
    } finally {
        btn.disabled = false;
    }
}

// ---------- Novels list ----------
async function reloadNovels() {
    const params = new URLSearchParams({
        page: String(state.page), size: String(PAGE_SIZE),
        sort: state.sort, order: state.order, r18: state.r18, ai: state.ai
    });
    if (state.search) params.set('search', state.search);
    if (state.selectedCollections.size) params.set('collectionIds', Array.from(state.selectedCollections).join(','));

    const must = [], not = [], or = [];
    state.selectedTags.forEach((mode, id) => (mode === 'must' ? must : mode === 'not' ? not : or).push(id));
    if (must.length) params.set('tagIds', must.join(','));
    if (not.length) params.set('notTagIds', not.join(','));
    if (or.length) params.set('orTagIds', or.join(','));

    const sMust = [], sNot = [];
    state.selectedSeries.forEach((mode, id) => (mode === 'must' ? sMust : sNot).push(id));
    if (sMust.length) params.set('seriesIds', sMust.join(','));
    if (sNot.length) params.set('notSeriesIds', sNot.join(','));

    const aMust = [], aNot = [], aOr = [];
    state.selectedAuthors.forEach((mode, id) => (mode === 'must' ? aMust : mode === 'not' ? aNot : aOr).push(id));
    if (state.exclusiveAuthorId != null) aMust.push(state.exclusiveAuthorId);
    if (aMust.length) params.set('authorIds', aMust.join(','));
    if (aNot.length) params.set('notAuthorIds', aNot.join(','));
    if (aOr.length) params.set('orAuthorIds', aOr.join(','));

    try {
        const r = await fetch(`/api/gallery/novels?${params.toString()}`);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        renderGrid(data.content || []);
        renderPagination('pagination', data.totalPages || 0, data.page || 0, p => { state.page = p; reloadNovels(); });
    } catch (e) {
        document.getElementById('grid').innerHTML = `<div class="empty">${esc(pageI18n.t('novel:status.load-failed', '加载失败'))}</div>`;
        document.getElementById('pagination').innerHTML = '';
    }
}

function formatReadingDuration(seconds) {
    const total = Math.floor(Number(seconds || 0));
    if (!Number.isFinite(total) || total <= 0) return '';
    const hour = Math.floor(total / 3600);
    const minute = Math.floor((total % 3600) / 60);
    const second = total % 60;
    const parts = [];
    if (hour > 0) parts.push(pageI18n.t('novel:duration.hour', '{count} 小时', { count: hour }));
    if (minute > 0) parts.push(pageI18n.t('novel:duration.minute', '{count} 分钟', { count: minute }));
    if (second > 0 && hour === 0) parts.push(pageI18n.t('novel:duration.second', '{count} 秒', { count: second }));
    if (!parts.length) parts.push(pageI18n.t('novel:duration.second', '{count} 秒', { count: total }));
    return parts.join(' ');
}

function formatReadingTime(seconds) {
    const text = formatReadingDuration(seconds);
    return text ? pageI18n.t('novel:meta.reading-time', '预计阅读：{time}', { time: text }) : '';
}

function renderGrid(items) {
    const grid = document.getElementById('grid');
    if (!items.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">${esc(pageI18n.t('novel:status.empty', '暂无小说'))}</div>`;
        return;
    }
    const heartTitle = esc(pageI18n.t('collection.add', '添加到收藏夹'));
    grid.innerHTML = items.map(item => {
        const badges = [];
        if (item.xRestrict === 1) badges.push('<span class="badge r18">R-18</span>');
        if (item.xRestrict === 2) badges.push('<span class="badge r18g">R-18G</span>');
        if (item.isAi) badges.push('<span class="badge ai">AI</span>');
        if (item.isOriginal) badges.push(`<span class="badge original">${esc(pageI18n.t('novel:meta.original', '原创'))}</span>`);
        const meta = [];
        if (item.wordCount && item.wordCount > 0) meta.push(esc(pageI18n.t('novel:meta.word-count', '{count} 字', { count: item.wordCount })));
        else if (item.textLength && item.textLength > 0) meta.push(esc(pageI18n.t('novel:meta.text-length', '{count} 字符', { count: item.textLength })));
        const readingText = formatReadingTime(item.readingTimeSeconds);
        if (readingText) meta.push(esc(readingText));
        if (item.seriesId && item.seriesId > 0 && item.seriesOrder != null) meta.push('#' + item.seriesOrder);
        const cover = item.coverExt
            ? `<div class="card-cover"><img loading="lazy" src="/api/gallery/novel/${item.novelId}/cover" alt="" onerror="this.parentElement.style.display='none'"></div>`
            : '';
        return `<div class="card" data-novel-id="${item.novelId}">
            ${cover}
            <div class="card-title">${esc(item.title || '')}</div>
            <div class="card-author">${esc(item.authorName || pageI18n.t('novel:status.unknown-author', '未知作者'))}</div>
            <div class="badges">${badges.join('')}</div>
            <div class="card-meta">${meta.map(m => `<span>${m}</span>`).join('')}</div>
            <div class="work-collections" data-collections-for="${item.novelId}"></div>
            <button class="thumb-heart" data-novel-id="${item.novelId}" title="${heartTitle}" type="button">${HEART_SVG}</button>
        </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
        const id = card.dataset.novelId;
        card.addEventListener('click', e => {
            if (e.target.closest('.thumb-heart')) return;
            window.location.href = `/pixiv-novel.html?id=${id}`;
        });
        const heart = card.querySelector('.thumb-heart');
        if (heart) {
            heart.addEventListener('click', e => {
                e.stopPropagation();
                e.preventDefault();
                openAddToCollectionModal(Number(id));
            });
        }
    });

    loadMembershipsForNovels(items.map(i => Number(i.novelId)));
}

async function loadMembershipsForNovels(novelIds) {
    if (!novelIds.length) return;
    let memberships = {};
    try {
        const r = await fetch('/api/collections/novels/memberships', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ novelIds })
        });
        if (!r.ok) return;
        const data = await r.json();
        memberships = data.memberships || {};
    } catch (e) { return; }
    const byId = new Map((state.collections || []).map(c => [c.id, c]));
    novelIds.forEach(id => {
        const collectionIds = memberships[id] || [];
        const card = document.querySelector(`.card[data-novel-id="${id}"]`);
        if (!card) return;
        const heart = card.querySelector('.thumb-heart');
        if (heart) heart.classList.toggle('liked', collectionIds.length > 0);
        const label = card.querySelector(`[data-collections-for="${id}"]`);
        if (!label) return;
        if (collectionIds.length === 0) { label.textContent = ''; return; }
        const names = collectionIds.map(cid => byId.get(cid)?.name).filter(Boolean);
        label.textContent = names.length ? '♥ ' + names.join(' · ') : '';
    });
}
